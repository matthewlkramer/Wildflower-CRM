  # ─── Opportunities & pledges ───────────────────────────────────────────────
  /opportunities-and-pledges:
    get:
      operationId: listOpportunitiesAndPledges
      tags: [opportunities-and-pledges]
      parameters:
        - { $ref: "#/components/parameters/IncludeArchivedQuery" }
        - { name: search, in: query, schema: { type: string } }
        # Presence filters on computed rollup fields. `has` keeps rows with a
        # value, `blank` keeps rows with none. Omit for no constraint.
        - { name: paidPresence, in: query, required: false, description: "Rollup presence filter on paid amount (`has` = >0, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: coveredFysPresence, in: query, required: false, description: "Presence filter on covered fiscal years (`has` = any, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: entitiesPresence, in: query, required: false, description: "Presence filter on linked entities (`has` = any allocation, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: projectedCloseDatePresence, in: query, required: false, description: "Presence filter on projected close date (`has` = set, `blank` = null).", schema: { type: string, enum: [has, blank] } }
        - { name: applicationDeadlinePresence, in: query, required: false, description: "Presence filter on application deadline (`has` = set, `blank` = null).", schema: { type: string, enum: [has, blank] } }
        - { name: winProbabilityPresence, in: query, required: false, description: "Presence filter on win probability (`has` = set, `blank` = null).", schema: { type: string, enum: [has, blank] } }
        # Filter params on nullable enum columns accept the literal
        # `__blank__` to match rows where the column is NULL. Item type is
        # plain string so the sentinel passes generated zod validation.
        - name: status
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: stage
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: pledgeView
          in: query
          required: false
          description: |
            Convenience filter encoding the page split:
              pledges       — writtenPledge=true (the sticky commitment outcome).
                              Drives the /pledges page; historical pledges stay
                              after they're fully paid.
              opportunities — the complement (rest of the rows). Drives the
                              /opportunities page.
            Omit to include all rows.
          schema: { type: string, enum: [pledges, opportunities] }
        - name: writtenPledge
          in: query
          required: false
          description: "Filter strictly on the written_pledge column."
          schema: { type: boolean }
        - name: worklist
          in: query
          required: false
          description: |
            Donor-lifecycle worklist preset ("what hasn't been done yet"). Each
            value applies a composite server-side filter on top of any other
            filters (status, owner, entity scope, etc.) and is the canonical,
            drift-proof definition shared with the dashboard worklist counts:
              verbal_no_letter — stage=verbal_confirmation, written_pledge=false,
                                 grant_letter_url IS NULL, status=open. A verbal
                                 yes with no recorded written commitment yet.
                                 Rows are ordered stalest-first (least recently
                                 updated) so the oldest sit at the top.
              committed_unpaid — status=pledge with $0 received. A written pledge
                                 nothing has been paid against yet.
              partially_paid   — status=pledge with >$0 received (a pledge fully
                                 paid flips to cash_in, so status=pledge + paid>0
                                 means paid < awarded). No expected-payment-date
                                 field exists, so rows are ordered by projected
                                 close date (oldest first) as a best-effort
                                 "overdue" proxy.
          schema: { type: string, enum: [verbal_no_letter, committed_unpaid, partially_paid] }
        - name: type
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { name: individualGiverPersonId, in: query, schema: { type: string } }
        - name: ownerUserId
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: entityId
          in: query
          required: false
          description: |
            Filter to opportunities that have at least one pledge_allocation
            with `entity_id` in the given set. Comma-separated form supported.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: fiscalYear
          in: query
          required: false
          description: |
            Filter to opportunities that have at least one pledge_allocation
            with `grant_year` in the given set (e.g. `fy2026`). Multi-value:
            repeat the param or comma-separate. Omit to include all fiscal
            years.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: includeStageAskTotals
          in: query
          required: false
          description: |
            When true, the response includes `stageAskTotals` — SUM(ask_amount)
            per stage over ALL rows matching the filters, not just the
            returned page. Used by the pipeline board so column totals stay
            correct when the result set exceeds the page limit.
          schema: { type: boolean }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OpportunityOrPledgeList" } } } }
    post:
      operationId: createOpportunityOrPledge
      tags: [opportunities-and-pledges]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOpportunityOrPledgeBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/OpportunityOrPledge" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /opportunities-and-pledges/{id}:
    get:
      operationId: getOpportunityOrPledge
      tags: [opportunities-and-pledges]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OpportunityOrPledgeDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateOpportunityOrPledge
      tags: [opportunities-and-pledges]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateOpportunityOrPledgeBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OpportunityOrPledge" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

