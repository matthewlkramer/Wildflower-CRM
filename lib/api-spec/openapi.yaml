      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: calendarUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { name: startAfter, in: query, schema: { type: string, format: date-time }, description: "Only events with startAt >= this timestamp." }
        - { name: startBefore, in: query, schema: { type: string, format: date-time }, description: "Only events with startAt < this timestamp." }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc }, description: "Sort by startAt. Default desc (most recent first)." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEventList" } } } }
  /calendar-events/{id}:
    get:
      operationId: getCalendarEvent
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /calendar-events/{id}/privacy:
    patch:
      operationId: updateCalendarEventPrivacy
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCalendarEventPrivacyBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Admin: per-user sync health + manual resync ──────────────────────────
  /admin/google-sync:
    get:
      operationId: adminListGoogleSync
      tags: [admin]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AdminGoogleSyncList" } } } }
        "403": { description: Admin required }
  /admin/google-sync/{id}/resync:
    post:
      operationId: adminResyncGoogleUser
      tags: [admin]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: object, additionalProperties: true } } }
        "403": { description: Admin required }
        "409": { description: User has no active Google grant }

  # ─── Admin: Airtable → schools sync health + manual trigger ───────────────
  /admin/school-sync:
    get:
      operationId: adminGetSchoolSyncStatus
      tags: [admin]
      summary: Last Airtable → schools sync run state (admin-only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SchoolSyncStatus" } } } }
        "403": { description: Admin required }
  /admin/school-sync/run:
    post:
      operationId: adminRunSchoolSync
      tags: [admin]
      summary: Trigger an immediate Airtable → schools sync (admin-only). Returns the updated run state.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SchoolSyncStatus" } } } }
        "403": { description: Admin required }
        "502": { description: "School sync failed" }

  # ─── Google OAuth (per-CRM-user Gmail + Calendar grants) ──────────────────
  # NB: /google-oauth/start and /google-oauth/callback are browser
  # navigations (302 redirects to/from Google), not API client calls, so
  # only the status + disconnect endpoints are documented here.
  /google-oauth/status:
    get:
      operationId: getGoogleOauthStatus
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleOauthStatus" } } } }
  /google-oauth/disconnect:
    post:
      operationId: disconnectGoogleOauth
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }

  # ─── Google sync (per-user Gmail + Calendar incremental sync) ─────────────
  /google-sync/status:
    get:
      operationId: getGoogleSyncStatus
      tags: [google-sync]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleSyncStatus" } } } }
  /google-sync/gmail:
    post:
      operationId: runGmailSync
      tags: [google-sync]
      summary: Trigger an immediate Gmail sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GmailSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }
  /google-sync/calendar:
    post:
      operationId: runCalendarSync
      tags: [google-sync]
      summary: Trigger an immediate Google Calendar sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }

  # ─── QuickBooks Online OAuth (admin-gated, org-wide single company) ────────
  # NB: /quickbooks-oauth/start and /quickbooks-oauth/callback are browser
  # navigations (302 redirects to/from Intuit), not API client calls, so only
  # the status + disconnect endpoints are documented here.
  /quickbooks-oauth/status:
    get:
      operationId: getQuickbooksOauthStatus
      tags: [quickbooks-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksOauthStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /quickbooks-oauth/disconnect:
    post:
      operationId: disconnectQuickbooksOauth
      tags: [quickbooks-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── QuickBooks sync (manual "sync now"; admin-gated) ─────────────────────
  /quickbooks/sync:
    post:
      operationId: runQuickbooksSync
      tags: [quickbooks-sync]
      summary: Trigger an immediate one-way QuickBooks → CRM payment pull.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksSyncSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks sync failed" }

  /quickbooks/resync-full:
    post:
      operationId: resyncQuickbooksFull
      tags: [quickbooks-sync]
      summary: Start a non-destructive full re-pull in the background (returns immediately). Re-enriches every staged row with the extended QuickBooks capture fields, preserving all review state. Poll /quickbooks/resync-status for progress.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksResyncStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /quickbooks/resync-status:
    get:
      operationId: getQuickbooksResyncStatus
      tags: [quickbooks-sync]
      summary: Poll the state of the background full re-pull started by /quickbooks/resync-full.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksResyncStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /quickbooks/rematch:
    post:
      operationId: rematchStagedPayments
      tags: [quickbooks-sync]
      summary: Re-run donor auto-match over still-unmatched pending staged payments (additive, never overwrites a human match).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksRematchSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks rematch failed" }

  /quickbooks/reclassify:
    post:
      operationId: reclassifyStagedPayments
      tags: [quickbooks-sync]
      summary: Re-run the noise classifier over auto-classified pending/excluded staged payments (never touches manual overrides).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksReclassifySummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks reclassify failed" }

  # ─── Stripe payment sync (ongoing one-way Stripe → CRM) ───────────────────
  /stripe/sync:
    post:
      operationId: runStripeSync
      tags: [stripe-sync]
      summary: Trigger an immediate one-way Stripe → CRM payout/charge pull (admin only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeSyncSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "Stripe sync failed" }
  /stripe/rematch:
    post:
      operationId: rematchStripeCharges
      tags: [stripe-sync]
      summary: Re-run donor auto-match over still-unmatched pending Stripe charges (additive, never overwrites a human match) (admin only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeRematchSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "Stripe rematch failed" }
  /stripe/sync-status:
    get:
      operationId: getStripeSyncStatus
      tags: [stripe-sync]
      summary: Read the Stripe sync cursor + health (admin only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeSyncStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /stripe/reconciliation/propose-historical:
    post:
      operationId: proposeHistoricalStripeReconciliation
      tags: [stripe-sync]
      summary: Re-run Stripe→QuickBooks payout-match proposals across ALL payouts, including prior-account rows never seen by incremental sync (admin only). Proposals only — every match stays in a proposed/conflict state for a human to confirm; never mints or archives anything.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeHistoricalProposalSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "Historical reconciliation proposal pass failed" }

  # ─── Stripe staged-charge review queue ────────────────────────────────────
  /stripe-staged-charges:
    get:
      operationId: listStripeStagedCharges
      tags: [stripe-staged-charges]
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/StagedPaymentQueue" }, description: "Which queue to list (default needs_review)." }
        - { name: sort, in: query, schema: { $ref: "#/components/schemas/StagedPaymentSort" }, description: "Sort order (default date_desc)." }
        - { name: search, in: query, schema: { type: string }, description: "Free-text filter across payer name/email, description, and statement descriptor." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedChargeList" } } } }
  /stripe-staged-charges-summary:
    get:
      operationId: getStripeStagedChargesSummary
      tags: [stripe-staged-charges]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedChargeSummary" } } } }
  /stripe-staged-charges/{id}/resolve:
    post:
      operationId: resolveStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Set/fix the donor match on a pending Stripe charge (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ResolveStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge is not pending" }
  /stripe-staged-charges/{id}/create-gift:
    post:
      operationId: createGiftFromStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Mint a new gifts_and_payments row (crediting GROSS) from a pending Stripe charge (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StagedGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge is not pending, or its payout conflicts with an approved QuickBooks lump" }
  /stripe-staged-charges/{id}/reject:
    post:
      operationId: rejectStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Reject a Stripe charge (retained so re-sync won't re-stage it).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge is not pending" }
  /stripe-staged-charges/{id}/exclude:
    post:
      operationId: excludeStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Manually file a Stripe charge under a non-gift exclusion category.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ExcludeStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge cannot be excluded from its current state" }
  /stripe-staged-charges/{id}/re-include:
    post:
      operationId: reIncludeStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Move an excluded Stripe charge back to pending (pins classification to manual).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge is not excluded" }
  /stripe-staged-charges/{id}/revert:
    post:
      operationId: revertStripeStagedCharge
      tags: [stripe-staged-charges]
      summary: Undo an approved Stripe charge — unlink a reconciled gift or delete a gift this charge minted — returning the row to pending.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged charge cannot be reverted from its current state" }
  /stripe-staged-charges/{id}/confirm-refund:
    post:
      operationId: confirmStripeRefundPropagation
      tags: [stripe-staged-charges]
      summary: Confirm a proposed Stripe refund/chargeback (INV-13) — reverse (archive) the linked gift for a full refund / chargeback, or reduce its amount for a partial refund; re-derive the linked pledge and recompute the gift's QuickBooks tie.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "No open refund proposal to confirm, or the targeted gift is no longer available" }
  /stripe-staged-charges/{id}/dismiss-refund:
    post:
      operationId: dismissStripeRefundPropagation
      tags: [stripe-staged-charges]
      summary: Dismiss a proposed Stripe refund/chargeback (INV-13) — leave the gift untouched and mark the proposal dismissed; re-sync won't re-raise the same refund (an escalation to a larger refund still re-raises).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripeStagedCharge" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "No open refund proposal to dismiss on this charge" }

  /donorbox/review:
    get:
      operationId: listDonorboxReview
      tags: [donorbox]
      summary: List non-Stripe (PayPal/ACH) Donorbox donations as human-reviewed new-money candidates.
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/DonorboxReviewQueue" }, description: "Which worklist bucket to list (default needs_review)." }
        - { name: search, in: query, schema: { type: string }, description: "Free-text filter across donor name/email, comment, designation, and campaign." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxReviewList" } } } }
  /donorbox/donations/{id}/link-gift:
    post:
      operationId: linkDonorboxDonationToGift
      tags: [donorbox]
      summary: Link a non-Stripe Donorbox donation to an existing gift as evidence (adopts the gift's donor; no new gift minted).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxLinkGiftBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxReviewRow" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Donation is not a pending non-Stripe candidate, or that gift is already linked elsewhere" }
  /donorbox/donations/{id}/create-gift:
    post:
      operationId: createGiftFromDonorboxDonation
      tags: [donorbox]
      summary: Mint a new gift from a non-Stripe Donorbox donation (Donor XOR), with a dedupe guard.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxCreateGiftBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxCreateGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Donation is not a pending non-Stripe candidate, or a possible duplicate was found (resubmit with force=true).", content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxDuplicateResponse" } } } }
  /donorbox/donations/{id}/exclude:
    post:
      operationId: excludeDonorboxDonation
      tags: [donorbox]
      summary: File a non-Stripe Donorbox candidate out of the new-money worklist.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxExcludeBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxReviewRow" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Donation cannot be excluded from its current state" }
  /donorbox/donations/{id}/re-include:
    post:
      operationId: reIncludeDonorboxDonation
      tags: [donorbox]
      summary: Move an excluded Donorbox candidate back to pending.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorboxReviewRow" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Donation is not excluded" }

  /stripe-payouts/reconciliation:
    get:
      operationId: listStripePayoutReconciliations
      tags: [stripe-staged-charges]
      summary: List Stripe payouts by their QuickBooks reconciliation state (proposals to confirm, conflicts to resolve, or already-confirmed), with the active QB deposit lump and any conflicting approved gift joined for display.
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/StripePayoutReconciliationQueue" }, description: "Which queue to list (default proposed)." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripePayoutReconciliationList" } } } }
  /stripe-payouts/{id}/confirm-exclude:
    post:
      operationId: confirmStripePayoutExclude
      tags: [stripe-staged-charges]
      summary: Confirm a proposed payout↔QB-deposit match — exclude the deposit lump (processor_payout, kept and linked, never deleted) and unblock the per-charge Stripe gift queue.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripePayoutReconciliationResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Payout is not in a proposed state" }
  /stripe-payouts/{id}/confirm-keep:
    post:
      operationId: confirmStripePayoutKeep
      tags: [stripe-staged-charges]
      summary: Resolve a conflict by keeping the already-approved QuickBooks gift — record only the payout linkage, touching no gift or deposit.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripePayoutReconciliationResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Payout is not in a conflict_approved state" }
  /stripe-payouts/{id}/confirm-replace:
    post:
      operationId: confirmStripePayoutReplace
      tags: [stripe-staged-charges]
      summary: Resolve a conflict by replacing the coarse QB-derived lump gift — archive it (kept, allocations preserved, never deleted), exclude the deposit, and unblock the per-charge Stripe gift queue. Explicit, default-off in the UI.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripePayoutReconciliationResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Payout is not in a conflict_approved state" }
  /stripe-payouts/{id}/revert-reconciliation:
    post:
      operationId: revertStripePayoutReconciliation
      tags: [stripe-staged-charges]
      summary: Undo a confirmed payout reconciliation back to its prior proposal state. Refused once any of the payout's Stripe charges have been booked into a gift.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StripePayoutReconciliationResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Payout cannot be reverted from its current state, or its charges are already booked" }

  # ─── QuickBooks handling rules (admin-editable ingest classifier) ─────────
  /admin/quickbooks-rules:
    get:
      operationId: adminListQuickbooksRules
      tags: [admin]
      summary: List the QuickBooks auto-handling rules in evaluation order (admin only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/QuickbooksHandlingRule" } } } } }
        "403": { description: Admin required }
    post:
      operationId: adminCreateQuickbooksRule
      tags: [admin]
      summary: Create a QuickBooks auto-handling rule (admin only). Applies to NEW incoming payments only.
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateQuickbooksRuleBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksHandlingRule" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
  /admin/quickbooks-rules/reorder:
    post:
      operationId: adminReorderQuickbooksRules
      tags: [admin]
      summary: Set the evaluation order by supplying rule ids in the desired priority order (admin only).
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ReorderQuickbooksRulesBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/QuickbooksHandlingRule" } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
  /admin/quickbooks-rules/{id}:
    patch:
      operationId: adminUpdateQuickbooksRule
      tags: [admin]
      summary: Update a QuickBooks auto-handling rule (admin only). Applies to NEW incoming payments only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateQuickbooksRuleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksHandlingRule" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminDeleteQuickbooksRule
      tags: [admin]
      summary: Delete a QuickBooks auto-handling rule (admin only).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/quickbooks-rules/{id}/apply-to-pending:
    post:
      operationId: adminApplyQuickbooksRuleToPending
      tags: [admin]
      summary: Preview or apply a single rule to currently-pending staged payments (admin only). Set dryRun=true to get a match count before committing.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ApplyRuleToPendingBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ApplyRuleToPendingResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Revenue coding reference & rules ─────────────────────────────────────
  /revenue-accounts:
    get:
      operationId: listRevenueAccounts
      tags: [revenue-coding]
      summary: List the closed set of QuickBooks revenue accounts (Object Codes).
      parameters:
        - { name: activeOnly, in: query, schema: { type: boolean }, description: "When true, omit deactivated accounts." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RevenueAccount" } } } } }
  /admin/entity-coding-rules:
    get:
      operationId: adminListEntityCodingRules
      tags: [admin]
      summary: List per-entity revenue-coding default rules (admin only).
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/EntityCodingRule" } } } } }
        "403": { description: Admin required }
    post:
      operationId: adminCreateEntityCodingRule
      tags: [admin]
      summary: Create a per-entity revenue-coding rule (admin only).
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateEntityCodingRuleBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/EntityCodingRule" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
  /admin/entity-coding-rules/{id}:
    patch:
      operationId: adminUpdateEntityCodingRule
      tags: [admin]
      summary: Update a per-entity revenue-coding rule (admin only). id is the entityId.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateEntityCodingRuleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EntityCodingRule" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminDeleteEntityCodingRule
      tags: [admin]
      summary: Delete a per-entity revenue-coding rule (admin only).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Staged payments (QuickBooks review queue) ────────────────────────────
  /staged-payments:
    get:
      operationId: listStagedPayments
      tags: [staged-payments]
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/QuickbooksStagedPaymentQueue" }, description: "Which queue to list (default needs_review)." }
        - { name: sort, in: query, schema: { $ref: "#/components/schemas/StagedPaymentSort" }, description: "Sort order (default date_desc)." }
        - { name: search, in: query, schema: { type: string }, description: "Free-text filter across payer, memo, and line item / account / class detail." }
        - { name: entity, in: query, schema: { type: string }, description: "Restrict to one Wildflower entity (entities.id). Empty or 'all' = no restriction; the Foundation id also includes unattributed (null-entity) rows." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPaymentList" } } } }
  /staged-payments-summary:
    get:
      operationId: getStagedPaymentsSummary
      tags: [staged-payments]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksStagedPaymentSummary" } } } }
  /staged-payments-donor-search:
    get:
      operationId: searchStagedPaymentDonors
      tags: [staged-payments]
      summary: Trigram donor search (organizations / people / households) for the reconciler picker.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string }, description: "Search query (min 2 chars)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorSearchList" } } } }
  /staged-payments-pending-for-donor:
    get:
      operationId: getPendingStagedMoneyForDonor
      tags: [staged-payments]
      summary: Pending reconciliation money (QuickBooks + Stripe) matched to a donor.
      description: >-
        Duplicate guard for manual gift entry: returns the still-pending staged
        payments (QuickBooks) and Stripe charges already matched to the given
        donor, so a fundraiser doesn't hand-key a gift for money that is about to
        be booked via reconciliation. Read-only.
      parameters:
        - { name: donorType, in: query, required: true, schema: { type: string, enum: [organization, individual, household] }, description: "Donor kind." }
        - { name: donorId, in: query, required: true, schema: { type: string }, description: "Donor record id." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PendingDonorMoney" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /staged-payments/{id}/resolve:
    post:
      operationId: resolveStagedPayment
      tags: [staged-payments]
      summary: Set/fix the donor match on a pending staged payment (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ResolveStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/create-gift:
    post:
      operationId: createGiftFromStagedPayment
      tags: [staged-payments]
      summary: Mint a new gifts_and_payments row from a pending staged payment (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StagedGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/reject:
    post:
      operationId: rejectStagedPayment
      tags: [staged-payments]
      summary: Reject a staged payment (retained so re-sync won't re-stage it).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/re-include:
    post:
      operationId: reIncludeStagedPayment
      tags: [staged-payments]
      summary: Move an excluded staged payment back to pending (pins classification to manual).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not excluded" }
  /staged-payments/{id}/set-entity:
    post:
      operationId: setStagedPaymentEntity
      tags: [staged-payments]
      summary: Pin or clear the Wildflower-entity attribution by hand (manual override that survives re-sync).
      description: |
        Reviewer sets or corrects which Wildflower legal entity a staged payment
        belongs to. Entity attribution is orthogonal to reconcile status, so this
        works on a row in any state. Pins entity_source='manual' so the
        detectEntity marker classifier never overwrites it on the next sync /
        reclassify — needed for "Sunlight" money (intentionally not
        auto-attributed) and to fix the broad marker match's misattributions.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SetStagedPaymentEntityBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/set-funding-source:
    post:
      operationId: setStagedPaymentFundingSource
      tags: [staged-payments]
      summary: Pin or clear the funding source by hand (manual override that survives re-sync).
      description: |
        Reviewer sets or corrects WHERE a staged payment's money came from / how
        it rendered (Stripe, brokerage, DAF, …). Funding source is an origin
        label orthogonal to reconcile status, so this works on a row in any
        state. Pins funding_source_provenance='manual' so the detectFundingSource
        helper never overwrites it on the next sync / reclassify. fundingSource
        null clears the value (keeping the manual pin so it is not re-derived).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SetStagedPaymentFundingSourceBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/set-needs-research:
    post:
      operationId: setStagedPaymentNeedsResearch
      tags: [staged-payments]
      summary: Set or clear the plain human "needs research" flag on a staged payment.
      description: |
        Reviewer flags a staged payment as not yet fully figured out (unknown
        donor, ambiguous coding, unclear restriction, etc.) so they can come
        back to it. A pure annotation: orthogonal to reconcile status, allowed
        on a row in any state, and never auto-derived. Flipping it has no side
        effects on matching, status, or reconciliation.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SetStagedPaymentNeedsResearchBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/set-coding:
    post:
      operationId: setStagedPaymentCoding
      tags: [staged-payments]
      summary: Set or clear the revenue-coding snapshot on a staged payment (the QuickBooks payment record).
      description: |
        Reviewer captures/edits the accounting coding for this QuickBooks
        payment — Object Code, Revenue Location, Revenue Class (each with a
        manual override), the deferred-revenue flag + reason, and the coding
        flags. The coding snapshot now lives on the payment record, not on the
        allocation; a live derivation is available per-allocation via
        `/gift-allocations/{id}/coding-preview`. Only provided fields are
        written; passing null clears that field. Orthogonal to reconcile status,
        allowed on a row in any state.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SetStagedPaymentCodingBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/exclude:
    post:
      operationId: excludeStagedPayment
      tags: [staged-payments]
      summary: Manually file a staged payment under a non-gift exclusion category.
      description: |
        Human-driven counterpart to the insert-time auto-exclude: files a staged
        payment under a non-gift category (membership, loan, etc.) and moves it to
        the excluded bucket, pinning classification_source='manual' so the
        re-runnable classifier never re-includes it. Works on a pending row
        (exclude it) or an already-excluded row (reclassify its category). The
        donor match is left intact so re-include can restore it.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ExcludeStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment cannot be excluded from its current state" }
  /staged-payments/{id}/gift-candidates:
    get:
      operationId: listStagedPaymentGiftCandidates
      tags: [staged-payments]
      summary: Existing gifts for this staged payment's saved donor within the amount band.
      description: |
        Finds already-recorded gifts_and_payments rows for the staged payment's
        saved donor whose amount is at or just above the staged amount (a
        processor fee makes the CRM gross gift slightly larger than the QB net
        deposit), so the fundraiser can reconcile to an existing gift instead of
        minting a duplicate. Empty when the staged row has no donor or no amount.
        Each candidate flags whether it is already linked to another staged
        payment.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftCandidateList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/gift-window:
    get:
      operationId: listStagedPaymentGiftWindow
      tags: [staged-payments]
      summary: Existing gifts across ALL donors within the amount/date window (donor-agnostic).
      description: |
        Donor-agnostic reconcile entry point: existing gifts whose amount and
        date sit in a window around the staged payment, so a fundraiser can
        reconcile even when the donor wasn't auto-resolved. Empty when the staged
        row has no amount.
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around the staged date (default 30)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftCandidateList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/reconcile:
    post:
      operationId: reconcileStagedPayment
      tags: [staged-payments]
      summary: Reconcile a staged payment to an existing gift (no new gift is created).
      description: |
        Ties the staged payment to an already-recorded gifts_and_payments row by
        setting matchedGiftId. Marks the row approved (autoApplied=false). If the
        staged row has no donor yet it adopts the gift's donor; otherwise the
        donors must match. The gift must not already be linked to another staged
        payment.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending, or the gift is already linked" }
  /staged-payments/{id}/split:
    post:
      operationId: splitStagedPayment
      tags: [staged-payments]
      summary: Split one staged payment across several existing gifts, optionally minting a new gift for the remainder.
      description: |
        Reconciles ONE staged payment to one or more already-recorded gifts for
        different donors — the case where a single incoming-money record (e.g. a
        Stripe payout that nets fees into a lump sum) covers several donors'
        gifts. Each portion links to an existing gift for that gift's own gross
        amount; any unmatched remainder may be routed to a NEW gift (minted with
        a single donor, Donor XOR). QuickBooks is never written back. The staged
        row is marked approved (human-confirmed) and its own donor / single-gift
        link columns are cleared — its resolution lives entirely in the split
        links. Guards: the row is pending; at least two total links (existing
        gifts + optional remainder); each existing gift exists, carries a single
        valid donor, and is not already linked to ANY staged payment (matched,
        created, group-reconciled, or split); and the combined GROSS total
        (existing gifts + remainder) sits in the processor fee-band tolerance
        around the staged NET amount (sum >= staged * 0.9 - 1 AND sum <= staged *
        1.1 + 1). Reversible as a whole via the revert endpoint (unsplit).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SplitStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SplitStagedPaymentResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending, or one of the gifts is already linked" }
  /staged-payments/group-reconcile:
    post:
      operationId: groupReconcileStagedPayments
      tags: [staged-payments]
      summary: Group several staged payments and reconcile them as one unit to an existing gift.
      description: |
        Manually groups two or more staged payments into a single unit and
        reconciles the GROUP as a whole to one already-recorded gift (typically a
        multi-allocation gift). Members must form one coherent group: they share
        ONE underlying bank Deposit (same qbDepositId), or — when no deposit was
        captured — they share the same payer name (e.g. a single wire, or a
        series of stock sales, split across several QuickBooks records). No new
        gift is minted and QuickBooks is never written back. Every member is set
        to approved with groupReconciledGiftId = the gift; one deterministic
        representative member also carries matchedGiftId so the gift shows linked.
        The group adopts the gift's donor (Donor XOR). Guards: at least two rows,
        all pending and unresolved, all sharing one grouping key (deposit or
        payer) — OR all already belonging to one "same physical gift" source
        group (sharing a single non-null sourceGroupId), which bypasses the
        deposit/payer coherence check since the human already asserted the rows
        are one gift (the multi-date / amount-mismatch confirmations below still
        apply); the gift exists with a single valid donor and is not already
        linked elsewhere, and the members' combined total matches the gift amount
        within the processor fee-band tolerance. When the grouped payments do not
        all fall on the same date_received, or carry more than one distinct
        (non-null) bank deposit, `confirmMultiDate` must be true (otherwise
        400 multi_date_confirmation_required) — this guards against collapsing
        unrelated same-payer gifts. When the combined total falls OUTSIDE the
        fee-band tolerance (e.g. stock/securities gifts whose sale proceeds differ
        from the booked value), `confirmAmountMismatch` must be true (otherwise
        400 amount_mismatch_confirmation_required). Reversible as a whole via the
        revert endpoint.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GroupReconcileStagedPaymentsBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GroupReconcileStagedPaymentsResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "A member is no longer pending, or the gift is already linked" }
  /staged-payments/group:
    post:
      operationId: groupStagedPayments
      tags: [staged-payments]
      summary: Group separately-entered QuickBooks records that are really ONE physical gift.
      description: |
        Marks two or more staged payments as a single "same physical gift"
        source group by stamping a shared sourceGroupId. UNLIKE group-reconcile
        (which ties a deposit's members to ONE existing gift at reconcile time),
        this groups FREELY across different bank deposits AND dates and BEFORE
        any gift exists — for a gift a donor entered as several QuickBooks
        records. It only records the grouping: it does NOT change any donor or
        gift link and never reconciles by itself. Guards: at least two distinct,
        existing, non-archived, still-unreconciled rows; rows already in another
        group are rejected unless they are all already in the same group
        (idempotent). When the members resolve to more than one distinct donor,
        confirmDonorConflict must be true (else 400 donor_conflict). The group is
        exactly the rows carrying the id; reconcile it as a unit on the card.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GroupStagedPaymentsBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GroupStagedPaymentsResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "A row is already in a different group, or is no longer groupable." }
  /staged-payments/ungroup:
    post:
      operationId: ungroupStagedPayments
      tags: [staged-payments]
      summary: Remove staged payments from their "same physical gift" source group.
      description: |
        Clears sourceGroupId on the given rows, removing them from their source
        group. If this leaves a group with fewer than two members, the remaining
        orphan is cleared too (a group requires >= 2). Does not change donor or
        gift links. A no-op for rows that aren't grouped.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UngroupStagedPaymentsBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/UngroupStagedPaymentsResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/confirm-matches:
    post:
      operationId: confirmStagedPaymentMatches
      tags: [staged-payments]
      summary: Bulk-confirm several auto-applied/suggested donor matches in one call.
      description: |
        Confirms many staged-payment matches at once — the bulk equivalent of
        POST /staged-payments/{id}/confirm-match, used to clear the Auto-matched
        queue in a single action. Each id is confirmed only if it is in a
        confirmable state (a pending row with a donor, or an auto-applied approved
        row); ids that are missing, already confirmed, or otherwise not
        confirmable are silently skipped rather than failing the whole batch. Does
        not change donors or mint gifts. The response reports which ids were
        confirmed so the client can report partial results.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ConfirmStagedPaymentMatchesBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConfirmStagedPaymentMatchesResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /staged-payments/revert-matches:
    post:
      operationId: revertStagedPaymentMatches
      tags: [staged-payments]
      summary: Bulk-revert several auto-applied matches in one call.
      description: |
        Reverts many staged-payment matches at once — the bulk equivalent of
        POST /staged-payments/{id}/revert, used to clear auto-applied matches off
        the Auto-matched queue in a single action. Each id is reverted only if it
        is in a revertible state (an approved row that was reconciled to an
        existing gift, auto-minted, group-reconciled, or split); the auto-minted
        gift is deleted, pre-existing gifts are untouched. Ids that are missing or
        not revertible (e.g. a manually-created gift) are silently skipped rather
        than failing the whole batch. The response reports which ids were reverted
        so the client can report partial results.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RevertStagedPaymentMatchesBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RevertStagedPaymentMatchesResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /staged-payments/{id}/confirm-match:
    post:
      operationId: confirmStagedPaymentMatch
      tags: [staged-payments]
      summary: Confirm a system-suggested or auto-applied donor match (→ human approved / done).
      description: |
        Stamps the donor match as human-confirmed (match_confirmed_at /
        match_confirmed_by_user_id). Works on a pending row with a donor OR an
        auto-applied approved row (graduating it from "Auto-matched" to "Done").
        Does not change the donor or mint a gift.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not in a confirmable state, or has no donor" }
  /staged-payments/{id}/unmatch:
    post:
      operationId: unmatchStagedPayment
      tags: [staged-payments]
      summary: Clear the donor match (any match → unmatched). Pending rows only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/revert:
    post:
      operationId: revertStagedPayment
      tags: [staged-payments]
      summary: Undo an approved reconciliation/creation (approved → pending).
      description: |
        Returns an approved staged payment to the pending queue. If it was
        reconciled to an existing gift (matchedGiftId), the link is cleared and
        the pre-existing gift is untouched. If it was an auto-minted gift
        (createdGiftId + autoApplied), the auto-created gift is deleted. A
        manually created gift cannot be reverted (it would orphan a
        fundraiser-created ledger row). The donor match is left intact.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment cannot be reverted from its current state" }

  # ─── Grant Leads (team-shared, cross-inbox deduped) ────────────────────────
  /grant-leads:
    get:
      operationId: listGrantLeads
      tags: [grant-leads]
      summary: List all team grant leads (deduped across inboxes).
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/GrantLeadStatus" }, description: "Filter by status. Omit to get all active (new + claimed) leads." }
        - { name: assigneeUserId, in: query, schema: { type: string }, description: "Filter by assignee." }
        - { name: search, in: query, schema: { type: string }, description: "Free-text filter across title and funder name." }
        - { name: includeArchived, in: query, schema: { type: boolean }, description: "When true, include archived and converted leads." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GrantLeadList" } } } }
  /grant-leads/{id}:
    get:
      operationId: getGrantLead
      tags: [grant-leads]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GrantLeadDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /grant-leads/{id}/claim:
    post:
      operationId: claimGrantLead
      tags: [grant-leads]
      summary: Claim this lead (set assignee to caller, status → claimed).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GrantLead" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Lead already converted or archived" }
  /grant-leads/{id}/assign:
    post:
      operationId: assignGrantLead
      tags: [grant-leads]
      summary: Assign (or reassign) this lead to a team member.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AssignGrantLeadBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GrantLead" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Lead already converted or archived" }
  /grant-leads/{id}/archive:
    post:
      operationId: archiveGrantLead
      tags: [grant-leads]
      summary: Archive (dismiss) this lead for everyone.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GrantLead" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Lead already converted or archived" }
  /grant-leads/{id}/split:
    post:
      operationId: splitGrantLead
      tags: [grant-leads]
      summary: Split one lead into two separate leads.
      description: |
        When a single email contained multiple distinct opportunities that were
        grouped together, this endpoint creates a second independent lead for the
        provided alternate title/funder, clones the sightings, and leaves the
        original lead intact with its title/funder updated to the primary.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SplitGrantLeadBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SplitGrantLeadResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Lead already converted or archived" }
  /grant-leads/{id}/convert:
    post:
      operationId: convertGrantLead
      tags: [grant-leads]
      summary: Convert this lead into a real opportunity (cold lead stage).
      description: |
        Mints a new opportunities_and_pledges row at stage=cold_lead, marks
        this lead status=converted, and returns the new opportunity id. The
        caller must supply exactly one of organizationId / individualGiverPersonId
        / householdId (Donor XOR). The lead's targetOrganizationId is pre-filled
        as a convenience but can be overridden.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ConvertGrantLeadBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ConvertGrantLeadResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Lead already converted or archived" }

  # ─── Top Priorities ────────────────────────────────────────────────────────
  /top-priorities:
    get:
      operationId: getTopPriorities
      tags: [top-priorities]
      summary: Top-priority organizations and individuals for the fundraiser dashboard.
      description: |
        Returns all organizations with priority='top' and all people with priority='top'
        who are NOT currently affiliated with a top-priority organization. Each row carries
        computed open-opportunity count, open-task count, affiliated people (organizations)
        or last-gift info (both). Names are masked server-side for anonymous records
        when the viewer is not the owner or an admin.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TopPriorities" } } } }

  # ─── Analytics (aggregate read-only) ───────────────────────────────────────
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Aggregate counts + money totals for the Dashboard landing page.
      parameters:
        - name: entityIds
          in: query
          description: |
            Optional list of `entities.id` slugs. When provided, the money tiles
            (received / openPipelineAsk / openPipelineWeighted / goal) are restricted
            to allocations on those entities. Counts are unaffected. Omit or pass an
            empty list to include all entities.
          required: false
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DashboardSummary" } } } }

  /projections-by-fy-entity:
    get:
      operationId: getProjectionsByFyEntity
      tags: [analytics]
      summary: Open-pipeline pledge_allocations aggregated by (grantYear, entityId).
      description: |
        Joins `pledge_allocations` to its parent `opportunities_and_pledges` where status='open',
        excludes superseded/abandoned allocation rows, and groups remaining rows by
        (grantYear, entityId). `expected` weights `sub_amount` by the parent opp's `win_probability`
        (defaulting to 1 when null). Both grouping keys may be null.
      parameters:
        - name: entityId
          in: query
          required: false
          description: |
            Optional set of `entities.id` slugs. When provided, only allocations
            on those entities are included. Comma-separated form supported.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectionsByFyEntity" } } } }

  /fiscal-year-breakdown/{fyId}:
    get:
      operationId: getFiscalYearBreakdown
      tags: [analytics]
      summary: Per-FY drilldown for a Dashboard money tile.
      description: |
        Returns the supporting detail for a single fiscal year's dashboard money tiles:
        gift allocations booked to that grant_year (the "Received" rollup) and pledge
        allocations on open opportunities for that grant_year (the "Open asks" / "Weighted asks"
        rollups), plus the FY's goal. Each row carries enough denormalized parent info
        (donor names, parent gift/opportunity IDs, win probability) to render a useful table
        without N+1 fetches.
      parameters:
        - { name: fyId, in: path, required: true, schema: { type: string }, description: "fiscal_years.id (e.g. `fy2026`)." }
        - name: entityId
          in: query
          required: false
          description: |
            Optional `entities.id` slug. When provided, both the `received` and
            `openPipeline` sections are restricted to allocations on that entity.
            Omit to include all entities.
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearBreakdown" } } } }

  /fiscal-year-report/{fyId}:
    get:
      operationId: getFiscalYearReport
      tags: [analytics]
      summary: The records behind one fiscal year + track's progress-to-goal bar.
      description: |
        Returns every record that contributes to a single fiscal year +
        fundraising category's "progress to goal" calculation, tagged by bucket
        (`received` | `committed` | `open`), plus the reconciling per-bucket
        totals. Mirrors the dashboard-summary `fyMetricsFor` semantics exactly
        (same archived / countsTowardGoal / reimbursable-`direct` exclusions;
        committed = per-opp unpaid remainder of status='pledge'; weighted open =
        sub_amount × win_probability on status='open') so the totals reconcile to
        the dashboard bar for the same FY + track + entity filter. Rows are
        ordered received → committed → open, amount descending within each bucket.
      parameters:
        - { name: fyId, in: path, required: true, schema: { type: string }, description: "fiscal_years.id (e.g. `fy2026`)." }
        - name: category
          in: query
          required: false
          description: "Which track to report — `revenue` (Grants) or `loan_capital` (Loans). Defaults to revenue."
          schema: { $ref: "#/components/schemas/FundraisingCategory" }
        - name: entityIds
          in: query
          required: false
          description: |
            Optional list of `entities.id` slugs. When provided, all three buckets
            and the goal are restricted to allocations on those entities. Omit or
            pass an empty list to include all entities.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearReport" } } } }

  # ─── Bulk record updates ───────────────────────────────────────────────────
  # One endpoint per entity. The body is { ids, patch } where `patch` is
  # a per-entity subset of writable fields. Only fields present in `patch`
  # are written — forward-only, untouched fields are never overwritten.
  # Returns 200 even on partial failures; per-id failures are listed in
  # the response body (the audit log records both success and failure).
  /people/bulk-update:
    post:
      operationId: bulkUpdatePeople
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdatePeopleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/bulk-update:
    post:
      operationId: bulkUpdateOrganizations
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateOrganizationsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/merge:
    post:
      operationId: mergeOrganizations
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergeOrganizationsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /people/merge:
    post:
      operationId: mergePeople
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergePeopleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/merge:
    post:
      operationId: mergeGiftsAndPayments
      tags: [gifts-and-payments]
      summary: "Merge several gifts into one gift, summing amounts and combining allocations."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergeGiftsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: "A duplicate gift is linked to a QuickBooks staged payment; resolve that first." }
  /gifts-and-payments/merge-into-pledge:
    post:
      operationId: mergeGiftsIntoPledge
      tags: [gifts-and-payments]
      summary: "Attach several gifts to a pledge as its payments (new pledge or existing)."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergeGiftsIntoPledgeBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeIntoPledgeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: "Target pledge not found or one of the gifts could not be attached." }
  /gifts-and-payments/{id}/split-into-pledge:
    post:
      operationId: splitGiftIntoPledge
      tags: [gifts-and-payments]
      summary: "Convert one multi-allocation gift into a pledge plus one gift per allocation."
      description: |
        Transforms a single gift that has two or more allocations into a PLEDGE
        (awarded amount = the gift amount, donor inherited from the gift) and
        splits the gift so each `gift_allocation` becomes its own payment gift on
        that pledge. Non-destructive: the original gift is KEPT — it becomes the
        payment for its first allocation; one new gift is minted per remaining
        allocation. The allocation sub-amounts must sum to the gift amount.
        Returns 409 when the gift already pays a pledge or is linked to a
        QuickBooks staged payment (resolve that first); 400 when the gift has
        fewer than two allocations or the sub-amounts do not sum to the amount.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: false, content: { application/json: { schema: { $ref: "#/components/schemas/SplitGiftIntoPledgeBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeIntoPledgeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "The gift already pays a pledge, is linked to a QuickBooks staged payment, or its allocations cannot be split." }
  /gifts-and-payments/{id}/revert-to-opportunity:
    post:
      operationId: revertGiftToOpportunity
      tags: [gifts-and-payments]
      summary: "Revert a recorded gift back into a pipeline opportunity (or a pledge)."
      description: |
        Treats the recorded gift as money that did NOT actually land: mints a fresh
        opportunities_and_pledges row from the gift (donor + amount inherited, its
        allocations mirrored onto pledge_allocations) and ARCHIVES the gift
        (non-destructive — the gift and its allocations are retained, soft-deleted).
        With asPledge=true the new record is a written PLEDGE (a documented but
        still-unpaid commitment); otherwise it is an open OPPORTUNITY back in the
        pipeline. Derived opportunity fields (status/stage) are recomputed afterward
        — never written by hand. Returns 409 when the gift is archived, already pays
        a pledge, or is linked to a QuickBooks staged payment (resolve that first).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: false, content: { application/json: { schema: { $ref: "#/components/schemas/RevertGiftToOpportunityBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RevertGiftToOpportunityResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "The gift is archived, already pays a pledge, or is linked to a QuickBooks staged payment." }
  /households/bulk-update:
    post:
      operationId: bulkUpdateHouseholds
      tags: [households]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateHouseholdsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /opportunities-and-pledges/bulk-update:
    post:
      operationId: bulkUpdateOpportunitiesAndPledges
      tags: [opportunities-and-pledges]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateOpportunitiesBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/bulk-update:
    post:
      operationId: bulkUpdateGiftsAndPayments
      tags: [gifts-and-payments]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateGiftsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  # ─── Bulk archive (soft-delete) ──────────────────────────────────────────────
  # Replaces the former per-entity bulk-delete. Stamps archived_at on each id
  # instead of removing the row; anyone authenticated may archive. Per-row;
  # returns succeeded + failed ids.
  /people/bulk-archive:
    post:
      operationId: bulkArchivePeople
      tags: [people]
      summary: "Archive (soft-delete) the given people. Per-row; returns succeeded + failed ids."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkArchiveBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/bulk-archive:
    post:
      operationId: bulkArchiveOrganizations
      tags: [organizations]
      summary: "Archive (soft-delete) the given organizations. Per-row; returns succeeded + failed ids."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkArchiveBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /opportunities-and-pledges/bulk-archive:
    post:
      operationId: bulkArchiveOpportunitiesAndPledges
      tags: [opportunities-and-pledges]
      summary: "Archive (soft-delete) the given opportunities/pledges. Per-row; returns succeeded + failed ids."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkArchiveBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/bulk-archive:
    post:
      operationId: bulkArchiveGiftsAndPayments
      tags: [gifts-and-payments]
      summary: "Archive (soft-delete) the given gifts/payments. Per-row; returns succeeded + failed ids."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkArchiveBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ─── Per-entity archive / unarchive (soft-delete) ────────────────────────────
  # POST /{entity}/{id}/archive — anyone authenticated may archive (replaces the
  # row delete). POST /{entity}/{id}/unarchive — admin-only (403 otherwise).
  /people/{id}/archive:
    post:
      operationId: archivePerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Person" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /people/{id}/unarchive:
    post:
      operationId: unarchivePerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Person" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /organizations/{id}/archive:
    post:
      operationId: archiveOrganization
      tags: [organizations]
