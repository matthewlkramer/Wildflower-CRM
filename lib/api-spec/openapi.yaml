        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateHousehold
      tags: [households]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateHouseholdBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Household" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteHousehold
      tags: [households]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── People ────────────────────────────────────────────────────────────────
  /people:
    get:
      operationId: listPeople
      tags: [people]
      parameters:
