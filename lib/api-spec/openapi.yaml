        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    NoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Note" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateNoteBody:
      type: object
