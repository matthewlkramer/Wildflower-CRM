  # ─── Email tracking (Magio-compatible) ───────────────────────────────────
  # Vendored from github.com/DeepakSilaych/Magio. The browser extension
  # POSTs here when the operator clicks Send in Gmail; we mint an id,
  # resolve the To: address against the CRM contacts table, and the
  # extension injects a 1×1 pixel pointing at /track/{id}.gif. POST/search/
  # status/delete-latest are intentionally UNAUTHENTICATED to keep the
  # extension stateless (matches upstream). The CRM-facing read paths
  # require auth.
  /email-tracking:
    get:
      operationId: listTrackedEmails
      tags: [email-tracking]
      description: "CRM dashboard listing. Requires auth."
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 100, minimum: 1, maximum: 1000 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TrackedEmailList" } } } }
    post:
      operationId: createTrackedEmail
      tags: [email-tracking]
      description: "Called by the extension at send-time. Unauthenticated by design."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateTrackedEmailBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/TrackedEmail" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /email-tracking/send:
    post:
      operationId: sendTrackedEmail
      tags: [email-tracking]
      description: >-
        Superhuman-style per-recipient send. The extension posts the composed
        message; the server delivers one individualized copy per recipient
        through the sender's own Gmail (each copy carries a unique tracking
        pixel but shows the full To/Cc group). Authenticated by the per-user
        X-Extension-Token header (not Clerk).
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SendTrackedEmailBody" } } } }
      responses:
        "201": { description: Sent, content: { application/json: { schema: { $ref: "#/components/schemas/SendTrackedEmailResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { description: Missing or invalid extension token }
        "409": { description: "Google not connected or send scope not granted (reconnect required)." }
        "502": { description: Gmail send failed }
  /email-tracking/search:
    get:
      operationId: searchTrackedEmail
      tags: [email-tracking]
      description: "Extension sidebar lookup by subject. Returns null when no match. Unauthenticated."
      parameters:
        - { name: subject, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/TrackedEmailWithViews" }
                  - { type: "null" }
  /email-tracking/status:
    get:
      operationId: listTrackedEmailStatuses
      tags: [email-tracking]
      description: "Extension list-icon source — subject + view count for every tracked email. Unauthenticated."
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/TrackedEmailStatus" } } } } }
  /email-tracking/by-contact:
    get:
      operationId: listTrackedEmailsByContact
      tags: [email-tracking]
      description: "Tracked sends linked to one CRM contact. Exactly one of personId / organizationId / householdId required. Requires auth."
      parameters:
        - { name: personId,    in: query, schema: { type: string } }
        - { name: organizationId,    in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TrackedEmailList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /email-tracking/extension-token:
    get:
      operationId: getExtensionToken
      tags: [email-tracking]
      description: "Returns the current user's tracking-extension token (or null if not yet generated). Requires auth."
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ExtensionTokenResponse" } } } }
    post:
      operationId: rotateExtensionToken
      tags: [email-tracking]
      description: "Generates (or rotates) the current user's tracking-extension token and returns it. Requires auth."
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ExtensionTokenResponse" } } } }
  /email-tracking/{id}:
    get:
      operationId: getTrackedEmail
      tags: [email-tracking]
      description: "CRM detail view. Requires auth."
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TrackedEmailWithViews" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-tracking/{id}/views/latest:
    delete:
      operationId: deleteLatestTrackedEmailView
      tags: [email-tracking]
      description: "Magio's sender-self-view cleanup: drops any views logged in the last 5 minutes for this email. Unauthenticated (extension uses it)."
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted: { type: integer }

  # ─── Email messages (synced Gmail, read-only + privacy toggle) ────────────
  /email-messages:
    get:
      operationId: listEmailMessages
      tags: [email-messages]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailMessageList" } } } }
  /email-messages/{id}:
    get:
      operationId: getEmailMessage
      tags: [email-messages]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailMessageDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-messages/{id}/privacy:
    patch:
      operationId: updateEmailMessagePrivacy
      tags: [email-messages]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateEmailMessagePrivacyBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailMessage" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-attachments/{id}/download:
    get:
      operationId: downloadEmailAttachment
      tags: [email-messages]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: Attachment bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Calendar events (synced Google Calendar, read-only + privacy) ────────
  /calendar-events:
    get:
      operationId: listCalendarEvents
      tags: [calendar-events]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: calendarUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { name: startAfter, in: query, schema: { type: string, format: date-time }, description: "Only events with startAt >= this timestamp." }
        - { name: startBefore, in: query, schema: { type: string, format: date-time }, description: "Only events with startAt < this timestamp." }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc }, description: "Sort by startAt. Default desc (most recent first)." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEventList" } } } }
  /calendar-events/{id}:
    get:
      operationId: getCalendarEvent
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /calendar-events/{id}/privacy:
    patch:
      operationId: updateCalendarEventPrivacy
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCalendarEventPrivacyBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Admin: per-user sync health + manual resync ──────────────────────────
  /admin/google-sync:
    get:
      operationId: adminListGoogleSync
      tags: [admin]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AdminGoogleSyncList" } } } }
        "403": { description: Admin required }
  /admin/google-sync/{id}/resync:
    post:
      operationId: adminResyncGoogleUser
      tags: [admin]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: object, additionalProperties: true } } }
        "403": { description: Admin required }
        "409": { description: User has no active Google grant }

  # ─── Google OAuth (per-CRM-user Gmail + Calendar grants) ──────────────────
  # NB: /google-oauth/start and /google-oauth/callback are browser
  # navigations (302 redirects to/from Google), not API client calls, so
  # only the status + disconnect endpoints are documented here.
  /google-oauth/status:
    get:
      operationId: getGoogleOauthStatus
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleOauthStatus" } } } }
  /google-oauth/disconnect:
    post:
      operationId: disconnectGoogleOauth
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }

  # ─── Google sync (per-user Gmail + Calendar incremental sync) ─────────────
  /google-sync/status:
    get:
      operationId: getGoogleSyncStatus
      tags: [google-sync]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleSyncStatus" } } } }
  /google-sync/gmail:
    post:
      operationId: runGmailSync
      tags: [google-sync]
      summary: Trigger an immediate Gmail sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GmailSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }
  /google-sync/calendar:
    post:
      operationId: runCalendarSync
      tags: [google-sync]
      summary: Trigger an immediate Google Calendar sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }

  # ─── QuickBooks Online OAuth (admin-gated, org-wide single company) ────────
  # NB: /quickbooks-oauth/start and /quickbooks-oauth/callback are browser
  # navigations (302 redirects to/from Intuit), not API client calls, so only
  # the status + disconnect endpoints are documented here.
  /quickbooks-oauth/status:
    get:
      operationId: getQuickbooksOauthStatus
      tags: [quickbooks-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksOauthStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /quickbooks-oauth/disconnect:
    post:
      operationId: disconnectQuickbooksOauth
      tags: [quickbooks-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── QuickBooks sync (manual "sync now"; admin-gated) ─────────────────────
  /quickbooks/sync:
    post:
      operationId: runQuickbooksSync
      tags: [quickbooks-sync]
      summary: Trigger an immediate one-way QuickBooks → CRM payment pull.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksSyncSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks sync failed" }

  /quickbooks/resync-full:
    post:
      operationId: resyncQuickbooksFull
      tags: [quickbooks-sync]
      summary: Start a non-destructive full re-pull in the background (returns immediately). Re-enriches every staged row with the extended QuickBooks capture fields, preserving all review state. Poll /quickbooks/resync-status for progress.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksResyncStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /quickbooks/resync-status:
    get:
      operationId: getQuickbooksResyncStatus
      tags: [quickbooks-sync]
      summary: Poll the state of the background full re-pull started by /quickbooks/resync-full.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksResyncStatus" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /quickbooks/rematch:
    post:
      operationId: rematchStagedPayments
      tags: [quickbooks-sync]
      summary: Re-run donor auto-match over still-unmatched pending staged payments (additive, never overwrites a human match).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksRematchSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks rematch failed" }

  /quickbooks/reclassify:
    post:
      operationId: reclassifyStagedPayments
      tags: [quickbooks-sync]
      summary: Re-run the noise classifier over auto-classified pending/excluded staged payments (never touches manual overrides).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/QuickbooksReclassifySummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502": { description: "QuickBooks reclassify failed" }

  # ─── Staged payments (QuickBooks review queue) ────────────────────────────
  /staged-payments:
    get:
      operationId: listStagedPayments
      tags: [staged-payments]
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/StagedPaymentQueue" }, description: "Which queue to list (default needs_review)." }
        - { name: sort, in: query, schema: { $ref: "#/components/schemas/StagedPaymentSort" }, description: "Sort order (default date_desc)." }
        - { name: search, in: query, schema: { type: string }, description: "Free-text filter across payer, memo, and line item / account / class detail." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPaymentList" } } } }
  /staged-payments-summary:
    get:
      operationId: getStagedPaymentsSummary
      tags: [staged-payments]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPaymentSummary" } } } }
  /staged-payments-donor-search:
    get:
      operationId: searchStagedPaymentDonors
      tags: [staged-payments]
      summary: Trigram donor search (organizations / people / households) for the reconciler picker.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string }, description: "Search query (min 2 chars)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DonorSearchList" } } } }
  /staged-payments/{id}/resolve:
    post:
      operationId: resolveStagedPayment
      tags: [staged-payments]
      summary: Set/fix the donor match on a pending staged payment (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ResolveStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/create-gift:
    post:
      operationId: createGiftFromStagedPayment
      tags: [staged-payments]
      summary: Mint a new gifts_and_payments row from a pending staged payment (donor XOR).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StagedGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/reject:
    post:
      operationId: rejectStagedPayment
      tags: [staged-payments]
      summary: Reject a staged payment (retained so re-sync won't re-stage it).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/re-include:
    post:
      operationId: reIncludeStagedPayment
      tags: [staged-payments]
      summary: Move an excluded staged payment back to pending (pins classification to manual).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not excluded" }
  /staged-payments/{id}/exclude:
    post:
      operationId: excludeStagedPayment
      tags: [staged-payments]
      summary: Manually file a staged payment under a non-gift exclusion category.
      description: |
        Human-driven counterpart to the insert-time auto-exclude: files a staged
        payment under a non-gift category (membership, loan, etc.) and moves it to
        the excluded bucket, pinning classification_source='manual' so the
        re-runnable classifier never re-includes it. Works on a pending row
        (exclude it) or an already-excluded row (reclassify its category). The
        donor match is left intact so re-include can restore it.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ExcludeStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment cannot be excluded from its current state" }
  /staged-payments/{id}/gift-candidates:
    get:
      operationId: listStagedPaymentGiftCandidates
      tags: [staged-payments]
      summary: Existing gifts for this staged payment's saved donor within the amount band.
      description: |
        Finds already-recorded gifts_and_payments rows for the staged payment's
        saved donor whose amount is at or just above the staged amount (a
        processor fee makes the CRM gross gift slightly larger than the QB net
        deposit), so the fundraiser can reconcile to an existing gift instead of
        minting a duplicate. Empty when the staged row has no donor or no amount.
        Each candidate flags whether it is already linked to another staged
        payment.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftCandidateList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/gift-window:
    get:
      operationId: listStagedPaymentGiftWindow
      tags: [staged-payments]
      summary: Existing gifts across ALL donors within the amount/date window (donor-agnostic).
      description: |
        Donor-agnostic reconcile entry point: existing gifts whose amount and
        date sit in a window around the staged payment, so a fundraiser can
        reconcile even when the donor wasn't auto-resolved. Empty when the staged
        row has no amount.
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around the staged date (default 30)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftCandidateList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /staged-payments/{id}/reconcile:
    post:
      operationId: reconcileStagedPayment
      tags: [staged-payments]
      summary: Reconcile a staged payment to an existing gift (no new gift is created).
      description: |
        Ties the staged payment to an already-recorded gifts_and_payments row by
        setting matchedGiftId. Marks the row approved (autoApplied=false). If the
        staged row has no donor yet it adopts the gift's donor; otherwise the
        donors must match. The gift must not already be linked to another staged
        payment.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileStagedPaymentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedGiftResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending, or the gift is already linked" }
  /staged-payments/group-reconcile:
    post:
      operationId: groupReconcileStagedPayments
      tags: [staged-payments]
      summary: Group several same-deposit staged payments and reconcile them as one unit to an existing gift.
      description: |
        Manually groups two or more staged payments that share ONE underlying
        bank Deposit (same qbDepositId) into a single "deposit unit" and
        reconciles the GROUP as a whole to one already-recorded gift (typically a
        multi-allocation gift). No new gift is minted and QuickBooks is never
        written back. Every member is set to approved with
        groupReconciledGiftId = the gift; one deterministic representative member
        also carries matchedGiftId so the gift shows linked. The group adopts the
        gift's donor (Donor XOR). Guards: at least two rows, all pending and
        unresolved, all sharing the same non-null deposit, the gift exists with a
        single valid donor and is not already linked elsewhere, and the members'
        combined total matches the gift amount within the processor fee-band
        tolerance. Reversible as a whole via the revert endpoint.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GroupReconcileStagedPaymentsBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GroupReconcileStagedPaymentsResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "A member is no longer pending, or the gift is already linked" }
  /staged-payments/{id}/confirm-match:
    post:
      operationId: confirmStagedPaymentMatch
      tags: [staged-payments]
      summary: Confirm a system-suggested or auto-applied donor match (→ human approved / done).
      description: |
        Stamps the donor match as human-confirmed (match_confirmed_at /
        match_confirmed_by_user_id). Works on a pending row with a donor OR an
        auto-applied approved row (graduating it from "Auto-matched" to "Done").
        Does not change the donor or mint a gift.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not in a confirmable state, or has no donor" }
  /staged-payments/{id}/unmatch:
    post:
      operationId: unmatchStagedPayment
      tags: [staged-payments]
      summary: Clear the donor match (any match → unmatched). Pending rows only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment is not pending" }
  /staged-payments/{id}/revert:
    post:
      operationId: revertStagedPayment
      tags: [staged-payments]
      summary: Undo an approved reconciliation/creation (approved → pending).
      description: |
        Returns an approved staged payment to the pending queue. If it was
        reconciled to an existing gift (matchedGiftId), the link is cleared and
        the pre-existing gift is untouched. If it was an auto-minted gift
        (createdGiftId + autoApplied), the auto-created gift is deleted. A
        manually created gift cannot be reverted (it would orphan a
        fundraiser-created ledger row). The donor match is left intact.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StagedPayment" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Staged payment cannot be reverted from its current state" }

  # ─── Top Priorities ────────────────────────────────────────────────────────
  /top-priorities:
    get:
      operationId: getTopPriorities
      tags: [top-priorities]
      summary: Top-priority organizations and individuals for the fundraiser dashboard.
      description: |
        Returns all organizations with priority='top' and all people with priority='top'
        who are NOT currently affiliated with a top-priority organization. Each row carries
        computed open-opportunity count, open-task count, affiliated people (organizations)
        or last-gift info (both). Names are masked server-side for anonymous records
        when the viewer is not the owner or an admin.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TopPriorities" } } } }

  # ─── Analytics (aggregate read-only) ───────────────────────────────────────
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Aggregate counts + money totals for the Dashboard landing page.
      parameters:
        - name: entityIds
          in: query
          description: |
            Optional list of `entities.id` slugs. When provided, the money tiles
            (received / openPipelineAsk / openPipelineWeighted / goal) are restricted
            to allocations on those entities. Counts are unaffected. Omit or pass an
            empty list to include all entities.
          required: false
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DashboardSummary" } } } }

  /projections-by-fy-entity:
    get:
      operationId: getProjectionsByFyEntity
      tags: [analytics]
      summary: Open-pipeline pledge_allocations aggregated by (grantYear, entityId).
      description: |
        Joins `pledge_allocations` to its parent `opportunities_and_pledges` where status='open',
        excludes superseded/abandoned allocation rows, and groups remaining rows by
        (grantYear, entityId). `expected` weights `sub_amount` by the parent opp's `win_probability`
        (defaulting to 1 when null). Both grouping keys may be null.
      parameters:
        - name: entityId
          in: query
          required: false
          description: |
            Optional set of `entities.id` slugs. When provided, only allocations
            on those entities are included. Comma-separated form supported.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectionsByFyEntity" } } } }

  /fiscal-year-breakdown/{fyId}:
    get:
      operationId: getFiscalYearBreakdown
      tags: [analytics]
      summary: Per-FY drilldown for a Dashboard money tile.
      description: |
        Returns the supporting detail for a single fiscal year's dashboard money tiles:
        gift allocations booked to that grant_year (the "Received" rollup) and pledge
        allocations on open opportunities for that grant_year (the "Open asks" / "Weighted asks"
        rollups), plus the FY's goal. Each row carries enough denormalized parent info
        (donor names, parent gift/opportunity IDs, win probability) to render a useful table
        without N+1 fetches.
      parameters:
        - { name: fyId, in: path, required: true, schema: { type: string }, description: "fiscal_years.id (e.g. `fy2026`)." }
        - name: entityId
          in: query
          required: false
          description: |
            Optional `entities.id` slug. When provided, both the `received` and
            `openPipeline` sections are restricted to allocations on that entity.
            Omit to include all entities.
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearBreakdown" } } } }

  # ─── Bulk record updates ───────────────────────────────────────────────────
  # One endpoint per entity. The body is { ids, patch } where `patch` is
  # a per-entity subset of writable fields. Only fields present in `patch`
  # are written — forward-only, untouched fields are never overwritten.
  # Returns 200 even on partial failures; per-id failures are listed in
  # the response body (the audit log records both success and failure).
  /people/bulk-update:
    post:
      operationId: bulkUpdatePeople
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdatePeopleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/bulk-update:
    post:
      operationId: bulkUpdateOrganizations
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateOrganizationsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/merge:
    post:
      operationId: mergeOrganizations
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergeOrganizationsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /people/merge:
    post:
      operationId: mergePeople
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MergePeopleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MergeResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /households/bulk-update:
    post:
      operationId: bulkUpdateHouseholds
      tags: [households]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateHouseholdsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /opportunities-and-pledges/bulk-update:
    post:
      operationId: bulkUpdateOpportunitiesAndPledges
      tags: [opportunities-and-pledges]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateOpportunitiesBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/bulk-update:
    post:
      operationId: bulkUpdateGiftsAndPayments
      tags: [gifts-and-payments]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateGiftsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, size, contentType]
              properties:
                name: { type: string, minLength: 1 }
                size: { type: integer, minimum: 1 }
                contentType: { type: string, minLength: 1 }
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                type: object
                required: [uploadURL, objectPath]
                properties:
                  uploadURL: { type: string, format: uri }
                  objectPath: { type: string }
                  metadata:
                    type: object
                    properties:
                      name: { type: string }
                      size: { type: integer }
                      contentType: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ─── Person suppression windows ─────────────────────────────────────────────
  /person-suppression-windows:
    get:
      operationId: listPersonSuppressionWindows
      tags: [suppression-windows]
      summary: List per-person sync suppression windows
      parameters:
        - { name: personId, in: query, schema: { type: string }, description: "Filter to a specific person." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonSuppressionWindowList" } } } }
    post:
      operationId: createPersonSuppressionWindow
      tags: [suppression-windows]
      summary: Add a suppression window for a person (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePersonSuppressionWindowBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PersonSuppressionWindow" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /person-suppression-windows/{id}:
    patch:
      operationId: updatePersonSuppressionWindow
      tags: [suppression-windows]
      summary: Update a suppression window (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdatePersonSuppressionWindowBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonSuppressionWindow" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePersonSuppressionWindow
      tags: [suppression-windows]
      summary: Delete a suppression window (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Calendar meeting-filter config ─────────────────────────────────────────
  /calendar-meeting-filters:
    get:
      operationId: getCalendarMeetingFilters
      tags: [calendar-meeting-filters]
      summary: Get the current group-meeting suppression config
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarMeetingFiltersConfig" } } } }
    put:
      operationId: updateCalendarMeetingFilters
      tags: [calendar-meeting-filters]
      summary: Replace the group-meeting suppression config (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCalendarMeetingFiltersBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarMeetingFiltersConfig" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── Internal staff email-domain config ─────────────────────────────────────
  /internal-email-domains:
    get:
      operationId: getInternalEmailDomains
      tags: [internal-email-domains]
      summary: Get the configured internal staff email domains
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InternalEmailDomainsConfig" } } } }
    put:
      operationId: updateInternalEmailDomains
      tags: [internal-email-domains]
      summary: Replace the internal staff email-domain list (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateInternalEmailDomainsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InternalEmailDomainsConfig" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

components:
  parameters:
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 10000, default: 50 } }
    Page:  { name: page,  in: query, schema: { type: integer, minimum: 1, default: 1 } }
    IdPath: { name: id, in: path, required: true, schema: { type: string } }

  responses:
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    BadRequest:
      description: Bad request (validation error)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    Forbidden:
      description: Forbidden (admin access required)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties: { status: { type: string } }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:   { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    Pagination:
      type: object
      required: [page, limit, total]
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ─── Enums ─────────────────────────────────────────────────────────────────
    RegionType: { type: string, enum: [state, metro_area, city, neighborhood, region_within_state, multi_state_region, country, continent] }
    EntityRoleType: { type: string, enum: [organization, payment_intermediary, household] }
    ContactValidity: { type: string, enum: [valid, invalid, unknown] }
    EmailType: { type: string, enum: [work, personal, other] }
    PhoneType: { type: string, enum: [work, mobile, home, other] }
    PeopleRoleCurrent: { type: string, enum: [current, past] }
    PeopleEntityRoleConnection: { type: string, enum: [employee, principal, board_member, partner, professor, donor_advisor, elected_official] }
    PaymentIntermediaryType: { type: string, enum: [daf, giving_platform, private_wealth_manager] }
    Pronouns: { type: string, enum: [he_him_his, she_her_hers, they_them_theirs, other] }
    SchoolStatus: { type: string, enum: [emerging, open, paused, closing, permanently_closed, disaffiliating, disaffiliated, placeholder, abandoned] }
    GovernanceModel: { type: string, enum: [independent, district, charter, exploring_charter, community_partnership] }
    UserRole: { type: string, enum: [admin, team_member, finance, read_only] }
    FundingEntitySubtype: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform] }
    EntityType: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform, advocacy_membership_lobbyist, authorizer, education_vendor, elected_official, higher_ed, investor, law_firm, media, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    NumberOfEmployees: { type: string, enum: [e_1, e_2_10, e_11_50, e_51_250, e_251_1000, e_1001_10000, e_10000_plus] }
    CapacityRating: { type: string, enum: [tier_1k_10k, tier_10k_50k, tier_50k_250k, tier_250k_1m, tier_1m_plus] }
    ConnectionStatus: { type: string, enum: [connected, have_a_connector, no_connection] }
    Enthusiasm: { type: string, enum: ['7-advocate', '6-supportive', '5-warm', '4-neutral', '3-cool', '2-unsupportive', '1-hostile'] }
    Priority: { type: string, enum: [top, high, medium, low] }
    StrategicAlignment: { type: string, enum: [high, medium, low] }
    ActiveStatus: { type: string, enum: [active, defunct, spenddown] }
    OrganizationType: { type: string, enum: [advocacy_membership_lobbyist, authorizer, cmo, capital_provider, government, corporation, education_vendor, elected_official, higher_ed, investor, law_firm, media, nonprofit, philanthropic_advisor, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    OpportunityStatus:
      type: string
      enum: [open, pledge, cash_in, dormant, lost]
      description: |
        Lifecycle status of an opportunity/pledge row. FULLY CALCULATED and
        read-only — never set this directly. Derived server-side from stage +
        payments + lossType on every write:
          lossType set                                  → status = lossType
          else fully paid (paid≥awarded) or stage=cash_in → cash_in
          else stage = written_commitment                      → pledge
          else                                                 → open
        Values:
          open    — actively in the funnel, not yet committed
          pledge  — funder has committed (stage = written, or conditional/grant-letter sticky flag)
          cash_in — fully paid (stage=cash_in or sum of payments >= awarded)
          dormant — paused (mirrors lossType='dormant')
          lost    — declined/withdrawn (mirrors lossType='lost')
        To mark a row dormant/lost, set the `lossType` field instead.
    OpportunityLossType:
      type: string
      enum: [dormant, lost]
      description: |
        User-set override that pulls an opportunity/pledge out of the
        calculated funnel. Null while open/pledge/cash_in; set to 'dormant'
        (paused) or 'lost' (declined/withdrawn). The only user-settable half
        of the old status overload — when set, `status` mirrors it.
    OpportunityType: { type: string, enum: [solicitation, renewal, open_application] }
    OpportunityStage: { type: string, enum: [cold_lead, warm_lead, in_conversation, convince, conditional_commitment, probable_renewal, verbal_confirmation, written_commitment, cash_in] }
    OpportunityConditional: { type: string, enum: [unconditional, conditional_unspecified, reimbursable, conditional_on_funder_determination, conditional_on_target] }
    PledgeAllocationStatus: { type: string, enum: [working, committed, superseded, committed_with_conditions, superseded_by_pledge, superseded_by_gift, abandoned] }
    GiftType: { type: string, enum: [standard_gift, pledge_payment, directed_gift, loan_fund_investment, matching_gift] }
    GiftPaymentMethod: { type: string, enum: [ach, check, wire, stock, donor_box, daf_ach, daf_check, daf_bill_com] }
    IntendedUsage: { type: string, enum: [gen_ops, growth, school_startup, teacher_training, project] }

    # ─── Users ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, emailSyncMode, createdAt, updatedAt]
      properties:
        id:             { type: string }
        clerkId:        { type: string }
        email:          { type: string }
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        displayName:    { type: string, nullable: true }
        role:           { $ref: "#/components/schemas/UserRole" }
        defaultFund:    { type: string, nullable: true }
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    EmailSyncMode:
      type: string
      enum: [full, summary_only]
      description: "Per-user Gmail sync privacy mode. `full` stores the email body + attachments. `summary_only` stores only an AI-generated one-line topic summary; body and attachments are never persisted, and intelligence/proposals are skipped for messages from this mailbox. The setting applies to NEW emails synced after the change; existing emails are not retroactively edited."
    UpdateCurrentUserBody:
      type: object
      properties:
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }

    # ─── Regions ───────────────────────────────────────────────────────────────
    CreateRegionBody:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1, description: "Human-readable region name, e.g. 'Greater Boston'." }
        displayPath: { type: string, description: "Full display path, e.g. 'United States, Massachusetts, Greater Boston'. Defaults to name when omitted." }
    Region:
      type: object
      required: [id, name, displayPath, createdAt, updatedAt]
      properties:
        id:                 { type: string, description: "Human-readable slug PK, e.g. `united_states__minnesota__saint_paul`. Built from the region's name plus its included-type ancestors (continent / country / state / city / neighborhood); intermediate aggregation layers (multi_state_region, region_within_state, metro_area) are skipped." }
        name:               { type: string }
        displayPath:        { type: string, description: "Comma-separated full path including every ancestor (e.g. `United States, New England, Massachusetts, Greater Boston, Boston`). Use for UI display." }
        stateAbbreviation:  { type: string, nullable: true }
        type:               { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
        parentRegionId:     { type: string, nullable: true }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
    RegionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Region" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Schools ───────────────────────────────────────────────────────────────
    School:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        longName:                 { type: string, nullable: true }
        shortName:                { type: string, nullable: true }
        status:                   { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:          { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        agesPlanes:               { type: array, items: { type: string }, nullable: true }
        logoMainSquareUrl:        { type: string, nullable: true }
        stageStatus:              { type: string, nullable: true }
        currentMailingAddress:    { type: string, nullable: true }
        currentPhysicalAddress:   { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    SchoolList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/School" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Entities / fundable projects / fiscal years ──────────────────────────
    Entity:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:        { type: string }
        name:      { type: string }
        active:    { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateEntityBody:
      type: object
      required: [id, name]
      properties:
        id:     { type: string, description: "Slug-style key, e.g. wildflower_foundation. Must be unique." }
        name:   { type: string }
        active: { type: boolean, description: "Defaults to true. Set false to mark retired." }
    UpdateEntityBody:
      type: object
      properties:
        name:   { type: string }
        active: { type: boolean }
    FiscalYearEntityGoal:
      type: object
      required: [fiscalYearId, entityId, goalAmount, createdAt, updatedAt]
      properties:
        fiscalYearId: { type: string }
        entityId:     { type: string }
        goalAmount:   { type: string, description: "Decimal string (numeric(14,2))." }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    UpsertFiscalYearEntityGoalBody:
      type: object
      required: [goalAmount]
      properties:
        goalAmount: { type: string, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProject:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:               { type: string }
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean }
        fundraisingStart: { type: string, format: date, nullable: true, description: "Fundraising start date (YYYY-MM-DD). Null on legacy rows; UI prompts to fill in." }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string (numeric(14,2)). Null on legacy rows." }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    CreateFundableProjectBody:
      type: object
      required: [id, name]
      properties:
        id:               { type: string, description: "Slug-style key, e.g. ssj. Must be unique." }
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean, description: "Defaults to true. Set false to mark retired." }
        fundraisingStart: { type: string, format: date, nullable: true }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    UpdateFundableProjectBody:
      type: object
      properties:
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean }
        fundraisingStart: { type: string, format: date, nullable: true }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProjectProgress:
      type: object
      required: [fundableProjectId, raised]
      properties:
        fundableProjectId: { type: string }
        raised:            { type: string, description: "Decimal string — sum of gift_allocations.sub_amount for this project. '0' when none." }
    FiscalYear:
      type: object
      required: [id, label, createdAt, updatedAt]
      properties:
        id:         { type: string }
        label:      { type: string }
        startDate:  { type: string, format: date, nullable: true }
        endDate:    { type: string, format: date, nullable: true }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    # ─── Analytics (aggregate read-only response shapes) ──────────────────────
    DashboardCounts:
      type: object
      required: [people, organizations, households, opportunities, openOpportunities, pledges, gifts]
      properties:
        people:            { type: integer }
        households:        { type: integer }
        organizations:     { type: integer }
        opportunities:     { type: integer }
        openOpportunities: { type: integer }
        # Count of rows currently on the Pledges page: wasPledge=true OR
        # stage ∈ (conditional, verbal, written).
        pledges:           { type: integer }
        gifts:             { type: integer }
    DashboardFiscalYear:
      type: object
      required: [id, label, startDate, endDate]
      properties:
        id:        { type: string, description: "fy-slug (e.g. `fy2026`)." }
        label:     { type: string, description: "Human label (e.g. `FY 2026`)." }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    FiscalYearMetrics:
      type: object
      required: [fiscalYear, openPipelineAsk, openPipelineWeighted, received, goal]
      description: |
        Per-fiscal-year fundraising metrics. All money values are decimal strings
        (PostgreSQL numeric) to preserve precision — format with `formatCurrency`
        on the client. `goal` is nullable because not every FY has a goal seeded
        (e.g. far-future years).
      properties:
        fiscalYear:           { $ref: "#/components/schemas/DashboardFiscalYear" }
        openPipelineAsk:      { type: string, description: "SUM(pledge_allocations.sub_amount) for status='open' opps with grant_year = this FY." }
        openPipelineWeighted: { type: string, description: "SUM(pledge_allocations.sub_amount × COALESCE(parent.win_probability, 1)) for status='open' opps with grant_year = this FY." }
        received:             { type: string, description: "SUM(gift_allocations.sub_amount) for allocations with grant_year = this FY." }
        goal:                 { type: string, nullable: true, description: "Fundraising goal for the FY (from fiscal_years.goal_amount); null if not set." }
    DashboardSummary:
      type: object
      required: [counts, currentFiscalYear, byFiscalYear]
      properties:
        counts:            { $ref: "#/components/schemas/DashboardCounts" }
        currentFiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        byFiscalYear:
          type: array
          description: "Per-FY metrics for the current FY and the next FY (in that order)."
          items: { $ref: "#/components/schemas/FiscalYearMetrics" }

    ProjectionByFyEntityRow:
      type: object
      required: [grantYear, entityId, allocationCount, totalSubAmount, expected]
      properties:
        grantYear:       { type: string, nullable: true, description: "fiscal_years.id, or null for unbucketed allocations." }
        entityId:        { type: string, nullable: true, description: "entities.id, or null for unbucketed allocations." }
        allocationCount: { type: integer }
        totalSubAmount:  { type: string, description: "SUM(sub_amount) for the group, as numeric string." }
        expected:        { type: string, description: "SUM(sub_amount × COALESCE(parent.win_probability, 1)) for the group, as numeric string." }
    ProjectionsByFyEntity:
      type: object
      required: [rows]
      properties:
        rows: { type: array, items: { $ref: "#/components/schemas/ProjectionByFyEntityRow" } }

    TopPriorityAffiliate:
      type: object
      required: [personId, personName, anonymous, ownerUserId]
      properties:
        personId:    { type: string }
        personName:  { type: string }
        anonymous:   { type: boolean }
        ownerUserId: { type: string, nullable: true }

    TopPriorityOpenAsk:
      type: object
      required: [opportunityId, opportunityName]
      properties:
        opportunityId:   { type: string }
        opportunityName: { type: string }

    TopPriorityOrganization:
      type: object
      required: [id, name, anonymous, ownerUserId, openOpportunityCount, openTaskCount, openAsks, affiliatedPeople]
      properties:
        id:                   { type: string }
        name:                 { type: string }
        anonymous:            { type: boolean }
        ownerUserId:          { type: string, nullable: true }
        openOpportunityCount: { type: integer }
        openTaskCount:        { type: integer }
        openAsks:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOpenAsk" }
        affiliatedPeople:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityAffiliate" }
        lastGiftDate:         { type: string, nullable: true }
        lastGiftAmount:       { type: string, nullable: true }

    TopPriorityPerson:
      type: object
      required: [id, firstName, lastName, anonymous, ownerUserId, openOpportunityCount, openTaskCount, openAsks]
      properties:
        id:                   { type: string }
        firstName:            { type: string, nullable: true }
        lastName:             { type: string, nullable: true }
        fullName:             { type: string, nullable: true }
        anonymous:            { type: boolean }
        ownerUserId:          { type: string, nullable: true }
        openOpportunityCount: { type: integer }
        openTaskCount:        { type: integer }
        openAsks:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOpenAsk" }
        lastGiftDate:         { type: string, nullable: true }
        lastGiftAmount:       { type: string, nullable: true }

    TopPriorities:
      type: object
      required: [organizations, individuals]
      properties:
        organizations:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOrganization" }
        individuals:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityPerson" }

    FiscalYearReceivedRow:
      type: object
      required: [allocationId, subAmount, giftId]
      description: "A single gift_allocation row booked to the FY's grant_year, denormalized with parent gift + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "gift_allocations.sub_amount (numeric string)." }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        displayUsage:               { type: string, nullable: true, description: "Server-computed human-readable usage label from gift_allocations.display_usage." }
        fundableProjectId:          { type: string, nullable: true }
        giftId:                     { type: string }
        giftType:                   { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        giftAmount:                 { type: string, nullable: true, description: "Parent gift's total amount (numeric string)." }
        organizationId:                   { type: string, nullable: true }
        organizationName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
    FiscalYearOpenRow:
      type: object
      required: [allocationId, subAmount, weightedAmount, opportunityId]
      description: "A single pledge_allocation row on an open opportunity for the FY's grant_year, denormalized with parent opp + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "pledge_allocations.sub_amount (numeric string)." }
        weightedAmount:             { type: string, description: "sub_amount × COALESCE(parent.win_probability, 1) (numeric string)." }
        allocationStatus:           { type: string, nullable: true }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        fundableProjectId:          { type: string, nullable: true }
        opportunityId:              { type: string }
        opportunityName:            { type: string, nullable: true }
        opportunityStage:           { type: string, nullable: true }
        winProbability:             { type: string, nullable: true, description: "Parent opp's win_probability (0–1, numeric string)." }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        organizationId:                   { type: string, nullable: true }
        organizationName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
    FiscalYearBreakdown:
      type: object
      required: [fiscalYear, goal, received, openPipeline]
      description: |
        Supporting detail for a single FY's dashboard money tiles. `received` powers the
        "Received" tile (gift_allocations summed); `openPipeline` powers both the
        "Open asks" tile (totalAsk) and the "Weighted asks" tile (totalWeighted).
      properties:
        fiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        goal:       { type: string, nullable: true }
        received:
          type: object
          required: [total, rows]
          properties:
            total: { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            rows:  { type: array, items: { $ref: "#/components/schemas/FiscalYearReceivedRow" } }
        openPipeline:
          type: object
          required: [totalAsk, totalWeighted, rows]
          properties:
            totalAsk:      { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            totalWeighted: { type: string, description: "SUM(weightedAmount) across the rows (numeric string)." }
            rows:          { type: array, items: { $ref: "#/components/schemas/FiscalYearOpenRow" } }

    # ─── Organizations ─────────────────────────────────────────────────────────
    # Unified table — consolidates former `funders` (issuesGrants=true) and
    # `organizations` (issuesGrants=false, advisors/partners/etc.).
    Organization:
      type: object
      required: [id, name, issuesGrants, anonymous, createdAt, updatedAt]
      properties:
        id:                    { type: string }
        name:                  { type: string }
        issuesGrants:          { type: boolean, description: "True for grant-making organizations (formerly 'funders'); false for non-grant entities." }
        entityType:            { allOf: [ { $ref: "#/components/schemas/EntityType" } ], nullable: true, description: "Normalized entity type (school_network, nonprofit, etc.)." }
        makesPris:             { type: boolean, nullable: true }
        numberOfEmployees:     { allOf: [ { $ref: "#/components/schemas/NumberOfEmployees" } ], nullable: true }
        capacityRating:        { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        totalAssets:           { type: string, nullable: true, description: "Estimated total assets / endowment size. Decimal as string." }
        priorityAreasNotes:    { type: string, nullable: true }
        about:                 { type: string, nullable: true }
        activeStatus:          { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        otherNames:            { type: string, nullable: true }
        historicalNames:       { type: array, items: { type: string }, nullable: true }
        details:               { type: string, nullable: true }
        emailDomain:           { type: string, nullable: true }
        orgEmail:              { type: string, nullable: true }
        ownerUserId:           { type: string, nullable: true }
        tags:                  { type: string, nullable: true }
        website:               { type: string, nullable: true }
        connectionStatus:      { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        enthusiasm:            { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        strategicAlignment:    { allOf: [ { $ref: "#/components/schemas/StrategicAlignment" } ], nullable: true }
        interestsThematic:     { type: array, items: { type: string }, nullable: true }
        interestsAges:         { type: array, items: { type: string }, nullable: true }
        interestsGovModels:    { type: array, items: { type: string }, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }
        parentOrganizationId:  { type: string, nullable: true }
        paymentIntermediaryId: { type: string, nullable: true, description: "Payment intermediary (e.g. a DAF) this organization gives through." }
        anonymous:             { type: boolean, description: "When true, hide the organization's real name in the UI (shown as 'Anonymous') from everyone except the record owner and admins. UI-only; the name is still stored and returned." }
        lastContacted:         { type: string, format: date, nullable: true }
        x:                     { type: string, nullable: true }
        linkedin:              { type: string, nullable: true }
        facebook:              { type: string, nullable: true }
        instagram:             { type: string, nullable: true }
        youtube:               { type: string, nullable: true }
        crunchbase:            { type: string, nullable: true }
        quickbooksCustomerId:  { type: string, nullable: true, description: "QuickBooks Online Customer Id this organization maps to." }
        priority:              { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, description: "Solicitation priority tier (top/high/medium/low)." }
        # Server-computed aggregates for the organizations list view.
        primaryContactPersonId:   { type: string, nullable: true, readOnly: true }
        primaryContactPersonName: { type: string, nullable: true, readOnly: true }
        lifetimeGiving:           { type: string, nullable: true, readOnly: true, description: "Sum of gifts.amount where organization_id matches. Decimal as string." }
        openOpportunityCount:     { type: integer, nullable: true, readOnly: true, description: "Count of opportunities_and_pledges where organization_id matches and status='open'." }
        createdAt:             { type: string, format: date-time }
        updatedAt:             { type: string, format: date-time }
    OrganizationDetail:
      allOf:
        - { $ref: "#/components/schemas/Organization" }
        - type: object
          properties:
            people:       { type: array, items: { $ref: "#/components/schemas/PeopleEntityRole" } }
            emails:       { type: array, items: { $ref: "#/components/schemas/Email" } }
            phoneNumbers: { type: array, items: { $ref: "#/components/schemas/PhoneNumber" } }
            addresses:    { type: array, items: { $ref: "#/components/schemas/Address" } }
            paymentIntermediary: { allOf: [ { $ref: "#/components/schemas/PaymentIntermediary" } ], nullable: true, readOnly: true }
    OrganizationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Organization" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateOrganizationBody:
      type: object
      required: [name]
      properties:
        name:                  { type: string }
        issuesGrants:          { type: boolean }
        entityType:            { allOf: [ { $ref: "#/components/schemas/EntityType" } ], nullable: true }
        makesPris:             { type: boolean }
        numberOfEmployees:     { $ref: "#/components/schemas/NumberOfEmployees" }
        capacityRating:        { $ref: "#/components/schemas/CapacityRating" }
        totalAssets:           { type: string }
        priorityAreasNotes:    { type: string }
        about:                 { type: string }
        activeStatus:          { $ref: "#/components/schemas/ActiveStatus" }
        otherNames:            { type: string }
        historicalNames:       { type: array, items: { type: string } }
        details:               { type: string }
        emailDomain:           { type: string }
        orgEmail:              { type: string }
        ownerUserId:           { type: string }
        tags:                  { type: string }
        website:               { type: string }
        connectionStatus:      { $ref: "#/components/schemas/ConnectionStatus" }
        enthusiasm:            { $ref: "#/components/schemas/Enthusiasm" }
        strategicAlignment:    { $ref: "#/components/schemas/StrategicAlignment" }
        interestsThematic:     { type: array, items: { type: string } }
        interestsAges:         { type: array, items: { type: string } }
        interestsGovModels:    { type: array, items: { type: string } }
        regionIds:             { type: array, items: { type: string } }
        parentOrganizationId:  { type: string }
        paymentIntermediaryId: { type: string }
        x:                     { type: string }
        linkedin:              { type: string }
        facebook:              { type: string }
        instagram:             { type: string }
        youtube:               { type: string }
        crunchbase:            { type: string }
        quickbooksCustomerId:  { type: string }
        priority:              { $ref: "#/components/schemas/Priority" }
        anonymous:             { type: boolean }
    UpdateOrganizationBody:
      type: object
      properties:
        name:                  { type: string }
        issuesGrants:          { type: boolean }
        entityType:            { allOf: [ { $ref: "#/components/schemas/EntityType" } ], nullable: true }
        makesPris:             { type: boolean, nullable: true }
        numberOfEmployees:     { allOf: [ { $ref: "#/components/schemas/NumberOfEmployees" } ], nullable: true }
        capacityRating:        { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        totalAssets:           { type: string, nullable: true }
        priorityAreasNotes:    { type: string, nullable: true }
        about:                 { type: string, nullable: true }
        activeStatus:          { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        otherNames:            { type: string, nullable: true }
        historicalNames:       { type: array, items: { type: string }, nullable: true }
        details:               { type: string, nullable: true }
        emailDomain:           { type: string, nullable: true }
        orgEmail:              { type: string, nullable: true }
        ownerUserId:           { type: string, nullable: true }
        tags:                  { type: string, nullable: true }
        website:               { type: string, nullable: true }
        connectionStatus:      { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        enthusiasm:            { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        strategicAlignment:    { allOf: [ { $ref: "#/components/schemas/StrategicAlignment" } ], nullable: true }
        interestsThematic:     { type: array, items: { type: string }, nullable: true }
        interestsAges:         { type: array, items: { type: string }, nullable: true }
        interestsGovModels:    { type: array, items: { type: string }, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }
        parentOrganizationId:  { type: string, nullable: true }
        paymentIntermediaryId: { type: string, nullable: true }
        x:                     { type: string, nullable: true }
        linkedin:              { type: string, nullable: true }
        facebook:              { type: string, nullable: true }
        instagram:             { type: string, nullable: true }
        youtube:               { type: string, nullable: true }
        crunchbase:            { type: string, nullable: true }
        quickbooksCustomerId:  { type: string, nullable: true }
        priority:              { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        anonymous:             { type: boolean }

    # ─── Donor payment-intermediaries ("gives through") ─────────────────────────
    DonorPaymentIntermediary:
      type: object
      required: [id, paymentIntermediaryId, paymentIntermediary, createdAt, updatedAt]
      properties:
        id:                      { type: string }
        paymentIntermediaryId:   { type: string }
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        notes:                   { type: string, nullable: true }
        paymentIntermediary:     { $ref: "#/components/schemas/PaymentIntermediary" }
        createdAt:               { type: string, format: date-time }
        updatedAt:               { type: string, format: date-time }
    DonorPaymentIntermediaryList:
      type: object
      required: [data, giftDerived]
      properties:
        data:        { type: array, items: { $ref: "#/components/schemas/DonorPaymentIntermediary" } }
        # Intermediaries seen on this donor's gifts that are NOT yet logged as
        # explicit links — surfaced as quick-add suggestions, not persisted.
        giftDerived: { type: array, items: { $ref: "#/components/schemas/PaymentIntermediary" } }
    CreateDonorPaymentIntermediaryBody:
      type: object
      required: [paymentIntermediaryId]
      properties:
        paymentIntermediaryId:   { type: string }
        organizationId:          { type: string }
        individualGiverPersonId: { type: string }
        householdId:             { type: string }
        notes:                   { type: string }

    # ─── Payment intermediaries ────────────────────────────────────────────────
    PaymentIntermediary:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:         { type: string }
        name:       { type: string }
        type:       { allOf: [ { $ref: "#/components/schemas/PaymentIntermediaryType" } ], nullable: true }
        quickbooksCustomerId: { type: string, nullable: true, description: "QuickBooks Online Customer Id this payment intermediary maps to." }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }
    PaymentIntermediaryDetail:
      allOf:
        - { $ref: "#/components/schemas/PaymentIntermediary" }
        - type: object
          properties:
            people:    { type: array, items: { $ref: "#/components/schemas/PeopleEntityRole" } }
            emails:    { type: array, items: { $ref: "#/components/schemas/Email" } }
            addresses: { type: array, items: { $ref: "#/components/schemas/Address" } }
    PaymentIntermediaryList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/PaymentIntermediary" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreatePaymentIntermediaryBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        type: { $ref: "#/components/schemas/PaymentIntermediaryType" }
        quickbooksCustomerId: { type: string }
    UpdatePaymentIntermediaryBody:
      type: object
      properties:
        name: { type: string }
        type: { allOf: [ { $ref: "#/components/schemas/PaymentIntermediaryType" } ], nullable: true }
        quickbooksCustomerId: { type: string, nullable: true }

    # ─── Households ────────────────────────────────────────────────────────────
    Household:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        active:                   { type: boolean }
        # Server-computed aggregates for the households list view.
        lifetimeGiving:           { type: string, nullable: true, readOnly: true, description: "Sum of gifts to this household + gifts directly to its member individuals. Decimal as string." }
        mostRecentGiftDate:       { type: string, format: date, nullable: true, readOnly: true, description: "Most recent date_received across household gifts and member individual gifts." }
        openOpportunityCount:     { type: integer, nullable: true, readOnly: true, description: "Count of opportunities_and_pledges where household_id matches and status='open'." }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    HouseholdDetail:
      allOf:
        - { $ref: "#/components/schemas/Household" }
        - type: object
          properties:
            people:    { type: array, items: { $ref: "#/components/schemas/PeopleEntityRole" } }
            emails:    { type: array, items: { $ref: "#/components/schemas/Email" } }
            addresses: { type: array, items: { $ref: "#/components/schemas/Address" } }
    HouseholdList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Household" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateHouseholdBody:
      type: object
      required: [name]
      properties:
        name:   { type: string }
        active: { type: boolean }
    UpdateHouseholdBody:
      type: object
      properties:
        name:   { type: string }
        active: { type: boolean }

    # ─── People ────────────────────────────────────────────────────────────────
    Person:
      type: object
      required: [id, deceased, newsletter, unsubscribedToNewsletter, anonymous, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        prefix:                   { type: string, nullable: true }
        firstName:                { type: string, nullable: true }
        nickname:                 { type: string, nullable: true }
        middleName:               { type: string, nullable: true }
        lastName:                 { type: string, nullable: true }
        suffix:                   { type: string, nullable: true }
        fullName:                 { type: string, nullable: true }
        pronouns:                 { allOf: [ { $ref: "#/components/schemas/Pronouns" } ], nullable: true }
