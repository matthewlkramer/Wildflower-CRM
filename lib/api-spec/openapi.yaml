    InteractionKind:
      type: string
      enum: [meeting, phone_call, video_call, conference, other]
    Interaction:
      type: object
      required: [id, kind, occurredAt, summary, createdAt, updatedAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        funderIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    InteractionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Interaction" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateInteractionBody:
      type: object
      required: [kind, occurredAt, summary]
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer }
        location:         { type: string }
        summary:          { type: string }
        notes:            { type: string }
        ownerUserId:      { type: string }
        personIds:        { type: array, items: { type: string } }
        funderIds:        { type: array, items: { type: string } }
        householdIds:     { type: array, items: { type: string } }
    UpdateInteractionBody:
      type: object
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        funderIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }

    # ─── Email messages + attachments + calendar events ──────────────────────
    EmailMessage:
      type: object
      required: [id, mailboxUserId, direction, sentAt, isPrivate]
      properties:
        id:                  { type: string }
        gmailMessageId:      { type: string }
        gmailThreadId:       { type: string, nullable: true }
        mailboxUserId:       { type: string }
        direction:           { type: string, enum: [sent, received] }
        sentAt:              { type: string, format: date-time }
        subject:             { type: string, nullable: true }
        snippet:             { type: string, nullable: true }
        fromEmail:           { type: string, nullable: true }
        toEmails:            { type: array, items: { type: string }, nullable: true }
        ccEmails:            { type: array, items: { type: string }, nullable: true }
        bccEmails:           { type: array, items: { type: string }, nullable: true }
        hasAttachments:      { type: boolean }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedFunderIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
        aiSummary:           { type: string, nullable: true, description: "One-line topic summary. Populated only when the mailbox owner is in `summary_only` mode; in that case it is the ONLY content stored for the message — `snippet`, `bodyText`, `bodyHtml`, and attachments are all absent." }
    EmailMessageDetail:
      allOf:
        - $ref: "#/components/schemas/EmailMessage"
        - type: object
          properties:
            bodyText:    { type: string, nullable: true }
            bodyHtml:    { type: string, nullable: true }
            attachments:
              type: array
              items: { $ref: "#/components/schemas/EmailAttachmentSummary" }
    EmailAttachmentSummary:
      type: object
      required: [id, filename, mimeType, sizeBytes]
      properties:
        id:                 { type: string }
        filename:           { type: string }
        mimeType:           { type: string }
        sizeBytes:          { type: integer }
        gmailAttachmentId:  { type: string, nullable: true }
    EmailMessageList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailMessage" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateEmailMessagePrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }
    CalendarEvent:
      type: object
      required: [id, calendarUserId, gcalCalendarId, gcalEventId, startAt, isPrivate]
      properties:
        id:                  { type: string }
        calendarUserId:      { type: string }
        gcalCalendarId:      { type: string }
        gcalEventId:         { type: string }
        startAt:             { type: string, format: date-time }
        endAt:               { type: string, format: date-time, nullable: true }
        summary:             { type: string, nullable: true }
        description:         { type: string, nullable: true }
        location:            { type: string, nullable: true }
        attendeeEmails:      { type: array, items: { type: string }, nullable: true }
        organizerEmail:      { type: string, nullable: true }
        status:              { type: string, nullable: true }
        htmlLink:            { type: string, nullable: true }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedFunderIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
    CalendarEventList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/CalendarEvent" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateCalendarEventPrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }

    # ─── Admin sync status ────────────────────────────────────────────────────
    AdminGoogleSyncSourceStatus:
      type: object
      required: [bootstrapInProgress]
      properties:
        lastSyncedAt:           { type: string, format: date-time, nullable: true }
        lastError:              { type: string, nullable: true }
        bootstrapCompletedAt:   { type: string, format: date-time, nullable: true }
        bootstrapInProgress:    { type: boolean }
    AdminGoogleSyncUserRow:
      type: object
      required: [userId, userEmail, connected, gmail, calendar]
      properties:
        userId:           { type: string }
        userEmail:        { type: string }
        googleEmail:      { type: string, nullable: true }
        connected:        { type: boolean }
        grantedAt:        { type: string, format: date-time, nullable: true }
        revokedAt:        { type: string, format: date-time, nullable: true }
        tokenLastError:   { type: string, nullable: true }
        gmail:            { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
        calendar:         { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
    AdminGoogleSyncList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminGoogleSyncUserRow" }

    # ─── Google OAuth status ──────────────────────────────────────────────────
    GoogleOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has GOOGLE_OAUTH_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "Caller has an active, non-revoked grant" }
        googleEmail:  { type: string, nullable: true }
        scope:        { type: string, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }

    # ─── Google sync status + run report ──────────────────────────────────────
    GoogleSyncStatus:
      type: object
      properties:
        gmail:
          nullable: true
          type: object
          properties:
            lastHistoryId:        { type: string, nullable: true }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
        calendar:
          nullable: true
          type: object
          properties:
            hasSyncToken:         { type: boolean }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
    GmailSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            skipped:             { type: integer }
            attachments:         { type: integer }
            attachmentBytes:     { type: integer }
            bootstrapCompleted:  { type: boolean }
            finalHistoryId:      { type: string, nullable: true }
    CalendarSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            updated:             { type: integer }
            skipped:             { type: integer }
            errors:              { type: integer }
            bootstrapCompleted:  { type: boolean }
            hasSyncToken:        { type: boolean }

    # ─── Email intelligence ───────────────────────────────────────────────────
    EmailProposalKind:
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce_invalid, bounce_soft, signature_update, grant_opportunity]
    EmailProposalStatus:
      type: string
      enum: [pending, applied, rejected, ignored]
    EmailProposal:
      type: object
      required: [id, mailboxUserId, kind, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                 { type: string }
        mailboxUserId:      { type: string }
        kind:               { $ref: "#/components/schemas/EmailProposalKind" }
        status:             { $ref: "#/components/schemas/EmailProposalStatus" }
        sourceMessageId:    { type: string, nullable: true }
        targetPersonId:     { type: string, nullable: true }
        targetFunderId:     { type: string, nullable: true }
        targetEmailId:      { type: string, nullable: true }
        subjectEmail:       { type: string, nullable: true }
        subjectName:        { type: string, nullable: true }
        subjectDomain:      { type: string, nullable: true }
        payload:            { type: object, additionalProperties: true }
        proposedActions:    { type: array, items: { $ref: "#/components/schemas/ProposedAction" } }
        actionsAnalyzedAt:  { type: string, format: date-time, nullable: true }
        actionsModel:       { type: string, nullable: true }
        actionsError:       { type: string, nullable: true }
        appliedActions:     { type: array, items: { $ref: "#/components/schemas/ApplyActionResult" }, nullable: true }
        dedupeKey:          { type: string }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
        resolvedAt:         { type: string, format: date-time, nullable: true }
        resolvedByUserId:   { type: string, nullable: true }
    ProposedAction:
      type: object
      required: [type, reason]
      additionalProperties: true
      properties:
        type:
          type: string
          enum:
            - deactivate_per
            - create_per
            - create_person_with_per
            - add_email
            - set_primary_email
            - mark_email_invalid
            - create_grant_opportunity
        reason: { type: string }
    ApplyActionResult:
      type: object
      required: [type, status]
      properties:
        type:      { type: string }
        status:    { type: string, enum: [applied, skipped, failed] }
        message:   { type: string, nullable: true }
        createdId: { type: string, nullable: true }
    EmailProposalList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailProposal" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    EmailProposalSummaryEntry:
      type: object
      required: [kind, pending]
      properties:
        kind:    { $ref: "#/components/schemas/EmailProposalKind" }
        pending: { type: integer }
    EmailProposalSummary:
      type: object
      required: [byKind, totalPending]
      properties:
        byKind:        { type: array, items: { $ref: "#/components/schemas/EmailProposalSummaryEntry" } }
        totalPending:  { type: integer }
    EmailProposalActionFailed:
      # Returned with status 422 when an accept dispatched but one of the
      # apply actions failed. The proposal stays pending (the route's
      # transaction rolls back the row's status change too) and partial
      # action results are surfaced so the UI can show what did/didn't run.
      type: object
      required: [error, message, failedAction, attemptedResults]
      properties:
        error:            { type: string, enum: [action_failed] }
        message:          { type: string }
        failedAction:     { type: string }
        attemptedResults: { type: array, items: { type: object, additionalProperties: true } }
    AcceptEmailProposalBody:
      # All fields optional — the accept handler is per-kind and reads only
      # what's relevant. e.g. signature_update may receive {applyTitle:true,
      # applyPhone:false} to opt into individual field copies; auto_responder_move
      # may receive {newPrimaryFunderId} to override the parsed company guess.
      type: object
      additionalProperties: true
    UnrecognizedCorrespondent:
      type: object
      required: [emailAddress, threadCount, firstSeenAt, lastSeenAt]
      properties:
        emailAddress: { type: string }
        displayName:  { type: string, nullable: true }
        domain:       { type: string, nullable: true }
        threadCount:  { type: integer }
        firstSeenAt:  { type: string, format: date-time }
        lastSeenAt:   { type: string, format: date-time }
        lastSubject:  { type: string, nullable: true }
    UnrecognizedCorrespondentList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/UnrecognizedCorrespondent" } }
    CreateCorrespondentIgnoreBody:
      type: object
      required: [emailAddress]
      properties:
        emailAddress: { type: string }

    # ─── Notes ───────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, body, authorUserId, createdAt, updatedAt]
      properties:
        id:              { type: string }
        body:            { type: string }
        authorUserId:    { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    NoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Note" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateNoteBody:
      type: object
      required: [body]
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string } }
        funderIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateNoteBody:
      type: object
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Tasks ───────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [open, waiting, done, cancelled]
    Task:
      type: object
      required: [id, title, status, createdByUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string }
        description:      { type: string, nullable: true }
        dueDate:          { type: string, format: date, nullable: true }
        status:           { $ref: "#/components/schemas/TaskStatus" }
        completedAt:      { type: string, format: date-time, nullable: true }
        assigneeUserId:   { type: string, nullable: true }
        createdByUserId:  { type: string }
        personIds:        { type: array, items: { type: string }, nullable: true }
        funderIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        opportunityIds:   { type: array, items: { type: string }, nullable: true }
        giftIds:          { type: array, items: { type: string }, nullable: true }
        mentionUserIds:   { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    TaskList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Task" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateTaskBody:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        description:     { type: string }
        dueDate:         { type: string, format: date }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string }
        personIds:       { type: array, items: { type: string } }
        funderIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateTaskBody:
      type: object
      properties:
        title:           { type: string }
        description:     { type: string, nullable: true }
        dueDate:         { type: string, format: date, nullable: true }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string, nullable: true }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Bulk record updates ───────────────────────────────────────────────────
    BulkUpdateResult:
      type: object
      required: [requested, succeededIds, failed]
      properties:
        requested:    { type: integer, description: "Number of ids in the request." }
        succeededIds: { type: array, items: { type: string } }
        failed:
          type: array
          items:
            type: object
            required: [id, message]
            properties:
              id:      { type: string }
              message: { type: string }
    BulkUpdatePeoplePatch:
      type: object
      description: "Only fields present here are written. All fields are optional and forward-only — omit to leave unchanged."
      properties:
        ownerUserId:         { type: string, nullable: true }
        currentHomeRegionId: { type: string, nullable: true }
        capacityRating:      { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        isPriority:          { type: boolean }
        deceased:            { type: boolean }
    BulkUpdatePeopleBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdatePeoplePatch" }
    BulkUpdateFundersPatch:
      type: object
      properties:
        ownerUserId:          { type: string, nullable: true }
        activeStatus:         { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        connectionStatus:     { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        capacityRating:       { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        enthusiasm:           { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        isPriority:           { type: boolean }
        fundingEntitySubtype: { allOf: [ { $ref: "#/components/schemas/FundingEntitySubtype" } ], nullable: true }
    BulkUpdateFundersBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateFundersPatch" }
    BulkUpdateHouseholdsPatch:
      type: object
      properties:
        active: { type: boolean }
    BulkUpdateHouseholdsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateHouseholdsPatch" }
    BulkUpdateOpportunitiesPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        status:      { allOf: [ { $ref: "#/components/schemas/OpportunityStatus" } ], nullable: true }
        stage:       { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        actualCompletionDate: { type: string, format: date, nullable: true, description: "Optional close date when bulk-setting status to won/lost. Left null is allowed; the closed_requires_completion_date CHECK has been removed to support historical cleanup workflows." }
        coveredFiscalYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs (e.g. 'fy2026') to attach to each opportunity via pledge_allocations. Combined with coveredFiscalYearsMode."
        coveredFiscalYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe existing pledge_allocations on each opp and recreate one minimal row per FY (DESTRUCTIVE: loses subAmount/intendedUsage on those rows). append = add allocations only for FYs not already present."
    BulkUpdateOpportunitiesBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOpportunitiesPatch" }
    BulkUpdateGiftsPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        entityIds:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each gift via gift_allocations. Combined with entityIdsMode."
        entityIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        grantYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs to attach via gift_allocations. Combined with grantYearsMode."
        grantYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose grant_year is set (DESTRUCTIVE) and recreate one minimal row per FY. append = add allocations only for FYs not already present."
    BulkUpdateGiftsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateGiftsPatch" }
