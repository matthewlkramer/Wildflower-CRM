        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        funderIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    InteractionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Interaction" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateInteractionBody:
      type: object
      required: [kind, occurredAt, summary]
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
