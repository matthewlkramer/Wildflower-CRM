  # ─── People ────────────────────────────────────────────────────────────────
  /people:
    get:
      operationId: listPeople
      tags: [people]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: deceased, in: query, schema: { type: boolean } }
        - { name: regionId, in: query, schema: { type: string } }
        # Presence filters on computed rollup fields. `has` keeps rows with a
        # value, `blank` keeps rows with none. Omit for no constraint.
        - { name: lifetimeGivingPresence, in: query, required: false, description: "Rollup presence filter on lifetime giving (`has` = >0, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: lastGiftPresence, in: query, required: false, description: "Rollup presence filter on most-recent gift date (`has` = any gift, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: openAsksPresence, in: query, required: false, description: "Rollup presence filter on open opportunity count (`has` = >0, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: activeAffiliationPresence, in: query, required: false, description: "Presence filter on current funder/organization roles (`has` = any current role, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - name: newsletterStatus
          in: query
          description: |
            Filter to people by derived newsletter status. Multi-value
            (OR semantics): repeat or comma-separate. `subscribed` =
            newsletter on and not unsubscribed; `unsubscribed` =
            unsubscribed flag set (wins over newsletter); `not_subscribed`
            = newsletter off and not unsubscribed.
          style: form
          explode: false
          schema: { type: array, items: { type: string, enum: [subscribed, unsubscribed, not_subscribed] } }
        - name: capacityRating
          in: query
          description: |
            Capacity-rating slugs (see CapacityRating). Accepts the
            literal `__blank__` to match rows with no capacity rating set.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: connectionStatus
          in: query
          description: |
            Connection-status slugs (see ConnectionStatus). Accepts the
            literal `__blank__` to match rows with no connection status set.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: enthusiasm
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: ownerUserId
          in: query
          description: |
            Owner user-id values. Accepts the literal `__blank__` to match
            rows with no owner assigned.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: priority
          in: query
          description: |
            Filter to people whose `priority` tier is in the given set
            (top/high/medium/low). Multi-value: repeat or comma-separate.
            Accepts the literal `__blank__` to match rows with no priority set.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: regionIds
          in: query
          description: |
            Filter to people whose `regionIds` array overlaps the given set
            (any selected region appears in the person's regions). Multi-value:
            repeat or comma-separate. Distinct from `regionId` which filters
            on `currentHomeRegionId`.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonList" } } } }
    post:
      operationId: createPerson
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePersonBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Person" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updatePerson
