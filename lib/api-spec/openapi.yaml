    UpdateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        formalRegionalRestriction:   { type: boolean }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        formalFundUseRestriction:    { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }

    # ─── Interactions ─────────────────────────────────────────────────────────
    InteractionKind:
      type: string
      enum: [meeting, phone_call, video_call, conference, other]
    Interaction:
      type: object
      required: [id, kind, occurredAt, summary, createdAt, updatedAt]
      properties:
