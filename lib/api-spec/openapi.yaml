      parameters:
        - { name: search, in: query, schema: { type: string } }
        - name: status
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/OpportunityStatus" } }
        - name: stage
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/OpportunityStage" } }
        - name: type
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/OpportunityType" } }
        - { name: funderId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
