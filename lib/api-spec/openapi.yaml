  /households:
    get:
      operationId: listHouseholds
      tags: [households]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: active, in: query, schema: { type: boolean } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HouseholdList" } } } }
    post:
      operationId: createHousehold
      tags: [households]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateHouseholdBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Household" } } } }
