        middleName:               { type: string }
        lastName:                 { type: string }
        suffix:                   { type: string }
        fullName:                 { type: string }
        pronouns:                 { $ref: "#/components/schemas/Pronouns" }
        deceased:                 { type: boolean }
        currentHomeRegionId:      { type: string }
        details:                  { type: string }
        ownerUserId:                    { type: string }
        tags:                     { type: string }
        lastContacted:            { type: string, format: date }
        linkedin:                 { type: string }
        x:                        { type: string }
        facebook:                 { type: string }
        instagram:                { type: string }
        aboutMe:                  { type: string }
        youtube:                  { type: string }
        website:                  { type: string }
        interestsThematic:        { type: array, items: { type: string } }
        interestsAges:            { type: array, items: { type: string } }
        interestsGovModels:       { type: array, items: { type: string } }
        regionIds:                { type: array, items: { type: string } }
        newsletter:               { type: boolean }
