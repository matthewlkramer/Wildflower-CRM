        fundableProjectId:           { type: string, nullable: true }
        formalFundUseRestriction:    { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        displayUsage:                { type: string, nullable: true, readOnly: true, description: "Server-computed human-readable usage label (school name | usage label | usage + ' - ' + region names). Maintained by DB triggers; read-only." }
        createdAt:                   { type: string, format: date-time }
        updatedAt:                   { type: string, format: date-time }
    GiftAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftAllocationBody:
      type: object
      properties:
