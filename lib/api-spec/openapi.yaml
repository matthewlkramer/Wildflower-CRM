    # ─── Opportunities & pledges ───────────────────────────────────────────────
    OpportunityOrPledge:
      type: object
      required: [id, conditionsMet, createdAt, updatedAt]
      properties:
        id:                         { type: string }
        name:                       { type: string, nullable: true }
        funderId:                   { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        askAmount:                  { type: string, nullable: true }
        awardedAmount:              { type: string, nullable: true }
        # Server-computed: SUM(gifts_and_payments.amount) for payments
        # whose payment_on_pledge_id = this opp. "0" when no payments
        # exist. Primarily meaningful for pledges (status='won') so the
        # UI can show a Paid column and a paid-vs-awarded comparison.
        paidAmount:                 { type: string, readOnly: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        conditional:                { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true }
        conditions:                 { type: string, nullable: true }
        conditionsMet:              { type: boolean }
        individualGiverPersonId:    { type: string, nullable: true }
        individualAdvisorPersonId:  { type: string, nullable: true }
        matchId:                    { type: string, nullable: true }
        status:                     { allOf: [ { $ref: "#/components/schemas/OpportunityStatus" } ], nullable: true }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        actualCompletionDate:       { type: string, format: date, nullable: true }
        winProbability:             { type: string, nullable: true }
        stage:                      { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        lossReason:                 { type: string, nullable: true }
        applicationDeadline:        { type: string, format: date, nullable: true }
        paymentDetails:             { type: string, nullable: true }
        usageNotes:                 { type: string, nullable: true }
        copperPledgeId:             { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        ownerUserId:                { type: string, nullable: true }
        # Denormalized display names, joined server-side from funders /
        # households / people. Present on list + detail responses so the
        # UI doesn't have to fire one fetch per row to resolve donor IDs.
        funderName:                 { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        funderIsPriority:                 { type: boolean, nullable: true, readOnly: true }
        individualGiverPersonIsPriority:  { type: boolean, nullable: true, readOnly: true }
        # Display name of primary_contact_person_id, joined server-side.
        # Used by the grants calendar's contact column.
        primaryContactPersonName:   { type: string, nullable: true, readOnly: true }
        # Fiscal-year slug derived from projectedCloseDate (FY ends Jun 30
        # America/Chicago). e.g. a projectedCloseDate of 2026-08-15 →
        # "FY27". Null when projectedCloseDate is null.
        fiscalYear:                 { type: string, nullable: true, readOnly: true }
        # Distinct grant_year values across pledge_allocations for this
        # opp, sorted ascending. Empty array if no allocations.
        coveredFiscalYears:         { type: array, items: { type: string }, nullable: true, readOnly: true }
        # Distinct entity_id values across pledge_allocations for this
        # opp, sorted ascending. Empty array if no allocations have an
        # entity set.
        entityIds:                  { type: array, items: { type: string }, nullable: true, readOnly: true }
        createdAt:                  { type: string, format: date-time }
        updatedAt:                  { type: string, format: date-time }
    OpportunityOrPledgeDetail:
      allOf:
        - { $ref: "#/components/schemas/OpportunityOrPledge" }
        - type: object
          properties:
            allocations: { type: array, items: { $ref: "#/components/schemas/PledgeAllocation" } }
            payments:    { type: array, items: { $ref: "#/components/schemas/GiftOrPayment" } }
    OpportunityOrPledgeList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/OpportunityOrPledge" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateOpportunityOrPledgeBody:
      type: object
      properties:
        name:                       { type: string }
        funderId:                   { type: string }
        householdId:                { type: string }
        askAmount:                  { type: string }
        awardedAmount:              { type: string }
        type:                       { $ref: "#/components/schemas/OpportunityType" }
        conditional:                { $ref: "#/components/schemas/OpportunityConditional" }
        conditions:                 { type: string }
        conditionsMet:              { type: boolean }
        individualGiverPersonId:    { type: string }
        individualAdvisorPersonId:  { type: string }
        matchId:                    { type: string }
        status:                     { $ref: "#/components/schemas/OpportunityStatus" }
        projectedCloseDate:         { type: string, format: date }
        actualCompletionDate:       { type: string, format: date }
        winProbability:             { type: string }
        stage:                      { $ref: "#/components/schemas/OpportunityStage" }
        lossReason:                 { type: string }
        applicationDeadline:        { type: string, format: date }
        paymentDetails:             { type: string }
        usageNotes:                 { type: string }
        copperPledgeId:             { type: string }
        primaryContactPersonId:     { type: string }
        ownerUserId:                { type: string }
    UpdateOpportunityOrPledgeBody:
      type: object
      properties:
        name:                       { type: string, nullable: true }
        funderId:                   { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        askAmount:                  { type: string, nullable: true }
        awardedAmount:              { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        conditional:                { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true }
        conditions:                 { type: string, nullable: true }
        conditionsMet:              { type: boolean }
        individualGiverPersonId:    { type: string, nullable: true }
        individualAdvisorPersonId:  { type: string, nullable: true }
        matchId:                    { type: string, nullable: true }
        status:                     { allOf: [ { $ref: "#/components/schemas/OpportunityStatus" } ], nullable: true }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        actualCompletionDate:       { type: string, format: date, nullable: true }
        winProbability:             { type: string, nullable: true }
        stage:                      { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        lossReason:                 { type: string, nullable: true }
        applicationDeadline:        { type: string, format: date, nullable: true }
        paymentDetails:             { type: string, nullable: true }
        usageNotes:                 { type: string, nullable: true }
        copperPledgeId:             { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        ownerUserId:                { type: string, nullable: true }

    # ─── Pledge allocations ────────────────────────────────────────────────────
    PledgeAllocation:
      type: object
      required: [id, directToSchool, createdAt, updatedAt]
      properties:
        id:                     { type: string }
        pledgeOrOpportunityId:  { type: string, nullable: true }
        subAmount:              { type: string, nullable: true }
        grantYear:              { type: string, nullable: true }
        entityId:               { type: string, nullable: true }
        intendedUsage:          { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:      { type: string, nullable: true }
        directToSchool:         { type: boolean }
        status:                 { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        conditions:             { type: string, nullable: true }
        notes:                  { type: string, nullable: true }
        regionIds:              { type: array, items: { type: string }, nullable: true }
        createdAt:              { type: string, format: date-time }
        updatedAt:              { type: string, format: date-time }
    PledgeAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/PledgeAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string }
        subAmount:             { type: string }
        grantYear:             { type: string }
        entityId:              { type: string }
        intendedUsage:         { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:     { type: string }
        directToSchool:        { type: boolean }
        status:                { $ref: "#/components/schemas/PledgeAllocationStatus" }
        conditions:            { type: string }
        notes:                 { type: string }
        regionIds:             { type: array, items: { type: string } }
    UpdatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string, nullable: true }
        subAmount:             { type: string, nullable: true }
        grantYear:             { type: string, nullable: true }
        entityId:              { type: string, nullable: true }
        intendedUsage:         { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:     { type: string, nullable: true }
        directToSchool:        { type: boolean }
        status:                { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        conditions:            { type: string, nullable: true }
        notes:                 { type: string, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }

    # ─── Gifts & payments ──────────────────────────────────────────────────────
    GiftOrPayment:
      type: object
      required: [id, designatedToSchool, createdAt, updatedAt]
      properties:
        id:                         { type: string }
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true }
        funderId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentOnPledgeId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string, nullable: true }
        # Denormalized display names, joined server-side. See
        # OpportunityOrPledge for rationale.
        funderName:                 { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        funderIsPriority:                 { type: boolean, nullable: true, readOnly: true }
        individualGiverPersonIsPriority:  { type: boolean, nullable: true, readOnly: true }
        # Aggregates across this gift's gift_allocations rows. All three
        # arrays are de-duplicated and may be empty.
        entityIds:                  { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct entity_id values from gift_allocations." }
        displayUsages:              { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct display_usage values from gift_allocations (server-computed labels)." }
        grantYears:                 { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct grant_year values from gift_allocations." }
        createdAt:                  { type: string, format: date-time }
        updatedAt:                  { type: string, format: date-time }
    GiftOrPaymentDetail:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            allocations: { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
    GiftOrPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftOrPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string }
        name:                       { type: string }
        details:                    { type: string }
        dateReceived:               { type: string, format: date }
        paymentMethod:              { $ref: "#/components/schemas/GiftPaymentMethod" }
        amount:                     { type: string }
        funderId:                   { type: string }
        individualGiverPersonId:    { type: string }
        householdId:                { type: string }
        type:                       { $ref: "#/components/schemas/GiftType" }
        paymentOnPledgeId:          { type: string }
        advisorPersonId:            { type: string }
        grantYear:                  { type: string }
        giftBeingMatchedId:         { type: string }
        primaryContactPersonId:     { type: string }
        paymentIntermediaryId:      { type: string }
        ownerUserId:                      { type: string }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string }
    UpdateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true }
        funderId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentOnPledgeId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string, nullable: true }

    # ─── Gift allocations ──────────────────────────────────────────────────────
    GiftAllocation:
      type: object
      required: [id, formalRegionalRestriction, formalFundUseRestriction, createdAt, updatedAt]
      properties:
