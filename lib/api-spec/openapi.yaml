  # ─── Phone numbers ─────────────────────────────────────────────────────────
  /phone-numbers:
    get:
      operationId: listPhoneNumbers
      tags: [phone-numbers]
      parameters:
        - { name: personId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PhoneNumberList" } } } }
    post:
      operationId: createPhoneNumber
      tags: [phone-numbers]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePhoneNumberBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PhoneNumber" } } } }
