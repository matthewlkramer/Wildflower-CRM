          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/InteractionKind" } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InteractionList" } } } }
    post:
      operationId: createInteraction
      tags: [interactions]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateInteractionBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Interaction" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /interactions/{id}:
    get:
      operationId: getInteraction
