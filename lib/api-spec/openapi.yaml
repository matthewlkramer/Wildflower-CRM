    # ─── Media mentions ────────────────────────────────────────────────────────
    MediaMention:
      type: object
      required: [id, publicationName, url, pinned, createdAt, updatedAt]
      properties:
        id:              { type: string }
        publicationName: { type: string }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    MediaMentionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MediaMention" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    MediaMentionInput:
      type: object
      required: [publicationName, url]
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string }
        author:          { type: string }
        publicationDate: { type: string, format: date }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string }
        source:          { type: string }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string } }
        funderIds:       { type: array, items: { type: string } }
    MediaMentionUpdate:
      type: object
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }

    # ─── Tasks ───────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [open, waiting, done, cancelled]
    TaskKind:
      type: string
      enum: [general, reporting_deadline, thank_you_followup]
    Task:
      type: object
      required: [id, title, status, kind, createdByUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string }
        description:      { type: string, nullable: true }
        dueDate:          { type: string, format: date, nullable: true }
        kind:             { $ref: "#/components/schemas/TaskKind" }
        status:           { $ref: "#/components/schemas/TaskStatus" }
        completedAt:      { type: string, format: date-time, nullable: true }
        assigneeUserId:   { type: string, nullable: true }
        createdByUserId:  { type: string }
        personIds:        { type: array, items: { type: string }, nullable: true }
        funderIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        opportunityIds:   { type: array, items: { type: string }, nullable: true }
        giftIds:          { type: array, items: { type: string }, nullable: true }
        mentionUserIds:   { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    TaskList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Task" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateTaskBody:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        description:     { type: string }
        dueDate:         { type: string, format: date }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string }
        personIds:       { type: array, items: { type: string } }
        funderIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateTaskBody:
      type: object
      properties:
        title:           { type: string }
        description:     { type: string, nullable: true }
        dueDate:         { type: string, format: date, nullable: true }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string, nullable: true }
        personIds:       { type: array, items: { type: string }, nullable: true }
        funderIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Meeting notes ────────────────────────────────────────────────────────
    MeetingActionItem:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        assigneeName:    { type: string, nullable: true, description: "Free-text assignee name as extracted from the transcript." }
        dueDate:         { type: string, format: date, nullable: true }
        promotedTaskId:  { type: string, nullable: true, description: "Set after this item was promoted into a task via /promote-action-item." }
    MeetingNote:
      type: object
      required: [id, meetingDate, summaryOnly, creatorUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string, nullable: true }
        meetingDate:      { type: string, format: date-time }
        attendees:        { type: array, items: { type: string }, nullable: true }
        rawTranscript:    { type: string, nullable: true, description: "Always null when summaryOnly is true." }
        summaryOnly:      { type: boolean, description: "Snapshot of the creator's email_sync_mode at create time. When true, the raw transcript was dropped pre-insert." }
        aiSummary:        { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        creatorUserId:    { type: string }
        personId:         { type: string, nullable: true }
        funderId:         { type: string, nullable: true }
        householdId:      { type: string, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    MeetingNoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MeetingNote" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateMeetingNoteBody:
      type: object
      description: "Exactly one of personId / funderId / householdId must be set (contact XOR). Exactly one of `transcript` or `summary` must be provided — `transcript` runs through AI summarization, `summary` is stored verbatim as the note body (used by the hand-typed-notes flow)."
      properties:
        transcript:      { type: string, description: "Raw pasted transcript. Dropped server-side before insert when the caller's email_sync_mode is summary_only. Runs through AI summarization to produce aiSummary + actionItems." }
        summary:         { type: string, description: "Hand-typed notes. Stored verbatim as aiSummary with no AI processing; no rawTranscript or actionItems are generated. Mutually exclusive with transcript." }
        title:           { type: string }
        meetingDate:     { type: string, format: date-time, description: "Defaults to now if omitted." }
        attendees:       { type: array, items: { type: string } }
        personId:        { type: string }
        funderId:        { type: string }
        householdId:     { type: string }
    UpdateMeetingNoteBody:
      type: object
      properties:
        title:           { type: string, nullable: true }
        meetingDate:     { type: string, format: date-time }
        attendees:       { type: array, items: { type: string }, nullable: true }
        aiSummary:       { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        personId:        { type: string, nullable: true }
        funderId:        { type: string, nullable: true }
        householdId:     { type: string, nullable: true }
    PromoteActionItemBody:
      type: object
      required: [index]
      properties:
        index:           { type: integer, description: "Zero-based index into actionItems[]." }
        assigneeUserId:  { type: string, description: "Optional override; the extracted assigneeName is free-text and may not map to a user." }
        dueDate:         { type: string, format: date }

    # ─── Saved views ───────────────────────────────────────────────────────────
    SavedViewVisibility:
      type: string
      enum: [team, individual]
      description: "team = shared with everyone (creator-edit-only); individual = private to creator."
    SavedView:
      type: object
      required: [id, listKey, name, visibility, state, creatorUserId, createdAt, updatedAt]
      properties:
        id:             { type: string }
        listKey:        { type: string }
        name:           { type: string }
        visibility:     { $ref: "#/components/schemas/SavedViewVisibility" }
        state:          { type: object, additionalProperties: true, description: "Opaque page-specific state blob: filters + sort." }
        creatorUserId:  { type: string }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    SavedViewList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/SavedView" } }
    CreateSavedViewBody:
      type: object
      required: [listKey, name, visibility, state]
      properties:
        listKey:    { type: string }
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }
    UpdateSavedViewBody:
      type: object
      description: "Only the creator may PATCH. All fields optional; at least one required."
      properties:
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }

    # ─── Email tracking (Magio-compatible) ─────────────────────────────────
    TrackedEmail:
      type: object
      required: [id, subject, recipient, sender, recipientPersonIds, recipientFunderIds, recipientHouseholdIds, createdAt]
      properties:
        id:                       { type: string }
        subject:                  { type: string }
        recipient:                { type: string, description: "Verbatim To: line scraped by the extension, may be a comma list." }
        sender:                   { type: string }
        senderIp:                 { type: string, nullable: true }
        recipientPersonIds:       { type: array, items: { type: string } }
        recipientFunderIds:       { type: array, items: { type: string } }
        recipientHouseholdIds:    { type: array, items: { type: string } }
        createdAt:                { type: string, format: date-time }
        totalViews:               { type: integer, description: "Convenience aggregate; present on list/detail responses." }
        lastView:                 { type: string, format: date-time, nullable: true }
    TrackedEmailView:
      type: object
      required: [id, viewedAt]
      properties:
        id:        { type: string }
        viewedAt:  { type: string, format: date-time }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
    TrackedEmailWithViews:
      allOf:
        - $ref: "#/components/schemas/TrackedEmail"
        - type: object
          required: [totalViews, uniqueIps, views]
          properties:
            totalViews: { type: integer }
            uniqueIps:  { type: integer }
            views:      { type: array, items: { $ref: "#/components/schemas/TrackedEmailView" } }
    TrackedEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TrackedEmail" } }
    TrackedEmailStatus:
      type: object
      required: [subject, viewCount]
      properties:
        subject:   { type: string }
        viewCount: { type: integer }
    CreateTrackedEmailBody:
      type: object
      required: [subject, recipient, sender]
      description: "Posted by the extension at send-time."
      properties:
        subject:   { type: string }
        recipient: { type: string, description: "Comma- or semicolon-separated address list scraped from compose UI." }
        sender:    { type: string }

    # ─── Bulk record updates ───────────────────────────────────────────────────
    BulkUpdateResult:
      type: object
      required: [requested, succeededIds, failed]
      properties:
        requested:    { type: integer, description: "Number of ids in the request." }
        succeededIds: { type: array, items: { type: string } }
        failed:
          type: array
          items:
            type: object
            required: [id, message]
            properties:
              id:      { type: string }
              message: { type: string }
    BulkUpdatePeoplePatch:
      type: object
      description: "Only fields present here are written. All fields are optional and forward-only — omit to leave unchanged."
      properties:
        ownerUserId:         { type: string, nullable: true }
        currentHomeRegionId: { type: string, nullable: true }
        capacityRating:      { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        priority:            { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        deceased:            { type: boolean }
    BulkUpdatePeopleBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdatePeoplePatch" }
    BulkUpdateFundersPatch:
      type: object
      properties:
        ownerUserId:          { type: string, nullable: true }
        activeStatus:         { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        connectionStatus:     { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        capacityRating:       { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        enthusiasm:           { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:             { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        fundingEntitySubtype: { allOf: [ { $ref: "#/components/schemas/FundingEntitySubtype" } ], nullable: true }
    BulkUpdateFundersBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateFundersPatch" }
    BulkUpdateHouseholdsPatch:
      type: object
      properties:
        active: { type: boolean }
    BulkUpdateHouseholdsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateHouseholdsPatch" }
    BulkUpdateOpportunitiesPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        status:      { allOf: [ { $ref: "#/components/schemas/OpportunityStatus" } ], nullable: true }
        stage:       { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        wasPledge:   { type: boolean, nullable: true }
        isConditional: { type: boolean, nullable: true }
        actualCompletionDate: { type: string, format: date, nullable: true, description: "Optional close date when bulk-setting status to cash_in/lost. Left null is allowed to support historical cleanup workflows." }
        coveredFiscalYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs (e.g. 'fy2026') to attach to each opportunity via pledge_allocations. Combined with coveredFiscalYearsMode."
        coveredFiscalYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe existing pledge_allocations on each opp and recreate one minimal row per FY (DESTRUCTIVE: loses subAmount/intendedUsage on those rows). append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every pledge_allocations row of each opportunity. Existing allocation rows are updated to this value; if an opportunity has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every pledge_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateOpportunitiesBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOpportunitiesPatch" }
    BulkUpdateGiftsPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        entityIds:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each gift via gift_allocations. Combined with entityIdsMode."
        entityIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        grantYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs to attach via gift_allocations. Combined with grantYearsMode."
        grantYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose grant_year is set (DESTRUCTIVE) and recreate one minimal row per FY. append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every gift_allocations row of each gift. Existing allocation rows are updated to this value; if a gift has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every gift_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateGiftsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateGiftsPatch" }
