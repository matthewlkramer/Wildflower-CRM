  # ─── Unified reconciler (QB-anchored 4-node match graph) ─────────────────────
  /reconciliation/cards:
    get:
      operationId: listReconciliationCards
      tags: [reconciliation]
      summary: List reconciliation cards — one per QuickBooks staged-payment anchor.
      description: |
        The unified reconciler's work queue. Each card is anchored on a QB
        staged_payments row (a QB record is required for every complete match) and
        carries the QB facts plus a compact auto-proposed best guess for the donor /
        gift / opportunity nodes and whether Stripe per-charge evidence backs the
        same money. `reconciled` cards are excluded by default (filter with
        queue=reconciled). Use the graph endpoint for the full candidate detail.
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/ReconciliationCardQueue" }, description: "Queue bucket to list. Omit for the active work queue (excludes reconciled/excluded/rejected AND parks pending fiscally-sponsored money out of the main flow). Request queue=fiscally_sponsored to view the parked queue (still fully matchable), or queue=research for pending money flagged needs_research." }
        - { name: q, in: query, schema: { type: string }, description: "Free-text over payer name / reference / memo." }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter to one Wildflower legal entity attribution." }
        - { name: ready, in: query, schema: { type: boolean }, description: "Filter to cards whose auto-proposal passes (true) / fails (false) the consistency gate." }
        - { name: exclusionReason, in: query, schema: { $ref: "#/components/schemas/StagedPaymentExclusionReason" }, description: "Filter the Excluded queue to a single exclusion reason. Only meaningful with queue=excluded; ignored otherwise." }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 500 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationCardList" } } } }
  /reconciliation/cards/{stagedPaymentId}/graph:
    get:
      operationId: getReconciliationGraph
      tags: [reconciliation]
      summary: Full auto-proposed 4-node match graph for one card.
      description: |
        Returns the QB anchor + optional Stripe evidence and, for each of the donor /
        gift / opportunity nodes, the scored candidates and the edge state
        (determined / ambiguous / filter_only / conflict / none / create). Read-only:
        nothing is mutated. `ready=true` when a confident, non-conflicting selection
        exists for the required nodes so the card can be approved without manual
        disambiguation.
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationGraph" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/cards/{stagedPaymentId}/lineage:
    get:
      operationId: getReconciliationLineage
      tags: [reconciliation]
      summary: Read-only settlement lineage for one card — QB deposit ↔ Stripe payout ↔ Stripe charges ↔ Donorbox donations.
      description: |
        Traces the SAME physical money across processors for one QB staged-payment
        anchor, so the workbench can show where the deposit came from. Read-only —
        nothing is mutated. The chain is derived from existing pulled join keys
        (payout↔QB tie, charge.stripePayoutId, donation.stripeChargeId) PLUS any
        human-confirmed cross-processor links persisted on the staged charges /
        donations. Each leg's `linkSource` records HOW it was tied (a pulled key vs
        a reviewer confirmation). Any leg is empty/null when it doesn't apply
        (e.g. a check deposit has no Stripe payout or Donorbox donation).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SettlementLineage" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/bundles/{stagedPaymentId}/confirm-ties:
    post:
      operationId: confirmBundleCrossProcessorTies
      tags: [reconciliation]
      summary: Persist the human-confirmed cross-processor links for one settlement bundle.
      description: |
        Stamps the additive cross-processor link fields for the bundle anchored on
        a QB staged-payment deposit: every Stripe charge settled in the tied payout
        gets `linkedQbStagedPaymentId` set to this deposit, and every enrichment
        Donorbox donation (donationType=stripe) tied to one of those charges gets
        `linkedStripeChargeId` + `linkedQbStagedPaymentId` set, both stamped with the
        reviewer + timestamp. Idempotent — only ever fills NULL link fields, never
        overwrites. Additive and CRM-only: it writes nothing back to QuickBooks,
        Stripe, or Donorbox and mints no gifts (enrich, don't mint).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BundleTieResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/search/{nodeType}:
    get:
      operationId: searchReconciliationNode
      tags: [reconciliation]
      summary: Scoped, cross-filtering search for one node of a card.
      description: |
        Powers the four cross-filtering search boxes. Always scoped to a card
        (stagedPaymentId) so amount/date windows come from the QB anchor; pass
        donorId to cross-filter gift/opportunity candidates to a chosen donor
        (the FILTER edge). nodeType is donor / gift / opportunity / qb.
      parameters:
        - { name: nodeType, in: path, required: true, schema: { $ref: "#/components/schemas/ReconciliationMatchNodeType" } }
        - { name: stagedPaymentId, in: query, required: true, schema: { type: string }, description: "Anchor card; scopes amount/date windows and cross-filtering." }
        - { name: q, in: query, schema: { type: string }, description: "Free-text query (donor/gift name, payer, reference)." }
        - { name: donorId, in: query, schema: { type: string }, description: "Cross-filter gift/opportunity candidates to this donor (FILTER edge)." }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around the anchor date for amount/date windows." }
        - { name: limit, in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationSearchList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/cards/{stagedPaymentId}/approve:
    post:
      operationId: approveReconciliationCard
      tags: [reconciliation]
      summary: Approve a card — link or human-mint a gift, enforcing all invariants server-side.
      description: |
        Human approval of a reconciliation card. The server RE-DERIVES and
        RE-VALIDATES the whole graph (it never trusts UI-supplied locks) and runs the
        consistency gate before committing in one transaction: QB present + not already
        reconciled; exactly one donor (Donor XOR); gift donor == opportunity donor;
        the gift is not already claimed by another evidence row; amount/date within the
        fee-band tolerance unless an override reason is given; Stripe GROSS takes
        precedence over the QB net when a charge is selected; nothing is archived.
        Minting a gift is human-only. Idempotent: re-approving a reconciled card
        returns its current state.

        Source groups (a card whose stagedPaymentId carries a sourceGroupId)
        approve as a WHOLE: the create-* outcomes mint ONE gift whose amount sums
        every non-archived member, with a deterministic representative carrying
        createdGiftId and the other members groupReconciledGiftId (so no slice can
        be reconciled twice); link_existing_gift is rejected (409
        source_group_use_reconcile) — link the whole group via group-reconcile
        instead; and a group whose members carry a tied Stripe payout, or an
        explicit Stripe charge selection, is rejected (409
        source_group_stripe_unsupported) since per-charge GROSS can't yet be
        summed across a group (ungroup to reconcile those individually).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ApproveCompleteMatchBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationApproveResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Card is not in an approvable state, or the chosen gift/opportunity is already claimed." }
  /reconciliation/cards/{stagedPaymentId}/proposals:
    get:
      operationId: listReconciliationCardProposals
      tags: [reconciliation]
      summary: List the free-text "propose alternative" comments left on one reconciliation card.
      description: |
        Reviewer feedback for ONE card, newest first. These are the human
        "propose alternative" notes captured beside Approve in the Needs-review
        queue — context for later improving that row's match (and the matcher as
        a whole). Read-only. Open to any authenticated fundraiser.
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationProposalList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createReconciliationProposal
      tags: [reconciliation]
      summary: Leave a free-text "propose alternative" comment on one reconciliation card.
      description: |
        Capture a reviewer's free-text comment "to the system" for a staged-payment
        card instead of approving it. Append-only: each call stores a new note with
        the author and timestamp, keyed to the card's staged_payments row (the
        representative row for a source group). Used to flag how a specific row —
        or the matcher overall — should change. Does NOT mutate any match/donor/gift
        state. Open to any authenticated fundraiser.
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateReconciliationProposalBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/proposals:
    get:
      operationId: listReconciliationProposals
      tags: [reconciliation]
      summary: List all "propose alternative" comments across cards, joined with staged-payment context.
      description: |
        Cross-card feed of every reviewer "propose alternative" comment, newest
        first, each joined with its staged-payment context (payer / amount / date /
        status / resolved gift) so the notes can be triaged later WITHOUT re-querying
        per card. This is the endpoint the agent reads when the user comes back to
        act on the accumulated comments. Read-only.
      parameters:
        - { name: stagedPaymentId, in: query, schema: { type: string }, description: "Filter to the comments on one card." }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationProposalWithContextList" } } } }
  /reconciliation/qb-search:
    get:
      operationId: searchReconciliationQbStaged
      tags: [reconciliation]
      summary: Criteria-based QuickBooks staged-payment search (not anchored to a card).
      description: |
        Free search over QuickBooks staged-payment rows by text / amount / date window,
        with NO card anchor — used by the stray-Stripe worklist to hunt down the QB
        deposit that a yet-unmatched Stripe payout should belong to. Returns qb
        candidates (same shape as the card search). Read-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over payer name / reference / memo / doc number." }
        - { name: amount, in: query, schema: { type: string }, description: "Target amount (major units); when set, results are scored/filtered around it." }
        - { name: date, in: query, schema: { type: string, format: date }, description: "Anchor date; pair with days for a ± window." }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around date for the amount/date window." }
        - { name: limit, in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationSearchList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/gifts-missing-qb:
    get:
      operationId: listGiftsMissingQb
      tags: [reconciliation]
      summary: Gift allocations genuinely missing a QuickBooks record (data-quality worklist).
      description: |
        Lists on-books gifts that are genuinely UN-reconciled with QuickBooks — i.e.
        no QuickBooks cash-application ledger entry exists for the gift — ONE ROW PER
        gift_allocation (a multi-allocation gift surfaces several rows; a gift with no
        allocations surfaces a single row with allocationId null). Gifts that are not
        expected to get a direct QB record are excluded, so the list never implies they
        are unreconciled: Stripe-sourced gifts (the money lands in QuickBooks at the
        payout level, so they never carry a per-gift QB ledger link) and allocations
        attributed to entities that never settle through a payment processor
        (entities.expectsPayment = false: "Direct to School" / "Wildflower Foundation
        TSNE"). Broad by design (cash / check / brokerage / imports all surface) with
        filters to slice. Pagination is at allocation-row granularity. Donor names are
        anonymous-masked for the viewer. Read-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over donor name (organization / person / household)." }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter to one Wildflower legal entity." }
        - { name: paymentMethod, in: query, schema: { $ref: "#/components/schemas/GiftPaymentMethod" }, description: "Filter to one recorded gift payment method." }
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftMissingQbList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

components:
  parameters:
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 10000, default: 50 } }
    Page:  { name: page,  in: query, schema: { type: integer, minimum: 1, default: 1 } }
    IdPath: { name: id, in: path, required: true, schema: { type: string } }
    IncludeArchivedQuery: { name: includeArchived, in: query, required: false, description: "Admin-only: when true, include archived (soft-deleted) rows. Ignored for non-admins — they never see archived rows even if this is passed.", schema: { type: boolean } }

  responses:
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    BadRequest:
      description: Bad request (validation error)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    Forbidden:
      description: Forbidden (admin access required)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties: { status: { type: string } }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:   { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    Pagination:
      type: object
      required: [page, limit, total]
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ─── Enums ─────────────────────────────────────────────────────────────────
    RegionType: { type: string, enum: [state, metro_area, city, neighborhood, region_within_state, multi_state_region, country, continent] }
    EntityRoleType: { type: string, enum: [organization, payment_intermediary, household] }
    ContactValidity: { type: string, enum: [valid, invalid, unknown] }
    EmailType: { type: string, enum: [work, personal, other] }
    PhoneType: { type: string, enum: [work, mobile, home, other] }
    PeopleRoleCurrent: { type: string, enum: [current, past] }
    PeopleEntityRoleConnection: { type: string, enum: [employee, principal, board_member, partner, professor, donor_advisor, elected_official] }
    PaymentIntermediaryType: { type: string, enum: [daf, giving_platform, private_wealth_manager] }
    Pronouns: { type: string, enum: [he_him_his, she_her_hers, they_them_theirs, other] }
    SchoolStatus: { type: string, enum: [emerging, open, paused, closing, permanently_closed, disaffiliating, disaffiliated, placeholder, abandoned] }
    GovernanceModel: { type: string, enum: [independent, district, charter, exploring_charter, community_partnership] }
    UserRole: { type: string, enum: [admin, team_member, finance, read_only] }
    FundingEntitySubtype: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform] }
    EntityType: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform, advocacy_membership_lobbyist, authorizer, education_vendor, elected_official, higher_ed, investor, law_firm, media, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    NumberOfEmployees: { type: string, enum: [e_1, e_2_10, e_11_50, e_51_250, e_251_1000, e_1001_10000, e_10000_plus] }
    CapacityRating: { type: string, enum: [tier_1k_10k, tier_10k_50k, tier_50k_250k, tier_250k_1m, tier_1m_plus] }
    ConnectionStatus: { type: string, enum: [connected, have_a_connector, no_connection] }
    Enthusiasm: { type: string, enum: ['7-advocate', '6-supportive', '5-warm', '4-neutral', '3-cool', '2-unsupportive', '1-hostile'] }
    Priority: { type: string, enum: [top, high, medium, low] }
    StrategicAlignment: { type: string, enum: [high, medium, low] }
    ActiveStatus: { type: string, enum: [active, defunct, spenddown] }
    OrganizationType: { type: string, enum: [advocacy_membership_lobbyist, authorizer, cmo, capital_provider, government, corporation, education_vendor, elected_official, higher_ed, investor, law_firm, media, nonprofit, philanthropic_advisor, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    OpportunityStatus:
      type: string
      enum: [open, pledge, cash_in, dormant, lost]
      description: |
        Lifecycle status of an opportunity/pledge row. FULLY CALCULATED and
        read-only — never set this directly. Derived server-side from the
        writtenPledge outcome flag + payments + lossType on every write:
          lossType set                              → status = lossType
          else fully paid (paid ≥ awarded)          → cash_in
          else writtenPledge = true                 → pledge
          else                                      → open
        Values:
          open    — actively in the funnel, not yet committed
          pledge  — funder has committed but not fully paid; UI labels this
                    "Waiting for payment" (stored value stays `pledge`)
          cash_in — fully paid (sum of non-archived payments ≥ awarded)
          dormant — paused (mirrors lossType='dormant')
          lost    — declined/withdrawn (mirrors lossType='lost')
        To mark a row dormant/lost, set the `lossType` field instead. The
        commitment outcome is the writtenPledge flag — cultivation `stage` no
        longer feeds status.
    OpportunityLossType:
      type: string
      enum: [dormant, lost]
      description: |
        User-set override that pulls an opportunity/pledge out of the
        calculated funnel. Null while open/pledge/cash_in; set to 'dormant'
        (paused) or 'lost' (declined/withdrawn). The only user-settable half
        of the old status overload — when set, `status` mirrors it.
    OpportunityType: { type: string, enum: [solicitation, renewal, open_application] }
    OpportunityStage:
      type: string
      enum: [cold_lead, warm_lead, in_conversation, convince, conditional_commitment, probable_renewal, verbal_confirmation, written_commitment, cash_in, complete]
      description: |
        Cultivation funnel stage — a PURE pipeline position, fully separate from
        the commitment outcome (writtenPledge) and the calculated status. Active
        funnel: cold_lead → warm_lead → in_conversation → convince →
        probable_renewal → verbal_confirmation → complete (terminal: won).
        `complete` is set automatically when an opp is won (status pledge|cash_in)
        and reverted off a stale `complete` when no longer won.
        DEPRECATED (retained for historical rows, never written going forward):
        conditional_commitment, written_commitment, cash_in — the commitment
        outcome now lives on the writtenPledge flag, not the stage.
    OpportunityConditional: { type: string, enum: [unconditional, conditional_unspecified, reimbursable, conditional_on_funder_determination, conditional_on_target] }
    OpportunityConditionsMet:
      type: string
      enum: [no, partial, yes]
      description: |
        Tri-state record of whether a grant's conditions have been met:
        'no' (none met), 'partial' (some met), or 'yes' (fully met).
        Replaces the prior boolean flag (false→'no', true→'yes').
    PledgeAllocationStatus: { type: string, enum: [working, committed, superseded, committed_with_conditions, superseded_by_pledge, superseded_by_gift, abandoned] }
    GiftType: { type: string, enum: [standard_gift, pledge_payment, directed_gift, loan_fund_investment, matching_gift] }
    FundraisingCategory:
      type: string
      enum: [revenue, loan_capital]
      description: |
        Splits loan-fund capital out of revenue so the two tracks report in
        parallel. `loan_capital` = principal investments (`loan_fund_investment`
        gifts + opportunities/pledges flagged loan-capital); `revenue` = everything
        else. Defaults to `revenue` so existing data is treated as revenue.
    LoanOrGrant:
      type: string
      enum: [loan, grant]
      description: |
        The single authoritative loan-vs-grant classification, superseding three
        scattered legacy signals during the transition:
          - opportunities_and_pledges.fundraising_category (revenue | loan_capital)
          - gifts_and_payments.type (loan-ness derived from 'loan_fund_investment')
          - fiscal_year_entity_goals.category (= fundraising_category)
        Mapping (1:1): loan_capital / loan_fund_investment → `loan`; everything
        else → `grant`. NOTE: `grant` means ALL non-loan money (individual
        donations, foundation grants, earned revenue, …), not literally grants.
    GoalCategoryParam:
      type: string
      enum: [revenue, loan_capital, loan, grant]
      description: |
        Fiscal-year goal category path/query token. During the loan_or_grant
        transition it accepts BOTH the new authoritative loan/grant tokens AND
        the legacy revenue/loan_capital tokens (loan↔loan_capital, grant↔revenue).
    GiftPaymentMethod: { type: string, enum: [ach, check, wire, stock, donor_box, daf_ach, daf_check, daf_bill_com] }
    GiftFinalAmountSource: { type: string, enum: [human, stripe, quickbooks], description: "Where a gift's final `amount` was last sourced from. human: hand-entered, never reconciled. stripe: stamped from a Stripe charge (gross). quickbooks: stamped from a QuickBooks staged row. XOR with the two final_amount pointer fields." }
    GiftQuickbooksTie: { type: string, enum: [exempt, tied, amount_mismatch, missing], description: "Derived per-gift QuickBooks-tie signal. exempt: off-books (fiscal-sponsor era OR designated-to-school). tied: reconciles to a QuickBooks record within fee tolerance (or is Stripe-sourced). amount_mismatch: linked but outside the fee band. missing: on-books with no QuickBooks evidence." }
    ReconciliationLaneStatus:
      type: string
      enum: [unlinked, proposed, confirmed, exempt]
      description: >-
        Progress of ONE reconciliation lane for a unit of money (INV-4).
        unlinked: no connection yet. proposed: a system/auto match exists but no
        human has confirmed it. confirmed: a human (or a real, already-booked
        gift link) anchors the connection. exempt: no connection is expected —
        an off-books gift, or evidence dispositioned as not-a-gift
        (excluded/rejected). The CRM-record lane never emits exempt.
    ReconciliationLanes:
      type: object
      required: [funding, crmRecord]
      description: >-
        The two independently-tracked reconciliation lanes for a unit of money
        (INV-4). funding = the accounting/evidence side (QuickBooks/Stripe);
        crmRecord = the donor-record side. Derived, never a stored source of
        truth. crmRecord is null where a donor lane does not apply (e.g. a Stripe
        payout, which is a batch with no single donor).
      properties:
        funding:   { $ref: "#/components/schemas/ReconciliationLaneStatus" }
        crmRecord: { allOf: [ { $ref: "#/components/schemas/ReconciliationLaneStatus" } ], nullable: true }
    IntendedUsage: { type: string, enum: [gen_ops, growth, school_startup, teacher_training, project] }
    ReimbursementType: { type: string, enum: [direct, indirect], description: "Direct vs indirect share on a reimbursable grant allocation. DIRECT-tagged allocations are excluded from goal analytics (received, committed, open ask, weighted); untagged (null) and indirect both count. Never changes opportunity-status or pledge paid-amount derivation. (Renamed from ReimbursableShare in Task #449.)" }
    RestrictionAxis: { type: string, enum: [donor_restricted, wf_restricted, unrestricted], description: "Per-axis restriction taxonomy applied independently to the regional / fund-use / time axes of an allocation. donor_restricted = the funder imposed it (a true GAAP restriction); wf_restricted = Wildflower board-designated (NOT a GAAP restriction — counts as unrestricted for restriction rollups); unrestricted = none." }
    RestrictionType: { type: string, enum: [unrestricted, purpose, time, both, unclear, na], description: "@deprecated (Task #449) — superseded by the three RestrictionAxis fields. Retained only on deprecated read fields and legacy audit/reconciler views." }
    DeferredRevenue: { type: string, enum: [yes, no, na] }

    # ─── Users ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, emailSyncMode, createdAt, updatedAt]
      properties:
        id:             { type: string }
        clerkId:        { type: string }
        email:          { type: string }
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        displayName:    { type: string, nullable: true }
        role:           { $ref: "#/components/schemas/UserRole" }
        defaultFund:    { type: string, nullable: true }
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    EmailSyncMode:
      type: string
      enum: [full, summary_only]
      description: "Per-user Gmail sync privacy mode. `full` stores the email body + attachments. `summary_only` stores only an AI-generated one-line topic summary; body and attachments are never persisted, and intelligence/proposals are skipped for messages from this mailbox. The setting applies to NEW emails synced after the change; existing emails are not retroactively edited."
    UpdateCurrentUserBody:
      type: object
      properties:
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }

    # ─── Regions ───────────────────────────────────────────────────────────────
    CreateRegionBody:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1, description: "Human-readable region name, e.g. 'Greater Boston'." }
        displayPath: { type: string, description: "Full display path, e.g. 'United States, Massachusetts, Greater Boston'. Defaults to name when omitted." }
    UpdateRegionBody:
      type: object
      description: "Inline-editable simple fields for a region. The slug (`id`) is immutable and the parent region (relational) is edited on the detail page, not here."
      properties:
        name:              { type: string, minLength: 1 }
        displayPath:       { type: string }
        stateAbbreviation: { type: string, nullable: true }
        type:              { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
    UpdateSchoolBody:
      type: object
      description: "Inline-editable simple scalar/enum fields for a school. Array/relational fields are edited on the detail page or synced upstream from Airtable."
      properties:
        name:                   { type: string, minLength: 1 }
        longName:               { type: string, nullable: true }
        shortName:              { type: string, nullable: true }
        status:                 { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:        { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        stageStatus:            { type: string, nullable: true }
        currentMailingAddress:  { type: string, nullable: true }
        currentPhysicalAddress: { type: string, nullable: true }
    UpdateFiscalYearBody:
      type: object
      description: "Inline-editable simple fields for a fiscal year. The slug (`id`) is immutable."
      properties:
        label:      { type: string, minLength: 1 }
        startDate:  { type: string, format: date, nullable: true }
        endDate:    { type: string, format: date, nullable: true }
        goalAmount: { type: string, nullable: true, description: "Decimal string (numeric(14,2)). Use plain digits with optional decimal, no commas." }
    Region:
      type: object
      required: [id, name, displayPath, createdAt, updatedAt]
      properties:
        id:                 { type: string, description: "Human-readable slug PK, e.g. `united_states__minnesota__saint_paul`. Built from the region's name plus its included-type ancestors (continent / country / state / city / neighborhood); intermediate aggregation layers (multi_state_region, region_within_state, metro_area) are skipped." }
        name:               { type: string }
        displayPath:        { type: string, description: "Comma-separated full path including every ancestor (e.g. `United States, New England, Massachusetts, Greater Boston, Boston`). Use for UI display." }
        stateAbbreviation:  { type: string, nullable: true }
        type:               { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
        parentRegionId:     { type: string, nullable: true }
        archivedAt:         { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
    RegionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Region" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Schools ───────────────────────────────────────────────────────────────
    School:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        longName:                 { type: string, nullable: true }
        shortName:                { type: string, nullable: true }
        status:                   { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:          { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        agesPlanes:               { type: array, items: { type: string }, nullable: true }
        logoMainSquareUrl:        { type: string, nullable: true }
        stageStatus:              { type: string, nullable: true }
        currentMailingAddress:    { type: string, nullable: true }
        currentPhysicalAddress:   { type: string, nullable: true }
        archivedAt:               { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    SchoolList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/School" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Entities / fundable projects / fiscal years ──────────────────────────
    Entity:
      type: object
      required: [id, name, active, fiscallySponsored, createdAt, updatedAt]
      properties:
        id:        { type: string }
        name:      { type: string }
        active:    { type: boolean }
        fiscallySponsored: { type: boolean, description: "Whether this fund entity is fiscally sponsored. Informational flag only." }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateEntityBody:
      type: object
      required: [id, name]
      properties:
        id:     { type: string, description: "Slug-style key, e.g. wildflower_foundation. Must be unique." }
        name:   { type: string }
        active: { type: boolean, description: "Defaults to true. Set false to mark retired." }
        fiscallySponsored: { type: boolean, description: "Defaults to false. Set true to mark fiscally sponsored." }
    UpdateEntityBody:
      type: object
      properties:
        name:   { type: string }
        active: { type: boolean }
        fiscallySponsored: { type: boolean }
    FiscalYearEntityGoal:
      type: object
      required: [fiscalYearId, entityId, category, goalAmount, createdAt, updatedAt]
      properties:
        fiscalYearId: { type: string }
        entityId:     { type: string }
        category:     { $ref: "#/components/schemas/FundraisingCategory" }
        loanOrGrant:  { allOf: [ { $ref: "#/components/schemas/LoanOrGrant" } ], readOnly: true, description: "Authoritative loan-vs-grant classification (supersedes category). Derived-but-persisted; dual-written from category." }
        goalAmount:   { type: string, description: "Decimal string (numeric(14,2))." }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    UpsertFiscalYearEntityGoalBody:
      type: object
      required: [goalAmount]
      properties:
        goalAmount: { type: string, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProject:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:               { type: string }
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean }
        fundraisingStart: { type: string, format: date, nullable: true, description: "Fundraising start date (YYYY-MM-DD). Null on legacy rows; UI prompts to fill in." }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string (numeric(14,2)). Null on legacy rows." }
        archivedAt:       { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    CreateFundableProjectBody:
      type: object
      required: [id, name]
      properties:
        id:               { type: string, description: "Slug-style key, e.g. ssj. Must be unique." }
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean, description: "Defaults to true. Set false to mark retired." }
        fundraisingStart: { type: string, format: date, nullable: true }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    UpdateFundableProjectBody:
      type: object
      properties:
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean }
        fundraisingStart: { type: string, format: date, nullable: true }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProjectProgress:
      type: object
      required: [fundableProjectId, raised]
      properties:
        fundableProjectId: { type: string }
        raised:            { type: string, description: "Decimal string — sum of gift_allocations.sub_amount for this project. '0' when none." }
    FiscalYear:
      type: object
      required: [id, label, createdAt, updatedAt]
      properties:
        id:         { type: string }
        label:      { type: string }
        startDate:  { type: string, format: date, nullable: true }
        endDate:    { type: string, format: date, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    # ─── Analytics (aggregate read-only response shapes) ──────────────────────
    DashboardCounts:
      type: object
      required: [people, organizations, households, opportunities, openOpportunities, pledges, gifts]
      properties:
        people:            { type: integer }
        households:        { type: integer }
        organizations:     { type: integer }
        opportunities:     { type: integer }
        openOpportunities: { type: integer }
        # Count of rows currently on the Pledges page: writtenPledge=true OR
        # stage ∈ (conditional, verbal, written).
        pledges:           { type: integer }
        gifts:             { type: integer }
    DashboardFiscalYear:
      type: object
      required: [id, label, startDate, endDate]
      properties:
        id:        { type: string, description: "fy-slug (e.g. `fy2026`)." }
        label:     { type: string, description: "Human label (e.g. `FY 2026`)." }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    FiscalYearCategoryMetrics:
      type: object
      required: [openPipelineAsk, openPipelineWeighted, committed, committedWeighted, received, goal]
      description: |
        Fundraising metrics for one category (revenue OR loan_capital) within a
        fiscal year. All money values are decimal strings (PostgreSQL numeric) to
        preserve precision — format with `formatCurrency` on the client.
      properties:
        openPipelineAsk:      { type: string, description: "SUM(pledge_allocations.sub_amount) for status='open' opps (of this category) with grant_year = this FY." }
        openPipelineWeighted: { type: string, description: "SUM(pledge_allocations.sub_amount × COALESCE(parent.win_probability, 1)) for status='open' opps (of this category) with grant_year = this FY." }
        committed:            { type: string, description: "Per-pledge UNPAID remainder (at 100%) for status='pledge' opps (of this category) with grant_year = this FY. Disjoint from openPipelineWeighted (status='open' only)." }
        committedWeighted:    { type: string, description: "Per-pledge UNPAID remainder discounted by the pledge's win_probability (0.90 non-conditional / 0.75 conditional) for status='pledge' opps of this category with grant_year = this FY. The projection tile uses THIS, not the raw 100% committed." }
        received:             { type: string, description: "SUM(gift_allocations.sub_amount) for allocations of this category with grant_year = this FY (loan_capital = loan_fund_investment gifts; revenue = everything else)." }
        goal:                 { type: string, nullable: true, description: "Fundraising goal for the FY+category; null if not set." }
    FiscalYearMetrics:
      type: object
      required: [fiscalYear, revenue, loanCapital]
      description: |
        Per-fiscal-year fundraising metrics, split into two parallel tracks:
        `revenue` (gifts/grants) and `loanCapital` (loan-fund principal). Loan
        money is never mixed into revenue.
      properties:
        fiscalYear:  { $ref: "#/components/schemas/DashboardFiscalYear" }
        revenue:     { $ref: "#/components/schemas/FiscalYearCategoryMetrics" }
        loanCapital: { $ref: "#/components/schemas/FiscalYearCategoryMetrics" }
    DashboardWorklists:
      type: object
      description: |
        Counts for the donor-lifecycle worklists ("what hasn't been done yet").
        Each count is scoped by the dashboard's global entity filter (when set)
        and excludes archived rows, matching the corresponding filtered-list
        worklist preset. See the `worklist` query params on the opportunities and
        gifts list endpoints for the canonical per-worklist definitions.
      required:
        [verbalNoLetter, committedUnpaid, partiallyPaid, stagedUnprocessed, giftsMissingAllocations]
      properties:
        # opportunities?worklist=verbal_no_letter
        verbalNoLetter:          { type: integer }
        # pledges?worklist=committed_unpaid
        committedUnpaid:         { type: integer }
        # pledges?worklist=partially_paid
        partiallyPaid:           { type: integer }
        # staged_payments + stripe_staged_charges still status=pending (links to
        # the reconciliation workbench). Stripe charges carry no entity column,
        # so they are not entity-scoped.
        stagedUnprocessed:       { type: integer }
        # gifts?worklist=missing_allocations
        giftsMissingAllocations: { type: integer }
    DashboardSummary:
      type: object
      required: [counts, worklists, currentFiscalYear, byFiscalYear]
      properties:
        counts:            { $ref: "#/components/schemas/DashboardCounts" }
        worklists:         { $ref: "#/components/schemas/DashboardWorklists" }
        currentFiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        byFiscalYear:
          type: array
          description: "Per-FY metrics for the current FY and the next FY (in that order)."
          items: { $ref: "#/components/schemas/FiscalYearMetrics" }

    ProjectionByFyEntityRow:
      type: object
      required: [grantYear, entityId, category, allocationCount, totalSubAmount, expected]
      properties:
        grantYear:       { type: string, nullable: true, description: "fiscal_years.id, or null for unbucketed allocations." }
        entityId:        { type: string, nullable: true, description: "entities.id, or null for unbucketed allocations." }
        category:        { $ref: "#/components/schemas/FundraisingCategory" }
        allocationCount: { type: integer }
        totalSubAmount:  { type: string, description: "SUM(sub_amount) for the group, as numeric string." }
        expected:        { type: string, description: "SUM(sub_amount × COALESCE(parent.win_probability, 1)) for the group, as numeric string." }
    ProjectionsByFyEntity:
      type: object
      required: [rows]
      properties:
        rows: { type: array, items: { $ref: "#/components/schemas/ProjectionByFyEntityRow" } }

    TopPriorityAffiliate:
      type: object
      required: [personId, personName, anonymous, ownerUserId]
      properties:
        personId:    { type: string }
        personName:  { type: string }
        anonymous:   { type: boolean }
        ownerUserId: { type: string, nullable: true }

    TopPriorityOpenAsk:
      type: object
      required: [opportunityId, opportunityName]
      properties:
        opportunityId:   { type: string }
        opportunityName: { type: string }

    TopPriorityOrganization:
      type: object
      required: [id, name, anonymous, ownerUserId, openOpportunityCount, openTaskCount, openAsks, affiliatedPeople]
      properties:
        id:                   { type: string }
        name:                 { type: string }
        anonymous:            { type: boolean }
        ownerUserId:          { type: string, nullable: true }
        openOpportunityCount: { type: integer }
        openTaskCount:        { type: integer }
        openAsks:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOpenAsk" }
        affiliatedPeople:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityAffiliate" }
        lastGiftDate:         { type: string, nullable: true }
        lastGiftAmount:       { type: string, nullable: true }

    TopPriorityPerson:
      type: object
      required: [id, firstName, lastName, anonymous, ownerUserId, openOpportunityCount, openTaskCount, openAsks]
      properties:
        id:                   { type: string }
        firstName:            { type: string, nullable: true }
        lastName:             { type: string, nullable: true }
        fullName:             { type: string, nullable: true }
        anonymous:            { type: boolean }
        ownerUserId:          { type: string, nullable: true }
        openOpportunityCount: { type: integer }
        openTaskCount:        { type: integer }
        openAsks:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOpenAsk" }
        lastGiftDate:         { type: string, nullable: true }
        lastGiftAmount:       { type: string, nullable: true }

    TopPriorities:
      type: object
      required: [organizations, individuals]
      properties:
        organizations:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityOrganization" }
        individuals:
          type: array
          items: { $ref: "#/components/schemas/TopPriorityPerson" }

    FiscalYearReceivedRow:
      type: object
      required: [allocationId, subAmount, giftId]
      description: "A single gift_allocation row booked to the FY's grant_year, denormalized with parent gift + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "gift_allocations.sub_amount (numeric string)." }
        category:                   { $ref: "#/components/schemas/FundraisingCategory" }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        displayUsage:               { type: string, nullable: true, description: "Server-computed human-readable usage label from gift_allocations.display_usage." }
        fundableProjectId:          { type: string, nullable: true }
        giftId:                     { type: string }
        giftType:                   { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        giftAmount:                 { type: string, nullable: true, description: "Parent gift's total amount (numeric string)." }
        organizationId:                   { type: string, nullable: true }
        organizationName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
    FiscalYearOpenRow:
      type: object
      required: [allocationId, subAmount, weightedAmount, opportunityId]
      description: "A single pledge_allocation row on an open opportunity for the FY's grant_year, denormalized with parent opp + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "pledge_allocations.sub_amount (numeric string)." }
        weightedAmount:             { type: string, description: "sub_amount × COALESCE(parent.win_probability, 1) (numeric string)." }
        category:                   { $ref: "#/components/schemas/FundraisingCategory" }
        allocationStatus:           { type: string, nullable: true }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        fundableProjectId:          { type: string, nullable: true }
        opportunityId:              { type: string }
        opportunityName:            { type: string, nullable: true }
        opportunityStage:           { type: string, nullable: true }
        winProbability:             { type: string, nullable: true, description: "Parent opp's win_probability (0–1, numeric string)." }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        organizationId:                   { type: string, nullable: true }
        organizationName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
    FiscalYearBreakdown:
      type: object
      required: [fiscalYear, revenue, loanCapital]
      description: |
        Supporting detail for a single FY's dashboard money tiles, split into the two
        parallel tracks (`revenue` and `loanCapital`). Within each category `received`
        powers the "Received" tile (gift_allocations summed); `openPipeline` powers
        both the "Open asks" tile (totalAsk) and the "Weighted asks" tile (totalWeighted).
      properties:
        fiscalYear:  { $ref: "#/components/schemas/DashboardFiscalYear" }
        revenue:     { $ref: "#/components/schemas/FiscalYearCategoryBreakdown" }
        loanCapital: { $ref: "#/components/schemas/FiscalYearCategoryBreakdown" }
    FiscalYearCategoryBreakdown:
      type: object
      required: [goal, received, openPipeline]
      description: "Per-category (revenue OR loan_capital) supporting detail for one FY."
      properties:
        goal:       { type: string, nullable: true }
        received:
          type: object
          required: [total, rows]
          properties:
            total: { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            rows:  { type: array, items: { $ref: "#/components/schemas/FiscalYearReceivedRow" } }
        openPipeline:
          type: object
          required: [totalAsk, totalWeighted, rows]
          properties:
            totalAsk:      { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            totalWeighted: { type: string, description: "SUM(weightedAmount) across the rows (numeric string)." }
            rows:          { type: array, items: { $ref: "#/components/schemas/FiscalYearOpenRow" } }

    FiscalYearReportBucket:
      type: string
      enum: [received, committed, open]
      description: |
        Which slice of a fiscal year's progress-to-goal calculation a row
        contributes to: `received` (cash-in gift allocations), `committed`
        (per-opp unpaid remainder of a written pledge), or `open` (weighted
        open opportunity pipeline).
    FiscalYearReportRow:
      type: object
      required: [rowId, bucket, amount]
      description: |
        One record contributing to a fiscal year + track's progress-to-goal
        calculation, denormalized with its donor (Donor-XOR: exactly one of
        organization / household / individual) and a link target (giftId for
        `received`, opportunityId for `committed`/`open`).
      properties:
        rowId:                      { type: string, description: "Stable React key, unique across buckets (`<bucket>:<id>`)." }
        bucket:                     { $ref: "#/components/schemas/FiscalYearReportBucket" }
        amount:                     { type: string, description: "received: gift_allocations.sub_amount; committed: per-opp unpaid remainder (pledged − paid-this-FY, clamped ≥ 0); open: pledge_allocations.sub_amount (ask). Numeric string." }
        weightedAmount:             { type: string, nullable: true, description: "committed: remainder × win_probability; open: sub_amount × win_probability; null for received. Numeric string." }
        category:                   { $ref: "#/components/schemas/FundraisingCategory" }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        displayUsage:               { type: string, nullable: true, description: "Server-computed human-readable usage label (received rows only)." }
        fundableProjectId:          { type: string, nullable: true }
        giftId:                     { type: string, nullable: true, description: "Link target for `received` rows." }
        giftType:                   { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        opportunityId:              { type: string, nullable: true, description: "Link target for `committed` / `open` rows." }
        opportunityName:            { type: string, nullable: true }
        opportunityStage:           { type: string, nullable: true }
        winProbability:             { type: string, nullable: true, description: "Parent opp's win_probability (0–1, numeric string)." }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        pledgedAmount:              { type: string, nullable: true, description: "committed: total pledged to this FY before payments (numeric string)." }
        paidAmount:                 { type: string, nullable: true, description: "committed: payments booked this FY against the pledge (numeric string)." }
        organizationId:             { type: string, nullable: true }
        organizationName:           { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:           { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
    FiscalYearReportTotals:
      type: object
      required: [received, committed, committedWeighted, openAsk, openWeighted, weightedProjection, goal]
      description: |
        Per-bucket reconciling totals for the FY + track. `received`,
        `committedWeighted` and `openWeighted` are the three segments of the
        dashboard progress-to-goal bar; `weightedProjection` is their sum.
      properties:
        received:           { type: string, description: "SUM of received rows' amount." }
        committed:          { type: string, description: "SUM of committed rows' amount (100% unpaid remainder)." }
        committedWeighted:  { type: string, description: "SUM of committed rows' weightedAmount (remainder × win_probability) — the dashboard bar's Committed segment." }
        openAsk:            { type: string, description: "SUM of open rows' amount (ask)." }
        openWeighted:       { type: string, description: "SUM of open rows' weightedAmount — the dashboard bar's Weighted open pipeline segment." }
        weightedProjection: { type: string, description: "received + committedWeighted + openWeighted — matches the dashboard bar's projection." }
        goal:               { type: string, nullable: true, description: "Fundraising goal for the FY + track; null if not set." }
    FiscalYearReport:
      type: object
      required: [fiscalYear, category, totals, rows]
      description: |
        The records behind one fiscal year + track's progress-to-goal bar. Totals
        reconcile to the dashboard bar for the same FY + track + entity filter.
      properties:
        fiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        category:   { $ref: "#/components/schemas/FundraisingCategory" }
        totals:     { $ref: "#/components/schemas/FiscalYearReportTotals" }
        rows:       { type: array, items: { $ref: "#/components/schemas/FiscalYearReportRow" } }

    # ─── Organizations ─────────────────────────────────────────────────────────
    # Unified table — consolidates former `funders` (issuesGrants=true) and
    # `organizations` (issuesGrants=false, advisors/partners/etc.).
    Organization:
      type: object
      required: [id, name, issuesGrants, anonymous, createdAt, updatedAt]
      properties:
        id:                    { type: string }
        name:                  { type: string }
        issuesGrants:          { type: boolean, description: "True for grant-making organizations (formerly 'funders'); false for non-grant entities." }
        entityType:            { allOf: [ { $ref: "#/components/schemas/EntityType" } ], nullable: true, description: "Normalized entity type (school_network, nonprofit, etc.)." }
        makesPris:             { type: boolean, nullable: true }
        numberOfEmployees:     { allOf: [ { $ref: "#/components/schemas/NumberOfEmployees" } ], nullable: true }
        capacityRating:        { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        totalAssets:           { type: string, nullable: true, description: "Estimated total assets / endowment size. Decimal as string." }
        priorityAreasNotes:    { type: string, nullable: true }
        about:                 { type: string, nullable: true }
        activeStatus:          { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        otherNames:            { type: string, nullable: true }
        historicalNames:       { type: array, items: { type: string }, nullable: true }
        details:               { type: string, nullable: true }
        emailDomain:           { type: string, nullable: true }
        orgEmail:              { type: string, nullable: true }
        ownerUserId:           { type: string, nullable: true }
        tags:                  { type: string, nullable: true }
        website:               { type: string, nullable: true }
        connectionStatus:      { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        enthusiasm:            { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        strategicAlignment:    { allOf: [ { $ref: "#/components/schemas/StrategicAlignment" } ], nullable: true }
        interestsThematic:     { type: array, items: { type: string }, nullable: true }
        interestsAges:         { type: array, items: { type: string }, nullable: true }
        interestsGovModels:    { type: array, items: { type: string }, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }
        parentOrganizationId:  { type: string, nullable: true }
        paymentIntermediaryId: { type: string, nullable: true, description: "Payment intermediary (e.g. a DAF) this organization gives through." }
        anonymous:             { type: boolean, description: "When true, hide the organization's real name in the UI (shown as 'Anonymous') from everyone except the record owner and admins. UI-only; the name is still stored and returned." }
        lastContacted:         { type: string, format: date, nullable: true }
        x:                     { type: string, nullable: true }
        linkedin:              { type: string, nullable: true }
        facebook:              { type: string, nullable: true }
        instagram:             { type: string, nullable: true }
        youtube:               { type: string, nullable: true }
        crunchbase:            { type: string, nullable: true }
        quickbooksCustomerId:  { type: string, nullable: true, description: "QuickBooks Online Customer Id this organization maps to." }
        priority:              { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, description: "Solicitation priority tier (top/high/medium/low)." }
        # Server-computed aggregates for the organizations list view.
        primaryContactPersonId:   { type: string, nullable: true, readOnly: true }
        primaryContactPersonName: { type: string, nullable: true, readOnly: true }
        lifetimeGiving:           { type: string, nullable: true, readOnly: true, description: "Sum of gifts.amount where organization_id matches. Decimal as string." }
        openOpportunityCount:     { type: integer, nullable: true, readOnly: true, description: "Count of opportunities_and_pledges where organization_id matches and status='open'." }
        archivedAt:            { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:             { type: string, format: date-time }
        updatedAt:             { type: string, format: date-time }
    OrganizationDetail:
      allOf:
        - { $ref: "#/components/schemas/Organization" }
        - type: object
          properties:
            people:       { type: array, items: { $ref: "#/components/schemas/PeopleEntityRole" } }
            emails:       { type: array, items: { $ref: "#/components/schemas/Email" } }
            phoneNumbers: { type: array, items: { $ref: "#/components/schemas/PhoneNumber" } }
            addresses:    { type: array, items: { $ref: "#/components/schemas/Address" } }
            paymentIntermediary: { allOf: [ { $ref: "#/components/schemas/PaymentIntermediary" } ], nullable: true, readOnly: true }
    OrganizationList:
      type: object
