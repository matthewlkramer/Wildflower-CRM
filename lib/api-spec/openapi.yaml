  # ─── Emails ────────────────────────────────────────────────────────────────
  /emails:
    get:
      operationId: listEmails
      tags: [emails]
      parameters:
        - { name: personId, in: query, schema: { type: string } }
        - { name: funderId, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: paymentIntermediaryId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
