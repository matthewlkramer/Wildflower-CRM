      tags: [admin]
      summary: >-
        Admin-only. Reassign every record owned by `fromUserId` to `toUserId`
        across all owner-bearing tables (people, organizations, opportunities,
        gifts, interactions, tasks, and grant leads) in one transaction
        (offboarding). Task `created_by_user_id` provenance is left untouched.
        Optionally archives the source user afterward. Records an audit-log entry.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReassignOwnerBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReassignOwnerResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Unified reconciler (QB-anchored 4-node match graph) ─────────────────────
  /reconciliation/cards:
    get:
      operationId: listReconciliationCards
      tags: [reconciliation]
      summary: List reconciliation cards — one per QuickBooks staged-payment anchor.
      description: |
        The unified reconciler's work queue. Each card is anchored on a QB
        staged_payments row (a QB record is required for every complete match) and
        carries the QB facts plus a compact auto-proposed best guess for the donor /
        gift / opportunity nodes and whether Stripe per-charge evidence backs the
        same money. `match_confirmed` cards are excluded by default (filter with
        queue=done). Use the graph endpoint for the full candidate detail.
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/ReconciliationCardQueue" }, description: "Queue bucket to list. Omit for the active work queue (excludes match_confirmed/excluded rows AND parks pending fiscally-sponsored money out of the main flow). Request queue=fiscally_sponsored to view the parked queue (still fully matchable)." }
        - { name: q, in: query, schema: { type: string }, description: "Free-text over payer name / reference / memo." }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter to one Wildflower legal entity attribution." }
        - { name: ready, in: query, schema: { type: boolean }, description: "Filter to cards whose auto-proposal passes (true) / fails (false) the consistency gate." }
        - { name: exclusionReason, in: query, schema: { $ref: "#/components/schemas/StagedPaymentExclusionReason" }, description: "Filter the Excluded queue to a single exclusion reason. Only meaningful with queue=excluded; ignored otherwise." }
        - { name: fundingSource, in: query, schema: { type: string, enum: [stripe, donorbox, qb_direct] }, description: "Filter cards by funding source (Gift report §4.5): stripe / donorbox / qb_direct (checks, ACH, cash — money not routed through a processor, including unclassified). Applies across all queues." }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 500 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationCardList" } } } }
  /reconciliation/cards/{stagedPaymentId}/graph:
    get:
      operationId: getReconciliationGraph
      tags: [reconciliation]
      summary: Full auto-proposed 4-node match graph for one card.
      description: |
        Returns the QB anchor + optional Stripe evidence and, for each of the donor /
        gift / opportunity nodes, the scored candidates and the edge state
        (determined / ambiguous / filter_only / conflict / none / create). Read-only:
        nothing is mutated. `ready=true` when a confident, non-conflicting selection
        exists for the required nodes so the card can be approved without manual
        disambiguation.
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationGraph" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/cards/{stagedPaymentId}/lineage:
    get:
      operationId: getReconciliationLineage
      tags: [reconciliation]
      summary: Read-only settlement lineage for one card — QB deposit ↔ Stripe payout ↔ Stripe charges ↔ Donorbox donations.
      description: |
        Traces the SAME physical money across processors for one QB staged-payment
        anchor, so the workbench can show where the deposit came from. Read-only —
        nothing is mutated. The chain is derived from existing pulled join keys
        (payout↔QB tie, charge.stripePayoutId, donation.stripeChargeId) PLUS any
        human-confirmed cross-processor links persisted on the staged charges /
        donations. Each leg's `linkSource` records HOW it was tied (a pulled key vs
        a reviewer confirmation). Any leg is empty/null when it doesn't apply
        (e.g. a check deposit has no Stripe payout or Donorbox donation).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SettlementLineage" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/bundles/{stagedPaymentId}/confirm-ties:
    post:
      operationId: confirmBundleCrossProcessorTies
      tags: [reconciliation]
      summary: Persist the human-confirmed cross-processor links for one settlement bundle.
      description: |
        Stamps the additive cross-processor link fields for the bundle anchored on
        a QB staged-payment deposit: every Stripe charge settled in the tied payout
        gets `linkedQbStagedPaymentId` set to this deposit, and every enrichment
        Donorbox donation (donationType=stripe) tied to one of those charges gets
        `linkedStripeChargeId` + `linkedQbStagedPaymentId` set, both stamped with the
        reviewer + timestamp. Idempotent — only ever fills NULL link fields, never
        overwrites. Additive and CRM-only: it writes nothing back to QuickBooks,
        Stripe, or Donorbox and mints no gifts (enrich, don't mint).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BundleTieResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/search/{nodeType}:
    get:
      operationId: searchReconciliationNode
      tags: [reconciliation]
      summary: Scoped, cross-filtering search for one node of a card.
      description: |
        Powers the cross-filtering search boxes. Scoped to a money event so
        amount/date windows come from that anchor. Pass EXACTLY ONE of
        stagedPaymentId (a QuickBooks card anchor) or stripeChargeId (a Stripe
        charge anchor, e.g. a settlement-bundle charge row that has no staged
        payment); a Stripe charge anchors on its GROSS amount + date. Pass
        donorId to cross-filter gift/opportunity candidates to a chosen donor
        (the FILTER edge). nodeType is donor / gift / opportunity / qb — a Stripe
        charge anchor supports only donor and gift (opportunity/qb require a
        stagedPaymentId).
      parameters:
        - { name: nodeType, in: path, required: true, schema: { $ref: "#/components/schemas/ReconciliationMatchNodeType" } }
        - { name: stagedPaymentId, in: query, schema: { type: string }, description: "QuickBooks card anchor; scopes amount/date windows and cross-filtering. Provide exactly one of stagedPaymentId or stripeChargeId." }
        - { name: stripeChargeId, in: query, schema: { type: string }, description: "Stripe charge anchor (its GROSS amount + date scope the window); for donor/gift search on a charge that has no staged payment. Provide exactly one of stagedPaymentId or stripeChargeId." }
        - { name: q, in: query, schema: { type: string }, description: "Free-text query (donor/gift name, payer, reference)." }
        - { name: donorId, in: query, schema: { type: string }, description: "Cross-filter gift/opportunity candidates to this donor (FILTER edge)." }
        - { name: split, in: query, schema: { type: boolean, default: false }, description: "Split mode (gift search only): candidate gifts are FRACTIONS of the payment, not near-equal to it. Drops the lower amount bound (returns gifts with amount > 0 up to the payment total within fee-band tolerance), relaxes the date window, and orders by date proximity/recency instead of proximity to the full amount." }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around the anchor date for amount/date windows." }
        - { name: limit, in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationSearchList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/cards/{stagedPaymentId}/approve:
    post:
      operationId: approveReconciliationCard
      tags: [reconciliation]
      summary: Approve a card — link or human-mint a gift, enforcing all invariants server-side.
      description: |
        Human approval of a reconciliation card. The server RE-DERIVES and
        RE-VALIDATES the whole graph (it never trusts UI-supplied locks) and runs the
        consistency gate before committing in one transaction: QB present + not already
        reconciled; exactly one donor (Donor XOR); gift donor == opportunity donor;
        the gift is not already claimed by another evidence row; amount/date within the
        fee-band tolerance unless an override reason is given; Stripe GROSS takes
        precedence over the QB net when a charge is selected; nothing is archived.
        Minting a gift is human-only. Idempotent: re-approving a reconciled card
        returns its current state.

        Source groups (a card whose stagedPaymentId belongs to a unit group)
        approve as a WHOLE: the create-* outcomes mint ONE gift whose amount sums
        every non-archived member, booking one counted payment_applications
        ledger row per member (the representative's row carries
        created_the_gift, so no slice can
        be reconciled twice); link_existing_gift is rejected (409
        source_group_use_reconcile) — link the whole group via group-reconcile
        instead; and a group whose members carry a tied Stripe payout, or an
        explicit Stripe charge selection, is rejected (409
        source_group_stripe_unsupported) since per-charge GROSS can't yet be
        summed across a group (ungroup to reconcile those individually).
      parameters:
        - { name: stagedPaymentId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ApproveCompleteMatchBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationApproveResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Card is not in an approvable state, or the chosen gift/opportunity is already claimed." }
  /reconciliation/qb-search:
    get:
      operationId: searchReconciliationQbStaged
      tags: [reconciliation]
      summary: Criteria-based payment search (not anchored to a card) — QuickBooks staged payments, optionally interleaved with Stripe charges.
      description: |
        Free search over QuickBooks staged-payment rows by text / amount / date window,
        with NO card anchor — used by the stray-Stripe worklist to hunt down the QB
        deposit that a yet-unmatched Stripe payout should belong to, and by the
        stray-gift "Link gift/allocation to a payment" dialog. Returns qb
        candidates (same shape as the card search). Read-only.

        With includeStripe=true (the stray-gift dialog), Stripe staged charges —
        which carry donor names QuickBooks deposit lumps often lack — are searched
        too and interleaved with the QB rows by amount/date proximity. Stripe
        candidates come back with nodeType=stripe; failed / refunded / disputed /
        excluded charges never appear, and a charge already tied to a gift carries
        alreadyLinkedGiftId so the client can gray it and offer an unlink (the
        per-charge revert path). Default false keeps every existing caller QB-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over payer name / reference / memo / doc number (for Stripe: payer name / email / description / statement descriptor)." }
        - { name: amount, in: query, schema: { type: string }, description: "Target amount (major units); when set, results are scored/filtered around it." }
        - { name: date, in: query, schema: { type: string, format: date }, description: "Anchor date; pair with days for a ± window." }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around date for the amount/date window." }
        - { name: limit, in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
        - { name: includeStripe, in: query, schema: { type: boolean, default: false }, description: "Also search Stripe staged charges and interleave them with the QB rows by amount/date proximity (nodeType=stripe). Default false: QB-only, preserving existing callers." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationSearchList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/payout-search:
    get:
      operationId: searchReconciliationPayouts
      tags: [reconciliation]
      summary: Criteria-based Stripe payout search (reverse of qb-search; not anchored to a card).
      description: |
        Free search over ORPHAN Stripe payouts (no settlement link at all) by
        payout-id text / amount / date window — the reverse of qb-search. Powers
        the Settlement report's "Missing payout" resolve box: a standalone
        QuickBooks deposit anchor uses this to hunt the payout it should settle
        against. Payouts already tied (proposed or confirmed) are omitted — they
        belong to another deposit's bundle. Read-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over the Stripe payout id (po_...)." }
        - { name: amount, in: query, schema: { type: string }, description: "Target amount (major units); when set, results are banded around the payout net." }
        - { name: date, in: query, schema: { type: string, format: date }, description: "Anchor date; pair with days for a ± window." }
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 }, description: "± days around date for the amount/date window." }
        - { name: limit, in: query, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PayoutSearchList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/settlement-links/{payoutId}/reject:
    post:
      operationId: rejectSettlementProposal
      tags: [reconciliation]
      summary: Dismiss a PROPOSED payout↔deposit settlement tie.
      description: |
        Deletes the PROPOSED settlement link for one Stripe payout, dropping the
        auto-proposed payout↔deposit tie so the Settlement report shows it as an
        un-proposed orphan again. Money is untouched: nothing is excluded and no
        gift is minted. A CONFIRMED link is never rejected here (revert is a
        separate reconciliation path) — attempting to reject a confirmed tie is a
        409. Rejecting a payout with no proposed link is a no-op success.
      parameters:
        - { name: payoutId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RejectSettlementProposalResult" } } } }
        "409": { description: "The settlement link is confirmed (use revert, not reject)." }
  /reconciliation/settlement-links/{payoutId}/confirm:
    post:
      operationId: confirmSettlementLink
      tags: [reconciliation]
      summary: Confirm a payout↔deposit settlement tie (Plane 1 only).
      description: |
        Confirms the settlement link for ONE Stripe payout — the Plane-1
        payout↔deposit tie ONLY — without touching the per-charge → gift booking
        (Plane 2), which the Gift report owns. Approving a "linked" (proposed)
        settlement is therefore one click: the tie is stamped confirmed and the
        QuickBooks deposit is marked reconciled so the coarse deposit can never
        credit donors on top of the individual per-charge Stripe gifts (that
        deposit→reconciled flip IS the double-count guard).

        Behaviour by the payout's current settlement-link state:
          • proposed (clean)                → confirm; deposit pending → reconciled.
          • proposed + already-booked deposit (legacy `approved`, e.g. a split
            whose money lives in counted payment_applications rows or a
            gift-linked lump) → LINKAGE-ONLY confirm: the tie is stamped and the
            deposit is left untouched (kind `confirmed_linkage_only`). An
            approved deposit with NO provable booking is refused with a
            permanent 409 `deposit_not_booked` — resolve it in QuickBooks
            review first.
          • proposed + approved-QB-gift conflict → keep the existing gift; confirm
            the linkage only (deposit + gift untouched).
          • already confirmed               → idempotent success (no re-book).
          • no link + depositStagedPaymentId body → propose that payout↔deposit tie,
            then confirm it (powers the Settlement report Resolve box in BOTH
            directions: a payout anchor picking a deposit, or a deposit anchor
            picking a payout).
          • no link + no deposit            → 400 (nothing to confirm).
      parameters:
        - { name: payoutId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmSettlementLinkBody" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConfirmSettlementLinkResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { description: "The payout (or the chosen deposit) no longer exists." }
        "409": { description: "Either transient drift (error `tie_transition`: the link was already confirmed differently, or the deposit/gift changed — reload and retry) or a PERMANENT rejection (error `deposit_not_booked`: the deposit is approved with no provable booking — retrying won't help)." }
  /reconciliation/payouts/{payoutId}/charge-ties/confirm:
    post:
      operationId: confirmPayoutChargeTies
      tags: [reconciliation]
      summary: Confirm charge-grain Stripe↔QuickBooks ties for one payout (individually-booked payouts).
      description: |
        Atomically confirms per-charge QuickBooks ties for ONE Stripe payout —
        the settlement path for payouts the bookkeeper booked as individual QB
        rows (one per donation) instead of a single deposit lump, so no
        payout↔deposit settlement link will ever exist.

        Two modes, by body:
          • NO qbStagedPaymentIds — approve the SYSTEM-PROPOSED ties: every
            charge carrying a proposed QB tie is stamped with the confirmed
            linkedQbStagedPaymentId (+ who/when provenance) and the proposal is
            cleared. 409 if nothing is proposed or any proposed QB row was
            claimed elsewhere in the meantime (nothing is written).
          • qbStagedPaymentIds present — MANUAL "Tie selected": the server
            assigns each given QB row to a distinct untied charge of this
            payout by exact amount (payer-name similarity and date proximity
            order the assignment when several same-amount charges compete) and
            confirms all of them. 400/409 with per-row issues when any row
            cannot be assigned (nothing is written).
          • qbStagedPaymentIds (exactly one) + chargeId — PINNED manual tie:
            tie that one QB row to that specific untied charge of this payout
            (the per-charge "Find the QuickBooks row" dialog). The row's
            amount must still equal the charge's gross or net exactly UNLESS
            overrideAmountMismatch is set — the deliberate human assertion
            that this row records this charge's money even though the
            bookkeeper booked a different amount. 409 amount_mismatch
            otherwise (nothing is written).

        Plane 1 only: ties are permanent settlement EVIDENCE. No gift is ever
        minted, no QB row's status/donor changes, and per-charge → gift booking
        stays with the Gift report. All-or-nothing in one transaction. Once
        every charge of the payout is tied (or excluded/rejected), the payout
        shows as settled ("Matched") on the Settlement report, and each tied QB
        row leaves the "Needs payout tie" column.
      parameters:
        - { name: payoutId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmChargeTiesBody" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConfirmChargeTiesResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { description: "The payout no longer exists." }
        "409": { description: "Nothing to confirm, or the state drifted (a QB row was claimed elsewhere / a charge tie changed). Reload and retry. The body's `details.issues` lists the specific rows." }
  /reconciliation/charges/{chargeId}/qb-tie/reject:
    post:
      operationId: rejectChargeQbTie
      tags: [reconciliation]
      summary: Reject ONE proposed charge-grain Stripe↔QuickBooks tie.
      description: |
        Dismisses the system-PROPOSED QuickBooks tie on ONE Stripe charge (the
        per-row Reject on a "Missing deposit" card). Clears the charge's
        proposedQbStagedPaymentId AND remembers the dismissed charge↔QB pair,
        so the idempotent proposal pass never re-proposes the same pair — the
        QB row remains a candidate for OTHER charges, and a manual human
        "Tie selected" still overrides the dismissal.

        Plane 1 only: money is untouched — no gift is minted or changed, no QB
        row's status/donor changes, and settlement links are never touched.
        409 when the charge carries no proposed tie (nothing to reject) or is
        already confirmed-tied (revert is a separate path).
      parameters:
        - { name: chargeId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RejectChargeQbTieResult" } } } }
        "404": { description: "The charge no longer exists." }
        "409": { description: "No proposed tie to reject, or the tie is already confirmed." }
  /reconciliation/charges/{chargeId}/qb-tie/revert:
    post:
      operationId: revertChargeQbTie
      tags: [reconciliation]
      summary: Untie ONE CONFIRMED charge-grain Stripe↔QuickBooks tie.
      description: |
        Reverts a CONFIRMED QuickBooks tie on ONE Stripe charge — the undo for
        an accidental or wrong "Tie selected" / proposal approval. Clears the
        charge's linkedQbStagedPaymentId (+ the who/when provenance) and, when
        a sibling negative "Stripe fee" QB row was auto-claimed at confirm
        time, frees that fee row too (clears linkedFeeQbStagedPaymentId). The
        QB row immediately returns to the open review flow (its status is
        derived, nothing stored) and the charge reopens for a new tie. The
        original proposal is NOT restored, and the pair is not remembered as
        dismissed — a later proposal pass may re-propose it.

        Plane 1 only: money is untouched — no gift is minted or changed, no QB
        row's donor changes, and settlement links are never touched. 409 when
        the charge carries no confirmed tie (a merely-PROPOSED tie is rejected
        via the reject endpoint instead).
      parameters:
        - { name: chargeId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RevertChargeQbTieResult" } } } }
        "404": { description: "The charge no longer exists." }
        "409": { description: "No confirmed tie to revert (an unconfirmed proposal is rejected via the reject endpoint)." }
  /reconciliation/gifts-missing-qb:
    get:
      operationId: listGiftsMissingQb
      tags: [reconciliation]
      summary: Gift allocations genuinely missing a QuickBooks record (data-quality worklist).
      description: |
        Lists on-books gifts that are genuinely UN-reconciled with QuickBooks — i.e.
        no QuickBooks cash-application ledger entry exists for the gift — ONE ROW PER
        gift_allocation (a multi-allocation gift surfaces several rows; a gift with no
        allocations surfaces a single row with allocationId null). Gifts that are not
        expected to get a direct QB record are excluded, so the list never implies they
        are unreconciled: Stripe-sourced gifts (the money lands in QuickBooks at the
        payout level, so they never carry a per-gift QB ledger link) and allocations
        attributed to entities that never settle through a payment processor
        (entities.expectsPayment = false: "Direct to School" / "Wildflower Foundation
        TSNE"). Broad by design (cash / check / brokerage / imports all surface) with
        filters to slice. Pagination is at allocation-row granularity. Donor names are
        anonymous-masked for the viewer. Read-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over donor name (organization / person / household) or the CRM gift name. When set, the response ALSO carries `linkedMatches`: gifts matching the text that are excluded from the list because they are already tied to money, so a search never silently hides an already-matched gift." }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter to one Wildflower legal entity." }
        - { name: paymentMethod, in: query, schema: { $ref: "#/components/schemas/GiftPaymentMethod" }, description: "Filter to one recorded gift payment method." }
        - { name: fundingSource, in: query, schema: { type: string, enum: [stripe, donorbox, qb_direct] }, description: "Filter by the source of this gift's best-guess UNLINKED payment proposal (the same match the row's one-click Link surfaces): stripe = only a Stripe charge is plausible; qb_direct = a QuickBooks staged payment is plausible (preferred over Stripe); donorbox = no proposals originate from Donorbox (settles via Stripe), so this always yields none — kept only so the column's filter set matches the other two Gift-report columns." }
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftMissingQbList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/incomplete-gifts:
    get:
      operationId: listIncompleteGifts
      tags: [reconciliation]
      summary: Gifts still missing the critical coding info needed to book them (bookable-gift SOP worklist).
      description: |
        Lists every on-books gift that fails the bookable-gift standard — the critical
        coding info the finance team needs to record it correctly in QuickBooks. ONE ROW
        PER gift, each carrying the list of missing-info reasons and a link to fix it.
        A gift is INCOMPLETE when any of: donor not set (needs exactly one), amount or
        date received missing, any allocation missing entity / fiscal year / intended
        usage (or a project allocation with no fundable project), a donor_restricted
        allocation with neither a grant letter nor an online-source link, or a linked
        opportunity that requires a written report with no reporting_deadline task.
        Off-books gifts (all allocations on non-payment entities) are EXEMPT, mirroring
        quickbooks_tie_status. The queue updates as gifts are completed. Donor names are
        anonymous-masked for the viewer. Read-only.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Free-text over donor name (organization / person / household)." }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter to gifts with an allocation attributed to this Wildflower legal entity." }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/IncompleteGiftList" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/bundle-anchors:
    get:
      operationId: listReconciliationBundleAnchors
      tags: [reconciliation]
      summary: List every settlement anchor the bundle workbench can reconcile — Stripe payouts AND standalone QuickBooks deposits/payments.
      description: |
        The unified anchor queue for the reactive settlement-bundle workbench. Returns
        BOTH anchor kinds in one deduped, paginated list so reconciliation can start
        from ANY anchor point:
          • Stripe payouts — the per-charge GROSS source of truth.
          • Standalone QuickBooks deposits/payments — a staged_payments row with NO
            tied Stripe payout (checks, ACH, wires, direct gifts).
        A QB deposit that IS tied to a Stripe payout is deliberately OMITTED: it
        reconciles THROUGH the payout's bundle (assemble canonicalizes a tied QB id to
        its payout), so listing it separately would double-book the same money. Rows
        already grouped (a unit_group_members member) stay in the existing group-reconcile flow and
        are omitted here. Rejected/excluded QB rows are not anchors. Read-only.
      parameters:
        - { name: queue, in: query, schema: { $ref: "#/components/schemas/BundleAnchorQueue" }, description: "Which bucket to list (default needs_review)." }
        - { name: source, in: query, schema: { $ref: "#/components/schemas/BundleAnchorType" }, description: "Restrict to one anchor source. Omit to list both." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BundleAnchorListResponse" } } } }
  /reconciliation/workbench-clusters:
    get:
      operationId: listWorkbenchClusters
      tags: [reconciliation]
      summary: The unified cluster list for the reconciliation workbench — every piece of money work as ONE row with its CRM, transaction and accounting facets.
      description: |
        One paginated list of reconciliation CLUSTERS — each row is a self-contained
        unit of money work carrying all three facets (CRM gifts, transaction evidence,
        bank & accounting records), the money math (gross − fees = net = bank, gap) and
        a server-derived rollup status, so the workbench never re-derives state.
        Exactly three cluster kinds partition the universe (money-safety mirrors the
        bundle-anchor omission rules — a QB deposit settlement-linked to a payout,
        grouped into a unit group, or tied to a charge reconciles THROUGH that cluster
        and is never listed as its own row):
          • stripe_payout — a payout with its charges, per-charge gift links,
            settlement-linked QB deposit and linked processor-fee QB rows.
          • qb_standalone — a QB staged payment/deposit with no payout, group or
            charge/fee tie (checks, ACH, wires, direct gifts); a unit-group
            representative row carries its group rollup.
          • crm_only — an on-books gift with NO counted QuickBooks or Stripe ledger
            row (a Donorbox-only tie does not disqualify — it renders as a badge);
            exempt/off-books gifts and reimbursable placeholders are omitted.
        A gift legitimately paid by BOTH a Stripe charge and an independent QB row can
        appear in two clusters (parallel evidence); both read completed.
        `lensCounts` is computed over the same universe in the same request so the
        rail counts always agree with the rows. Donor/gift names are anonymous-masked
        for the viewer. Read-only; actions ship separately.
      parameters:
        - { name: lens, in: query, schema: { $ref: "#/components/schemas/WorkbenchLens" }, description: "Which lens to list (default all_open)." }
        - { name: q, in: query, schema: { type: string }, description: "Free-text over payer/donor/gift names, QB memo/reference and charge/payout ids." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WorkbenchClusterListResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /reconciliation/workbench-recent-changes:
    get:
      operationId: listWorkbenchRecentChanges
      tags: [reconciliation]
      summary: The workbench's recent-changes rail — the last human reconciliation actions with their undo pointers.
      description: |
        The most recent human reconciliation queue actions (exclude / re-include /
        resolve / reconcile / mint / link / revert / refund decisions), newest
        first, hydrated from the audit log's reconciliation-domain entries. Each
        entry carries a human-readable summary, the actor, and — when the action
        has a safe single-call inverse — an `undo` pointer naming which existing
        revert/re-include endpoint undoes it and on which row. `undo` is recorded
        at action time and NOT re-validated here; the target endpoint still
        enforces its own guards and returns 409 if state has moved on. Entries
        with `undo: null` are shown with a disabled Undo (the reason is in the
        summary's nature: reverts, refunds and manual mints have no safe inverse).
        Read-only; not admin-gated (the workbench itself is team-wide).
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WorkbenchRecentChangesResponse" } } } }
  /reconciliation/bundle-proposals:
    post:
      operationId: assembleReconciliationBundle
      tags: [reconciliation]
      summary: Assemble (or load) the reactive settlement-bundle draft for one anchor.
      description: |
        Returns the COMPLETE proposed end-state for a settlement anchor — one
        Stripe payout and/or one QB deposit plus all its charges — as a persisted
        draft: the payout↔deposit tie plus, per charge/line, the proposed donor
        (existing | new) and gift (match | mint | research | exclude) with
        confidence, provenance and warnings. Creates the draft on first call and
        re-derives from live source on every call (human overrides are always
        preserved). Server-authoritative — UI-supplied locks are never trusted.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BundleAnchorInput" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationBundleProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/bundle-proposals/{draftId}:
    get:
      operationId: getReconciliationBundle
      tags: [reconciliation]
      summary: Load a persisted settlement-bundle draft, re-derived against live state.
      description: |
        Reloads one bundle draft by id, re-deriving the proposal from current CRM +
        processor state with the draft's stored overrides applied. `stale` is true
        when the live source rows drifted from the cached snapshot.
      parameters:
        - { name: draftId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationBundleProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /reconciliation/bundle-proposals/{draftId}/derive:
    post:
      operationId: deriveReconciliationBundle
      tags: [reconciliation]
      summary: Apply human edits to a bundle and re-derive the rest (reactive).
      description: |
        Persists the supplied row/tie overrides, then RE-DERIVES the whole bundle
        server-side so a single edit (picking a donor, flipping mint↔match,
        excluding a row) reactively updates dependent rows, warnings and readiness.
        Bumps the draft revision. Never clobbers other rows' overrides.
      parameters:
        - { name: draftId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BundleOverridesInput" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationBundleProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "The draft is already confirmed (no further edits)." }
  /reconciliation/bundle-proposals/{draftId}/confirm:
    post:
      operationId: confirmReconciliationBundle
      tags: [reconciliation]
      summary: Atomically commit the whole settlement bundle.
      description: |
        Re-derives and re-validates the entire bundle from current DB under row
        locks, runs the consistency gates (Donor XOR, double-book guards,
        amount/date fee-band, Stripe-GROSS precedence), then commits all of it in
        ONE transaction via the SAME money-write primitives used by manual
        approve/reconcile: mints proposed new donors + gifts, links matched gifts,
        stamps the payout↔deposit tie (processor_payout supersede), recomputes the
        gift↔QB tie status and re-derives affected opportunities, and writes the
        audit trail. All-or-nothing; idempotent by (draftId, expectedRevision).
        research/excluded rows mint nothing.
      parameters:
        - { name: draftId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BundleConfirmInput" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReconciliationBundleConfirmResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Revision mismatch, blocker warnings present, or a row's gift/donor is no longer valid (re-derive and retry)." }

components:
  parameters:
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 10000, default: 50 } }
    Page:  { name: page,  in: query, schema: { type: integer, minimum: 1, default: 1 } }
    IdPath: { name: id, in: path, required: true, schema: { type: string } }
    IncludeArchivedQuery: { name: includeArchived, in: query, required: false, description: "Admin-only: when true, include archived (soft-deleted) rows. Ignored for non-admins — they never see archived rows even if this is passed.", schema: { type: boolean } }

  responses:
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    BadRequest:
      description: Bad request (validation error)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    Forbidden:
      description: Forbidden (admin access required)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties: { status: { type: string } }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:   { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    Pagination:
      type: object
      required: [page, limit, total]
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ─── Enums ─────────────────────────────────────────────────────────────────
    RegionType: { type: string, enum: [state, metro_area, city, neighborhood, region_within_state, multi_state_region, country, continent] }
    EntityRoleType: { type: string, enum: [organization, payment_intermediary, household] }
    ContactValidity: { type: string, enum: [valid, invalid, unknown] }
    EmailType: { type: string, enum: [work, personal, other] }
    PhoneType: { type: string, enum: [work, mobile, home, other] }
    PeopleRoleCurrent: { type: string, enum: [current, past] }
    PeopleEntityRoleConnection: { type: string, enum: [employee, principal, board_member, partner, professor, donor_advisor, elected_official] }
    PaymentIntermediaryType: { type: string, enum: [daf, giving_platform, private_wealth_manager] }
    Pronouns: { type: string, enum: [he_him_his, she_her_hers, they_them_theirs, other] }
    SchoolStatus: { type: string, enum: [emerging, open, paused, closing, permanently_closed, disaffiliating, disaffiliated, placeholder, abandoned] }
    GovernanceModel: { type: string, enum: [independent, district, charter, exploring_charter, community_partnership] }
    UserRole: { type: string, enum: [admin, team_member, finance, read_only] }
    FundingEntitySubtype: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform] }
    EntityType: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform, advocacy_membership_lobbyist, authorizer, education_vendor, elected_official, higher_ed, investor, law_firm, media, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    NumberOfEmployees: { type: string, enum: [e_1, e_2_10, e_11_50, e_51_250, e_251_1000, e_1001_10000, e_10000_plus] }
    CapacityRating: { type: string, enum: [tier_1k_10k, tier_10k_50k, tier_50k_250k, tier_250k_1m, tier_1m_plus] }
    ConnectionStatus: { type: string, enum: [connected, have_a_connector, no_connection] }
    Enthusiasm: { type: string, enum: ['7-advocate', '6-supportive', '5-warm', '4-neutral', '3-cool', '2-unsupportive', '1-hostile'] }
    Priority: { type: string, enum: [top, high, medium, low] }
    StrategicAlignment: { type: string, enum: [high, medium, low] }
    ActiveStatus: { type: string, enum: [active, defunct, spenddown] }
    OrganizationType: { type: string, enum: [advocacy_membership_lobbyist, authorizer, cmo, capital_provider, government, corporation, education_vendor, elected_official, higher_ed, investor, law_firm, media, nonprofit, philanthropic_advisor, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    OpportunityStatus:
      type: string
      enum: [open, pledge, cash_in, dormant, lost]
      description: |
        Lifecycle status of an opportunity/pledge row. FULLY CALCULATED and
        read-only — never set this directly. Derived server-side from the
        writtenPledge outcome flag + payments + lossType on every write:
          lossType set                              → status = lossType
          else fully paid (paid ≥ awarded)          → cash_in
          else writtenPledge = true                 → pledge
          else                                      → open
        Values:
          open    — actively in the funnel, not yet committed
          pledge  — funder has committed but not fully paid; UI labels this
                    "Waiting for payment" (stored value stays `pledge`)
          cash_in — fully paid (sum of non-archived payments ≥ awarded)
          dormant — paused (mirrors lossType='dormant')
          lost    — declined/withdrawn (mirrors lossType='lost')
        To mark a row dormant/lost, set the `lossType` field instead. The
        commitment outcome is the writtenPledge flag — cultivation `stage` no
        longer feeds status.
    OpportunityLossType:
      type: string
      enum: [dormant, lost]
      description: |
        User-set override that pulls an opportunity/pledge out of the
        calculated funnel. Null while open/pledge/cash_in; set to 'dormant'
        (paused) or 'lost' (declined/withdrawn). The only user-settable half
        of the old status overload — when set, `status` mirrors it.
        NEWLY setting this (closing the row) requires an actualCompletionDate
        (pre-existing on the row or supplied in the same request) → 400
        otherwise. Rows that are already closed (incl. legacy no-date rows)
        stay freely editable — the rule fires only on the close transition.
    OpportunityType: { type: string, enum: [solicitation, renewal, open_application] }
    OpportunityStage:
      type: string
      enum: [cold_lead, warm_lead, in_conversation, convince, conditional_commitment, probable_renewal, verbal_confirmation, written_commitment, cash_in, complete]
      description: |
        Cultivation funnel stage — a PURE pipeline position, fully separate from
        the commitment outcome (writtenPledge) and the calculated status. Active
        funnel: cold_lead → warm_lead → in_conversation → convince →
        probable_renewal → verbal_confirmation → complete (terminal: won).
        `complete` is set automatically when an opp is won (status pledge|cash_in)
        and reverted off a stale `complete` when no longer won.
        DEPRECATED (retained for historical rows, never written going forward):
        conditional_commitment, written_commitment, cash_in — the commitment
        outcome now lives on the writtenPledge flag, not the stage.
    OpportunityConditional: { type: string, enum: [unconditional, conditional_unspecified, reimbursable, conditional_on_funder_determination, conditional_on_target] }
    OpportunityConditionsMet:
      type: string
      enum: [no, partial, yes]
      description: |
        Tri-state record of whether a grant's conditions have been met:
        'no' (none met), 'partial' (some met), or 'yes' (fully met).
        Replaces the prior boolean flag (false→'no', true→'yes').
    # The superseded family (superseded / superseded_by_pledge / superseded_by_gift)
    # is RETIRED (Task #665): removed from the contract so new writes are rejected;
    # the values remain in the pg enum only (historical rows were remapped to abandoned).
    PledgeAllocationStatus: { type: string, enum: [working, committed, committed_with_conditions, abandoned] }
    GiftType: { type: string, enum: [standard_gift, pledge_payment, directed_gift, loan_fund_investment, matching_gift, reimbursement] }
    FundraisingCategory:
      type: string
      enum: [revenue, loan_capital]
      description: |
        Analytics/track TOKEN vocabulary only (revenue vs loan-capital track).
        Used as a derived bucket label on analytics rows and as a filter token;
        every value is derived server-side from the authoritative `loan_or_grant`
        flag (loan → `loan_capital`, grant → `revenue`). The legacy persisted
        columns of the same name are @deprecated and no longer written or
        returned.
    LoanOrGrant:
      type: string
      enum: [loan, grant]
      description: |
        The single authoritative loan-vs-grant classification. Gifts derive their
        flag from `type` ('loan_fund_investment' → loan) because the gift type IS
        the user input. NOTE: `grant` means ALL non-loan money (individual
        donations, foundation grants, earned revenue, …), not literally grants.
    GoalCategoryParam:
      type: string
      enum: [revenue, loan_capital, loan, grant]
      description: |
        Fiscal-year goal category path/query token. During the loan_or_grant
        transition it accepts BOTH the new authoritative loan/grant tokens AND
        the legacy revenue/loan_capital tokens (loan↔loan_capital, grant↔revenue).
    GiftPaymentMethod: { type: string, enum: [ach, check, wire, stock, donor_box, daf_ach, daf_check, daf_bill_com] }
    GiftFinalAmountSource: { type: string, enum: [human, stripe, quickbooks], description: "Where a gift's final `amount` was last sourced from. human: hand-entered, never reconciled. stripe: stamped from a Stripe charge (gross). quickbooks: stamped from a QuickBooks staged row. XOR with the two final_amount pointer fields." }
    GiftQuickbooksTie: { type: string, enum: [exempt, tied, amount_mismatch, missing], description: "Derived per-gift QuickBooks-tie signal. exempt: off-books (fiscal-sponsor era OR designated-to-school). tied: reconciles to a QuickBooks record within fee tolerance (or is Stripe-sourced). amount_mismatch: linked but outside the fee band. missing: on-books with no QuickBooks evidence." }
    ReconciliationLaneStatus:
      type: string
      enum: [unlinked, proposed, confirmed, exempt]
      description: >-
        Progress of ONE reconciliation lane for a unit of money (INV-4).
        unlinked: no connection yet. proposed: a system/auto match exists but no
        human has confirmed it. confirmed: a human (or a real, already-booked
        gift link) anchors the connection. exempt: no connection is expected —
        an off-books gift, or evidence dispositioned as not-a-gift
        (excluded/rejected). The CRM-record lane never emits exempt.
    ReconciliationLanes:
      type: object
      required: [funding, crmRecord]
      description: >-
        The two independently-tracked reconciliation lanes for a unit of money
        (INV-4). funding = the accounting/evidence side (QuickBooks/Stripe);
        crmRecord = the donor-record side. Derived, never a stored source of
        truth. crmRecord is null where a donor lane does not apply (e.g. a Stripe
        payout, which is a batch with no single donor).
      properties:
        funding:   { $ref: "#/components/schemas/ReconciliationLaneStatus" }
        crmRecord: { allOf: [ { $ref: "#/components/schemas/ReconciliationLaneStatus" } ], nullable: true }
    IntendedUsage: { type: string, enum: [gen_ops, growth, school_startup, teacher_training, project] }
    ReimbursementType: { type: string, enum: [direct, indirect], description: "Direct vs indirect share on a reimbursable grant allocation. DIRECT-tagged allocations are excluded from goal analytics (received, committed, open ask, weighted); untagged (null) and indirect both count. Never changes opportunity-status or pledge paid-amount derivation. (Renamed from ReimbursableShare in Task #449.)" }
    RestrictionAxis: { type: string, enum: [donor_restricted, wf_restricted, unrestricted], description: "Per-axis restriction taxonomy applied independently to the regional / fund-use / time axes of an allocation. donor_restricted = the funder imposed it (a true GAAP restriction); wf_restricted = Wildflower board-designated (NOT a GAAP restriction — counts as unrestricted for restriction rollups); unrestricted = none." }
    DeferredRevenue: { type: string, enum: [yes, no, na] }

    # ─── Users ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, emailSyncMode, createdAt, updatedAt]
      properties:
        id:             { type: string }
        clerkId:        { type: string }
        email:          { type: string }
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        displayName:    { type: string, nullable: true }
        role:           { $ref: "#/components/schemas/UserRole" }
        defaultFund:    { type: string, nullable: true }
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    EmailSyncMode:
      type: string
      enum: [full, summary_only]
      description: "Per-user Gmail sync privacy mode. `full` stores the email body + attachments. `summary_only` stores only an AI-generated one-line topic summary; body and attachments are never persisted, and intelligence/proposals are skipped for messages from this mailbox. The setting applies to NEW emails synced after the change; existing emails are not retroactively edited."
    UpdateCurrentUserBody:
      type: object
      properties:
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }

    # ─── Regions ───────────────────────────────────────────────────────────────
    CreateRegionBody:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1, description: "Human-readable region name, e.g. 'Greater Boston'." }
        displayPath: { type: string, description: "Full display path, e.g. 'United States, Massachusetts, Greater Boston'. Defaults to name when omitted." }
    UpdateRegionBody:
      type: object
      description: "Inline-editable simple fields for a region. The slug (`id`) is immutable and the parent region (relational) is edited on the detail page, not here."
      properties:
        name:              { type: string, minLength: 1 }
        displayPath:       { type: string }
        stateAbbreviation: { type: string, nullable: true }
        type:              { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
    UpdateSchoolBody:
      type: object
      description: "Inline-editable simple scalar/enum fields for a school. Array/relational fields are edited on the detail page or synced upstream from Airtable."
      properties:
        name:                   { type: string, minLength: 1 }
        longName:               { type: string, nullable: true }
        shortName:              { type: string, nullable: true }
        status:                 { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:        { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        stageStatus:            { type: string, nullable: true }
        currentMailingAddress:  { type: string, nullable: true }
        currentPhysicalAddress: { type: string, nullable: true }
    UpdateFiscalYearBody:
      type: object
      description: "Inline-editable simple fields for a fiscal year. The slug (`id`) is immutable."
      properties:
        label:      { type: string, minLength: 1 }
        startDate:  { type: string, format: date, nullable: true }
        endDate:    { type: string, format: date, nullable: true }
        goalAmount: { type: string, nullable: true, description: "Decimal string (numeric(14,2)). Use plain digits with optional decimal, no commas." }
    Region:
      type: object
      required: [id, name, displayPath, createdAt, updatedAt]
      properties:
        id:                 { type: string, description: "Human-readable slug PK, e.g. `united_states__minnesota__saint_paul`. Built from the region's name plus its included-type ancestors (continent / country / state / city / neighborhood); intermediate aggregation layers (multi_state_region, region_within_state, metro_area) are skipped." }
        name:               { type: string }
        displayPath:        { type: string, description: "Comma-separated full path including every ancestor (e.g. `United States, New England, Massachusetts, Greater Boston, Boston`). Use for UI display." }
        stateAbbreviation:  { type: string, nullable: true }
        type:               { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
        parentRegionId:     { type: string, nullable: true }
        archivedAt:         { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
    RegionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Region" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Schools ───────────────────────────────────────────────────────────────
    School:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        longName:                 { type: string, nullable: true }
        shortName:                { type: string, nullable: true }
        status:                   { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:          { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        agesPlanes:               { type: array, items: { type: string }, nullable: true }
        logoMainSquareUrl:        { type: string, nullable: true }
        stageStatus:              { type: string, nullable: true }
        currentMailingAddress:    { type: string, nullable: true }
        currentPhysicalAddress:   { type: string, nullable: true }
        archivedAt:               { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    SchoolList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/School" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Entities / fundable projects / fiscal years ──────────────────────────
    Entity:
      type: object
      required: [id, name, active, fiscallySponsored, createdAt, updatedAt]
      properties:
        id:        { type: string }
        name:      { type: string }
        active:    { type: boolean }
        fiscallySponsored: { type: boolean, description: "Whether this fund entity is fiscally sponsored. Informational flag only." }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateEntityBody:
      type: object
      required: [id, name]
      properties:
        id:     { type: string, description: "Slug-style key, e.g. wildflower_foundation. Must be unique." }
        name:   { type: string }
        active: { type: boolean, description: "Defaults to true. Set false to mark retired." }
        fiscallySponsored: { type: boolean, description: "Defaults to false. Set true to mark fiscally sponsored." }
    UpdateEntityBody:
      type: object
      properties:
        name:   { type: string }
        active: { type: boolean }
        fiscallySponsored: { type: boolean }
    FiscalYearEntityGoal:
      type: object
      required: [fiscalYearId, entityId, loanOrGrant, goalAmount, createdAt, updatedAt]
      properties:
        fiscalYearId: { type: string }
        entityId:     { type: string }
        loanOrGrant:  { allOf: [ { $ref: "#/components/schemas/LoanOrGrant" } ], description: "Authoritative loan-vs-grant track this goal targets. Part of the goal's identity: one goal per (fiscalYearId, entityId, loanOrGrant). Set via the `:category` path segment on PUT/DELETE (accepts loan|grant and the legacy revenue|loan_capital tokens)." }
        goalAmount:   { type: string, description: "Decimal string (numeric(14,2))." }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    UpsertFiscalYearEntityGoalBody:
      type: object
      required: [goalAmount]
      properties:
        goalAmount: { type: string, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProject:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:               { type: string }
        name:             { type: string }
        description:      { type: string, nullable: true }
        active:           { type: boolean }
        fundraisingStart: { type: string, format: date, nullable: true, description: "Fundraising start date (YYYY-MM-DD). Null on legacy rows; UI prompts to fill in." }
        fundraisingEnd:   { type: string, format: date, nullable: true }
        spendingStart:    { type: string, format: date, nullable: true }
        spendingEnd:      { type: string, format: date, nullable: true }
        fundraisingGoal:  { type: string, nullable: true, description: "Decimal string (numeric(14,2)). Null on legacy rows." }
        locationCode:     { type: string, nullable: true, description: "QuickBooks Revenue Location a project-specific grant codes to when no entity coding rule and no regional hub apply. One of the closed LOCATIONS list; null = fall back to Foundation General (surfaces a project_location_missing review flag)." }
        archivedAt:       { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    CreateFundableProjectBody:
      type: object
