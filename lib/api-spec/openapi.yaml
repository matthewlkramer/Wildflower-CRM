        cityRegionId:          { type: string, nullable: true }
        cityName:              { type: string, nullable: true }
        stateRegionId:         { type: string, nullable: true }
        stateCode:             { type: string, nullable: true }
        postalCode:            { type: string, nullable: true }
        country:               { type: string, nullable: true }
        personId:              { type: string, nullable: true }
        organizationId:        { type: string, nullable: true }
        paymentIntermediaryId: { type: string, nullable: true }
        householdId:           { type: string, nullable: true }

    # ─── Opportunities & pledges ───────────────────────────────────────────────
    OpportunityOrPledge:
      type: object
      required: [id, conditionsMet, writtenPledge, fundraisingCategory, createdAt, updatedAt]
      properties:
        id:                         { type: string }
        name:                       { type: string, nullable: true }
        organizationId:                   { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        fundraisingCategory:        { $ref: "#/components/schemas/FundraisingCategory" }
        loanOrGrant:                { allOf: [ { $ref: "#/components/schemas/LoanOrGrant" } ], readOnly: true, description: "Authoritative loan-vs-grant classification (supersedes fundraisingCategory). Derived-but-persisted; dual-written from fundraisingCategory during the transition. Analytics read from this." }
        askAmount:                  { type: string, nullable: true }
        awardedAmount:              { type: string, nullable: true }
        # Server-computed: SUM(gifts_and_payments.amount) for payments
        # whose opportunity_id = this opp. "0" when no payments
        # exist. Primarily meaningful for pledges (status='won') so the
        # UI can show a Paid column and a paid-vs-awarded comparison.
        paidAmount:                 { type: string, readOnly: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        # @deprecated (Task #449) — grant conditions moved onto pledge_allocations.
        # These header fields are no longer written (use the allocation fields +
        # the derived *Rollup values below). Retained read-only for back-compat.
        conditional:                { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true, deprecated: true }
        conditions:                 { type: string, nullable: true, deprecated: true }
        conditionsMet:              { allOf: [ { $ref: "#/components/schemas/OpportunityConditionsMet" } ], deprecated: true }
        conditionalRollup:          { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true, readOnly: true, description: "Derived from the opportunity's pledge allocations: conditional when ANY allocation carries a conditional condition, else unconditional. Drives win-probability. Null when no allocation is set." }
        conditionsMetRollup:        { allOf: [ { $ref: "#/components/schemas/OpportunityConditionsMet" } ], readOnly: true, description: "Derived from the opportunity's pledge allocations: 'yes' only when every conditional allocation's conditions are met; otherwise 'no'." }
        individualGiverPersonId:    { type: string, nullable: true }
        individualAdvisorPersonId:  { type: string, nullable: true }
        matchId:                    { type: string, nullable: true }
        status:                     { allOf: [ { $ref: "#/components/schemas/OpportunityStatus" } ], nullable: true, readOnly: true }
        lossType:                   { allOf: [ { $ref: "#/components/schemas/OpportunityLossType" } ], nullable: true }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        actualCompletionDate:       { type: string, format: date, nullable: true }
        winProbability:             { type: string, nullable: true }
        stage:                      { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        lossReason:                 { type: string, nullable: true }
        applicationDeadline:        { type: string, format: date, nullable: true }
        paymentDetails:             { type: string, nullable: true }
        usageNotes:                 { type: string, nullable: true }
        copperPledgeId:             { type: string, nullable: true }
        # Sticky-true commitment outcome (renamed from writtenPledge): has this opp
        # ever reached a written commitment? Latches true automatically when a
        # grant letter is uploaded or a legacy commitment stage is set; user can
        # also tick it manually. Never auto-cleared. Drives the Pledges page
        # filter AND the calculated status (writtenPledge=true ⇒ status pledge,
        # unless fully paid ⇒ cash_in).
        writtenPledge:              { type: boolean }
        # Foundation grant letter (object storage URL + display name +
        # upload time). Uploading flips writtenPledge=true.
        grantLetterUrl:             { type: string, nullable: true }
        grantLetterFilename:        { type: string, nullable: true }
        grantLetterUploadedAt:      { type: string, format: date-time, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        ownerUserId:                { type: string, nullable: true }
        # Denormalized display names, joined server-side from funders /
        # households / people. Present on list + detail responses so the
        # UI doesn't have to fire one fetch per row to resolve donor IDs.
        organizationName:                 { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        # Display name of primary_contact_person_id, joined server-side.
        # Used by the grants calendar's contact column.
        primaryContactPersonName:   { type: string, nullable: true, readOnly: true }
        # Fiscal-year slug derived from projectedCloseDate (FY ends Jun 30
        # America/Chicago). e.g. a projectedCloseDate of 2026-08-15 →
        # "FY27". Null when projectedCloseDate is null.
        fiscalYear:                 { type: string, nullable: true, readOnly: true }
        # Distinct grant_year values across pledge_allocations for this
        # opp, sorted ascending. Empty array if no allocations.
        coveredFiscalYears:         { type: array, items: { type: string }, nullable: true, readOnly: true }
        # Distinct entity_id values across pledge_allocations for this
        # opp, sorted ascending. Empty array if no allocations have an
        # entity set.
        entityIds:                  { type: array, items: { type: string }, nullable: true, readOnly: true }
        archivedAt:                 { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        createdAt:                  { type: string, format: date-time }
        updatedAt:                  { type: string, format: date-time }
        # PATCH-response only. True when this update flipped status into
        # pledge or cash_in for the first time AND no reporting_deadline
        # task exists yet for the opportunity. Frontend opens a one-shot
        # dialog asking the reviewer to record reporting deadlines.
        promptForReportingDeadlines:
          type: boolean
          readOnly: true
    OpportunityOrPledgeDetail:
      allOf:
        - { $ref: "#/components/schemas/OpportunityOrPledge" }
        - type: object
          properties:
            allocations: { type: array, items: { $ref: "#/components/schemas/PledgeAllocation" } }
            payments:    { type: array, items: { $ref: "#/components/schemas/GiftOrPayment" } }
    OpportunityOrPledgeList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/OpportunityOrPledge" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateOpportunityOrPledgeBody:
      type: object
      properties:
        name:                       { type: string }
        organizationId:                   { type: string }
        householdId:                { type: string }
        fundraisingCategory:        { $ref: "#/components/schemas/FundraisingCategory" }
        askAmount:                  { type: string }
        awardedAmount:              { type: string }
        type:                       { $ref: "#/components/schemas/OpportunityType" }
        individualGiverPersonId:    { type: string }
        individualAdvisorPersonId:  { type: string }
        matchId:                    { type: string }
        lossType:                   { $ref: "#/components/schemas/OpportunityLossType" }
        projectedCloseDate:         { type: string, format: date }
        actualCompletionDate:       { type: string, format: date }
        winProbability:             { type: string }
        stage:                      { $ref: "#/components/schemas/OpportunityStage" }
        lossReason:                 { type: string }
        applicationDeadline:        { type: string, format: date }
        paymentDetails:             { type: string }
        usageNotes:                 { type: string }
        copperPledgeId:             { type: string }
        writtenPledge:                  { type: boolean }
        grantLetterUrl:             { type: string }
        grantLetterFilename:        { type: string }
        grantLetterUploadedAt:      { type: string, format: date-time }
        primaryContactPersonId:     { type: string }
        ownerUserId:                { type: string }
    UpdateOpportunityOrPledgeBody:
      type: object
      properties:
        name:                       { type: string, nullable: true }
        organizationId:                   { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        fundraisingCategory:        { $ref: "#/components/schemas/FundraisingCategory" }
        askAmount:                  { type: string, nullable: true }
        awardedAmount:              { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualAdvisorPersonId:  { type: string, nullable: true }
        matchId:                    { type: string, nullable: true }
        lossType:                   { allOf: [ { $ref: "#/components/schemas/OpportunityLossType" } ], nullable: true }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        actualCompletionDate:       { type: string, format: date, nullable: true }
        winProbability:             { type: string, nullable: true }
        stage:                      { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        lossReason:                 { type: string, nullable: true }
        applicationDeadline:        { type: string, format: date, nullable: true }
        paymentDetails:             { type: string, nullable: true }
        usageNotes:                 { type: string, nullable: true }
        copperPledgeId:             { type: string, nullable: true }
        writtenPledge:                  { type: boolean }
        grantLetterUrl:             { type: string, nullable: true }
        grantLetterFilename:        { type: string, nullable: true }
        grantLetterUploadedAt:      { type: string, format: date-time, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        ownerUserId:                { type: string, nullable: true }

    # ─── Pledge allocations ────────────────────────────────────────────────────
    PledgeAllocation:
      type: object
      required: [id, directToSchool, regionalRestrictionType, usageRestrictionType, timeRestrictionType, conditionsMet, createdAt, updatedAt]
      properties:
        id:                     { type: string }
        pledgeOrOpportunityId:  { type: string, nullable: true }
        subAmount:              { type: string, nullable: true }
        grantYear:              { type: string, nullable: true }
        entityId:               { type: string, nullable: true }
        intendedUsage:          { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:      { type: string, nullable: true }
        directToSchool:         { type: boolean }
        schoolRecipientId:      { type: string, nullable: true }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        reimbursementType:      { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, description: "Direct vs indirect share on a reimbursable grant. DIRECT is excluded from goal analytics; null (untagged) and indirect both count." }
        conditional:            { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true, description: "Per-allocation grant condition (moved off the opportunity header in Task #449). Drives the pledge's derived conditionalRollup / win-probability." }
        conditionsMet:          { $ref: "#/components/schemas/OpportunityConditionsMet" }
        status:                 { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        contingent:             { type: boolean, description: "Scheduled (false) vs contingent (true) future payment." }
        conditions:             { type: string, nullable: true, description: "Free-text grant conditions for this allocation (moved off the opportunity header in Task #449)." }
        expectedPaymentDate:    { type: string, format: date, nullable: true, description: "Date this allocation's payment is expected. Per-row (a grant year may hold multiple payments); allocations sharing a date roll up into one expected payment. Drives overdue detection. Null = unscheduled." }
        notes:                  { type: string, nullable: true }
        regionIds:              { type: array, items: { type: string }, nullable: true }
        purposeVerbatim:        { type: string, nullable: true }
        # @deprecated (Task #449) — superseded by regional/usage/time RestrictionAxis
        # + the staged-payment coding snapshot. Read-only; no longer written.
        formallyRestricted:     { type: boolean, deprecated: true, description: "@deprecated — use the three RestrictionAxis fields." }
        reimbursableShare:      { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, deprecated: true, description: "@deprecated — renamed to reimbursementType." }
        restrictionType:        { allOf: [ { $ref: "#/components/schemas/RestrictionType" } ], nullable: true, deprecated: true }
        restrictionEvidence:    { type: string, nullable: true, deprecated: true }
        deferredRevenue:        { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true, deprecated: true, description: "@deprecated — coding snapshot moved to staged_payments." }
        deferredRevenueReason:  { type: string, nullable: true, deprecated: true }
        objectCode:             { type: string, nullable: true, readOnly: true, deprecated: true }
        objectCodeOverride:     { type: string, nullable: true, deprecated: true }
        revenueLocation:        { type: string, nullable: true, readOnly: true, deprecated: true }
        revenueLocationOverride: { type: string, nullable: true, deprecated: true }
        revenueClass:           { type: string, nullable: true, readOnly: true, deprecated: true }
        revenueClassOverride:   { type: string, nullable: true, deprecated: true }
        codingFlags:            { type: array, items: { type: string }, nullable: true, readOnly: true, deprecated: true }
        createdAt:              { type: string, format: date-time }
        updatedAt:              { type: string, format: date-time }
    PledgeAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/PledgeAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string }
        subAmount:             { type: string }
        grantYear:             { type: string }
        entityId:              { type: string }
        intendedUsage:         { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:     { type: string }
        directToSchool:        { type: boolean }
        schoolRecipientId:     { type: string }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        reimbursementType:     { $ref: "#/components/schemas/ReimbursementType" }
        conditional:           { $ref: "#/components/schemas/OpportunityConditional" }
        conditionsMet:         { $ref: "#/components/schemas/OpportunityConditionsMet" }
        status:                { $ref: "#/components/schemas/PledgeAllocationStatus" }
        contingent:            { type: boolean }
        conditions:            { type: string }
        expectedPaymentDate:   { type: string, format: date }
        notes:                 { type: string }
        regionIds:             { type: array, items: { type: string } }
        purposeVerbatim:       { type: string }
    UpdatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string, nullable: true }
        subAmount:             { type: string, nullable: true }
        grantYear:             { type: string, nullable: true }
        entityId:              { type: string, nullable: true }
        intendedUsage:         { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:     { type: string, nullable: true }
        directToSchool:        { type: boolean }
        schoolRecipientId:     { type: string, nullable: true }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        reimbursementType:     { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true }
        conditional:           { allOf: [ { $ref: "#/components/schemas/OpportunityConditional" } ], nullable: true }
        conditionsMet:         { $ref: "#/components/schemas/OpportunityConditionsMet" }
        status:                { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        contingent:            { type: boolean }
        conditions:            { type: string, nullable: true }
        expectedPaymentDate:   { type: string, format: date, nullable: true }
        notes:                 { type: string, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }
        purposeVerbatim:       { type: string, nullable: true }

    # ─── Gifts & payments ──────────────────────────────────────────────────────
    GiftOrPayment:
      type: object
      required: [id, designatedToSchool, offBooksFiscalSponsor, paymentExpected, needsResearch, quickbooksTieStatus, finalAmountSource, createdAt, updatedAt]
      properties:
        id:                         { type: string }
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true, description: "The human-entered gift amount. NO LONGER auto-overwritten by reconciliation (Task #448) — evidence is linked, the entered amount is preserved, and disagreements surface in the settled-vs-entered reconciliation queue. Compare against derivedSettledAmount." }
        # ── Derived settled amount + fees (Task #448 Step 2/3). ──
        # Computed at read time from the payments LINKED to the gift (QuickBooks
        # payment_applications + Stripe charges + non-stripe Donorbox), via the one
        # shared {settledGross, totalFees} helper. Replaces the deprecated header
        # processorFee / final_amount_* / originalHumanCrmAmount columns.
        derivedSettledAmount:       { type: string, nullable: true, readOnly: true, description: "Settled GROSS actually landed for this gift, derived from all linked payments (QuickBooks + Stripe + non-stripe Donorbox). Null when no payment is linked yet. The UI shows 'you entered $X, settled $Y' by comparing with `amount`." }
        derivedProcessorFee:        { type: string, nullable: true, readOnly: true, description: "Total processor fees withheld across the gift's linked payments (Stripe + Donorbox; QuickBooks carries none). Donor is credited the GROSS `amount`; net = derivedSettledAmount − derivedProcessorFee. Null when no fee-bearing payment is linked." }
        # ── DEPRECATED final-amount provenance (Task #448). Retained on the read
        # ── model only during deprecate-then-drop; superseded by derivedSettledAmount.
        processorFee:               { type: string, nullable: true, readOnly: true, deprecated: true, description: "DEPRECATED (Task #448) — use derivedProcessorFee. No longer written; derived fees come from linked payments." }
        originalHumanCrmAmount:     { type: string, nullable: true, readOnly: true, deprecated: true, description: "DEPRECATED (Task #448) — `amount` is now never overwritten, so the human-entered amount is just `amount`. Compare with derivedSettledAmount." }
        finalAmountSource:          { allOf: [ { $ref: "#/components/schemas/GiftFinalAmountSource" } ], readOnly: true, deprecated: true, description: "DEPRECATED (Task #448) — `amount` is always the human-entered amount now; settled money is derivedSettledAmount." }
        finalAmountStripeChargeId:  { type: string, nullable: true, readOnly: true, deprecated: true, description: "DEPRECATED (Task #448) — Stripe linkage lives on stripe_staged_charges; settled amount is derived." }
        finalAmountQbStagedPaymentId: { type: string, nullable: true, readOnly: true, deprecated: true, description: "DEPRECATED (Task #448) — QuickBooks linkage lives on payment_applications; settled amount is derived." }
        organizationId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        opportunityId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        offBooksFiscalSponsor:      { type: boolean, description: "Fiscal-sponsor-era off-books flag. Together with designatedToSchool it exempts the gift from the QuickBooks-tie requirement (still counts toward revenue goals, excluded from audit reconciliation)." }
        paymentExpected:            { type: boolean, description: "When false, no QuickBooks record will ever arrive (e.g. fiscal-sponsor-era or direct-to-school money), so the gift is treated as exempt from QuickBooks-tie status (alongside offBooksFiscalSponsor / designatedToSchool). Defaults true." }
        needsResearch:              { type: boolean, description: "Plain human-set flag: this money record hasn't been fully figured out yet (unknown donor, ambiguous coding, unclear restriction, etc.). Never auto-derived; flipping it has no side effects on status / derivation / QuickBooks tie." }
        quickbooksTieStatus:        { allOf: [ { $ref: "#/components/schemas/GiftQuickbooksTie" } ], readOnly: true, description: "Derived (persisted) signal of whether this on-books gift reconciles to a QuickBooks record. Never set via create/update." }
        loanOrGrant:                { allOf: [ { $ref: "#/components/schemas/LoanOrGrant" } ], readOnly: true, description: "Authoritative loan-vs-grant classification (supersedes the type='loan_fund_investment' loan signal). Derived-but-persisted; dual-written from type during the transition." }
        reconciliationLanes:        { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two-lane reconciliation status (INV-4), derived read-only from quickbooksTieStatus + Donor XOR. funding mirrors the QB tie; crmRecord is always confirmed (a gift is itself the confirmed CRM record). Present on list/detail reads, omitted from bare mutation responses." }
        tags:                       { type: string, nullable: true }
        thankYouSentAt:             { type: string, format: date, nullable: true, description: "Date the linked thank-you email was sent. Snapshot of emailMessages.sentAt at link time." }
        thankYouEmailMessageId:     { type: string, nullable: true, description: "FK to the email_messages row that was identified as the thank-you. Read-only; set via /link-thank-you-email or the thank_you_acknowledgment proposal accept." }
        thankYouAttachments:
          type: array
          nullable: true
          readOnly: true
          description: "Document attachments on the linked thank-you email (PDF / DOCX / etc.). Populated only on the detail endpoint."
          items: { $ref: "#/components/schemas/ThankYouAttachment" }
        # Denormalized display names, joined server-side. See
        # OpportunityOrPledge for rationale.
        organizationName:                 { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        paymentIntermediaryName:    { type: string, nullable: true, readOnly: true }
        quickbooksStagedPaymentId:  { type: string, nullable: true, readOnly: true, description: "Id of the QuickBooks staged payment reconciled to / that created this gift, if any. Lets the reconciler show linked status and offer unmatch." }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        # Aggregates across this gift's gift_allocations rows. All three
        # arrays are de-duplicated and may be empty.
        entityIds:                  { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct entity_id values from gift_allocations." }
        displayUsages:              { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct display_usage values from gift_allocations (server-computed labels)." }
        grantYears:                 { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct grant_year values from gift_allocations." }
        archivedAt:                 { type: string, format: date-time, nullable: true, description: "Soft-delete timestamp. Non-null = archived; only admins can view/restore." }
        donorbox:                   { allOf: [ { $ref: "#/components/schemas/DonorboxEnrichment" } ], nullable: true, readOnly: true, description: "Donorbox donation facts for this gift, joined via its linked Stripe charge (donorbox_donations.stripe_charge_id = the gift's matched/created stripe_staged_charges.id). Populated only on the detail endpoint. Enrichment only — never mints a gift." }
        createdAt:                  { type: string, format: date-time }
        updatedAt:                  { type: string, format: date-time }
    GiftOrPaymentDetail:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            allocations: { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
    GiftOrPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftOrPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    GiftAuditReconciliationRecord:
      type: object
      required: [stagedPaymentId, linkType]
      description: A QuickBooks record this gift appears in ("where"), derived read-only from the gift's QB linkage.
      properties:
        stagedPaymentId:      { type: string }
        linkType:             { type: string, enum: [matched, created, group, split], description: "How the gift is tied to this QuickBooks staged row." }
        realmId:              { type: string, nullable: true }
        qbEntityType:         { type: string, nullable: true }
        qbEntityId:           { type: string, nullable: true }
        qbDocNumber:          { type: string, nullable: true }
        qbDepositToAccountName: { type: string, nullable: true }
        qbPaymentMethod:      { type: string, nullable: true }
        payerName:            { type: string, nullable: true }
        amount:               { type: string, nullable: true, description: "QuickBooks amount for this record (the split sub-amount for split links)." }
        dateReceived:         { type: string, format: date, nullable: true }
    GiftAuditReconciliationRestriction:
      type: object
      required: [allocationId, regionalRestrictionType, usageRestrictionType, timeRestrictionType]
      properties:
        allocationId:    { type: string }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        purposeVerbatim: { type: string, nullable: true }
        subAmount:       { type: string, nullable: true }
        displayUsage:    { type: string, nullable: true }
    GiftAuditReconciliationDonor:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string, enum: [organization, individual, household] }
        id:   { type: string }
        name: { type: string, nullable: true }
    GiftAuditReconciliation:
      type: object
      required: [giftId, quickbooksTieStatus, reconciliationLanes, offBooks, auditExcluded, quickbooksRecords, restrictions]
      description: |
        Per-gift audit-reconciliation view: when the money arrived, the
        QuickBooks record(s) it appears in, who gave it, and its restrictions.
        Off-books gifts are flagged `auditExcluded` (excluded from audit
        reconciliation) and carry no QuickBooks expectation.
      properties:
        giftId:              { type: string }
        name:                { type: string, nullable: true }
        quickbooksTieStatus: { $ref: "#/components/schemas/GiftQuickbooksTie" }
        reconciliationLanes: { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], description: "Two-lane reconciliation status (INV-4): funding mirrors quickbooksTieStatus; crmRecord is confirmed (the gift is the CRM record)." }
        offBooks:            { type: boolean, description: "True when the gift is exempt (fiscal-sponsor off-books OR designated-to-school)." }
        auditExcluded:       { type: boolean, description: "True when off-books — the gift is excluded from audit reconciliation." }
        amount:              { type: string, nullable: true }
        # WHEN
        dateReceived:        { type: string, format: date, nullable: true }
        # WHO
        donor:               { allOf: [ { $ref: "#/components/schemas/GiftAuditReconciliationDonor" } ], nullable: true }
        # WHERE
        quickbooksRecords:
          type: array
          items: { $ref: "#/components/schemas/GiftAuditReconciliationRecord" }
        # RESTRICTIONS
        restrictions:
          type: array
          items: { $ref: "#/components/schemas/GiftAuditReconciliationRestriction" }
    CreateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string }
        name:                       { type: string }
        details:                    { type: string }
        dateReceived:               { type: string, format: date }
        paymentMethod:              { $ref: "#/components/schemas/GiftPaymentMethod" }
        amount:                     { type: string }
        organizationId:                   { type: string }
        individualGiverPersonId:    { type: string }
        householdId:                { type: string }
        type:                       { $ref: "#/components/schemas/GiftType" }
        opportunityId:          { type: string }
        advisorPersonId:            { type: string }
        grantYear:                  { type: string }
        giftBeingMatchedId:         { type: string }
        primaryContactPersonId:     { type: string }
        paymentIntermediaryId:      { type: string }
        ownerUserId:                      { type: string }
        designatedToSchool:         { type: boolean }
        offBooksFiscalSponsor:      { type: boolean }
        paymentExpected:            { type: boolean }
        needsResearch:              { type: boolean }
        tags:                       { type: string }
    UpdateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true }
        organizationId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        opportunityId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        offBooksFiscalSponsor:      { type: boolean }
        paymentExpected:            { type: boolean }
        needsResearch:              { type: boolean }
        tags:                       { type: string, nullable: true }
    ThankYouAttachment:
      type: object
      required: [id, downloadUrl]
      properties:
        id:          { type: string }
        filename:    { type: string, nullable: true }
        mimeType:    { type: string, nullable: true }
        sizeBytes:   { type: integer, nullable: true }
        downloadUrl: { type: string }

    # ─── QuickBooks payment sync ──────────────────────────────────────────────
    QuickbooksEntityType: { type: string, enum: [sales_receipt, payment, deposit] }
    QuickbooksPayerType: { type: string, enum: [vendor, customer, employee], description: "The QuickBooks payer/entity kind behind this incoming money (Customer for a SalesReceipt/Payment, or the deposit line's Entity ref). Null when QuickBooks recorded no entity (e.g. a bare deposit line)." }
    StagedPaymentStatus: { type: string, enum: [pending, approved, rejected, excluded, reconciled], description: "Lifecycle of a staged payment / Stripe charge. reconciled: terminal — this evidence row was tied to a CRM gift as its final-amount source (it is NOT itself a gift and is NEVER archived). Shared by QuickBooks staged_payments and Stripe staged charges." }
    StagedPaymentExclusionReason: { type: string, enum: [zero_amount, membership, interest, tax_refund, other_revenue, earned_income, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire, processor_payout, loan_repayment, loan_proceeds, note_payable, miscoded_withdrawal, loan, government_reimbursement, fiscally_sponsored], description: "Why a staged QuickBooks payment was filtered from the queue. loan / government_reimbursement / fiscally_sponsored are LEGACY (no longer produced; retained for historical rows)." }
    StagedPaymentMatchStatus: { type: string, enum: [matched, suggested, unmatched] }
    StagedPaymentMatchMethod: { type: string, enum: [email, name, name_amount_date, amount_date, memo, intermediary, manual] }
    StagedPaymentClassificationSource: { type: string, enum: [auto, manual] }
    StagedPaymentEntitySource: { type: string, enum: [auto, manual], description: "Whether the Wildflower-entity attribution was derived by detectEntity (auto) or pinned by a human (manual). A manual attribution survives every re-sync / reclassify." }
    StagedPaymentFundingSource: { type: string, enum: [stripe, brokerage, daf, donorbox, paypal, wire_ach, check, cash, employer_match, other], description: "WHERE the incoming money came from / how it rendered. A first-class origin dimension, DISTINCT from qbPaymentMethod (the QB instrument like Visa/Check) and from the derived reconciliation funding lane (reconcile progress, not origin). Auto-seeded at ingest by detectFundingSource and human-correctable. other = a known origin outside this list." }
    StagedPaymentFundingSourceProvenance: { type: string, enum: [auto, manual], description: "Whether fundingSource was derived by detectFundingSource (auto) or pinned by a human (manual). A manual value survives every re-sync / reclassify." }
    StagedPaymentQueue: { type: string, enum: [needs_review, auto_matched, excluded, done, rejected, reconciled, refund_review], description: "Derived queue bucket. reconciled: evidence rows tied to a CRM gift — hidden from the active work queues but filterable on demand. refund_review: a Stripe-only cross-cutting filter (independent of status) for charges with an open refund/chargeback proposal awaiting confirm/dismiss — never emitted as a row's derived bucket." }
    StripeRefundPropagationStatus: { type: string, enum: [none, proposed, applied, dismissed], description: "Lifecycle of a Stripe refund/chargeback proposal against a charge already booked into a CRM gift (INV-13). none: no refund/dispute or no linked gift. proposed: detected, awaiting human confirm. applied: human confirmed (gift reversed/reduced). dismissed: human declined to propagate." }
    StripeRefundKind: { type: string, enum: [full_refund, partial_refund, chargeback], description: "Kind of Stripe reversal. full_refund/chargeback reverse (archive) the gift; partial_refund reduces the gift amount." }
    QuickbooksStagedPaymentQueue: { type: string, enum: [needs_review, fiscally_sponsored, auto_matched, excluded, done, rejected, reconciled], description: "QuickBooks staged-payment queue buckets. Superset of StagedPaymentQueue adding the fiscally_sponsored parking queue (entity-attributed sponsored money split out of needs_review)." }
    ReconciliationCardQueue: { type: string, enum: [needs_review, fiscally_sponsored, auto_matched, excluded, done, rejected, reconciled, research], description: "Queue buckets accepted by the reconciliation cards endpoint query param. Superset of QuickbooksStagedPaymentQueue adding the research parking queue (pending money a human flagged needs_research) — a query-time filter over the needs_research flag, never a derived response bucket (so it is NOT part of the staged-payment response queue enum)." }
    StagedPaymentSort: { type: string, enum: [date_desc, date_asc, amount_desc, amount_asc, payer_asc, payer_desc] }
    GiftSort: { type: string, enum: [date_desc, date_asc, amount_desc, amount_asc] }
    QuickbooksOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has QUICKBOOKS_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "An active, non-revoked company grant exists" }
        realmId:      { type: string, nullable: true }
        companyName:  { type: string, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }
    QuickbooksSyncSummary:
      type: object
      required: [ran, pulled, staged, matched, autoApplied]
      properties:
        ran:         { type: boolean, description: "False when the sync was skipped (lock contended)." }
        pulled:      { type: integer }
        staged:      { type: integer }
        matched:     { type: integer }
        autoApplied: { type: integer, description: "Newly-staged rows auto-reconciled or auto-minted at high confidence." }
    QuickbooksResyncStatus:
      type: object
      required: [status, startedAt, finishedAt, summary, error]
      properties:
        status:
          type: string
          enum: [idle, running, done, error]
          description: "Lifecycle of the background full re-pull. 'idle' = none has run since boot; 'running' = in progress; 'done'/'error' = last run outcome."
        startedAt:  { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
        summary:
          oneOf: [ { $ref: "#/components/schemas/QuickbooksSyncSummary" } ]
          nullable: true
          description: "Result of the last completed run (null while running / before any run)."
        error:      { type: string, nullable: true, description: "Error message when status is 'error'." }
    QuickbooksRematchSummary:
      type: object
      required: [ran, scanned, matched]
      properties:
        ran:     { type: boolean, description: "False when the rematch was skipped (a sync/rematch was already running)." }
        scanned: { type: integer, description: "Candidate rows examined (pending + unmatched + no donor)." }
        matched: { type: integer, description: "Rows newly given a donor hint by this run." }
    QuickbooksReclassifySummary:
      type: object
      required: [ran, scanned, excluded, included]
      properties:
        ran:      { type: boolean, description: "False when the reclassify was skipped (a sync/rematch/reclassify was already running)." }
        scanned:  { type: integer, description: "Auto-classified pending/excluded rows examined." }
        excluded: { type: integer, description: "Rows newly moved to excluded by this run." }
        included: { type: integer, description: "Rows newly restored to pending by this run." }
    QuickbooksRuleAction: { type: string, enum: [exclude, auto_create_approve] }
    QuickbooksRuleConditionField: { type: string, enum: [payer_name, line_item_name, line_account_name, memo_reference, line_description, qb_class, any_text, amount] }
    QuickbooksRuleConditionMode: { type: string, enum: [contains, exact, prefix, regex, lte] }
    QuickbooksRuleMatchLogic: { type: string, enum: [any, all] }
    QuickbooksRuleCondition:
      type: object
      required: [field, mode, value]
      properties:
        field: { $ref: "#/components/schemas/QuickbooksRuleConditionField" }
        mode:  { $ref: "#/components/schemas/QuickbooksRuleConditionMode" }
        value: { type: string, description: "Match value. For mode=lte this is a numeric threshold (as a string); for regex it is a JS regex source; otherwise a literal compared case-insensitively." }
    QuickbooksHandlingRule:
      type: object
      required: [id, name, enabled, priority, action, donationGuard, matchLogic, conditions, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        enabled:                  { type: boolean }
        priority:                 { type: integer, description: "Ascending evaluation order; first matching enabled rule wins." }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Required when action=exclude." }
        donationGuard:            { type: boolean, description: "When true, the rule is suppressed on rows carrying a real donation line." }
        matchLogic:               { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true, description: "Donor org for the minted gift (action=auto_create_approve)." }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true, description: "Allocation intended usage (action=auto_create_approve)." }
        targetFundableProjectId:  { type: string, nullable: true, description: "Specific fundable project, only when targetIntendedUsage=project." }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    CreateQuickbooksRuleBody:
      type: object
      required: [name, action, conditions]
      properties:
        name:                     { type: string, minLength: 1 }
        enabled:                  { type: boolean, description: "Defaults to true." }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true }
        donationGuard:            { type: boolean, description: "Defaults to false." }
        matchLogic:               { allOf: [ { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" } ], description: "Defaults to any." }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        targetFundableProjectId:  { type: string, nullable: true }
    UpdateQuickbooksRuleBody:
      type: object
      properties:
        name:                     { type: string, minLength: 1 }
        enabled:                  { type: boolean }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true }
        donationGuard:            { type: boolean }
        matchLogic:               { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        targetFundableProjectId:  { type: string, nullable: true }
    ReorderQuickbooksRulesBody:
      type: object
      required: [ids]
      properties:
        ids: { type: array, items: { type: string }, description: "All rule ids in the desired evaluation order." }
    ApplyRuleToPendingBody:
      type: object
      required: [dryRun]
      properties:
        dryRun: { type: boolean, description: "When true, counts matching pending rows without applying any changes." }
    ApplyRuleToPendingResult:
      type: object
      required: [matched, excluded, autoCreated, skipped]
      properties:
        matched:     { type: integer, description: "Number of pending rows the rule matches (preview count when dryRun=true)." }
        excluded:    { type: integer, description: "Rows marked excluded (0 when dryRun=true)." }
        autoCreated: { type: integer, description: "Gifts minted and auto-approved (0 when dryRun=true)." }
        skipped:     { type: integer, description: "Matched rows the rule could not apply to cleanly, left pending (0 when dryRun=true)." }

    # ─── Revenue coding reference & rules ────────────────────────────────────
    RevenueCodingPreview:
      type: object
      required: [objectCode, location, revenueClass, flags]
      description: |
        Live, on-demand revenue-coding instructions derived from an allocation's
        scope (donor kind, fund entity, restriction axes, region). NOT persisted
        on the allocation — a read-only preview the reviewer copies onto the
        linked staged_payments coding snapshot.
      properties:
        objectCode:   { type: string, nullable: true, description: "Derived Object Code (e.g. 4000.1 / 4100.2), or null when it can't be resolved cleanly." }
        location:     { type: string, nullable: true, description: "Derived Revenue Location." }
        revenueClass: { type: string, nullable: true, description: "Derived Suggested Class." }
        flags:        { type: array, items: { type: string }, description: "Ambiguities surfaced for human review (e.g. location_default, payer_type_assumed, loan_no_revenue_account)." }
    RevenueAccount:
      type: object
      required: [code, name, kind, sortOrder, active, createdAt, updatedAt]
      properties:
        code:       { type: string, description: "Object Code, e.g. 4000.1 / 4100.2." }
        name:       { type: string }
        kind:       { type: string, enum: [unrestricted, restricted, special] }
        payerType:  { type: string, nullable: true, enum: [individual, foundation, corporation, governmental] }
        sortOrder:  { type: integer }
        active:     { type: boolean }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }
    EntityCodingRule:
      type: object
      required: [entityId, forceRestricted, enabled, createdAt, updatedAt]
      properties:
        entityId:        { type: string, description: "Fund entity id this rule applies to." }
        forceRestricted: { type: boolean, description: "Treat gifts to this entity as purpose-restricted regardless of donor language (fiscal sponsees)." }
        location:        { type: string, nullable: true, description: "Override Location (must be a value in the closed Location list)." }
        revenueClass:    { type: string, nullable: true, description: "Suggested Class." }
        enabled:         { type: boolean }
        notes:           { type: string, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    CreateEntityCodingRuleBody:
      type: object
      required: [entityId]
      properties:
        entityId:        { type: string }
        forceRestricted: { type: boolean, description: "Defaults to false." }
        location:        { type: string, nullable: true }
        revenueClass:    { type: string, nullable: true }
        enabled:         { type: boolean, description: "Defaults to true." }
        notes:           { type: string, nullable: true }
    UpdateEntityCodingRuleBody:
      type: object
      properties:
        forceRestricted: { type: boolean }
        location:        { type: string, nullable: true }
        revenueClass:    { type: string, nullable: true }
        enabled:         { type: boolean }
        notes:           { type: string, nullable: true }
    StagedPayment:
      type: object
      required: [id, realmId, qbEntityType, qbEntityId, status, matchStatus, autoApplied, needsResearch, classificationSource, entitySource, fundingSourceProvenance, createdAt, updatedAt]
      properties:
        id:                        { type: string }
        realmId:                   { type: string }
        qbEntityType:              { $ref: "#/components/schemas/QuickbooksEntityType" }
        qbEntityId:                { type: string }
        qbLineId:                  { type: string, nullable: true }
        qbDepositId:               { type: string, nullable: true, description: "The underlying bank Deposit id this incoming money belongs to, when known. Rows sharing one non-null value are candidates a fundraiser may manually group into a single deposit unit and reconcile as a whole to one multi-allocation gift. Null when not tied to a deposit (or staged before this field existed)." }
        amount:                    { type: string, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        payerName:                 { type: string, nullable: true }
        payerEmail:                { type: string, nullable: true }
        rawReference:              { type: string, nullable: true }
        lineDescription:           { type: string, nullable: true }
        status:                    { $ref: "#/components/schemas/StagedPaymentStatus" }
        exclusionReason:           { $ref: "#/components/schemas/StagedPaymentExclusionReason", nullable: true }
        classificationSource:      { $ref: "#/components/schemas/StagedPaymentClassificationSource" }
        lineItemNames:             { type: array, items: { type: string }, nullable: true }
        lineAccountNames:          { type: array, items: { type: string }, nullable: true }
        lineClasses:               { type: array, items: { type: string }, nullable: true }
        # Extended QuickBooks capture — read-only mirrors of the QB record surfaced
        # in the reviewer for context. The verbatim qbRaw / qbRawLine JSON is stored
        # in the DB but intentionally omitted here (and from the list select) to keep
        # responses small.
        qbPayerType:               { $ref: "#/components/schemas/QuickbooksPayerType", nullable: true }
        qbPayerId:                 { type: string, nullable: true }
        qbPaymentMethod:           { type: string, nullable: true }
        qbCheckNumber:             { type: string, nullable: true }
        qbDepositToAccountName:    { type: string, nullable: true }
        qbDocNumber:               { type: string, nullable: true }
        qbBillingAddress:          { type: string, nullable: true }
        qbTransactionMemo:         { type: string, nullable: true }
        qbCurrency:                { type: string, nullable: true }
        qbExchangeRate:            { type: string, nullable: true }
        qbCreateTime:              { type: string, format: date-time, nullable: true }
        qbLinkedTxn:
          type: array
          nullable: true
          items:
            type: object
            required: [txnId, txnType]
            properties:
              txnId:   { type: string }
              txnType: { type: string }
        qbDepositLinks:
          type: array
          nullable: true
          description: "Top-level QuickBooks LinkedTxn references, derived read-only from the stored raw QB payload (never written onto the row). For a Payment/SalesReceipt this is the Deposit it was deposited into. Display-only reference; does not change any field on the staged payment. (The invoices/credit memos/journal entries a payment applies to ship in qbLinkedTxn.)"
          items:
            type: object
            required: [txnId, txnType]
            properties:
              txnId:   { type: string }
              txnType: { type: string }
        matchStatus:               { $ref: "#/components/schemas/StagedPaymentMatchStatus" }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { $ref: "#/components/schemas/StagedPaymentMatchMethod", nullable: true }
        matchConfirmedByUserId:    { type: string, nullable: true }
        matchConfirmedAt:          { type: string, format: date-time, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        matchedGiftId:             { type: string, nullable: true }
        createdGiftId:             { type: string, nullable: true }
        groupReconciledGiftId:     { type: string, nullable: true, description: "Set on every member of a manually grouped deposit unit that was reconciled as a whole to one existing gift. The group is exactly the rows sharing this gift id; one representative member also carries matchedGiftId. Cleared for the whole group on revert." }
        sourceGroupId:             { type: string, nullable: true, description: "Shared opaque id tying separately-entered QuickBooks records that are really ONE physical gift, grouped freely across deposits and dates and BEFORE any gift exists. Pure human review state; the sync never writes it. The group is exactly the rows carrying this id (>= 2 members). Null when ungrouped. Distinct from qbDepositId (one bank deposit) and groupReconciledGiftId (members tied to one existing gift)." }
        autoApplied:               { type: boolean }
        approvedByUserId:          { type: string, nullable: true }
        approvedAt:                { type: string, format: date-time, nullable: true }
        rejectedByUserId:          { type: string, nullable: true }
        rejectedAt:                { type: string, format: date-time, nullable: true }
        # Derived queue bucket + denormalized display fields, joined server-side.
        queue:                     { $ref: "#/components/schemas/QuickbooksStagedPaymentQueue" }
        organizationName:          { type: string, nullable: true }
        householdName:             { type: string, nullable: true }
        individualGiverPersonName: { type: string, nullable: true }
        intermediaryName:          { type: string, nullable: true }
        entityId:                  { type: string, nullable: true, description: "Wildflower legal entity this incoming money is attributed to (entities.id), derived from QuickBooks markers. Null = no distinctive marker (treated as the default Wildflower Foundation bucket by the entity filter)." }
        entityName:                { type: string, nullable: true, description: "Display name of the attributed entity, joined server-side. Null when entityId is null or the entity has since been deleted." }
        entitySource:              { $ref: "#/components/schemas/StagedPaymentEntitySource" }
        fundingSource:             { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "WHERE this money came from / how it rendered (Stripe, brokerage, DAF, …). Origin dimension, distinct from qbPaymentMethod (the instrument) and the derived funding lane. Null = unknown / not yet determined. Auto-seeded at ingest, human-correctable." }
        fundingSourceProvenance:   { $ref: "#/components/schemas/StagedPaymentFundingSourceProvenance" }
        needsResearch:             { type: boolean, description: "Plain human-set flag: a reviewer hasn't fully figured this incoming money out yet (unknown donor, ambiguous coding, unclear restriction, etc.). Never auto-derived; set via /set-needs-research with no side effects on reconcile status or matching." }
        # ── Revenue-accounting / QuickBooks coding snapshot (Task #449) ──────────
        # The derived coding snapshot describes a QuickBooks PAYMENT, so it lives
        # here (moved off gift/pledge allocations). Each `*Override` lets a human
        # override the derived value (effective = override ?? derived). Set via
        # /staged-payments/{id}/set-coding.
        objectCode:                { type: string, nullable: true }
        objectCodeOverride:        { type: string, nullable: true }
        revenueLocation:           { type: string, nullable: true }
        revenueLocationOverride:   { type: string, nullable: true }
        revenueClass:              { type: string, nullable: true }
        revenueClassOverride:      { type: string, nullable: true }
        codingFlags:               { type: array, items: { type: string }, nullable: true, description: "Coding flags surfaced for human review (e.g. location_default, payer_type_assumed)." }
        deferredRevenue:           { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:     { type: string, nullable: true }
        resolvedGiftId:            { type: string, nullable: true }
        resolvedGiftName:          { type: string, nullable: true }
        resolvedGiftAmount:        { type: string, nullable: true }
        resolvedGiftDate:          { type: string, format: date, nullable: true }
        splitCount:                { type: integer, description: "How many existing gifts this staged payment is split across (0 when not split). When > 0 the row is resolved via a split, not a single resolvedGift." }
        splitTotal:                { type: string, nullable: true, description: "Combined gross total of the gifts this staged payment is split across (sum of the split sub-amounts). Null when not split." }
        splitGiftNames:            { type: array, items: { type: string }, nullable: true, description: "Names of the gifts this staged payment is split across, for display. Null when not split." }
        giftAlreadyLinkedElsewhere: { type: boolean, description: "True when this pending row has no gift of its own, yet every same-donor, similar-amount gift is already linked to a different QuickBooks payment — i.e. the gift for this payment likely hasn't been created yet (create a new gift for it, or exclude if it's a duplicate)." }
        matchedRuleId:             { type: string, nullable: true, description: "Id of the admin-editable handling rule that auto-excluded or auto-created+approved this payment at ingest or apply time. Null for rows classified by the legacy code classifier, manually classified rows, or rows that matched no rule." }
        matchedRuleName:           { type: string, nullable: true, description: "Display name of the matched rule, joined server-side. Null when matchedRuleId is null or the rule has since been deleted." }
        reconciliationLanes:       { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this still-unmatched evidence, derived read-only: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped matchConfirmedAt)." }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
    StagedPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StagedPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StagedPaymentSummary:
      type: object
      required: [needsReview, autoMatched, done, rejected, excluded, excludedByReason]
      properties:
        needsReview: { type: integer }
        autoMatched: { type: integer }
        done:        { type: integer }
        rejected:    { type: integer }
        excluded:    { type: integer }
        excludedByReason:
          type: object
          required: [zero_amount, loan, membership, interest, government_reimbursement, tax_refund, other_revenue, earned_income, fiscally_sponsored, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire, loan_repayment, loan_proceeds, note_payable, miscoded_withdrawal]
          properties:
            zero_amount:             { type: integer }
            loan:                    { type: integer }
            membership:              { type: integer }
            interest:                { type: integer }
            government_reimbursement: { type: integer }
            tax_refund:              { type: integer }
            other_revenue:           { type: integer }
            earned_income:           { type: integer }
            fiscally_sponsored:      { type: integer }
            intercompany_transfer:   { type: integer }
            other:                   { type: integer }
            insurance:               { type: integer }
            expense_refund:          { type: integer }
            expensify:               { type: integer }
            returned_wire:           { type: integer }
            loan_repayment:          { type: integer }
            loan_proceeds:           { type: integer }
            note_payable:            { type: integer }
            miscoded_withdrawal:     { type: integer }
    QuickbooksStagedPaymentSummary:
      description: "QuickBooks staged-payment summary. StagedPaymentSummary plus the fiscally_sponsored parking-queue count."
      allOf:
        - $ref: "#/components/schemas/StagedPaymentSummary"
        - type: object
          required: [fiscallySponsored]
          properties:
            fiscallySponsored: { type: integer }
    StripeStagedChargeSummary:
      description: "Stripe staged-charge summary. StagedPaymentSummary plus the open refund/chargeback proposal count (INV-13)."
      allOf:
        - $ref: "#/components/schemas/StagedPaymentSummary"
        - type: object
          required: [refundReview]
          properties:
            refundReview: { type: integer, description: "Charges with an open refund/chargeback proposal awaiting confirm/dismiss." }
    StripeSyncSummary:
      type: object
      required: [ran, payouts, staged, matched, autoApplied]
      properties:
        ran:         { type: boolean, description: "False when the sync was skipped (lock contended, or the Stripe connector/account was unavailable)." }
        payouts:     { type: integer, description: "Stripe payouts seen this run." }
        staged:      { type: integer, description: "Newly staged charges this run." }
        matched:     { type: integer, description: "Newly staged charges given a donor hint." }
        autoApplied: { type: integer, description: "Newly-staged charges auto-reconciled to an existing gift at high confidence (never mints)." }
    StripeRematchSummary:
      type: object
      required: [ran, scanned, matched]
      properties:
        ran:     { type: boolean, description: "False when the rematch was skipped (a sync/rematch was already running, or the Stripe connector was unavailable)." }
        scanned: { type: integer, description: "Candidate rows examined (pending + unmatched + no donor)." }
        matched: { type: integer, description: "Rows newly given a donor hint by this run." }
    StripeHistoricalProposalSummary:
      type: object
      required: [ran, payoutsScanned, proposalsCreated, conflictsFound, alreadyResolved, unmatched]
      description: "Result of the admin historical Stripe→QuickBooks reconciliation proposal pass over ALL payouts (including prior-account rows). Every match is a PROPOSAL — a human confirms each; nothing is minted or archived."
      properties:
        ran:              { type: boolean, description: "False when the pass was skipped (a sync/rematch/proposal run was already holding the lock, or the Stripe connector was unavailable)." }
        payoutsScanned:   { type: integer, description: "Payouts examined this pass." }
        proposalsCreated: { type: integer, description: "Payouts newly moved to a proposed QB-deposit match." }
        conflictsFound:   { type: integer, description: "Payouts whose candidate QB deposit was already approved into a gift (conflict_approved)." }
        alreadyResolved:  { type: integer, description: "Payouts already in a confirmed/reconciled state, left untouched." }
        unmatched:        { type: integer, description: "Payouts with no QB deposit candidate." }
    StripeSyncStatus:
      type: object
      required: [configured, lastRunAt, lastRunStatus, lastError, consecutiveErrors, payoutCreatedWatermark]
      properties:
        configured:             { type: boolean, description: "True once the sync has run at least once and seeded its per-account cursor." }
        lastRunAt:              { type: string, format: date-time, nullable: true }
        lastRunStatus:          { type: string, nullable: true, description: "'ok' | 'error' — coarse health of the most recent run." }
        lastError:              { type: string, nullable: true }
        consecutiveErrors:      { type: integer, description: "Consecutive errored runs (cursor held); 0 after a clean run." }
        payoutCreatedWatermark: { type: string, format: date-time, nullable: true, description: "Only payouts created at/after this instant are pulled." }
    DonorboxEnrichment:
      type: object
      description: |
        Read-only Donorbox donation facts joined onto a Stripe-sourced record
        (a Stripe staged charge or a gift minted/matched from one) by
        donorbox_donations.stripe_charge_id = stripe_staged_charges.id — a 1:1
        join present only for Stripe-type Donorbox donations. Enrichment only:
        it NEVER mints a gift (the Stripe sync already pulls those charges). The
        verbatim Donorbox payload, custom questions, and review/donor-match
        state are deliberately omitted.
      required: [id, recurring, refunded, anonymous]
      properties:
        id:            { type: string, description: "Donorbox donation id." }
        donationType:  { type: string, nullable: true, description: "Donorbox payment instrument (e.g. stripe)." }
        amount:        { type: string, nullable: true }
        processingFee: { type: string, nullable: true }
        currency:      { type: string, nullable: true }
        donatedAt:     { type: string, format: date-time, nullable: true }
        campaignName:  { type: string, nullable: true }
        designation:   { type: string, nullable: true }
        comment:       { type: string, nullable: true }
        recurring:     { type: boolean }
        refunded:      { type: boolean, description: "True when refunded (fully/partially) in Donorbox. Surfaced as a badge — Donorbox refunds are NOT auto-applied to gifts." }
        anonymous:     { type: boolean }
        donorName:     { type: string, nullable: true }
        donorEmail:    { type: string, nullable: true }
        donorEmployer: { type: string, nullable: true }
    DonorboxExclusionReason:
      type: string
      enum: [already_booked, duplicate, not_a_gift, other]
      description: |
        Why a non-Stripe Donorbox candidate was filed out of the new-money
        worklist. already_booked = the money is already a CRM gift via another
        path; duplicate = a duplicate donation; not_a_gift = not donation
        revenue; other = anything else.
    DonorboxReviewQueue:
      type: string
      enum: [needs_review, done, excluded]
      description: |
        Which new-money worklist bucket to list. needs_review = pending
        candidates; done = linked to an existing gift or minted a new one;
        excluded = filed out.
    DonorboxReviewRow:
      type: object
      description: |
        A non-Stripe (PayPal/ACH) Donorbox donation surfaced as a human-reviewed
        new-money candidate. Stripe-type donations never appear here (they enrich
        existing Stripe records instead — see DonorboxEnrichment). A reviewer
        links it to an existing gift, mints a new gift (with a dedupe guard), or
        excludes it. Never auto-minted; never written to staged_payments.
      required: [id, recurring, refunded, anonymous, status, matchStatus, queue, createdAt, updatedAt]
      properties:
        id:                        { type: string, description: "Donorbox donation id (primary key)." }
        donationType:              { type: string, nullable: true, description: "Donorbox payment instrument (e.g. paypal); never 'stripe' here." }
        paypalTransactionId:       { type: string, nullable: true }
        amount:                    { type: string, nullable: true }
        amountRefunded:            { type: string, nullable: true }
        processingFee:             { type: string, nullable: true }
        currency:                  { type: string, nullable: true }
        donationStatus:            { type: string, nullable: true, description: "Donorbox donation status (paid/refunded/…), distinct from the review status." }
        refunded:                  { type: boolean }
        recurring:                 { type: boolean }
        donatedAt:                 { type: string, format: date-time, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        campaignName:              { type: string, nullable: true }
        designation:               { type: string, nullable: true }
        comment:                   { type: string, nullable: true }
        anonymous:                 { type: boolean }
        donorName:                 { type: string, nullable: true }
        donorEmail:                { type: string, nullable: true }
        donorEmployer:             { type: string, nullable: true }
        status:                    { type: string, description: "Review status: pending | approved (minted) | reconciled (linked) | excluded." }
        exclusionReason:           { allOf: [ { $ref: "#/components/schemas/DonorboxExclusionReason" } ], nullable: true }
        matchStatus:               { type: string, description: "Suggested-donor match tier: unmatched | suggested | matched (a hint; never auto-applied)." }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { type: string, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        matchedGiftId:             { type: string, nullable: true, description: "Set when linked to a PRE-EXISTING gift (no new ledger row)." }
        createdGiftId:             { type: string, nullable: true, description: "Set when a NEW gift was minted from this donation." }
        organizationName:          { type: string, nullable: true, readOnly: true }
        householdName:             { type: string, nullable: true, readOnly: true }
        individualGiverPersonName: { type: string, nullable: true, readOnly: true }
        intermediaryName:          { type: string, nullable: true, readOnly: true }
        linkedGiftId:              { type: string, nullable: true, readOnly: true, description: "The linked/minted gift (matchedGiftId or createdGiftId), joined for display." }
        linkedGiftName:            { type: string, nullable: true, readOnly: true }
        linkedGiftAmount:          { type: string, nullable: true, readOnly: true }
        linkedGiftDate:            { type: string, format: date, nullable: true, readOnly: true }
        queue:                     { allOf: [ { $ref: "#/components/schemas/DonorboxReviewQueue" } ], readOnly: true }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
    DonorboxReviewList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/DonorboxReviewRow" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    DonorboxLinkGiftBody:
      type: object
      required: [giftId]
      properties:
        giftId: { type: string, description: "The existing gift this Donorbox donation is evidence for. The donation adopts that gift's donor; no new gift is minted." }
    DonorboxCreateGiftBody:
      type: object
      description: |
        Mint a NEW gift from a non-Stripe Donorbox donation. Exactly one donor
        FK must be set (Donor XOR). The server runs a dedupe guard against
        existing gifts / staged payments / Donorbox links; pass force=true to
        override a possible-duplicate (409) and mint anyway.
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true, description: "Conduit the donor gave through (Donorbox/PayPal), propagated onto the gift." }
        force:                   { type: boolean, description: "Override the dedupe guard and mint even when possible duplicates were found." }
    DonorboxExcludeBody:
      type: object
      required: [exclusionReason]
      properties:
        exclusionReason: { $ref: "#/components/schemas/DonorboxExclusionReason" }
    DonorboxCreateGiftResponse:
      type: object
      required: [gift, donationId]
      properties:
        gift:       { $ref: "#/components/schemas/GiftOrPayment" }
        donationId: { type: string }
    DonorboxDuplicateCandidate:
      type: object
      required: [kind, id]
      properties:
        kind:         { type: string, enum: [gift, staged_payment, donorbox], description: "Where the possible duplicate was found." }
        id:           { type: string }
        name:         { type: string, nullable: true }
        amount:       { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        reason:       { type: string, nullable: true, description: "Why it matched (amount+date, paypal id, …)." }
    DonorboxDuplicateResponse:
      type: object
      description: "409 body when the dedupe guard finds possible duplicates; resubmit create-gift with force=true to override, or link/exclude instead."
      required: [error, candidates]
      properties:
        error:      { type: string, enum: [possible_duplicate] }
        message:    { type: string }
        candidates: { type: array, items: { $ref: "#/components/schemas/DonorboxDuplicateCandidate" } }
    StripeStagedCharge:
      type: object
      required: [id, stripeAccountId, status, classificationSource, matchStatus, autoApplied, refunded, disputed, refundPropagationStatus, createdAt, updatedAt]
      properties:
        id:                        { type: string, description: "The Stripe charge id (ch_...) — also the primary key." }
        stripeAccountId:           { type: string }
        stripePayoutId:            { type: string, nullable: true, description: "The payout this charge settled in (null until paid out)." }
        stripeBalanceTransactionId: { type: string, nullable: true }
        stripePaymentIntentId:     { type: string, nullable: true }
        stripeCustomerId:          { type: string, nullable: true }
        # Money (major units, 2dp). Donors are credited GROSS; net = gross − fees − refunds.
        grossAmount:               { type: string, nullable: true }
        feeAmount:                 { type: string, nullable: true }
        netAmount:                 { type: string, nullable: true }
        amountRefunded:            { type: string, nullable: true }
        currency:                  { type: string, nullable: true }
        chargeCreated:             { type: string, format: date-time, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        payerName:                 { type: string, nullable: true }
        payerEmail:                { type: string, nullable: true }
        description:               { type: string, nullable: true }
        statementDescriptor:       { type: string, nullable: true }
        cardBrand:                 { type: string, nullable: true }
        metadata:                  { type: object, additionalProperties: { type: string }, nullable: true }
        refunded:                  { type: boolean }
        disputed:                  { type: boolean }
        status:                    { $ref: "#/components/schemas/StagedPaymentStatus" }
        exclusionReason:           { $ref: "#/components/schemas/StagedPaymentExclusionReason", nullable: true }
        classificationSource:      { $ref: "#/components/schemas/StagedPaymentClassificationSource" }
        matchStatus:               { $ref: "#/components/schemas/StagedPaymentMatchStatus" }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { $ref: "#/components/schemas/StagedPaymentMatchMethod", nullable: true }
        autoApplied:               { type: boolean }
        matchConfirmedByUserId:    { type: string, nullable: true }
        matchConfirmedAt:          { type: string, format: date-time, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        matchedGiftId:             { type: string, nullable: true }
        createdGiftId:             { type: string, nullable: true }
        approvedByUserId:          { type: string, nullable: true }
        approvedAt:                { type: string, format: date-time, nullable: true }
        rejectedByUserId:          { type: string, nullable: true }
        rejectedAt:                { type: string, format: date-time, nullable: true }
        # Refund / chargeback propagation (INV-13, propose-then-confirm).
        refundPropagationStatus:   { $ref: "#/components/schemas/StripeRefundPropagationStatus" }
        refundPropagationKind:     { $ref: "#/components/schemas/StripeRefundKind", nullable: true }
        refundPropagationGiftId:   { type: string, nullable: true, description: "The CRM gift the refund proposal targets (snapshot of the gift link at propose time)." }
        refundProposedAmount:      { type: string, nullable: true, description: "Absolute amount being reversed: gross for a full refund / chargeback, cumulative amount_refunded for a partial refund." }
        refundConfirmedByUserId:   { type: string, nullable: true }
        refundConfirmedAt:         { type: string, format: date-time, nullable: true }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
        # Derived queue bucket + denormalized display fields, joined server-side
        # (present on list responses, omitted from bare mutation responses).
        queue:                     { $ref: "#/components/schemas/StagedPaymentQueue" }
        organizationName:          { type: string, nullable: true }
        householdName:             { type: string, nullable: true }
        individualGiverPersonName: { type: string, nullable: true }
        intermediaryName:          { type: string, nullable: true }
        resolvedGiftId:            { type: string, nullable: true }
        resolvedGiftName:          { type: string, nullable: true }
        resolvedGiftAmount:        { type: string, nullable: true }
        resolvedGiftDate:          { type: string, format: date, nullable: true }
        # Payout-level rollups (gross − fees − refunds = net), joined read-only.
        payoutAmount:              { type: string, nullable: true }
        payoutGrossTotal:          { type: string, nullable: true }
        payoutFeeTotal:            { type: string, nullable: true }
        payoutRefundTotal:         { type: string, nullable: true }
        payoutNetTotal:            { type: string, nullable: true }
        payoutArrivalDate:         { type: string, format: date, nullable: true }
        payoutStatus:              { type: string, nullable: true }
        payoutQbSupersedeStatus:   { type: string, nullable: true, description: "Non-destructive QuickBooks supersede audit for this charge's payout: none | excluded_pending | conflict_approved. 'conflict_approved' blocks minting a per-charge gift here." }
        payoutQbConflictGiftId:    { type: string, nullable: true, description: "The already-approved QuickBooks gift this payout conflicts with, when payoutQbSupersedeStatus is conflict_approved." }
        reconciliationLanes:       { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this still-unmatched Stripe evidence, derived read-only: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped matchConfirmedAt)." }
        donorbox:                  { allOf: [ { $ref: "#/components/schemas/DonorboxEnrichment" } ], nullable: true, readOnly: true, description: "Donorbox donation facts for this Stripe charge (joined 1:1 by donorbox_donations.stripe_charge_id = id), present when the charge originated from a Donorbox donation. Enrichment only — never mints a gift. Present on list reads; omitted from bare mutation responses." }
    StripeStagedChargeList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StripeStagedCharge" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StripePayoutReconciliationStatus:
      type: string
      description: "Where a Stripe payout sits in the QuickBooks reconciliation lifecycle. unmatched: no QB deposit candidate. proposed: a pending QB deposit lump was matched, awaiting confirm. conflict_approved: the matching QB deposit was already approved into a gift, needs keep/replace. confirmed_reconciled: the current model — on confirm the per-charge Stripe gifts are stamped as the source of truth and the QB deposit lump is marked reconciled (kept, never archived). confirmed_excluded/keep/replace: legacy decisions retained for history."
      enum: [unmatched, proposed, conflict_approved, confirmed_reconciled, confirmed_excluded, confirmed_keep, confirmed_replace]
    StripePayoutReconciliationQueue:
      type: string
      description: "Which reconciliation bucket to list. unmatched: no QB deposit candidate yet (stray Stripe). proposed: awaiting confirm. conflict: conflict_approved awaiting keep/replace. confirmed: any confirmed state (incl. confirmed_reconciled). all: every non-unmatched payout."
      enum: [unmatched, proposed, conflict, confirmed, all]
    StripePayoutReconciliation:
      type: object
      required: [id, stripeAccountId, qbReconciliationStatus]
      properties:
        id:                              { type: string, description: "The Stripe payout id (po_...) — also the primary key." }
        stripeAccountId:                 { type: string }
        amount:                          { type: string, nullable: true, description: "Payout amount reported by Stripe (major units)." }
        currency:                        { type: string, nullable: true }
        status:                          { type: string, nullable: true }
        arrivalDate:                     { type: string, format: date, nullable: true }
        # Charge rollups (gross − fees − refunds = net), computed at sync time.
        grossTotal:                      { type: string, nullable: true }
        feeTotal:                        { type: string, nullable: true }
        refundTotal:                     { type: string, nullable: true }
        netTotal:                        { type: string, nullable: true }
        chargeCount:                     { type: integer, nullable: true }
        # QuickBooks reconciliation state + linkage (propose-then-confirm).
        qbReconciliationStatus:          { $ref: "#/components/schemas/StripePayoutReconciliationStatus" }
        proposedQbStagedPaymentId:       { type: string, nullable: true, description: "The pending QB deposit lump proposed as this payout's match." }
        matchedQbStagedPaymentId:        { type: string, nullable: true, description: "The QB deposit lump confirmed (excluded + linked) for this payout." }
        qbConflictStagedPaymentId:       { type: string, nullable: true, description: "The QB deposit lump that was already approved into a gift (conflict candidate)." }
        qbConflictGiftId:                { type: string, nullable: true, description: "The already-approved QB gift this payout conflicts with." }
        qbReconciliationConfirmedByUserId: { type: string, nullable: true }
        qbReconciliationConfirmedAt:     { type: string, format: date-time, nullable: true }
        # Active QB deposit lump (matched once confirmed, else the candidate), joined read-only.
        depositId:                       { type: string, nullable: true }
        depositAmount:                   { type: string, nullable: true }
        depositDateReceived:             { type: string, format: date, nullable: true }
        depositPayerName:                { type: string, nullable: true }
        depositStatus:                   { type: string, nullable: true }
        # Conflicting already-approved gift (present for conflict_approved / confirmed_replace), joined read-only.
        conflictGiftAmount:              { type: string, nullable: true }
        conflictGiftDate:                { type: string, format: date, nullable: true }
        conflictGiftArchivedAt:          { type: string, format: date-time, nullable: true, description: "Set once a confirm-replace archives this gift (kept, never deleted)." }
        conflictGiftDonorName:           { type: string, nullable: true }
        reconciliationLanes:             { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two-lane reconciliation status (INV-4) for this payout, derived read-only from qbReconciliationStatus: funding = unlinked (unmatched)→proposed (proposed/conflict_approved)→confirmed (any confirmed_*, exempt when confirmed_excluded). crmRecord is null — a payout is a batch with no single donor." }
    StripePayoutReconciliationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StripePayoutReconciliation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StripePayoutReconciliationResult:
      type: object
      required: [ok, kind, payoutId]
      description: "Outcome of a payout reconciliation confirm/revert transition."
      properties:
        ok:               { type: boolean, enum: [true] }
        kind:             { type: string, enum: [confirmed_reconciled, confirmed_excluded, confirmed_keep, confirmed_replace, reverted] }
        payoutId:         { type: string }
        stagedPaymentId:  { type: string, nullable: true, description: "The QB deposit lump that was excluded/relinked, when applicable." }
        archivedGiftId:   { type: string, nullable: true, description: "The QB-derived gift archived by a confirm-replace (kept, never deleted)." }
        restoredGiftId:   { type: string, nullable: true, description: "The gift un-archived by reverting a confirm-replace." }
    GiftStripeChain:
      type: object
      required: [giftId]
      description: "Read-only three-way audit chain for a gift: the Stripe charge it was minted from or linked to → the Stripe payout that charge settled in → the QuickBooks deposit lump that payout reconciles against. Any leg is null when it doesn't apply (non-Stripe gift, charge not yet paid out, payout with no QB deposit candidate)."
      properties:
        giftId: { type: string }
        charge:
          type: object
          nullable: true
          required: [id, linkage]
          properties:
            id:           { type: string, description: "The Stripe charge id (ch_...)." }
            linkage:      { type: string, enum: [created, matched], description: "Whether this gift was minted from the charge (created) or the charge linked to a pre-existing gift (matched)." }
            grossAmount:  { type: string, nullable: true }
            feeAmount:    { type: string, nullable: true }
            netAmount:    { type: string, nullable: true }
            dateReceived: { type: string, format: date, nullable: true }
            payerName:    { type: string, nullable: true }
            currency:     { type: string, nullable: true }
        payout:
          type: object
          nullable: true
          required: [id, qbReconciliationStatus]
          properties:
            id:                     { type: string, description: "The Stripe payout id (po_...)." }
            amount:                 { type: string, nullable: true }
            arrivalDate:            { type: string, format: date, nullable: true }
            grossTotal:             { type: string, nullable: true }
            feeTotal:               { type: string, nullable: true }
            netTotal:               { type: string, nullable: true }
            chargeCount:            { type: integer, nullable: true }
            qbReconciliationStatus: { $ref: "#/components/schemas/StripePayoutReconciliationStatus" }
        qbDeposit:
          type: object
          nullable: true
          required: [id]
          properties:
            id:           { type: string, description: "The QuickBooks deposit lump's staged-payment id." }
            amount:       { type: string, nullable: true }
            dateReceived: { type: string, format: date, nullable: true }
            payerName:    { type: string, nullable: true }
            status:       { type: string, nullable: true }
    ReconciliationMatchNodeType:
      type: string
      enum: [qb, donor, gift, opportunity]
      description: "A node in a reconciliation card's match graph. qb is the required anchor; donor/gift/opportunity are the resolvable nodes (opportunity covers pledges — same table). Stripe is evidence, not a node."
    ReconciliationEdgeState:
      type: string
      enum: [determined, ambiguous, filter_only, conflict, none, create]
      description: |
        Resolution state of a node within a card's graph.
        determined: exactly one confident candidate, auto-locked (DERIVE-AND-LOCK, e.g. gift→donor via XOR, gift→opportunity via opportunityId). The human may still override.
        ambiguous: several plausible candidates; the human must choose.
        filter_only: this node only narrows the others (FILTER edge, e.g. donor→which gift); not independently locked.
        conflict: a candidate disagrees with an already-locked node (e.g. gift donor ≠ opportunity donor).
        none: no candidate found.
        create: the human intends to create a new record for this node (new donor / new gift).
    ReconciliationCandidateSource:
      type: string
      enum: [donor_xor, payment_on_pledge, name, email, amount_date, memo, intermediary, stripe, manual]
      description: "How a candidate was derived (audit + UI badge)."
    ReconciliationCandidate:
      type: object
      required: [nodeType, id, label]
      properties:
        nodeType:   { $ref: "#/components/schemas/ReconciliationMatchNodeType" }
        id:         { type: string }
        label:      { type: string, description: "Display label (anonymous-masked when the viewer can't see the identity)." }
        sublabel:   { type: string, nullable: true, description: "Secondary context (donor name for a gift/opp, email/phone for a donor)." }
        amount:     { type: string, nullable: true }
        date:       { type: string, format: date, nullable: true }
        confidence: { type: integer, nullable: true, description: "0–100 match confidence; null for filter-only candidates." }
        source:     { $ref: "#/components/schemas/ReconciliationCandidateSource", nullable: true }
        donorKind:  { type: string, enum: [organization, person, household], nullable: true }
        donorId:    { type: string, nullable: true, description: "For gift/opportunity candidates: the record id of the candidate's CURRENT donor (organization/person/household), so the client can detect when a picked donor differs from the gift's existing donor." }
        alreadyLinkedStagedPaymentId: { type: string, nullable: true, description: "For gift candidates: set when the gift is already reconciled/created/group/split-linked by another staged payment (UI disables linking to avoid double-counting)." }
        conflictReason: { type: string, nullable: true, description: "Why this candidate conflicts with a locked node (set only when state=conflict)." }
    ReconciliationNode:
      type: object
      required: [nodeType, state, candidates]
      properties:
        nodeType:   { $ref: "#/components/schemas/ReconciliationMatchNodeType" }
        state:      { $ref: "#/components/schemas/ReconciliationEdgeState" }
        selectedId: { type: string, nullable: true, description: "Auto-selected candidate id (a confident lock when state=determined; the top guess when state=ambiguous)." }
        locked:     { type: boolean, description: "True when the selection is server-derived (DERIVE-AND-LOCK). The human may override." }
        candidates: { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" } }
    ReconciliationEvidence:
      type: object
      required: [qb]
      description: "Cross-source evidence backing a card. QB is always present (the anchor). Stripe is present only when a Stripe charge/payout backs the same money (brokerage/check have none)."
      properties:
        qb:
          type: object
          required: [stagedPaymentId]
          properties:
            stagedPaymentId: { type: string }
            amount:          { type: string, nullable: true }
            dateReceived:    { type: string, format: date, nullable: true }
            payerName:       { type: string, nullable: true }
            paymentMethod:   { type: string, nullable: true }
            docNumber:       { type: string, nullable: true }
            depositId:       { type: string, nullable: true }
        stripe:
          type: object
          nullable: true
          required: [payoutId]
          properties:
            payoutId:    { type: string }
            chargeId:    { type: string, nullable: true, description: "The single Stripe charge backing this money, when resolved to one." }
            grossAmount: { type: string, nullable: true }
            feeAmount:   { type: string, nullable: true }
            netAmount:   { type: string, nullable: true }
            chargeCount: { type: integer, nullable: true }
            reconciliationStatus: { type: string, nullable: true, description: "The Stripe payout's QB-reconciliation state (proposed | conflict_approved | confirmed_reconciled | unmatched | …); null when no payout/charge backs this money." }
    ReconciliationGraph:
      type: object
      required: [stagedPaymentId, nodes, evidence, ready, blockers]
      description: "The full 4-node match graph for one card. Read-only — nothing is mutated."
      properties:
        stagedPaymentId: { type: string }
        nodes:    { type: array, items: { $ref: "#/components/schemas/ReconciliationNode" } }
        evidence: { $ref: "#/components/schemas/ReconciliationEvidence" }
        ready:    { type: boolean, description: "True when a confident, non-conflicting selection exists for the required nodes (donor + gift) so the card can be one-click approved." }
        blockers: { type: array, items: { type: string }, description: "Human-readable reasons the card is not ready (ambiguous donor, conflicting opportunity, gift already linked, amount mismatch, etc.)." }
    SettlementLineageLinkSource:
      type: string
      enum: [pulled, qb_confirmed, stripe_pulled, stripe_confirmed]
      description: |
        HOW a lineage leg was tied to the anchor.
        pulled: from a Stripe-pulled join key (payout↔QB tie, or charge.stripePayoutId).
        qb_confirmed: a reviewer-confirmed link directly to the QB staged row (charge.linkedQbStagedPaymentId / donation.linkedQbStagedPaymentId).
        stripe_pulled: a Donorbox donation tied to a Stripe charge via the pulled donation.stripeChargeId key.
        stripe_confirmed: a reviewer-confirmed donation↔charge link (donation.linkedStripeChargeId).
    SettlementLineageCharge:
      type: object
      required: [chargeId, linkSource, donorResolved, hasGift]
      description: "One Stripe charge in the settlement chain (the per-donor gross behind a payout)."
      properties:
        chargeId:     { type: string }
        grossAmount:  { type: string, nullable: true }
        feeAmount:    { type: string, nullable: true }
        netAmount:    { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        payerName:    { type: string, nullable: true }
        payerEmail:   { type: string, nullable: true }
        description:  { type: string, nullable: true }
        refunded:     { type: boolean }
        disputed:     { type: boolean }
        linkSource:   { $ref: "#/components/schemas/SettlementLineageLinkSource" }
        # Explode-into-per-donor-gifts support (read-only; drives the bundle queue).
        status:            { type: string, nullable: true, description: "The staged charge's reconciliation status (pending | reconciled | excluded)." }
        donorResolved:     { type: boolean, description: "True when a donor (org/person/household) is already resolved on this charge, so it can be exploded into a gift." }
        hasGift:           { type: boolean, description: "True when this charge already has a created or matched gift (already exploded)." }
        resolvedDonorName: { type: string, nullable: true, description: "The resolved donor's display name, when known." }
    BundleTieResult:
      type: object
      required: [ok, chargesLinked, donationsLinked]
      description: "Outcome of persisting a settlement bundle's cross-processor ties — counts of link fields newly filled (idempotent: re-running yields zeros)."
      properties:
        ok:               { type: boolean, enum: [true] }
        chargesLinked:    { type: integer, description: "Stripe charges whose linkedQbStagedPaymentId was newly set to the deposit." }
        donationsLinked:  { type: integer, description: "Donorbox donations whose linkedStripeChargeId/linkedQbStagedPaymentId were newly set." }
    SettlementLineageDonation:
      type: object
      required: [donationId, linkSource]
      description: "One Donorbox donation in the settlement chain (enrichment for a Stripe charge, or non-Stripe money landing in the QB deposit)."
      properties:
        donationId:   { type: string }
        donationType: { type: string, nullable: true, description: "stripe | paypal | … — distinguishes enrichment (stripe) from new money." }
        amount:       { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        donorName:    { type: string, nullable: true }
        donorEmail:   { type: string, nullable: true }
        campaignName: { type: string, nullable: true }
        designation:  { type: string, nullable: true }
        refunded:     { type: boolean }
        linkSource:   { $ref: "#/components/schemas/SettlementLineageLinkSource" }
    SettlementLineage:
      type: object
      required: [stagedPaymentId, deposit, charges, donations]
      description: |
        Read-only settlement lineage for one card: the QB deposit (anchor) and the
        SAME money traced across Stripe (payout + charges) and Donorbox (donations).
        Derived from pulled join keys plus any human-confirmed cross-processor links;
        a leg is null/empty when it doesn't apply to this deposit.
      properties:
        stagedPaymentId: { type: string }
        deposit:
          type: object
          required: [stagedPaymentId]
          description: "The QB staged-payment anchor (the bank deposit lump this card reconciles)."
          properties:
            stagedPaymentId:        { type: string }
            amount:                 { type: string, nullable: true }
            dateReceived:           { type: string, format: date, nullable: true }
            payerName:              { type: string, nullable: true }
            paymentMethod:          { type: string, nullable: true }
            docNumber:              { type: string, nullable: true }
            depositId:              { type: string, nullable: true, description: "QB deposit transaction id this row was deposited into (read-only, derived from qb_raw)." }
            depositToAccountName:   { type: string, nullable: true }
        payout:
          type: object
          nullable: true
          required: [payoutId, linkSource]
          description: "The Stripe payout tied to this deposit (null when no Stripe payout backs the money)."
          properties:
            payoutId:             { type: string }
            amount:               { type: string, nullable: true, description: "Net amount that hit the bank." }
            grossTotal:           { type: string, nullable: true }
            feeTotal:             { type: string, nullable: true }
            netTotal:             { type: string, nullable: true }
            chargeCount:          { type: integer, nullable: true }
            arrivalDate:          { type: string, format: date, nullable: true }
            status:               { type: string, nullable: true }
            reconciliationStatus: { type: string, nullable: true, description: "The payout's QB-reconciliation state (proposed | conflict_approved | confirmed_reconciled | unmatched | …)." }
            linkSource:           { $ref: "#/components/schemas/SettlementLineageLinkSource" }
        charges:
          type: array
          items: { $ref: "#/components/schemas/SettlementLineageCharge" }
          description: "The individual Stripe charges behind the payout (and any reviewer-confirmed per-charge ties to this deposit). Empty when no Stripe charges back the money."
        donations:
          type: array
          items: { $ref: "#/components/schemas/SettlementLineageDonation" }
          description: "Donorbox donations tied to the chain — enrichment for the Stripe charges, or non-Stripe new money the reviewer linked to this deposit. Empty when none apply."
    ReconciliationCardGiftAllocation:
      type: object
      required: [regionalRestrictionType, usageRestrictionType, timeRestrictionType]
      description: "Compact intended-usage summary of one allocation line on a reconciler card's linked CRM gift, so a reviewer can judge what the money is for."
      properties:
        entityName:      { type: string, nullable: true, description: "Wildflower legal entity the allocation is attributed to." }
        usageLabel:      { type: string, nullable: true, description: "Human-readable intended-usage label (display_usage, falling back to the intended_usage code) — e.g. 'Gen Ops', 'School Startup', or a project name." }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
    ReconciliationCard:
      type: object
      required: [stagedPaymentId, status, queue, hasStripeEvidence, ready, isSourceGroup, needsResearch]
      description: "List item for the unified reconciler — one per QB staged payment (the anchor), OR one per manual 'same physical gift' source group (collapsed; stagedPaymentId is the representative member). Carries the QB anchor facts + a compact best-guess summary; the full graph is fetched per card."
      properties:
        stagedPaymentId: { type: string }
        status:          { $ref: "#/components/schemas/StagedPaymentStatus" }
        queue:           { $ref: "#/components/schemas/QuickbooksStagedPaymentQueue" }
        amount:          { type: string, nullable: true }
        dateReceived:    { type: string, format: date, nullable: true }
        payerName:       { type: string, nullable: true }
        payerEmail:      { type: string, nullable: true }
        rawReference:    { type: string, nullable: true }
        lineDescription: { type: string, nullable: true }
        qbPaymentMethod: { type: string, nullable: true }
        qbEntityType:    { type: string, nullable: true, description: "QuickBooks transaction type (SalesReceipt | Payment | Deposit | …) — part of the QB key used to reference this card." }
        qbEntityId:      { type: string, nullable: true, description: "QuickBooks internal transaction id — the stable, unique QB key for this card's record." }
        qbDocNumber:     { type: string, nullable: true, description: "QuickBooks document/reference number (the 'No.' field), human-visible; may be absent (e.g. some deposits)." }
        qbAccountNames:  { type: array, nullable: true, items: { type: string }, description: "QuickBooks GL account name(s) on the transaction line(s) — the 'object code'. QBO bakes the numeric account number into the name as a prefix (e.g. '4000.1 Unrestricted Donations:…'), so this carries both the code and the label. Null/empty when the line(s) have no account." }
        qbClasses:       { type: array, nullable: true, items: { type: string }, description: "QuickBooks class(es) tagged on the transaction line(s). Null/empty when the line(s) are unclassed." }
        qbTransactionMemo: { type: string, nullable: true, description: "QuickBooks transaction-level memo/note, distinct from the per-line description (lineDescription)." }
        qbLocation:      { type: string, nullable: true, description: "QuickBooks Location/Department (DepartmentRef) on the transaction, e.g. 'National:Foundation Operations'. A read-only QB fact captured at pull time; null when none is tagged." }
        entityId:        { type: string, nullable: true }
        entityName:      { type: string, nullable: true }
        proposedDonorId:         { type: string, nullable: true }
        proposedDonorName:       { type: string, nullable: true }
        proposedDonorKind:       { type: string, enum: [organization, person, household], nullable: true }
        proposedGiftId:          { type: string, nullable: true }
        proposedGiftName:        { type: string, nullable: true }
        proposedOpportunityId:   { type: string, nullable: true }
        proposedOpportunityName: { type: string, nullable: true }
        donorState:       { $ref: "#/components/schemas/ReconciliationEdgeState" }
        giftState:        { $ref: "#/components/schemas/ReconciliationEdgeState" }
        opportunityState: { $ref: "#/components/schemas/ReconciliationEdgeState" }
        hasStripeEvidence: { type: boolean }
        stripeChargeId:    { type: string, nullable: true, description: "When set, this card is ONE Stripe charge (not the whole QB deposit): the active/needs-review/research queues expand a Stripe-payout-backed deposit into one card per backing charge. The card's identity is then the composite (stagedPaymentId, stripeChargeId); approve acts on this single charge → its own CRM gift. Null for non-Stripe rows, source-group cards, and the unexpanded (terminal) queues." }
        stripePayoutId:    { type: string, nullable: true }
        stripeChargeCount: { type: integer, nullable: true }
        stripeReconciliationStatus: { type: string, nullable: true, description: "Reconciliation state of the Stripe payout backing this money (proposed | conflict_approved | confirmed_reconciled | unmatched | …); null when there is no Stripe evidence." }
        stripeChargeDonorName: { type: string, nullable: true, description: "Payer/customer name (or resolved donor) on the Stripe charge — the real donor, not the 'Stripe' processor name that appears as the QB payer. Set for a per-charge card (stripeChargeId present) and for a single-charge payout; null for an un-expanded multi-charge payout or non-Stripe money." }
        stripeGrossAmount: { type: string, nullable: true, description: "Gross amount (major units) of the Stripe charge for this card; set for a per-charge card or a single-charge payout, null otherwise." }
        stripeNetAmount:   { type: string, nullable: true, description: "Net amount deposited (gross − processor fee) for the Stripe charge for this card; set for a per-charge card or a single-charge payout, null otherwise." }
        stripeFeeAmount:   { type: string, nullable: true, description: "Processor fee on the Stripe charge for this card (gross − net); set for a per-charge card or a single-charge payout, null otherwise." }
        resolvedGiftId:     { type: string, nullable: true }
        resolvedGiftName:   { type: string, nullable: true }
        resolvedGiftAmount: { type: string, nullable: true }
        resolvedGiftDonorName: { type: string, nullable: true, description: "Display name of the donor the LINKED gift is recorded under (its organization/individual/household), shown on the card's CRM-gift side. Distinct from proposedDonorName (the staged payment's payer-side donor): surfaces a payer-vs-gift-donor difference before approval. Null when no gift is linked." }
        resolvedGiftDate:   { type: string, format: date, nullable: true, description: "Received date (dateReceived) of the linked or proposed gift, shown on the card's CRM-gift side. Null when no gift is linked/proposed or the gift has no received date." }
        resolvedGiftFiscalYear: { type: string, nullable: true, description: "Fiscal-year slug (grantYear) of the linked gift, shown on the card's CRM-gift side. Null when no gift is linked or the gift has no fiscal year set." }
        resolvedGiftAllocations:
          type: array
          nullable: true
          description: "Intended-usage rollup of the linked gift's allocation lines (entity, usage label, restriction) — shown on the card's CRM-gift side so a reviewer can judge what the money is for. Null when no gift is linked or the gift has no allocations."
          items: { $ref: "#/components/schemas/ReconciliationCardGiftAllocation" }
        finalAmountSource:  { $ref: "#/components/schemas/GiftFinalAmountSource", nullable: true }
        ready:              { type: boolean, description: "Auto-proposal satisfies the consistency gate (one-click approve)." }
        needsResearch:      { type: boolean, description: "Plain human-set 'needs research' flag (parked for later); orthogonal to reconcile status. Set via /staged-payments/{id}/set-needs-research." }
        exclusionReason:    { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Why this money was filed as a non-gift; set only when status='excluded'. Drives the Excluded queue's reason label." }
        reconciliationLanes: { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this anchor's money, derived read-only from status + donor/gift state: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped donor match). Replaces the single blended badge." }
        fundingSource:      { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "Origin of this money (Stripe, brokerage, DAF, …). For a group card this is the members' common source, or null when they differ. Distinct from qbPaymentMethod (the instrument) and the funding lane." }
        fundingSourceProvenance: { $ref: "#/components/schemas/StagedPaymentFundingSourceProvenance", nullable: true, description: "Whether fundingSource was derived (auto) or human-pinned (manual). Null on a group card whose members disagree." }
        sourceGroupId:      { type: string, nullable: true, description: "Set when this card represents a manual 'same physical gift' group; null for a single staged payment." }
        isSourceGroup:      { type: boolean, description: "True when this card collapses several staged payments a human grouped as one physical gift (rows sharing sourceGroupId). The card's stagedPaymentId is the representative member; approve acts on the whole group." }
        sourceGroupCount:   { type: integer, nullable: true, description: "Number of staged payments in the group (>= 2). Null when not a group." }
        sourceGroupTotalAmount: { type: string, nullable: true, description: "Summed amount of all group members (the amount the group reconciles for). Null when not a group." }
        sourceGroupMembers:
          type: array
          nullable: true
          description: "Compact per-member rows of the group, for display. Null when not a group. The representative is the card's stagedPaymentId."
          items: { $ref: "#/components/schemas/ReconciliationCardGroupMember" }
        # ── Revenue-accounting / QuickBooks coding snapshot (Task #449) ──────────
        # The derived coding snapshot describes this QuickBooks PAYMENT (moved off
        # gift/pledge allocations). Surfaced read-only on the card so the reviewer
        # can see + edit it inline via /staged-payments/{id}/set-coding. Each
        # `*Override` lets a human override the derived value (effective =
        # override ?? derived).
        objectCode:              { type: string, nullable: true }
        objectCodeOverride:      { type: string, nullable: true }
        revenueLocation:         { type: string, nullable: true }
        revenueLocationOverride: { type: string, nullable: true }
        revenueClass:            { type: string, nullable: true }
        revenueClassOverride:    { type: string, nullable: true }
        codingFlags:             { type: array, items: { type: string }, nullable: true, description: "Coding flags surfaced for human review (e.g. location_default, payer_type_assumed)." }
        deferredRevenue:         { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:   { type: string, nullable: true }
        createdAt:          { type: string, format: date-time, nullable: true }
        updatedAt:          { type: string, format: date-time, nullable: true }
    ReconciliationCardList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/ReconciliationCard" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    ReconciliationProposal:
      type: object
      description: "One reviewer 'propose alternative' comment left on a reconciliation card, with its author and timestamp."
      required: [id, stagedPaymentId, comment, createdByUserId, createdByUserName, createdAt]
      properties:
        id:                { type: string }
        stagedPaymentId:   { type: string, description: "The staged_payments row this comment is attached to (the representative row for a source group)." }
        comment:           { type: string, description: "The reviewer's free-text note 'to the system'." }
        createdByUserId:   { type: string, nullable: true, description: "Author user id; null if the user row was since removed." }
        createdByUserName: { type: string, nullable: true, description: "Author display name, joined for convenience." }
        createdAt:         { type: string, format: date-time }
    ReconciliationProposalList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/ReconciliationProposal" } }
    ReconciliationProposalWithContext:
      description: "A reviewer comment joined with its staged-payment context, for cross-card triage."
      allOf:
        - $ref: "#/components/schemas/ReconciliationProposal"
        - type: object
          required: [payerName, amount, dateReceived, stagedStatus, resolvedGiftId]
          properties:
            payerName:      { type: string, nullable: true }
            amount:         { type: string, nullable: true, description: "The staged payment's amount (major units)." }
            dateReceived:   { type: string, format: date, nullable: true }
            stagedStatus:   { type: string, nullable: true, description: "The staged payment's status at read time (e.g. pending / approved / excluded)." }
            resolvedGiftId: { type: string, nullable: true, description: "The gift this row is matched/created/group-reconciled into, if any." }
    ReconciliationProposalWithContextList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/ReconciliationProposalWithContext" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateReconciliationProposalBody:
      type: object
      required: [comment]
      description: "Body for leaving a free-text 'propose alternative' comment on a reconciliation card."
      properties:
        comment: { type: string, minLength: 1, maxLength: 10000, description: "The reviewer's note. Trimmed server-side; whitespace-only is rejected." }
    ReconciliationCardGroupMember:
      type: object
      required: [stagedPaymentId, isRepresentative]
      description: "One member of a manual 'same physical gift' source group, summarized for the group card."
      properties:
        stagedPaymentId:  { type: string }
        amount:           { type: string, nullable: true }
        dateReceived:     { type: string, format: date, nullable: true }
        payerName:        { type: string, nullable: true }
        qbDocNumber:      { type: string, nullable: true }
        fundingSource:    { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true }
        isRepresentative: { type: boolean, description: "True for the single member that anchors the group card / carries the group's gift link on approve (the card's stagedPaymentId)." }
    ReconciliationSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" } }
    GiftMissingQb:
      type: object
      required: [id, rowKey]
      description: |
        ONE ROW PER gift_allocation for the gifts-missing-QB worklist. A gift with
        several allocations surfaces several rows (the gift header fields repeat).
        A gift that has no allocations surfaces a single row with allocationId null.
        Allocations attributed to an entity that never settles through a payment
        processor (entities.expectsPayment = false: "Direct to School" /
        "Wildflower Foundation TSNE") are excluded.
      properties:
        id:            { type: string, description: "Gift (gifts_and_payments) id. Repeats across the gift's allocation rows." }
        rowKey:        { type: string, description: "Stable per-row key (giftId + allocationId). Unique across the list; use as the React key." }
        allocationId:  { type: string, nullable: true, description: "gift_allocations id for this row. Null when the gift has no allocations." }
        giftName:      { type: string, nullable: true, description: "Gift header name (used with the allocation id to label the row)." }
        donorName:     { type: string, nullable: true, description: "Donor display name (anonymous-masked for the viewer)." }
        donorKind:     { type: string, enum: [organization, person, household], nullable: true }
        amount:        { type: string, nullable: true, description: "Raw gift header amount (may be null)." }
        displayAmount: { type: string, nullable: true, description: "Amount to display: the gift header amount, falling back to the sum of the gift's allocation sub-amounts when the header is null. Null only when no amount is recorded anywhere." }
        allocationAmount: { type: string, nullable: true, description: "This allocation's sub-amount (null when there is no allocation)." }
        dateReceived:  { type: string, format: date, nullable: true, description: "Raw gift header date received (may be null)." }
        displayDate:   { type: string, format: date, nullable: true, description: "Date to display: the gift date received, falling back to the earliest allocation spending-start date when the header is null." }
        paymentMethod: { $ref: "#/components/schemas/GiftPaymentMethod", nullable: true, description: "The donor's recorded payment method on the gift (NOT a reconciliation match)." }
        entityId:      { type: string, nullable: true, description: "The allocation's fund entity id." }
        entityName:    { type: string, nullable: true, description: "The allocation's fund entity name." }
        intendedUsage: { $ref: "#/components/schemas/IntendedUsage", nullable: true }
        displayUsage:  { type: string, nullable: true, description: "Denormalized human-readable usage label for the allocation." }
        fundableProjectId:   { type: string, nullable: true }
        fundableProjectName: { type: string, nullable: true }
        schoolRecipientId:   { type: string, nullable: true }
        schoolRecipientName: { type: string, nullable: true }
        grantYear:     { type: string, nullable: true, description: "The allocation's fiscal year (grant_year) id." }
        finalAmountSource: { $ref: "#/components/schemas/GiftFinalAmountSource", nullable: true }
    GiftMissingQbList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftMissingQb" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    ReconciliationOutcome:
      type: string
      enum: [link_existing_gift, create_gift, create_gift_from_opportunity, convert_to_pledge_and_first_payment]
      description: |
        What approving the card does.
        link_existing_gift: tie the QB (+Stripe) evidence to an existing gift; no new gift.
        create_gift: human-mint a new gift from the QB evidence for the chosen donor.
        create_gift_from_opportunity: mint a one-time gift and link it to the chosen opportunity (opportunityId); the opp derives to cash_in when fully paid.
        convert_to_pledge_and_first_payment: latch the opportunity as a pledge (set writtenPledge=true; cultivation stage is untouched) and mint the first-payment gift linked to it.
    ApproveCompleteMatchBody:
      type: object
      required: [outcome]
      description: "Approve a reconciliation card. The server re-derives and re-validates the entire graph and runs the consistency gate before committing; it never trusts UI-supplied locks."
      properties:
        outcome:       { $ref: "#/components/schemas/ReconciliationOutcome" }
        giftId:        { type: string, nullable: true, description: "Existing gift to link (required for link_existing_gift)." }
        opportunityId: { type: string, nullable: true, description: "Opportunity/pledge to generate from or link to (required for the *_opportunity / convert_* outcomes)." }
        organizationId:          { type: string, nullable: true, description: "Donor XOR — set exactly one of the three donor FKs when creating a gift and the donor isn't derivable." }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true, description: "Optional DAF / giving-platform conduit the donor gave through." }
        switchGiftDonor: { type: boolean, nullable: true, description: "For link_existing_gift ONLY: when true, re-point the existing gift's donor to the single donor FK supplied in this body (after explicit human confirmation in the UI). Blocked (409 gift_pledge_donor_conflict) when the gift is a payment on a pledge/opportunity owned by a different donor — fix the pledge first." }
        stripeChargeId: { type: string, nullable: true, description: "The Stripe charge whose GROSS becomes the gift's final amount (Stripe precedence). Omit for QB-only money (brokerage/check)." }
        overrideAmountMismatchReason: { type: string, nullable: true, description: "Required to approve when the evidence amount and the gift amount fall outside the fee-band tolerance." }
    ReconciliationApproveResult:
      type: object
      required: [ok, stagedPaymentId, outcome, giftId, createdGift, createdPledge]
      properties:
        ok:              { type: boolean, enum: [true] }
        outcome:         { $ref: "#/components/schemas/ReconciliationOutcome" }
        stagedPaymentId: { type: string }
        giftId:          { type: string, description: "The existing-or-newly-created gift the evidence is now tied to." }
        opportunityId:   { type: string, nullable: true }
        createdGift:     { type: boolean, description: "True when a new gift was minted." }
        createdPledge:   { type: boolean, description: "True when an opportunity was latched into a pledge." }
    DonorSearchResult:
      type: object
      required: [id, kind, name]
      properties:
        id:   { type: string }
        kind: { type: string, enum: [organization, person, household] }
        name: { type: string }
    DonorSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/DonorSearchResult" } }
    PendingDonorMoneyItem:
      type: object
      required: [source, amount, dateReceived, payerName]
      properties:
        source:       { type: string, enum: [quickbooks, stripe], description: "Where the pending money came from." }
        amount:       { type: string, nullable: true, description: "Numeric amount as a string (gross for Stripe)." }
        dateReceived: { type: string, nullable: true, description: "Date the money landed (YYYY-MM-DD), if known." }
        payerName:    { type: string, nullable: true, description: "Payer label from the source record." }
    PendingDonorMoney:
      type: object
      required: [count, items]
      properties:
        count: { type: integer, description: "Total pending staged rows matched to this donor." }
        items: { type: array, items: { $ref: "#/components/schemas/PendingDonorMoneyItem" }, description: "Up to a few recent pending rows for display." }
    SearchHit:
      type: object
      required: [type, id, label, score]
      properties:
        type:     { type: string, enum: [person, organization, household, opportunity, gift] }
        id:       { type: string }
        label:    { type: string, description: "Display name (anonymous-masked when the viewer can't see the identity)." }
        sublabel: { type: string, nullable: true, description: "Secondary context (e.g. donor name for opportunities/gifts)." }
        score:    { type: number, description: "Relevance score; higher is a better match." }
    SearchResults:
      type: object
      required: [people, organizations, households, opportunities, gifts]
      properties:
        people:        { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        organizations: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        households:    { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        opportunities: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        gifts:         { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
    DuplicatePairSide:
      type: object
      required: [id, name, giftCount]
      properties:
        id:           { type: string }
        name:         { type: string, description: "Display name (anonymous-masked when the viewer can't see the identity)." }
        ownerName:    { type: string, nullable: true, description: "Record owner's display name." }
        primaryEmail: { type: string, nullable: true }
        primaryPhone: { type: string, nullable: true }
        createdAt:    { type: string, nullable: true, description: "ISO timestamp the record was created (helps pick the canonical record)." }
        giftCount:    { type: integer, description: "Number of gifts/payments attributed to this record." }
    DuplicatePair:
      type: object
      required: [type, score, signals, a, b, safeMerge, mergeSuggestion]
      properties:
        type:    { type: string, enum: [organization, person] }
        score:   { type: number, description: "Match confidence; higher is a stronger duplicate signal." }
        signals: { type: array, items: { type: string, enum: [name, phone] }, description: "Why the pair was flagged (similar name and/or a shared phone number)." }
        a:       { $ref: "#/components/schemas/DuplicatePairSide" }
        b:       { $ref: "#/components/schemas/DuplicatePairSide" }
        safeMerge:
          type: boolean
          description: "True when the two records are identical, or their only differences are a filled value vs null/empty, so the merge has no real conflicts and can be applied in one click."
        mergeSuggestion:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DuplicateMergeSuggestion"
          description: "The auto-resolved merge to apply for a safe pair (survivor + the filled-in winning values). Null when the pair has conflicting values and needs manual review."
    DuplicateMergeSuggestion:
      type: object
      required: [primaryId, mergeIds, overrides]
      description: "A ready-to-apply merge for a safe duplicate pair: keep `primaryId`, fold `mergeIds` into it, and apply `overrides` (filled values pulled from the loser where the survivor was empty)."
      properties:
        primaryId: { type: string, description: "The record chosen to survive the merge." }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, description: "Records to fold into the survivor (always the other side of the pair)." }
        overrides: { type: object, additionalProperties: true, description: "Whitelisted scalar winners to apply to the survivor (filled value where the survivor was null/empty)." }
    DuplicatePairList:
      type: object
      required: [pairs]
      properties:
        pairs: { type: array, items: { $ref: "#/components/schemas/DuplicatePair" } }
    DismissDuplicateBody:
      type: object
      required: [type, idA, idB]
      description: "Mark a pair as not-a-duplicate. ids may be passed in any order; the server canonicalizes them (idA < idB)."
      properties:
        type: { type: string, enum: [organization, person] }
        idA:  { type: string }
        idB:  { type: string }
    FinancialCorrectionGift:
      type: object
      required: [id, amount, allocationCount]
      properties:
        id:              { type: string }
        donorName:       { type: string, nullable: true, description: "Display name of the gift's donor (anonymous-masked where required)." }
        amount:          { type: string, nullable: true, description: "Gift gross amount (numeric string)." }
        date:            { type: string, nullable: true, description: "Date the gift was received (ISO date)." }
        allocationCount: { type: integer, description: "Number of allocation lines on the gift." }
        pledgeId:        { type: string, nullable: true, description: "Pledge this gift pays toward, if any." }
    FinancialCorrectionEvidence:
      type: object
      required: [kind, id]
      properties:
        kind:       { type: string, enum: [qb_staged, stripe_charge], description: "Which evidence source this row comes from." }
        id:         { type: string, description: "The evidence row id (staged_payments.id or stripe_staged_charges.id)." }
        amount:     { type: string, nullable: true, description: "Evidence amount (numeric string)." }
        date:       { type: string, nullable: true, description: "Evidence date (ISO date)." }
        payerName:  { type: string, nullable: true, description: "Payer/source name on the evidence (often NOT the donor)." }
        entityName: { type: string, nullable: true, description: "Attributed fund entity, when known." }
    FinancialCorrectionMergeSuggestion:
      type: object
      required: [primaryId, mergeIds]
      description: "A ready-to-apply gift merge: keep `primaryId`, fold `mergeIds` into it as additional allocations. Apply through the gifts-and-payments/merge endpoint."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1 }
    FinancialCorrection:
      type: object
      required: [kind, key, score, reason, gifts, safeApply]
      properties:
        kind:    { type: string, enum: [merge_gifts, link_evidence], description: "merge_gifts = collapse near-duplicate gifts into one with allocations; link_evidence = corroborate many gifts with one bulk deposit." }
        key:     { type: string, description: "Canonical, order-independent proposal key (used for dismissal)." }
        score:   { type: number, description: "Confidence the records describe the same money; higher is stronger." }
        reason:  { type: string, description: "Human-readable explanation of why this was flagged." }
        gifts:   { type: array, items: { $ref: "#/components/schemas/FinancialCorrectionGift" } }
        evidence:
          $ref: "#/components/schemas/FinancialCorrectionEvidence"
        mergeSuggestion:
          $ref: "#/components/schemas/FinancialCorrectionMergeSuggestion"
        safeApply:
          type: boolean
          description: "True when the proposal can be applied without further human disambiguation (e.g. all gifts share one donor for a merge)."
    FinancialCorrectionList:
      type: object
      required: [corrections]
      properties:
        corrections: { type: array, items: { $ref: "#/components/schemas/FinancialCorrection" } }
    DismissFinancialCorrectionBody:
      type: object
      required: [kind, proposalKey]
      description: "Mark a proposed correction as leave-as-is so the detector never re-surfaces it."
      properties:
        kind:        { type: string, enum: [merge_gifts, link_evidence] }
        proposalKey: { type: string }
    ApplyFinancialCorrectionBody:
      type: object
      required: [evidenceKind, evidenceId, giftIds]
      description: "Apply a link_evidence correction: corroborate each gift in `giftIds` with the given evidence row. CRM-side only; never edits the source."
      properties:
        evidenceKind: { type: string, enum: [qb_staged, stripe_charge] }
        evidenceId:   { type: string }
        giftIds:      { type: array, items: { type: string }, minItems: 1 }
    ApplyFinancialCorrectionResult:
      type: object
      required: [evidenceKind, evidenceId, linkedGiftIds]
      properties:
        evidenceKind:  { type: string, enum: [qb_staged, stripe_charge] }
        evidenceId:    { type: string }
        linkedGiftIds: { type: array, items: { type: string }, description: "Gifts now corroborated by the evidence (idempotent — already-linked gifts included)." }
    CleanupQueueStatus:
      type: string
      enum: [open, resolved, dismissed]
    CleanupItem:
      type: object
      required: [id, targetType, targetId, reasonCode, note, status, flaggedAt, createdAt, updatedAt]
      properties:
        id:               { type: string }
        targetType:       { type: string, description: "Kind of record this item targets (e.g. 'pledge', 'opportunity', 'organization', 'person', 'gift')." }
        targetId:         { type: string, description: "Id of the targeted record." }
        targetName:       { type: string, nullable: true, description: "Resolved display name of the target record (when known)." }
        reasonCode:       { type: string, description: "Machine-readable category of the flag." }
        note:             { type: string, description: "Human-readable description of what to fix." }
        status:           { $ref: "#/components/schemas/CleanupQueueStatus" }
        flaggedAt:        { type: string, description: "ISO timestamp the record was flagged for cleanup." }
        resolvedAt:       { type: string, nullable: true, description: "ISO timestamp the item was resolved or dismissed." }
        resolvedByUserId: { type: string, nullable: true }
        resolvedByUserName: { type: string, nullable: true, description: "Display name of the user who resolved/dismissed the item." }
        createdAt:        { type: string }
        updatedAt:        { type: string }
    CleanupItemList:
      type: object
      required: [data, pagination]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CleanupItem" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    FlagForResearchBody:
      type: object
      required: [targetType, targetId, note]
      description: >-
        Flag a record for research. reason_code is always 'needs_research'.
      properties:
        targetType: { type: string, enum: [opportunity, pledge, organization, person, gift], description: "Kind of record being flagged." }
        targetId:   { type: string, minLength: 1, description: "Id of the record being flagged." }
        note:       { type: string, minLength: 1, description: "What needs research / follow-up on this record." }
    ResolveStagedPaymentBody:
      type: object
      description: "Set exactly one donor FK (donor XOR). Null the others. Optionally record a payment intermediary."
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true }
    StagedGiftResponse:
      type: object
      required: [gift, stagedPaymentId]
      properties:
        gift:            { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentId: { type: string }
    GiftCandidate:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            organizationName:          { type: string, nullable: true }
            householdName:             { type: string, nullable: true }
            individualGiverPersonName: { type: string, nullable: true }
            alreadyLinkedStagedPaymentId:
              type: string
              nullable: true
              description: "Set when this gift is already reconciled/created/group-reconciled/split-linked by a staged payment. The UI disables linking to it to avoid double-counting."
    GiftCandidateList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/GiftCandidate" } }
    ReconcileStagedPaymentBody:
      type: object
      required: [giftId]
      description: "Reconcile the staged payment to an existing gifts_and_payments row."
      properties:
        giftId: { type: string }
    SplitStagedPaymentBody:
      type: object
      required: [giftIds]
      description: "Split one staged payment across several existing gifts, with any unmatched remainder optionally routed to a NEW gift. Each existing portion is the linked gift's own gross amount; the optional remainder mints one new gift for the leftover. The total links (existing gifts + remainder) must be at least two."
      properties:
        giftIds:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the existing gifts to split this staged payment across. Each must be unlinked everywhere and carry a single valid donor. Combined with an optional remainder gift, the split must cover at least two links; the summed gross (existing gifts + remainder) must sit in the fee-band around the staged net amount."
        remainderGift:
          $ref: "#/components/schemas/SplitStagedPaymentRemainderGift"
    SplitStagedPaymentRemainderGift:
      type: object
      required: [amount]
      description: "Route the unmatched remainder of the payment to a brand-new gift. Exactly one donor (Donor XOR). Its amount is added to the split's combined gross for the fee-band check."
      properties:
        amount: { type: string, description: "Gross amount of the new remainder gift (the leftover not covered by the existing gifts)." }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    SplitStagedPaymentResponse:
      type: object
      required: [stagedPaymentId, giftIds, splitTotal]
      properties:
        stagedPaymentId: { type: string }
        giftIds: { type: array, items: { type: string }, description: "All gift ids the payment was split across, including the newly minted remainder gift (if any)." }
        splitTotal: { type: string, description: "Combined gross total of the split gifts (existing + remainder)." }
        createdGiftId: { type: string, nullable: true, description: "Id of the newly minted remainder gift, when a remainder gift was requested; null otherwise." }
    GroupReconcileStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds, giftId]
      description: "Group several staged payments and reconcile the whole group to one existing gift. Members must share one bank deposit, or — when no deposit was captured — the same payer."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 2
          items: { type: string }
          description: "Ids of the staged payments to group. Must be at least two, all pending, and all sharing the same non-null qbDepositId, or — when none has a deposit — the same payer name."
        giftId: { type: string, description: "The existing gift the group reconciles to." }
        confirmMultiDate:
          type: boolean
          description: "Must be true when the grouped payments do not all share the same date_received, or carry more than one distinct (non-null) bank deposit. Guards against accidentally collapsing unrelated same-payer gifts (e.g. recurring donations) or two genuinely separate deposits into one. The client prompts the operator to confirm before sending this."
        confirmAmountMismatch:
          type: boolean
          description: "Must be true when the members' combined total falls OUTSIDE the processor fee-band tolerance around the gift amount (e.g. stock/securities gifts, where the cash from selling the shares differs from the gift's booked value). Lets the operator explicitly approve a deliberate amount mismatch; without it such a group is rejected 400 amount_mismatch_confirmation_required. The client prompts the operator to confirm before sending this."
    GroupReconcileStagedPaymentsResponse:
      type: object
      required: [gift, stagedPaymentIds, representativeStagedPaymentId]
      properties:
        gift: { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentIds: { type: array, items: { type: string } }
        representativeStagedPaymentId: { type: string, description: "The group member that also carries matchedGiftId (the one that makes the gift show linked)." }
    ConfirmStagedPaymentMatchesBody:
      type: object
      required: [ids]
      description: "Bulk-confirm several staged-payment matches (e.g. the whole Auto-matched queue) in one call."
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to confirm. Ids that are not in a confirmable state are skipped, not errors."
    ConfirmStagedPaymentMatchesResponse:
      type: object
      required: [confirmedIds, requested]
      properties:
        confirmedIds: { type: array, items: { type: string }, description: "Ids that were actually confirmed." }
        requested: { type: integer, description: "How many ids were submitted. (requested − confirmedIds.length = skipped.)" }
    RevertStagedPaymentMatchesBody:
      type: object
      required: [ids]
      description: "Bulk-revert several auto-applied staged-payment matches (e.g. the whole Auto-matched queue) in one call."
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to revert. Ids that are not in a revertible state are skipped, not errors."
    RevertStagedPaymentMatchesResponse:
      type: object
      required: [revertedIds, requested]
      properties:
        revertedIds: { type: array, items: { type: string }, description: "Ids that were actually reverted." }
        requested: { type: integer, description: "How many ids were submitted. (requested − revertedIds.length = skipped.)" }
    ExcludeStagedPaymentBody:
      type: object
      required: [exclusionReason]
      description: "File the staged payment under a non-gift exclusion category."
      properties:
        exclusionReason: { $ref: "#/components/schemas/StagedPaymentExclusionReason" }
    SetStagedPaymentEntityBody:
      type: object
      required: [entityId]
      description: "Pin (or clear) the Wildflower-entity attribution by hand. Sets entitySource='manual' so detectEntity never overwrites it on re-sync. entityId null clears the attribution back to the default Foundation bucket while keeping the manual pin."
      properties:
        entityId: { type: string, nullable: true, description: "The entities.id to attribute this incoming money to, or null to clear the attribution (keeping the manual pin)." }
    SetStagedPaymentFundingSourceBody:
      type: object
      required: [fundingSource]
      description: "Pin (or clear) the funding source by hand. Sets fundingSourceProvenance='manual' so detectFundingSource never overwrites it on re-sync / reclassify. fundingSource null clears the value back to unknown while keeping the manual pin (so it is not re-derived)."
      properties:
        fundingSource: { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "The origin to attribute this money to, or null to clear it (keeping the manual pin)." }
    SetStagedPaymentNeedsResearchBody:
      type: object
      required: [needsResearch]
      description: "Set or clear the plain human 'needs research' flag on a staged payment. A pure annotation with no side effects on reconcile status or matching."
      properties:
        needsResearch: { type: boolean, description: "True to flag this row for further research, false to clear it." }
    SetStagedPaymentCodingBody:
      type: object
      description: |
        Set or clear the revenue-coding snapshot on a staged payment. All fields
        optional; only provided fields are written. The bare fields are the
        derived coding values, the *Override fields pin a manual value, and
        codingFlags surfaces ambiguities for human review. Passing null clears a
        field.
      properties:
        objectCode:              { type: string, nullable: true }
        objectCodeOverride:      { type: string, nullable: true }
        revenueLocation:         { type: string, nullable: true }
        revenueLocationOverride: { type: string, nullable: true }
        revenueClass:            { type: string, nullable: true }
        revenueClassOverride:    { type: string, nullable: true }
        codingFlags:             { type: array, items: { type: string }, nullable: true }
        deferredRevenue:         { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:   { type: string, nullable: true }
    GroupStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds]
      description: "Mark two or more staged payments as ONE physical gift entered separately in QuickBooks (a 'same physical gift' source group). Stamps a shared sourceGroupId. Does not change donor or gift links and never reconciles by itself."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 2
          items: { type: string }
          description: "Ids of the staged payments to group. Must be at least two distinct, existing, non-archived, still-unreconciled rows. Rows already in another group are rejected unless they are all already in the same group (idempotent re-group)."
        confirmDonorConflict:
          type: boolean
          description: "Must be true when the members already resolve to more than one distinct donor. Guards against grouping unrelated gifts. Without it such a group is rejected 400 donor_conflict. The client prompts the operator to confirm before sending this."
    GroupStagedPaymentsResponse:
      type: object
      required: [sourceGroupId, stagedPaymentIds, representativeStagedPaymentId]
      properties:
        sourceGroupId: { type: string, description: "The shared id stamped on every member." }
        stagedPaymentIds: { type: array, items: { type: string }, description: "All member ids now carrying the sourceGroupId." }
        representativeStagedPaymentId: { type: string, description: "The deterministic representative member (the one the group card is anchored on and that carries the gift link on group approve)." }
        totalAmount: { type: string, nullable: true, description: "Summed amount of all members." }
    UngroupStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds]
      description: "Remove staged payments from their 'same physical gift' source group by clearing sourceGroupId. If removing rows leaves a group with fewer than two members, the remaining orphan is cleared too (a group requires >= 2)."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to remove from their group. A no-op for rows that aren't grouped."
    UngroupStagedPaymentsResponse:
      type: object
      required: [ungroupedIds]
      properties:
        ungroupedIds: { type: array, items: { type: string }, description: "Ids whose sourceGroupId was cleared (includes any auto-dissolved orphans)." }
        dissolvedGroupIds: { type: array, items: { type: string }, description: "Source-group ids that no longer exist after this call (fully dissolved)." }
    CandidateThankYouEmail:
      type: object
      required: [emailMessageId, sentAt, hasDocumentAttachment]
      properties:
        emailMessageId:        { type: string }
        gmailMessageId:        { type: string, nullable: true }
        subject:               { type: string, nullable: true }
        fromEmail:             { type: string, nullable: true }
        toEmails:              { type: array, items: { type: string }, nullable: true }
        sentAt:                { type: string, format: date-time }
        snippet:               { type: string, nullable: true }
        hasDocumentAttachment: { type: boolean }
        documentAttachmentCount: { type: integer }
        autoSuggested:         { type: boolean, description: "True when this candidate matches the 30-day + 'thank' + has-document-attachment heuristic." }
    CandidateThankYouEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CandidateThankYouEmail" } }
    LinkThankYouEmailBody:
      type: object
      required: [emailMessageId]
      properties:
        emailMessageId: { type: string }

    # ─── Gift allocations ──────────────────────────────────────────────────────
    GiftAllocation:
      type: object
      required: [id, regionalRestrictionType, usageRestrictionType, timeRestrictionType, countsTowardGoal, createdAt, updatedAt]
      properties:
        id:                          { type: string }
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        reimbursementType:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, description: "Direct vs indirect share on a reimbursable grant. DIRECT is excluded from goal analytics; null (untagged) and indirect both count." }
        countsTowardGoal:            { type: boolean, description: "When false, this allocation's money is excluded from goal/received analytics rollups (e.g. government reimbursement that doesn't advance the fundraising goal). Per-allocation; defaults true." }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        displayUsage:                { type: string, nullable: true, readOnly: true, description: "Server-computed human-readable usage label (school name | usage label | usage + ' - ' + region names). Maintained by DB triggers; read-only." }
        purposeVerbatim:             { type: string, nullable: true }
        # @deprecated (Task #449) — superseded by regional/usage/time RestrictionAxis
        # + the staged-payment coding snapshot. Read-only; no longer written.
        formalRegionalRestriction:   { type: boolean, deprecated: true, description: "@deprecated — use regionalRestrictionType." }
        formalFundUseRestriction:    { type: boolean, deprecated: true, description: "@deprecated — use usageRestrictionType." }
        reimbursableShare:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, deprecated: true, description: "@deprecated — renamed to reimbursementType." }
        restrictionType:             { allOf: [ { $ref: "#/components/schemas/RestrictionType" } ], nullable: true, deprecated: true }
        restrictionEvidence:         { type: string, nullable: true, deprecated: true }
        deferredRevenue:             { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true, deprecated: true, description: "@deprecated — coding snapshot moved to staged_payments." }
        deferredRevenueReason:       { type: string, nullable: true, deprecated: true }
        objectCode:                  { type: string, nullable: true, readOnly: true, deprecated: true }
        objectCodeOverride:          { type: string, nullable: true, deprecated: true }
        revenueLocation:             { type: string, nullable: true, readOnly: true, deprecated: true }
        revenueLocationOverride:     { type: string, nullable: true, deprecated: true }
        revenueClass:                { type: string, nullable: true, readOnly: true, deprecated: true }
        revenueClassOverride:        { type: string, nullable: true, deprecated: true }
        codingFlags:                 { type: array, items: { type: string }, nullable: true, readOnly: true, deprecated: true }
        createdAt:                   { type: string, format: date-time }
        updatedAt:                   { type: string, format: date-time }
    GiftAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string }
        subAmount:                   { type: string }
        grantYear:                   { type: string }
        entityId:                    { type: string }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        intendedUsage:               { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:           { type: string }
        reimbursementType:           { $ref: "#/components/schemas/ReimbursementType" }
        countsTowardGoal:            { type: boolean }
        schoolRecipientId:           { type: string }
        spendingStart:               { type: string, format: date }
        spendingEnd:                 { type: string, format: date }
        regionIds:                   { type: array, items: { type: string } }
        purposeVerbatim:             { type: string }
    UpdateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        reimbursementType:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true }
        countsTowardGoal:            { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        purposeVerbatim:             { type: string, nullable: true }

    # ─── Interactions ─────────────────────────────────────────────────────────
    InteractionKind:
      type: string
      enum: [meeting, phone_call, video_call, conference, other]
    Interaction:
      type: object
      required: [id, kind, occurredAt, summary, createdAt, updatedAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    InteractionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Interaction" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateInteractionBody:
      type: object
      required: [kind, occurredAt, summary]
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer }
        location:         { type: string }
        summary:          { type: string }
        notes:            { type: string }
        ownerUserId:      { type: string }
        personIds:        { type: array, items: { type: string } }
        organizationIds:        { type: array, items: { type: string } }
        householdIds:     { type: array, items: { type: string } }
    UpdateInteractionBody:
      type: object
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }

    # ─── Email messages + attachments + calendar events ──────────────────────
    EmailMessage:
      type: object
      required: [id, mailboxUserId, direction, sentAt, isPrivate]
      properties:
        id:                  { type: string }
        gmailMessageId:      { type: string }
        gmailThreadId:       { type: string, nullable: true }
        mailboxUserId:       { type: string }
        direction:           { type: string, enum: [sent, received] }
        sentAt:              { type: string, format: date-time }
        subject:             { type: string, nullable: true }
        snippet:             { type: string, nullable: true }
        fromEmail:           { type: string, nullable: true }
        toEmails:            { type: array, items: { type: string }, nullable: true }
        ccEmails:            { type: array, items: { type: string }, nullable: true }
        bccEmails:           { type: array, items: { type: string }, nullable: true }
        hasAttachments:      { type: boolean }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
        aiSummary:           { type: string, nullable: true, description: "One-line topic summary. Populated only when the mailbox owner is in `summary_only` mode; in that case it is the ONLY content stored for the message — `snippet`, `bodyText`, `bodyHtml`, and attachments are all absent." }
        isTracked:           { type: boolean, readOnly: true, description: "True when this sent message matches an open-tracking pixel record. Only ever true for sent messages." }
        trackingTotalViews:  { type: integer, nullable: true, readOnly: true, description: "Total tracking-pixel opens recorded for this message. When the list is contact-scoped (personId/organizationId/householdId), this counts opens by that contact only. Null when not tracked." }
        trackingLastOpenedAt: { type: string, format: date-time, nullable: true, readOnly: true, description: "Most recent tracked open timestamp. Null when not tracked or not yet opened." }
    EmailMessageDetail:
      allOf:
        - $ref: "#/components/schemas/EmailMessage"
        - type: object
          properties:
            bodyText:    { type: string, nullable: true }
            bodyHtml:    { type: string, nullable: true }
            attachments:
              type: array
              items: { $ref: "#/components/schemas/EmailAttachmentSummary" }
    EmailAttachmentSummary:
      type: object
      required: [id, filename, mimeType, sizeBytes]
      properties:
        id:                 { type: string }
        filename:           { type: string }
        mimeType:           { type: string }
        sizeBytes:          { type: integer }
        gmailAttachmentId:  { type: string, nullable: true }
    EmailMessageList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailMessage" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateEmailMessagePrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }
    CalendarEvent:
      type: object
      required: [id, calendarUserId, gcalCalendarId, gcalEventId, startAt, isPrivate]
      properties:
        id:                  { type: string }
        calendarUserId:      { type: string }
        gcalCalendarId:      { type: string }
        gcalEventId:         { type: string }
        startAt:             { type: string, format: date-time }
        endAt:               { type: string, format: date-time, nullable: true }
        summary:             { type: string, nullable: true }
        description:         { type: string, nullable: true }
        location:            { type: string, nullable: true }
        attendeeEmails:      { type: array, items: { type: string }, nullable: true }
        organizerEmail:      { type: string, nullable: true }
        status:              { type: string, nullable: true }
        htmlLink:            { type: string, nullable: true }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
    CalendarEventList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/CalendarEvent" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateCalendarEventPrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }

    # ─── Admin sync status ────────────────────────────────────────────────────
    AdminGoogleSyncSourceStatus:
      type: object
      required: [bootstrapInProgress, bootstrapStuck, noProgressRuns, stuck]
      properties:
        lastSyncedAt:           { type: string, format: date-time, nullable: true }
        lastError:              { type: string, nullable: true }
        bootstrapCompletedAt:   { type: string, format: date-time, nullable: true }
        bootstrapInProgress:    { type: boolean }
        bootstrapStuck:         { type: boolean, description: "True when the initial sync (bootstrap) hasn't completed and has stopped making progress — either errored past the stall threshold or no run has advanced it in over a day. Recoverable from the panel via Sync now." }
        noProgressRuns:         { type: integer, description: "Consecutive sync runs that made no forward progress (cursor pinned by errors). Resets to 0 on any clean run." }
        stuck:                  { type: boolean, description: "True once noProgressRuns crosses the stall threshold — the mailbox appears wedged and should be investigated." }
    AdminGoogleSyncUserRow:
      type: object
      required: [userId, userEmail, connected, gmail, calendar]
      properties:
        userId:           { type: string }
        userEmail:        { type: string }
        googleEmail:      { type: string, nullable: true }
        connected:        { type: boolean }
        grantedAt:        { type: string, format: date-time, nullable: true }
        revokedAt:        { type: string, format: date-time, nullable: true }
        tokenLastError:   { type: string, nullable: true }
        gmail:            { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
        calendar:         { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
    AdminGoogleSyncList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminGoogleSyncUserRow" }

    # ─── Google OAuth status ──────────────────────────────────────────────────
    GoogleOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has GOOGLE_OAUTH_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "Caller has an active, non-revoked grant" }
        googleEmail:  { type: string, nullable: true }
        scope:        { type: string, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }

    # ─── Airtable → schools sync status (admin) ──────────────────────────────
    SchoolSyncStatus:
      type: object
      required: [configured]
      properties:
        configured:        { type: boolean, description: "Server has Airtable credentials set; the sync is a no-op without them" }
        lastRunStartedAt:  { type: string, format: date-time, nullable: true }
        lastRunFinishedAt: { type: string, format: date-time, nullable: true }
        lastStatus:        { type: string, nullable: true, enum: [ok, error, running], description: "State of the most recent run" }
        lastError:         { type: string, nullable: true }
        schoolsFetched:    { type: integer, nullable: true, description: "Records pulled from the Airtable Schools view in the last run" }
        schoolsUpserted:   { type: integer, nullable: true, description: "Schools inserted/updated in the CRM in the last run" }
        staleInDb:         { type: integer, nullable: true, description: "Schools present in the CRM but absent from the Airtable source view" }
        updatedAt:         { type: string, format: date-time, nullable: true }

    # ─── Google sync status + run report ──────────────────────────────────────
    GoogleSyncDateRange:
      type: object
      properties:
        earliest: { type: string, format: date-time, nullable: true }
        latest:   { type: string, format: date-time, nullable: true }
    GoogleSyncStatus:
      type: object
      properties:
        year: { type: integer, description: Calendar year the counts and date range are scoped to }
        gmail:
          nullable: true
          type: object
          properties:
            lastHistoryId:        { type: string, nullable: true }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
        calendar:
          nullable: true
          type: object
          properties:
            hasSyncToken:         { type: boolean }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
    GmailSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            skipped:             { type: integer }
            attachments:         { type: integer }
            attachmentBytes:     { type: integer }
            bootstrapCompleted:  { type: boolean }
            finalHistoryId:      { type: string, nullable: true }
    CalendarSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            updated:             { type: integer }
            skipped:             { type: integer }
            errors:              { type: integer }
            bootstrapCompleted:  { type: boolean }
            hasSyncToken:        { type: boolean }

    # ─── Email intelligence ───────────────────────────────────────────────────
    EmailProposalKind:
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce_invalid, bounce_soft, signature_update, grant_opportunity, thank_you_acknowledgment, wildflower_update]
    EmailProposalStatus:
      type: string
      enum: [pending, applied, rejected, ignored]
    EmailProposal:
      type: object
      required: [id, mailboxUserId, kind, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                 { type: string }
        mailboxUserId:      { type: string }
        kind:               { $ref: "#/components/schemas/EmailProposalKind" }
        status:             { $ref: "#/components/schemas/EmailProposalStatus" }
        sourceMessageId:    { type: string, nullable: true }
        targetPersonId:     { type: string, nullable: true }
        targetOrganizationId:     { type: string, nullable: true }
        targetEmailId:      { type: string, nullable: true }
        subjectEmail:       { type: string, nullable: true }
        subjectName:        { type: string, nullable: true }
        subjectDomain:      { type: string, nullable: true }
        # When the source Gmail message was SENT (from its Date /
        # internalDate), as opposed to createdAt (when our sync first
        # persisted the proposal). The review UI shows this so reviewers
        # see when the email actually arrived. Nullable: legacy rows /
        # messages without a parseable Date fall back to createdAt.
        emailSentAt:        { type: string, format: date-time, nullable: true }
        payload:            { type: object, additionalProperties: true }
        proposedActions:    { type: array, items: { $ref: "#/components/schemas/ProposedAction" } }
        actionsAnalyzedAt:  { type: string, format: date-time, nullable: true }
        actionsModel:       { type: string, nullable: true }
        actionsError:       { type: string, nullable: true }
        appliedActions:     { type: array, items: { $ref: "#/components/schemas/ApplyActionResult" }, nullable: true }
        dedupeKey:          { type: string }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
        resolvedAt:         { type: string, format: date-time, nullable: true }
        resolvedByUserId:   { type: string, nullable: true }
        # Free-text reviewer feedback captured on accept/reject. Used
        # downstream for prompt tuning — pair with `payload` and
        # `status` to see what the LLM proposed vs. what the human said.
        reviewerNote:       { type: string, nullable: true }
    ProposedAction:
      type: object
      required: [type, reason]
      additionalProperties: true
      properties:
        type:
          type: string
          enum:
            - deactivate_per
            - create_per
            - create_person_with_per
            - add_email
            - set_primary_email
            - mark_email_invalid
            - create_grant_opportunity
        reason: { type: string }
    ApplyActionResult:
      type: object
      required: [type, status]
      properties:
        type:      { type: string }
        status:    { type: string, enum: [applied, skipped, failed] }
        message:   { type: string, nullable: true }
        createdId: { type: string, nullable: true }
    EmailProposalList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailProposal" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    EmailProposalSummaryEntry:
      type: object
      required: [kind, pending]
      properties:
        kind:    { $ref: "#/components/schemas/EmailProposalKind" }
        pending: { type: integer }
    EmailProposalSummary:
      type: object
      required: [byKind, totalPending]
      properties:
        byKind:        { type: array, items: { $ref: "#/components/schemas/EmailProposalSummaryEntry" } }
        totalPending:  { type: integer }
    EmailProposalActionFailed:
      # Returned with status 422 when an accept dispatched but one of the
      # apply actions failed. The proposal stays pending (the route's
      # transaction rolls back the row's status change too) and partial
      # action results are surfaced so the UI can show what did/didn't run.
      type: object
      required: [error, message, failedAction, attemptedResults]
      properties:
        error:            { type: string, enum: [action_failed] }
        message:          { type: string }
        failedAction:     { type: string }
        attemptedResults: { type: array, items: { type: object, additionalProperties: true } }
    AcceptEmailProposalBody:
      # All fields optional — the accept handler is per-kind and reads only
      # what's relevant. e.g. signature_update may receive {applyTitle:true,
      # applyPhone:false} to opt into individual field copies; auto_responder_move
      # may receive {newPrimaryFunderId} to override the parsed company guess.
      # `reviewerNote` is recognized for every kind and stored on the
      # proposal row for prompt-tuning feedback.
      type: object
      additionalProperties: true
      properties:
        reviewerNote: { type: string, nullable: true }
        selectedActionIndexes:
          # Optional subset of the stored proposedActions to apply, by
          # zero-based index into the proposal's proposedActions array.
          # Omit the field entirely to apply ALL actions (backward
          # compatible with older clients). An empty array applies no
          # actions but still marks the proposal resolved/applied.
          # Ignored by the thank_you_acknowledgment branch, which has no
          # proposedActions list.
          type: array
          nullable: true
          items: { type: integer }
    RejectEmailProposalBody:
      # Optional reviewer feedback captured at reject time. The whole
      # body is optional so existing clients that POST with no body keep
      # working unchanged.
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }
    ReviseEmailProposalBody:
      # The reviewer's plain-English correction (e.g. "that's an invalid
      # email for him — mark it invalid and make the jfk@ one primary").
      # Required and non-empty: the whole point of this endpoint is to
      # re-run the AI with the reviewer's guidance folded in.
      type: object
      required: [reviewerGuidance]
      properties:
        reviewerGuidance: { type: string, minLength: 1 }

    # ─── Task intelligence ──────────────────────────────────────────────────────
    TaskProposalStatus:
      type: string
      enum: [pending, accepted, dismissed]
    TaskProposal:
      type: object
      required: [id, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                   { type: string }
        status:               { $ref: "#/components/schemas/TaskProposalStatus" }
        targetPersonId:       { type: string, nullable: true }
        targetOrganizationId: { type: string, nullable: true }
        # Signal bundle the AI reasoned over (recent gifts, open
        # opportunities, last-contact dates, capacity/priority, media).
        payload:              { type: object, additionalProperties: true }
        title:                { type: string, nullable: true }
        description:          { type: string, nullable: true }
        suggestedDueDate:     { type: string, format: date, nullable: true }
        rationale:            { type: string, nullable: true }
        # analyzedAt IS NULL means generation is still in flight.
        analyzedAt:           { type: string, format: date-time, nullable: true }
        model:                { type: string, nullable: true }
        error:                { type: string, nullable: true }
        dedupeKey:            { type: string }
        acceptedTaskId:       { type: string, nullable: true }
        reviewerNote:         { type: string, nullable: true }
        resolvedAt:           { type: string, format: date-time, nullable: true }
        resolvedByUserId:     { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }
    TaskProposalResponse:
      # `data` is null when the entity is low-priority (skipped) or has no
      # suggestion yet.
      type: object
      required: [data]
      properties:
        data: { allOf: [ { $ref: "#/components/schemas/TaskProposal" } ], nullable: true }
    RefreshTaskProposalBody:
      # Provide exactly one of personId / organizationId.
      type: object
      properties:
        personId:       { type: string }
        organizationId: { type: string }
    AcceptTaskProposalBody:
      # All optional. assigneeUserId optionally assigns the created task;
      # reviewerNote is stored on the proposal for feedback.
      type: object
      properties:
        assigneeUserId: { type: string, nullable: true }
        reviewerNote:   { type: string, nullable: true }
    AcceptTaskProposalResult:
      type: object
      required: [proposal, task]
      properties:
        proposal: { $ref: "#/components/schemas/TaskProposal" }
        task:     { $ref: "#/components/schemas/Task" }
    DismissTaskProposalBody:
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }
    ReviseTaskProposalBody:
      # The reviewer's plain-English correction (e.g. "this prospect already
      # gave this year — suggest a stewardship thank-you instead of an ask").
      # Required and non-empty: the whole point of this endpoint is to re-run
      # the suggestion with the reviewer's guidance folded in.
      type: object
      required: [reviewerGuidance]
      properties:
        reviewerGuidance: { type: string, minLength: 1 }

    # ─── Email-intelligence admin console ──────────────────────────────────────
    EmailIntelPromptStatus:
      type: string
      enum: [active, draft, archived]
    EmailIntelPromptOrigin:
      type: string
      enum: [hand_edited, ai_generated, reverted]
    EmailIntelSignalType:
      # The kind of detected signal a review prompt is scoped to. The
      # `bounce` value covers both bounce_invalid and bounce_soft proposal
      # kinds. `wildflower_update` is intentionally absent — it is
      # AI-generated, not regex-detected, and stays outside this review model.
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce, signature_update, grant_opportunity, thank_you_acknowledgment]
    EmailIntelReviewPhase:
      # `accuracy`   — judge whether the detected signal is actually correct.
      # `suppression` — even when accurate, decide if it is worth a human's time.
      type: string
      enum: [accuracy, suppression]
    EmailIntelPrompt:
      type: object
      required: [id, promptText, status, origin, createdAt, updatedAt]
      properties:
        id:           { type: string }
        promptText:   { type: string }
        status:       { $ref: "#/components/schemas/EmailIntelPromptStatus" }
        origin:       { $ref: "#/components/schemas/EmailIntelPromptOrigin" }
        # signalType + reviewPhase identify which review prompt this version
        # belongs to. Nullable only for legacy combined-prompt rows retained
        # as history; every new row is keyed.
        signalType:   { allOf: [ { $ref: "#/components/schemas/EmailIntelSignalType" } ], nullable: true }
        reviewPhase:  { allOf: [ { $ref: "#/components/schemas/EmailIntelReviewPhase" } ], nullable: true }
        authorUserId: { type: string, nullable: true }
        authorName:   { type: string, nullable: true }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    EmailIntelPromptKey:
      # The full state for a single (signal type, review phase) review
      # prompt: the live active version (omitted while on the built-in
      # default), any outstanding AI draft awaiting review, the archived
      # version history (newest first), and the built-in default text.
      type: object
      required: [signalType, reviewPhase, history, default, usingDefault]
      properties:
        signalType:   { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase:  { $ref: "#/components/schemas/EmailIntelReviewPhase" }
        active:       { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        draft:        { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        history:      { type: array, items: { $ref: "#/components/schemas/EmailIntelPrompt" } }
        default:      { type: string, description: "Built-in default review prompt text for this key (used when no active version exists)." }
        usingDefault: { type: boolean, description: "True when no saved active version exists for this key and the pipeline is on the built-in default." }
    EmailIntelPromptConsole:
      # All review-prompt keys (one per signal type × review phase) the admin
      # console renders in one fetch. The hidden action-proposing core prompt
      # is never returned here — admins cannot see or edit it.
      type: object
      required: [keys]
      properties:
        keys: { type: array, items: { $ref: "#/components/schemas/EmailIntelPromptKey" } }
    SaveEmailIntelPromptBody:
      type: object
      required: [signalType, reviewPhase, promptText]
      properties:
        signalType:  { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase: { $ref: "#/components/schemas/EmailIntelReviewPhase" }
        promptText:  { type: string, minLength: 1 }
    GenerateEmailIntelPromptBody:
      type: object
      required: [signalType, reviewPhase]
      properties:
        signalType:  { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase: { $ref: "#/components/schemas/EmailIntelReviewPhase" }
    EmailIntelFeedbackAction:
      type: object
      required: [type, reason]
      properties:
        type:   { type: string }
        reason: { type: string }
    EmailIntelFeedbackItem:
      type: object
      required: [id, kind, status, mailboxUserId, proposedActions, createdAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/EmailProposalKind" }
        status:           { $ref: "#/components/schemas/EmailProposalStatus" }
        reviewerNote:     { type: string, nullable: true }
        mailboxUserId:    { type: string }
        mailboxUserName:  { type: string, nullable: true }
        resolvedByUserId: { type: string, nullable: true }
        resolverName:     { type: string, nullable: true }
        resolvedAt:       { type: string, format: date-time, nullable: true }
        subjectName:      { type: string, nullable: true }
        subjectEmail:     { type: string, nullable: true }
        proposedActions:  { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackAction" } }
        createdAt:        { type: string, format: date-time }
        emailSentAt:      { type: string, format: date-time, nullable: true }
    EmailIntelFeedbackList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackItem" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    UnrecognizedCorrespondent:
      type: object
      required: [emailAddress, threadCount, firstSeenAt, lastSeenAt]
      properties:
        emailAddress: { type: string }
        displayName:  { type: string, nullable: true }
        domain:       { type: string, nullable: true }
        threadCount:  { type: integer }
        firstSeenAt:  { type: string, format: date-time }
        lastSeenAt:   { type: string, format: date-time }
        lastSubject:  { type: string, nullable: true }
    UnrecognizedCorrespondentList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/UnrecognizedCorrespondent" } }
    CreateCorrespondentIgnoreBody:
      type: object
      required: [emailAddress]
      properties:
        emailAddress: { type: string }

    # ─── Notes ───────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, body, authorUserId, createdAt, updatedAt]
      properties:
        id:              { type: string }
        body:            { type: string }
        authorUserId:    { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    NoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Note" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateNoteBody:
      type: object
      required: [body]
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateNoteBody:
      type: object
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Media mentions ────────────────────────────────────────────────────────
    MediaMention:
      type: object
      required: [id, publicationName, url, pinned, dismissed, createdAt, updatedAt]
      properties:
        id:              { type: string }
        publicationName: { type: string }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        # Soft-delete tombstone. Dismissed mentions are never returned by the
        # list endpoint; the field is exposed for completeness on single-row
        # reads. DELETE marks this true instead of removing the row.
        dismissed:       { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    MediaMentionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MediaMention" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    MediaMentionInput:
      type: object
      required: [publicationName, url]
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string }
        author:          { type: string }
        publicationDate: { type: string, format: date }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string }
        source:          { type: string }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
    MediaMentionUpdate:
      type: object
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }

    # ─── Tasks ───────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [open, waiting, done, cancelled]
    TaskKind:
      type: string
      enum: [general, reporting_deadline, thank_you_followup]
    Task:
      type: object
      required: [id, title, status, kind, createdByUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string }
        description:      { type: string, nullable: true }
        dueDate:          { type: string, format: date, nullable: true }
        kind:             { $ref: "#/components/schemas/TaskKind" }
        status:           { $ref: "#/components/schemas/TaskStatus" }
        completedAt:      { type: string, format: date-time, nullable: true }
        assigneeUserId:   { type: string, nullable: true }
        createdByUserId:  { type: string }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        opportunityIds:   { type: array, items: { type: string }, nullable: true }
        giftIds:          { type: array, items: { type: string }, nullable: true }
        grantLeadIds:     { type: array, items: { type: string }, nullable: true }
        mentionUserIds:   { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    TaskList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Task" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateTaskBody:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        description:     { type: string }
        dueDate:         { type: string, format: date }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        grantLeadIds:    { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateTaskBody:
      type: object
      properties:
        title:           { type: string }
        description:     { type: string, nullable: true }
        dueDate:         { type: string, format: date, nullable: true }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string, nullable: true }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        grantLeadIds:    { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Grant Leads ──────────────────────────────────────────────────────────
    GrantLeadStatus:
      type: string
      enum: [new, claimed, converted, archived]
    GrantLeadSighting:
      type: object
      required: [id, grantLeadId, mailboxUserId, createdAt]
      properties:
        id:              { type: string }
        grantLeadId:     { type: string }
        mailboxUserId:   { type: string }
        mailboxUserName: { type: string, nullable: true, description: "Denormalized display name of the mailbox user." }
        gmailMessageId:  { type: string, nullable: true }
        emailMessageId:  { type: string, nullable: true }
        emailSentAt:     { type: string, format: date-time, nullable: true }
        createdAt:       { type: string, format: date-time }
    GrantLead:
      type: object
      required: [id, dedupeKey, status, title, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        dedupeKey:                { type: string }
        status:                   { $ref: "#/components/schemas/GrantLeadStatus" }
        title:                    { type: string }
        funderName:               { type: string, nullable: true }
        targetOrganizationId:     { type: string, nullable: true }
        targetOrganizationName:   { type: string, nullable: true, description: "Denormalized name of the matched CRM organization." }
        deadline:                 { type: string, nullable: true }
        amount:                   { type: string, nullable: true }
        url:                      { type: string, nullable: true }
        snippet:                  { type: string, nullable: true }
        assigneeUserId:           { type: string, nullable: true }
        assigneeUserName:         { type: string, nullable: true, description: "Denormalized display name of the assignee." }
        claimedAt:                { type: string, format: date-time, nullable: true }
        convertedAt:              { type: string, format: date-time, nullable: true }
        convertedByUserId:        { type: string, nullable: true }
        convertedOpportunityId:   { type: string, nullable: true }
        archivedAt:               { type: string, format: date-time, nullable: true }
        archivedByUserId:         { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
        sightingCount:            { type: integer, description: "Number of inboxes that received this lead." }
        sightingUserIds:          { type: array, items: { type: string }, description: "Mailbox user IDs who received this lead (for display)." }
    GrantLeadDetail:
      allOf:
        - { $ref: "#/components/schemas/GrantLead" }
        - type: object
          required: [sightings]
          properties:
            sightings: { type: array, items: { $ref: "#/components/schemas/GrantLeadSighting" } }
    GrantLeadList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GrantLead" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    AssignGrantLeadBody:
      type: object
      required: [assigneeUserId]
      properties:
        assigneeUserId: { type: string, nullable: true, description: "Set to null to unassign." }
    SplitGrantLeadBody:
      type: object
      required: [newTitle]
      properties:
        newTitle:      { type: string, description: "Title for the newly created split-off lead." }
        newFunderName: { type: string, description: "Funder name for the split-off lead (optional)." }
    SplitGrantLeadResponse:
      type: object
      required: [original, splitOff]
      properties:
        original: { $ref: "#/components/schemas/GrantLead" }
        splitOff: { $ref: "#/components/schemas/GrantLeadDetail" }
    ConvertGrantLeadBody:
      type: object
      properties:
        organizationId:           { type: string, description: "Donor org (Donor XOR)." }
        individualGiverPersonId:  { type: string, description: "Individual donor (Donor XOR)." }
        householdId:              { type: string, description: "Household donor (Donor XOR)." }
        ownerUserId:              { type: string, description: "Opportunity owner (defaults to caller)." }
        name:                     { type: string, description: "Opportunity name (defaults to lead title)." }
        askAmount:                { type: string, description: "Ask amount in decimal string form." }
        applicationDeadline:      { type: string, format: date, description: "Application deadline (defaults to lead deadline)." }
    ConvertGrantLeadResponse:
      type: object
      required: [grantLead, opportunity]
      properties:
        grantLead:   { $ref: "#/components/schemas/GrantLead" }
        opportunity: { type: object, description: "The newly created opportunity row." }

    # ─── Meeting notes ────────────────────────────────────────────────────────
    MeetingActionItem:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        assigneeName:    { type: string, nullable: true, description: "Free-text assignee name as extracted from the transcript." }
        dueDate:         { type: string, format: date, nullable: true }
        promotedTaskId:  { type: string, nullable: true, description: "Set after this item was promoted into a task via /promote-action-item." }
    MeetingNote:
      type: object
      required: [id, meetingDate, summaryOnly, creatorUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string, nullable: true }
        meetingDate:      { type: string, format: date-time }
        attendees:        { type: array, items: { type: string }, nullable: true }
        rawTranscript:    { type: string, nullable: true, description: "Always null when summaryOnly is true." }
        summaryOnly:      { type: boolean, description: "Snapshot of the creator's email_sync_mode at create time. When true, the raw transcript was dropped pre-insert." }
        aiSummary:        { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        creatorUserId:    { type: string }
        personId:         { type: string, nullable: true }
        organizationId:         { type: string, nullable: true }
        householdId:      { type: string, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    MeetingNoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MeetingNote" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateMeetingNoteBody:
      type: object
      description: "Exactly one of personId / funderId / householdId must be set (contact XOR). Exactly one of `transcript` or `summary` must be provided — `transcript` runs through AI summarization, `summary` is stored verbatim as the note body (used by the hand-typed-notes flow)."
      properties:
        transcript:      { type: string, description: "Raw pasted transcript. Dropped server-side before insert when the caller's email_sync_mode is summary_only. Runs through AI summarization to produce aiSummary + actionItems." }
        summary:         { type: string, description: "Hand-typed notes. Stored verbatim as aiSummary with no AI processing; no rawTranscript or actionItems are generated. Mutually exclusive with transcript." }
        title:           { type: string }
        meetingDate:     { type: string, format: date-time, description: "Defaults to now if omitted." }
        attendees:       { type: array, items: { type: string } }
        personId:        { type: string }
        organizationId:        { type: string }
        householdId:     { type: string }
    UpdateMeetingNoteBody:
      type: object
      properties:
        title:           { type: string, nullable: true }
        meetingDate:     { type: string, format: date-time }
        attendees:       { type: array, items: { type: string }, nullable: true }
        aiSummary:       { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        personId:        { type: string, nullable: true }
        organizationId:        { type: string, nullable: true }
        householdId:     { type: string, nullable: true }
    PromoteActionItemBody:
      type: object
      required: [index]
      properties:
        index:           { type: integer, description: "Zero-based index into actionItems[]." }
        assigneeUserId:  { type: string, description: "Optional override; the extracted assigneeName is free-text and may not map to a user." }
        dueDate:         { type: string, format: date }

    # ─── Saved views ───────────────────────────────────────────────────────────
    SavedViewVisibility:
      type: string
      enum: [team, individual]
      description: "team = shared with everyone (creator-edit-only); individual = private to creator."
    SavedView:
      type: object
      required: [id, listKey, name, visibility, state, creatorUserId, createdAt, updatedAt]
      properties:
        id:             { type: string }
        listKey:        { type: string }
        name:           { type: string }
        visibility:     { $ref: "#/components/schemas/SavedViewVisibility" }
        state:          { type: object, additionalProperties: true, description: "Opaque page-specific state blob: filters + sort." }
        creatorUserId:  { type: string }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    SavedViewList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/SavedView" } }
    CreateSavedViewBody:
      type: object
      required: [listKey, name, visibility, state]
      properties:
        listKey:    { type: string }
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }
    UpdateSavedViewBody:
      type: object
      description: "Only the creator may PATCH. All fields optional; at least one required."
      properties:
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }

    # ─── Email tracking (Magio-compatible) ─────────────────────────────────
    TrackedEmail:
      type: object
      required: [id, subject, recipient, sender, recipientPersonIds, recipientOrganizationIds, recipientHouseholdIds, createdAt]
      properties:
        id:                       { type: string }
        subject:                  { type: string }
        recipient:                { type: string, description: "Verbatim To: line scraped by the extension, may be a comma list." }
        sender:                   { type: string }
        senderIp:                 { type: string, nullable: true }
        recipientPersonIds:       { type: array, items: { type: string } }
        recipientOrganizationIds:       { type: array, items: { type: string } }
        recipientHouseholdIds:    { type: array, items: { type: string } }
        groupId:                  { type: string, nullable: true, description: "Shared across per-recipient copies of one group send; null for legacy single-pixel sends." }
        gmailMessageId:           { type: string, nullable: true }
        gmailThreadId:            { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        totalViews:               { type: integer, description: "Convenience aggregate; present on list/detail responses." }
        lastView:                 { type: string, format: date-time, nullable: true }
    TrackedEmailView:
      type: object
      required: [id, viewedAt]
      properties:
        id:        { type: string }
        viewedAt:  { type: string, format: date-time }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
    TrackedEmailWithViews:
      allOf:
        - $ref: "#/components/schemas/TrackedEmail"
        - type: object
          required: [totalViews, uniqueIps, views]
          properties:
            totalViews: { type: integer }
            uniqueIps:  { type: integer }
            views:      { type: array, items: { $ref: "#/components/schemas/TrackedEmailView" } }
            recipients:
              type: array
              description: "Per-recipient open breakdown. For a group send this lists every recipient with their own open counts; for a legacy single send it has one entry. Aggregate fields above sum across the group."
              items: { $ref: "#/components/schemas/TrackedEmailRecipient" }
    TrackedEmailRecipient:
      type: object
      required: [id, recipient, totalViews]
      properties:
        id:         { type: string, description: "tracked_emails row id = this recipient's pixel id." }
        recipient:  { type: string }
        totalViews: { type: integer }
        lastView:   { type: string, format: date-time, nullable: true }
    TrackedEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TrackedEmail" } }
    TrackedEmailStatus:
      type: object
      required: [subject, viewCount]
      properties:
        subject:   { type: string }
        viewCount: { type: integer }
    CreateTrackedEmailBody:
      type: object
      required: [subject, recipient, sender]
      description: "Posted by the extension at send-time."
      properties:
        subject:   { type: string }
        recipient: { type: string, description: "Comma- or semicolon-separated address list scraped from compose UI." }
        sender:    { type: string }
    SendTrackedEmailBody:
      type: object
      required: [subject, html, to]
      description: "Posted by the extension for a per-recipient (group) send."
      properties:
        subject:    { type: string }
        html:       { type: string, description: "Composed message body as HTML." }
        to:         { type: array, items: { type: string }, minItems: 1, description: "To: addresses (shown on every copy)." }
        cc:         { type: array, items: { type: string }, description: "Cc: addresses (shown on every copy)." }
        inReplyTo:  { type: string, nullable: true, description: "Message-ID being replied to, for threading." }
        references: { type: string, nullable: true }
    SendTrackedEmailResult:
      type: object
      required: [groupId, recipients]
      properties:
        groupId:  { type: string }
        threadId: { type: string, nullable: true, description: "Shared Gmail thread id for the sent copies." }
        recipients:
          type: array
          items:
            type: object
            required: [id, recipient]
            properties:
              id:        { type: string }
              recipient: { type: string }
    ExtensionTokenResponse:
      type: object
      required: [token]
      properties:
        token: { type: string, nullable: true, description: "Null when the user has not generated a token yet." }

    # ─── Bulk record updates ───────────────────────────────────────────────────
    BulkUpdateResult:
      type: object
      required: [requested, succeededIds, failed]
      properties:
        requested:    { type: integer, description: "Number of ids in the request." }
        succeededIds: { type: array, items: { type: string } }
        failed:
          type: array
          items:
            type: object
            required: [id, message]
            properties:
              id:      { type: string }
              message: { type: string }
    MergeResult:
      type: object
      required: [primaryId, mergedIds]
      properties:
        primaryId: { type: string, description: "The surviving record id." }
        mergedIds: { type: array, items: { type: string }, description: "Duplicate record ids that were merged into the primary and deleted." }
    MergeOrganizationsBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted funder columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    MergePeopleBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted person columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    MergeGiftsBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (losers) into `primaryId` (survivor): the survivor's amount becomes the sum of all selected gifts, every loser's allocation rows move onto the survivor, and the losers are permanently deleted. Exactly one of the donor fields must be set (donor XOR); it is applied to the survivor."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    MergeGiftsIntoPledgeBody:
      type: object
      required: [giftIds]
      description: "Attach `giftIds` to a pledge as its payments (each gift's opportunity_id is set). Provide `pledgeId` to attach to an existing pledge, OR omit it to create a NEW pledge — in which case exactly one donor field must be set (donor XOR) for the new pledge."
      properties:
        giftIds: { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        pledgeId: { type: string, nullable: true, description: "Existing pledge to attach to. Omit/null to create a new pledge." }
        name: { type: string, nullable: true, description: "Name for the new pledge (ignored when pledgeId is set)." }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    MergeIntoPledgeResult:
      type: object
      required: [pledgeId, giftIds, created]
      properties:
        pledgeId: { type: string, description: "The pledge the gifts were attached to." }
        giftIds: { type: array, items: { type: string }, description: "The gift ids attached as payments." }
        created: { type: boolean, description: "True if a new pledge was created, false if an existing one was used." }
    SplitGiftIntoPledgeBody:
      type: object
      description: "Optional overrides when splitting a gift into a pledge. The pledge inherits the gift's donor and uses the gift amount as its awarded amount; each gift_allocation becomes one payment gift."
      properties:
        name: { type: string, nullable: true, description: "Name for the new pledge. Defaults to the gift's name." }
    RevertGiftToOpportunityBody:
      type: object
      description: "Options for reverting a gift back into an opportunity. The new record inherits the gift's donor and amount; the gift's allocations are mirrored onto pledge_allocations and the gift is archived."
      properties:
        asPledge: { type: boolean, default: false, description: "When true the new record is a written PLEDGE (writtenPledge=true); otherwise an open opportunity." }
        name: { type: string, nullable: true, description: "Name for the new opportunity/pledge. Defaults to the gift's name." }
    RevertGiftToOpportunityResult:
      type: object
      required: [opportunityId, asPledge]
      properties:
        opportunityId: { type: string, description: "Id of the newly created opportunities_and_pledges row." }
        asPledge:      { type: boolean, description: "Whether the new record was created as a written pledge." }
    BulkArchiveBody:
      type: object
      required: [ids]
      description: "Ids of the records to archive (soft-delete). Stamps archived_at on each row instead of removing it. Processed per-row; the response reports which ids succeeded and which failed (with a reason)."
      properties:
        ids: { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
    BulkUpdatePeoplePatch:
      type: object
      description: "Only fields present here are written. All fields are optional and forward-only — omit to leave unchanged."
      properties:
        ownerUserId:         { type: string, nullable: true }
        currentHomeRegionId: { type: string, nullable: true }
        capacityRating:      { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        connectionStatus:    { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        enthusiasm:          { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:            { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        deceased:            { type: boolean }
        newsletter:          { type: boolean, description: "Newsletter subscription flag. Changes are mirrored out to Flodesk (precedence rules apply — a Flodesk unsubscribe still wins)." }
        interestsThematic:
          type: array
          items: { type: string }
          description: "Thematic-interest tags on each person (people.interests_thematic). Combined with interestsThematicMode."
        interestsThematicMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite the person's interests_thematic with this set (DESTRUCTIVE). append = union this set into the existing tags."
        interestsAges:
          type: array
          items: { type: string }
          description: "Age-band interest tags on each person (people.interests_ages). Combined with interestsAgesMode."
        interestsAgesMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        interestsGovModels:
          type: array
          items: { type: string }
          description: "Governance-model interest tags on each person (people.interests_gov_models). Combined with interestsGovModelsMode."
        interestsGovModelsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        regionIds:
          type: array
          items: { type: string }
          description: "Region-interest ids on each person (people.region_ids). Combined with regionIdsMode."
        regionIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing ids."
    BulkUpdatePeopleBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdatePeoplePatch" }
    BulkUpdateOrganizationsPatch:
      type: object
      properties:
        ownerUserId:          { type: string, nullable: true }
        activeStatus:         { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        connectionStatus:     { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        capacityRating:       { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        enthusiasm:           { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:             { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        strategicAlignment:   { allOf: [ { $ref: "#/components/schemas/StrategicAlignment" } ], nullable: true }
        entityType:           { type: string, nullable: true }
        issuesGrants:         { type: boolean }
        makesPris:            { type: boolean, nullable: true }
        interestsThematic:
          type: array
          items: { type: string }
          description: "Thematic-interest tags on each organization (organizations.interests_thematic). Combined with interestsThematicMode."
        interestsThematicMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite the organization's interests_thematic with this set (DESTRUCTIVE). append = union this set into the existing tags."
        interestsAges:
          type: array
          items: { type: string }
          description: "Age-band interest tags on each organization (organizations.interests_ages). Combined with interestsAgesMode."
        interestsAgesMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        interestsGovModels:
          type: array
          items: { type: string }
          description: "Governance-model interest tags on each organization (organizations.interests_gov_models). Combined with interestsGovModelsMode."
        interestsGovModelsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        regionIds:
          type: array
          items: { type: string }
          description: "Region-interest ids on each organization (organizations.region_ids). Combined with regionIdsMode."
        regionIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing ids."
    BulkUpdateOrganizationsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOrganizationsPatch" }
    BulkUpdateHouseholdsPatch:
      type: object
      properties:
        active: { type: boolean }
    BulkUpdateHouseholdsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateHouseholdsPatch" }
    BulkUpdateOpportunitiesPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        lossType:    { allOf: [ { $ref: "#/components/schemas/OpportunityLossType" } ], nullable: true }
        stage:       { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        writtenPledge:   { type: boolean, nullable: true }
        actualCompletionDate: { type: string, format: date, nullable: true, description: "Optional close date when bulk-setting lossType to lost (or stage to cash_in). Left null is allowed to support historical cleanup workflows." }
        projectedCloseDate:   { type: string, format: date, nullable: true, description: "Projected close date on each opportunity." }
        applicationDeadline:  { type: string, format: date, nullable: true, description: "Application deadline on each opportunity." }
        entities:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each opportunity via pledge_allocations. Combined with entitiesMode."
        entitiesMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe pledge_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        coveredFiscalYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs (e.g. 'fy2026') to attach to each opportunity via pledge_allocations. Combined with coveredFiscalYearsMode."
        coveredFiscalYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe existing pledge_allocations on each opp and recreate one minimal row per FY (DESTRUCTIVE: loses subAmount/intendedUsage on those rows). append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every pledge_allocations row of each opportunity. Existing allocation rows are updated to this value; if an opportunity has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every pledge_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateOpportunitiesBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOpportunitiesPatch" }
    BulkUpdateGiftsPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentMethod: { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        dateReceived:  { type: string, format: date, nullable: true, description: "Date the gift/payment was received." }
        entityIds:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each gift via gift_allocations. Combined with entityIdsMode."
        entityIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        grantYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs to attach via gift_allocations. Combined with grantYearsMode."
        grantYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose grant_year is set (DESTRUCTIVE) and recreate one minimal row per FY. append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every gift_allocations row of each gift. Existing allocation rows are updated to this value; if a gift has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every gift_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateGiftsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateGiftsPatch" }

    # ─── Person suppression windows ──────────────────────────────────────────
    PersonSuppressionWindow:
      type: object
      required: [id, personId, createdAt, updatedAt]
      properties:
        id:        { type: string }
        personId:  { type: string }
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PersonSuppressionWindowList:
      type: object
      required: [data, staffDefaultSuppressed]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/PersonSuppressionWindow" } }
        staffDefaultSuppressed:
          type: boolean
          description: >-
            True when this person is permanently suppressed from email/calendar
            sync BY DEFAULT because they own a Wildflower staff email (internal
            domain) and have no explicit suppression window. Adding any window
            overrides the default (then only the window dates govern). Only
            meaningful for a single-person listing; false for the admin
            all-windows listing.
    CreatePersonSuppressionWindowBody:
      type: object
      required: [personId]
      properties:
        personId:  { type: string }
        notes:     { type: string }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    UpdatePersonSuppressionWindowBody:
      type: object
      properties:
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }

    # ─── Calendar meeting-filter config ──────────────────────────────────────
    CalendarMeetingFiltersConfig:
      type: object
      required: [titlePatterns, attendeeCountCutoff, updatedAt]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }
        updatedAt:          { type: string, format: date-time, nullable: true }
    UpdateCalendarMeetingFiltersBody:
      type: object
      required: [titlePatterns, attendeeCountCutoff]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }

    # ─── Internal staff email-domain config ──────────────────────────────────
    InternalEmailDomainsConfig:
      type: object
      required: [domains, updatedAt]
      properties:
        domains:   { type: array, items: { type: string } }
        updatedAt: { type: string, format: date-time, nullable: true }
    UpdateInternalEmailDomainsBody:
      type: object
      required: [domains]
      properties:
        domains: { type: array, items: { type: string } }

    # ─── Wildflower updates (shared admin-editable note) ─────────────────────
    WildflowerUpdateConfig:
      type: object
      required: [content, updatedAt]
      properties:
        content:         { type: string }
        updatedAt:       { type: string, format: date-time }
        updatedByUserId: { type: string, nullable: true }
    UpdateWildflowerUpdateBody:
      type: object
      required: [content]
      properties:
        content: { type: string }

    # ─── Audit log ────────────────────────────────────────────────────────────
    AuditChange:
      type: object
      required: [field]
      properties:
        field: { type: string }
        from: {}
        to: {}
    AuditLogEntry:
      type: object
      required: [id, action, entityType, entityId, createdAt]
      properties:
        id:          { type: string }
        actorUserId: { type: ["string", "null"] }
        actorName:   { type: ["string", "null"] }
        actorEmail:  { type: ["string", "null"] }
        action:      { type: string }
        entityType:  { type: string }
        entityId:    { type: string }
        summary:     { type: ["string", "null"] }
        changes:
          type: ["array", "null"]
          items: { $ref: "#/components/schemas/AuditChange" }
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:   { type: string, format: date-time }
    AuditLogList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Admin: offboarding / owner reassignment ───────────────────────────────
    OwnedRecordCounts:
      type: object
      required: [people, organizations, opportunities, gifts, interactions, tasks, grantLeads, total]
      properties:
        people:        { type: integer }
        organizations: { type: integer }
        opportunities: { type: integer }
        gifts:         { type: integer }
        interactions:  { type: integer }
        tasks:         { type: integer, description: "Tasks assigned to the user (assignee_user_id). Task authorship (created_by_user_id) is left untouched." }
        grantLeads:    { type: integer, description: "Grant leads claimed by the user (assignee_user_id)." }
        total:         { type: integer }
    ReassignOwnerBody:
      type: object
      required: [fromUserId, toUserId]
      properties:
        fromUserId:    { type: string, description: "The departing/source user whose records will be reassigned." }
        toUserId:      { type: string, description: "The user who will own the records afterward. Must be active (not archived)." }
        archiveSource: { type: boolean, default: false, description: "When true, archive the source user after a successful reassignment (offboarding)." }
    ReassignOwnerResult:
      type: object
      required: [reassigned, archivedSource]
      properties:
        reassigned:     { $ref: "#/components/schemas/OwnedRecordCounts" }
        archivedSource: { type: boolean, description: "True if the source user was archived as part of this call." }
