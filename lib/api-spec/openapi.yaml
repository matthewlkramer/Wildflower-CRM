        - { name: action, in: query, required: false, description: "Filter to one action (create/update/archive/unarchive/merge/bulk_update/bulk_archive).", schema: { type: string } }
        - { name: search, in: query, required: false, description: "Case-insensitive partial match across the entry summary, the actor's name/email, and the recorded field changes.", schema: { type: string } }
        - { name: dateFrom, in: query, required: false, description: "Inclusive lower bound — only entries on or after the start of this America/Chicago calendar day.", schema: { type: string, format: date } }
        - { name: dateTo, in: query, required: false, description: "Inclusive upper bound — only entries on or before the end of this America/Chicago calendar day.", schema: { type: string, format: date } }
