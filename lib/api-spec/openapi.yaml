    # ─── QuickBooks payment sync ──────────────────────────────────────────────
    QuickbooksEntityType: { type: string, enum: [sales_receipt, payment, deposit] }
    QuickbooksPayerType: { type: string, enum: [vendor, customer, employee], description: "The QuickBooks payer/entity kind behind this incoming money (Customer for a SalesReceipt/Payment, or the deposit line's Entity ref). Null when QuickBooks recorded no entity (e.g. a bare deposit line)." }
    StagedPaymentStatus: { type: string, enum: [pending, match_proposed, match_confirmed, excluded], description: "DERIVED lifecycle of a staged payment / Stripe charge — computed from the row's facts (gift links + match_confirmed_at + exclusion_reason), never stored. pending: no gift link. match_proposed: a system-applied gift link awaits human review. match_confirmed: human-owned — the evidence row is tied to a CRM gift (it is NOT itself a gift and is NEVER archived). excluded: filed as non-gift money. Shared by QuickBooks staged_payments and Stripe staged charges." }
    StagedPaymentExclusionReason: { type: string, enum: [zero_amount, membership, interest, tax_refund, other_revenue, earned_income, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire, processor_payout, loan_repayment, loan_proceeds, note_payable, miscoded_withdrawal, failed_charge, refunded_charge, loan, government_reimbursement, fiscally_sponsored], description: "Why a staged QuickBooks payment / Stripe charge was filtered from the queue. failed_charge is Stripe-only (charge never settled; auto-set at ingest). refunded_charge is auto-set on fully-refunded money never booked into a CRM gift (a Stripe charge with no gift link, or a QB staged payment whose whole Stripe trace is such charges); charges with a gift link take the refund-propagation path instead. loan / government_reimbursement / fiscally_sponsored are LEGACY (no longer produced; retained for historical rows)." }
    StagedPaymentMatchStatus: { type: string, enum: [matched, suggested, unmatched] }
    StagedPaymentMatchMethod: { type: string, enum: [email, name, name_amount_date, amount_date, memo, intermediary, manual] }
    StagedPaymentClassificationSource: { type: string, enum: [auto, manual] }
    StagedPaymentEntitySource: { type: string, enum: [auto, manual], description: "Whether the Wildflower-entity attribution was derived by detectEntity (auto) or pinned by a human (manual). A manual attribution survives every re-sync / reclassify." }
    StagedPaymentFundingSource: { type: string, enum: [stripe, brokerage, daf, donorbox, paypal, wire_ach, check, cash, employer_match, other], description: "WHERE the incoming money came from / how it rendered. A first-class origin dimension, DISTINCT from qbPaymentMethod (the QB instrument like Visa/Check) and from the derived reconciliation funding lane (reconcile progress, not origin). Auto-seeded at ingest by detectFundingSource and human-correctable. other = a known origin outside this list." }
    StagedPaymentFundingSourceProvenance: { type: string, enum: [auto, manual], description: "Whether fundingSource was derived by detectFundingSource (auto) or pinned by a human (manual). A manual value survives every re-sync / reclassify." }
    StagedPaymentQueue: { type: string, enum: [needs_review, auto_matched, excluded, done, refund_review], description: "Derived queue bucket. needs_review: pending rows. auto_matched: match_proposed (a system-applied gift link awaiting review). done: match_confirmed evidence rows tied to a CRM gift — hidden from the active work queues but filterable on demand. refund_review: a Stripe-only cross-cutting filter (independent of status) for charges with an open refund/chargeback proposal awaiting confirm/dismiss — never emitted as a row's derived bucket." }
    StripeRefundPropagationStatus: { type: string, enum: [none, proposed, applied, dismissed], description: "Lifecycle of a Stripe refund/chargeback proposal against a charge already booked into a CRM gift (INV-13). none: no refund/dispute or no linked gift. proposed: detected, awaiting human confirm. applied: human confirmed (gift reversed/reduced). dismissed: human declined to propagate." }
    StripeRefundKind: { type: string, enum: [full_refund, partial_refund, chargeback], description: "Kind of Stripe reversal. full_refund/chargeback reverse (archive) the gift; partial_refund reduces the gift amount." }
    QuickbooksStagedPaymentQueue: { type: string, enum: [needs_review, fiscally_sponsored, auto_matched, excluded, done], description: "QuickBooks staged-payment queue buckets. Adds the fiscally_sponsored parking queue (entity-attributed sponsored money split out of needs_review) to the shared buckets; no refund_review (Stripe-only)." }
    ReconciliationCardQueue: { type: string, enum: [needs_review, fiscally_sponsored, auto_matched, excluded, done], description: "Queue buckets accepted by the reconciliation cards endpoint query param. Mirrors QuickbooksStagedPaymentQueue but kept as its own schema so card-only query filters never leak into the staged-payment response queue enum." }
    StagedPaymentSort: { type: string, enum: [date_desc, date_asc, amount_desc, amount_asc, payer_asc, payer_desc] }
    GiftSort: { type: string, enum: [date_desc, date_asc, amount_desc, amount_asc] }
    QuickbooksOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has QUICKBOOKS_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "An active, non-revoked company grant exists" }
        realmId:      { type: string, nullable: true }
        companyName:  { type: string, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }
    QuickbooksSyncSummary:
      type: object
      required: [ran, pulled, staged, matched, autoApplied]
      properties:
        ran:         { type: boolean, description: "False when the sync was skipped (lock contended)." }
        pulled:      { type: integer }
        staged:      { type: integer }
        matched:     { type: integer }
        autoApplied: { type: integer, description: "Newly-staged rows auto-reconciled or auto-minted at high confidence." }
    QuickbooksResyncStatus:
      type: object
      required: [status, startedAt, finishedAt, summary, error]
      properties:
        status:
          type: string
          enum: [idle, running, done, error]
          description: "Lifecycle of the background full re-pull. 'idle' = none has run since boot; 'running' = in progress; 'done'/'error' = last run outcome."
        startedAt:  { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
        summary:
          oneOf: [ { $ref: "#/components/schemas/QuickbooksSyncSummary" } ]
          nullable: true
          description: "Result of the last completed run (null while running / before any run)."
        error:      { type: string, nullable: true, description: "Error message when status is 'error'." }
    QuickbooksRematchSummary:
      type: object
      required: [ran, scanned, matched]
      properties:
        ran:     { type: boolean, description: "False when the rematch was skipped (a sync/rematch was already running)." }
        scanned: { type: integer, description: "Candidate rows examined (pending + unmatched + no donor)." }
        matched: { type: integer, description: "Rows newly given a donor hint by this run." }
    QuickbooksReclassifySummary:
      type: object
      required: [ran, scanned, excluded, included]
      properties:
        ran:      { type: boolean, description: "False when the reclassify was skipped (a sync/rematch/reclassify was already running)." }
        scanned:  { type: integer, description: "Auto-classified pending/excluded rows examined." }
        excluded: { type: integer, description: "Rows newly moved to excluded by this run." }
        included: { type: integer, description: "Rows newly restored to pending by this run." }
    QuickbooksRuleAction: { type: string, enum: [exclude, auto_create_approve] }
    QuickbooksRuleConditionField: { type: string, enum: [payer_name, line_item_name, line_account_name, memo_reference, line_description, qb_class, any_text, amount] }
    QuickbooksRuleConditionMode: { type: string, enum: [contains, exact, prefix, regex, lte] }
    QuickbooksRuleMatchLogic: { type: string, enum: [any, all] }
    QuickbooksRuleCondition:
      type: object
      required: [field, mode, value]
      properties:
        field: { $ref: "#/components/schemas/QuickbooksRuleConditionField" }
        mode:  { $ref: "#/components/schemas/QuickbooksRuleConditionMode" }
        value: { type: string, description: "Match value. For mode=lte this is a numeric threshold (as a string); for regex it is a JS regex source; otherwise a literal compared case-insensitively." }
    QuickbooksHandlingRule:
      type: object
      required: [id, name, enabled, priority, action, donationGuard, matchLogic, conditions, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        enabled:                  { type: boolean }
        priority:                 { type: integer, description: "Ascending evaluation order; first matching enabled rule wins." }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Required when action=exclude." }
        donationGuard:            { type: boolean, description: "When true, the rule is suppressed on rows carrying a real donation line." }
        matchLogic:               { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true, description: "Donor org for the minted gift (action=auto_create_approve)." }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true, description: "Allocation intended usage (action=auto_create_approve)." }
        targetFundableProjectId:  { type: string, nullable: true, description: "Specific fundable project, only when targetIntendedUsage=project." }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    CreateQuickbooksRuleBody:
      type: object
      required: [name, action, conditions]
      properties:
        name:                     { type: string, minLength: 1 }
        enabled:                  { type: boolean, description: "Defaults to true." }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true }
        donationGuard:            { type: boolean, description: "Defaults to false." }
        matchLogic:               { allOf: [ { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" } ], description: "Defaults to any." }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        targetFundableProjectId:  { type: string, nullable: true }
    UpdateQuickbooksRuleBody:
      type: object
      properties:
        name:                     { type: string, minLength: 1 }
        enabled:                  { type: boolean }
        action:                   { $ref: "#/components/schemas/QuickbooksRuleAction" }
        exclusionReason:          { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true }
        donationGuard:            { type: boolean }
        matchLogic:               { $ref: "#/components/schemas/QuickbooksRuleMatchLogic" }
        conditions:               { type: array, items: { $ref: "#/components/schemas/QuickbooksRuleCondition" } }
        targetOrganizationId:     { type: string, nullable: true }
        targetIntendedUsage:      { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        targetFundableProjectId:  { type: string, nullable: true }
    ReorderQuickbooksRulesBody:
      type: object
      required: [ids]
      properties:
        ids: { type: array, items: { type: string }, description: "All rule ids in the desired evaluation order." }
    ApplyRuleToPendingBody:
      type: object
      required: [dryRun]
      properties:
        dryRun: { type: boolean, description: "When true, counts matching pending rows without applying any changes." }
    ApplyRuleToPendingResult:
      type: object
      required: [matched, excluded, autoCreated, skipped]
      properties:
        matched:     { type: integer, description: "Number of pending rows the rule matches (preview count when dryRun=true)." }
        excluded:    { type: integer, description: "Rows marked excluded (0 when dryRun=true)." }
        autoCreated: { type: integer, description: "Gifts minted and auto-approved (0 when dryRun=true)." }
        skipped:     { type: integer, description: "Matched rows the rule could not apply to cleanly, left pending (0 when dryRun=true)." }

    # ─── Revenue coding reference & rules ────────────────────────────────────
    RevenueCodingPreview:
      type: object
      required: [objectCode, location, revenueClass, flags]
      description: |
        Live, on-demand revenue-coding instructions derived from an allocation's
        scope (donor kind, fund entity, restriction axes, region). NOT persisted
        on the allocation — a read-only preview the reviewer copies onto the
        linked staged_payments coding snapshot.
      properties:
        objectCode:   { type: string, nullable: true, description: "Derived Object Code (e.g. 4000.1 / 4100.2), or null when it can't be resolved cleanly." }
        location:     { type: string, nullable: true, description: "Derived Revenue Location." }
        revenueClass: { type: string, nullable: true, description: "Derived Suggested Class." }
        revenueType:      { type: string, nullable: true, enum: [grant, donation], description: "Derived revenue type: grant when a grant letter, reporting requirement, or any donor restriction is present; otherwise donation." }
        restrictionType:  { type: string, nullable: true, enum: [Unrestricted, Purpose, Time, Both], description: "Derived restriction label from the three restriction axes (regional/usage ⇒ Purpose, time ⇒ Time)." }
        restrictionEvidence: { type: string, nullable: true, description: "Human-readable restriction evidence hint derived from the axes + verbatim purpose (empty for unrestricted lines)." }
        flags:        { type: array, items: { type: string }, description: "Ambiguities surfaced for human review (e.g. payer_type_assumed, project_location_missing, loan_no_revenue_account). A complete gift derives with zero flags." }
    RevenueExtractorReport:
      type: object
      required: [startDate, endDate, generatedAt, rows]
      properties:
        startDate:   { type: string, format: date }
        endDate:     { type: string, format: date }
        generatedAt: { type: string, format: date-time }
        rows:
          type: array
          items: { $ref: "#/components/schemas/RevenueExtractorRow" }
    RevenueExtractorRow:
      type: object
      description: |
        One Revenue Extractor line — either a gift allocation (isFeeLine=false) or a
        separate negative processor-fee line for a gift (isFeeLine=true). The 19
        report columns are the fields objectCode..sourceFile; the remaining fields
        are keys + the QuickBooks coding comparison (Step 4, QB authoritative).
      required:
        [rowKey, giftId, isFeeLine, objectCode, transactionDate, name, location,
         memoDescription, amount, revenueType, titleReference, periodStart, periodEnd,
         paymentSchedule, restrictionType, purpose, suggestedClass, deferredRevenue,
         restrictionEvidence, questionsFlags, notes, sourceFile, codingDisagreement]
      properties:
        rowKey:          { type: string, description: "Stable key: giftId, giftId:allocationId, or giftId:fee." }
        giftId:          { type: string }
        allocationId:    { type: string, nullable: true, description: "Null on the fee line." }
        isFeeLine:       { type: boolean, description: "True for the separate negative processor-fee line." }
        # ── The 19 report columns ──
        objectCode:      { type: string, nullable: true, description: "Col 1 — derived Object Code." }
        transactionDate: { type: string, format: date, nullable: true, description: "Col 2 — gift date_received." }
        name:            { type: string, nullable: true, description: "Col 3 — donor name, anonymous-masked for non-owners." }
        location:        { type: string, nullable: true, description: "Col 4 — derived Revenue Location." }
        memoDescription: { type: string, nullable: true, description: "Col 5 — gift memo / description." }
        amount:          { type: string, nullable: true, description: "Col 6 — allocation sub_amount; negative on the fee line." }
        revenueType:     { type: string, nullable: true, description: "Col 7 — grant / donation." }
        titleReference:  { type: string, nullable: true, description: "Col 8 — grant title / reference #." }
        periodStart:     { type: string, format: date, nullable: true, description: "Col 9 — allocation spending period start (grant period)." }
        periodEnd:       { type: string, format: date, nullable: true, description: "Col 10 — allocation spending period end." }
        paymentSchedule: { type: string, nullable: true, description: "Col 11 — payment-schedule descriptor (one-time vs pledge installment)." }
        restrictionType: { type: string, nullable: true, description: "Col 12 — Unrestricted / Purpose / Time / Both." }
        purpose:         { type: string, nullable: true, description: "Col 13 — donor's restriction language, verbatim." }
        suggestedClass:  { type: string, nullable: true, description: "Col 14 — derived Suggested Class." }
        deferredRevenue: { type: string, nullable: true, description: "Col 15 — Yes when the booked fiscal year starts after the transaction date, else No." }
        restrictionEvidence: { type: string, nullable: true, description: "Col 16 — restriction evidence hint." }
        questionsFlags:  { type: string, nullable: true, description: "Col 17 — human-readable questions for incomplete gifts (empty when complete)." }
        notes:           { type: string, nullable: true, description: "Col 18 — gift details / free-text notes." }
        sourceFile:      { type: string, nullable: true, description: "Col 19 — provenance of the record (e.g. Wildflower CRM, or the online source URL)." }
        # ── QuickBooks coding comparison (Step 4, QB authoritative) ──
        qbObjectCode:    { type: string, nullable: true, readOnly: true, description: "Object Code from the linked QuickBooks staged-payment coding snapshot (effective = override ?? derived), if any." }
        qbLocation:      { type: string, nullable: true, readOnly: true, description: "Revenue Location from the linked QuickBooks staged-payment coding snapshot." }
        qbClass:         { type: string, nullable: true, readOnly: true, description: "Class from the linked QuickBooks staged-payment coding snapshot." }
        codingDisagreement: { type: boolean, description: "True when the CRM-derived coding disagrees with the linked QuickBooks snapshot (any of object code / location / class). QuickBooks stays authoritative." }
    RevenueAccount:
      type: object
      required: [code, name, kind, sortOrder, active, createdAt, updatedAt]
      properties:
        code:       { type: string, description: "Object Code, e.g. 4000.1 / 4100.2." }
        name:       { type: string }
        kind:       { type: string, enum: [unrestricted, restricted, special] }
        payerType:  { type: string, nullable: true, enum: [individual, foundation, corporation, governmental] }
        sortOrder:  { type: integer }
        active:     { type: boolean }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }
    EntityCodingRule:
      type: object
      required: [entityId, forceRestricted, enabled, createdAt, updatedAt]
      properties:
        entityId:        { type: string, description: "Fund entity id this rule applies to." }
        forceRestricted: { type: boolean, description: "Treat gifts to this entity as purpose-restricted regardless of donor language (fiscal sponsees)." }
        location:        { type: string, nullable: true, description: "Override Location (must be a value in the closed Location list)." }
        revenueClass:    { type: string, nullable: true, description: "Suggested Class." }
        enabled:         { type: boolean }
        notes:           { type: string, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    CreateEntityCodingRuleBody:
      type: object
      required: [entityId]
      properties:
        entityId:        { type: string }
        forceRestricted: { type: boolean, description: "Defaults to false." }
        location:        { type: string, nullable: true }
        revenueClass:    { type: string, nullable: true }
        enabled:         { type: boolean, description: "Defaults to true." }
        notes:           { type: string, nullable: true }
    UpdateEntityCodingRuleBody:
      type: object
      properties:
        forceRestricted: { type: boolean }
        location:        { type: string, nullable: true }
        revenueClass:    { type: string, nullable: true }
        enabled:         { type: boolean }
        notes:           { type: string, nullable: true }
    StagedPayment:
      type: object
      required: [id, realmId, qbEntityType, qbEntityId, status, matchStatus, autoApplied, classificationSource, entitySource, fundingSourceProvenance, createdAt, updatedAt]
      properties:
        id:                        { type: string }
        realmId:                   { type: string }
        qbEntityType:              { $ref: "#/components/schemas/QuickbooksEntityType" }
        qbEntityId:                { type: string }
        qbLineId:                  { type: string, nullable: true }
        qbDepositId:               { type: string, nullable: true, description: "The underlying bank Deposit id this incoming money belongs to, when known. Rows sharing one non-null value are candidates a fundraiser may manually group into a single deposit unit and reconcile as a whole to one multi-allocation gift. Null when not tied to a deposit (or staged before this field existed)." }
        amount:                    { type: string, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        payerName:                 { type: string, nullable: true }
        payerEmail:                { type: string, nullable: true }
        rawReference:              { type: string, nullable: true }
        lineDescription:           { type: string, nullable: true }
        status:                    { $ref: "#/components/schemas/StagedPaymentStatus" }
        exclusionReason:           { $ref: "#/components/schemas/StagedPaymentExclusionReason", nullable: true }
        classificationSource:      { $ref: "#/components/schemas/StagedPaymentClassificationSource" }
        lineItemNames:             { type: array, items: { type: string }, nullable: true }
        lineAccountNames:          { type: array, items: { type: string }, nullable: true }
        lineClasses:               { type: array, items: { type: string }, nullable: true }
        # Extended QuickBooks capture — read-only mirrors of the QB record surfaced
        # in the reviewer for context. The verbatim qbRaw / qbRawLine JSON is stored
        # in the DB but intentionally omitted here (and from the list select) to keep
        # responses small.
        qbPayerType:               { $ref: "#/components/schemas/QuickbooksPayerType", nullable: true }
        qbPayerId:                 { type: string, nullable: true }
        qbPaymentMethod:           { type: string, nullable: true }
        qbCheckNumber:             { type: string, nullable: true }
        qbDepositToAccountName:    { type: string, nullable: true }
        qbDocNumber:               { type: string, nullable: true }
        qbBillingAddress:          { type: string, nullable: true }
        qbTransactionMemo:         { type: string, nullable: true }
        qbCurrency:                { type: string, nullable: true }
        qbExchangeRate:            { type: string, nullable: true }
        qbCreateTime:              { type: string, format: date-time, nullable: true }
        qbLinkedTxn:
          type: array
          nullable: true
          items:
            type: object
            required: [txnId, txnType]
            properties:
              txnId:   { type: string }
              txnType: { type: string }
        qbDepositLinks:
          type: array
          nullable: true
          description: "Top-level QuickBooks LinkedTxn references, derived read-only from the stored raw QB payload (never written onto the row). For a Payment/SalesReceipt this is the Deposit it was deposited into. Display-only reference; does not change any field on the staged payment. (The invoices/credit memos/journal entries a payment applies to ship in qbLinkedTxn.)"
          items:
            type: object
            required: [txnId, txnType]
            properties:
              txnId:   { type: string }
              txnType: { type: string }
        matchStatus:               { $ref: "#/components/schemas/StagedPaymentMatchStatus" }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { $ref: "#/components/schemas/StagedPaymentMatchMethod", nullable: true }
        matchConfirmedByUserId:    { type: string, nullable: true }
        matchConfirmedAt:          { type: string, format: date-time, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        autoApplied:               { type: boolean }
        approvedByUserId:          { type: string, nullable: true }
        approvedAt:                { type: string, format: date-time, nullable: true }
        rejectedByUserId:          { type: string, nullable: true }
        rejectedAt:                { type: string, format: date-time, nullable: true }
        # Derived queue bucket + denormalized display fields, joined server-side.
        queue:                     { $ref: "#/components/schemas/QuickbooksStagedPaymentQueue" }
        organizationName:          { type: string, nullable: true }
        householdName:             { type: string, nullable: true }
        individualGiverPersonName: { type: string, nullable: true }
        intermediaryName:          { type: string, nullable: true }
        entityId:                  { type: string, nullable: true, description: "Wildflower legal entity this incoming money is attributed to (entities.id), derived from QuickBooks markers. Null = no distinctive marker (treated as the default Wildflower Foundation bucket by the entity filter)." }
        entityName:                { type: string, nullable: true, description: "Display name of the attributed entity, joined server-side. Null when entityId is null or the entity has since been deleted." }
        entitySource:              { $ref: "#/components/schemas/StagedPaymentEntitySource" }
        fundingSource:             { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "WHERE this money came from / how it rendered (Stripe, brokerage, DAF, …). Origin dimension, distinct from qbPaymentMethod (the instrument) and the derived funding lane. Null = unknown / not yet determined. Auto-seeded at ingest, human-correctable." }
        fundingSourceProvenance:   { $ref: "#/components/schemas/StagedPaymentFundingSourceProvenance" }
        # ── Revenue-accounting / QuickBooks coding snapshot (Task #449) ──────────
        # The derived coding snapshot describes a QuickBooks PAYMENT, so it lives
        # here (moved off gift/pledge allocations). Each `*Override` lets a human
        # override the derived value (effective = override ?? derived). Set via
        # /staged-payments/{id}/set-coding.
        objectCode:                { type: string, nullable: true }
        objectCodeOverride:        { type: string, nullable: true }
        revenueLocation:           { type: string, nullable: true }
        revenueLocationOverride:   { type: string, nullable: true }
        revenueClass:              { type: string, nullable: true }
        revenueClassOverride:      { type: string, nullable: true }
        codingFlags:               { type: array, items: { type: string }, nullable: true, description: "Coding flags surfaced for human review (e.g. location_default, payer_type_assumed)." }
        deferredRevenue:           { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:     { type: string, nullable: true }
        resolvedGiftId:            { type: string, nullable: true }
        resolvedGiftName:          { type: string, nullable: true }
        resolvedGiftAmount:        { type: string, nullable: true }
        resolvedGiftDate:          { type: string, format: date, nullable: true }
        splitCount:                { type: integer, description: "How many existing gifts this staged payment is split across (0 when not split). When > 0 the row is resolved via a split, not a single resolvedGift." }
        splitTotal:                { type: string, nullable: true, description: "Combined gross total of the gifts this staged payment is split across (sum of the split sub-amounts). Null when not split." }
        splitGiftNames:            { type: array, items: { type: string }, nullable: true, description: "Names of the gifts this staged payment is split across, for display. Null when not split." }
        giftAlreadyLinkedElsewhere: { type: boolean, description: "True when this pending row has no gift of its own, yet every same-donor, similar-amount gift is already linked to a different QuickBooks payment — i.e. the gift for this payment likely hasn't been created yet (create a new gift for it, or exclude if it's a duplicate)." }
        matchedRuleId:             { type: string, nullable: true, description: "Id of the admin-editable handling rule that auto-excluded or auto-created+approved this payment at ingest or apply time. Null for rows classified by the legacy code classifier, manually classified rows, or rows that matched no rule." }
        matchedRuleName:           { type: string, nullable: true, description: "Display name of the matched rule, joined server-side. Null when matchedRuleId is null or the rule has since been deleted." }
        reconciliationLanes:       { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this still-unmatched evidence, derived read-only: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped matchConfirmedAt)." }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
    StagedPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StagedPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StagedPaymentSummary:
      type: object
      required: [needsReview, autoMatched, done, rejected, excluded, excludedByReason]
      properties:
        needsReview: { type: integer }
        autoMatched: { type: integer }
        done:        { type: integer }
        rejected:    { type: integer }
        excluded:    { type: integer }
        excludedByReason:
          type: object
          required: [zero_amount, loan, membership, interest, government_reimbursement, tax_refund, other_revenue, earned_income, fiscally_sponsored, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire, loan_repayment, loan_proceeds, note_payable, miscoded_withdrawal]
          properties:
            zero_amount:             { type: integer }
            loan:                    { type: integer }
            membership:              { type: integer }
            interest:                { type: integer }
            government_reimbursement: { type: integer }
            tax_refund:              { type: integer }
            other_revenue:           { type: integer }
            earned_income:           { type: integer }
            fiscally_sponsored:      { type: integer }
            intercompany_transfer:   { type: integer }
            other:                   { type: integer }
            insurance:               { type: integer }
            expense_refund:          { type: integer }
            expensify:               { type: integer }
            returned_wire:           { type: integer }
            loan_repayment:          { type: integer }
            loan_proceeds:           { type: integer }
            note_payable:            { type: integer }
            miscoded_withdrawal:     { type: integer }
    QuickbooksStagedPaymentSummary:
      description: "QuickBooks staged-payment summary. StagedPaymentSummary plus the fiscally_sponsored parking-queue count."
      allOf:
        - $ref: "#/components/schemas/StagedPaymentSummary"
        - type: object
          required: [fiscallySponsored]
          properties:
            fiscallySponsored: { type: integer }
    StripeStagedChargeSummary:
      description: "Stripe staged-charge summary. StagedPaymentSummary plus the open refund/chargeback proposal count (INV-13)."
      allOf:
        - $ref: "#/components/schemas/StagedPaymentSummary"
        - type: object
          required: [refundReview]
          properties:
            refundReview: { type: integer, description: "Charges with an open refund/chargeback proposal awaiting confirm/dismiss." }
    StripeSyncSummary:
      type: object
      required: [ran, payouts, staged, matched, autoApplied, refundProposals]
      properties:
        ran:             { type: boolean, description: "False when the sync was skipped (lock contended, or the Stripe connector/account was unavailable)." }
        payouts:         { type: integer, description: "Stripe payouts seen this run." }
        staged:          { type: integer, description: "Newly staged charges this run." }
        matched:         { type: integer, description: "Newly staged charges given a donor hint." }
        autoApplied:     { type: integer, description: "Newly-staged charges auto-reconciled to an existing gift at high confidence (never mints)." }
        refundProposals: { type: integer, description: "Refund/chargeback proposals raised against already-booked gifts this run (propose-then-confirm; never auto-applied)." }
    StripeRematchSummary:
      type: object
      required: [ran, scanned, matched]
      properties:
        ran:     { type: boolean, description: "False when the rematch was skipped (a sync/rematch was already running, or the Stripe connector was unavailable)." }
        scanned: { type: integer, description: "Candidate rows examined (pending + unmatched + no donor)." }
        matched: { type: integer, description: "Rows newly given a donor hint by this run." }
    StripeHistoricalProposalSummary:
      type: object
      required: [ran, payoutsScanned, proposalsCreated, conflictsFound, alreadyResolved, unmatched, chargesScanned, chargesRematched]
      description: "Result of the admin historical Stripe→QuickBooks reconciliation proposal pass over ALL payouts (including prior-account rows). Every match is a PROPOSAL — a human confirms each; nothing is minted or archived."
      properties:
        ran:              { type: boolean, description: "False when the pass was skipped (a sync/rematch/proposal run was already holding the lock, or the Stripe connector was unavailable)." }
        payoutsScanned:   { type: integer, description: "Payouts examined this pass." }
        proposalsCreated: { type: integer, description: "Payouts newly moved to a proposed QB-deposit match." }
        conflictsFound:   { type: integer, description: "Payouts whose candidate QB deposit was already approved into a gift (conflict_approved)." }
        alreadyResolved:  { type: integer, description: "Payouts already in a confirmed/reconciled state, left untouched." }
        unmatched:        { type: integer, description: "Payouts with no QB deposit candidate." }
        chargesScanned:   { type: integer, description: "Donor-less Stripe charges re-scored for a donor hint (charge-grain backfill for single-donation payouts with no deposit lump)." }
        chargesRematched: { type: integer, description: "Charges that gained a donor hint this pass, surfacing them in the per-charge review queue. DONOR-ONLY — never mints or reconciles." }
        chargeTiesProposed: { type: integer, description: "Charges (inside payouts with no settlement link) that ended the pass with a PROPOSED per-charge QuickBooks tie — the individually-booked-payout match a human approves on the Settlement report. Proposals only; never confirms." }
        chargeTiesCleared:  { type: integer, description: "Stale per-charge QuickBooks tie proposals cleared this pass (candidate disappeared, or the payout gained a settlement link)." }
    StripeUntiedPayoutDiagnostic:
      type: object
      required: [total, withExactQbRow, deposits, payments, orphans, rows]
      description: "Read-only triage of untied Stripe payouts (no settlement link, positive amount). Purely diagnostic — surfaces where the money likely sits in QuickBooks so finance can confirm proposals and chase the genuine orphans."
      properties:
        total:          { type: integer, description: "Untied positive payouts examined." }
        withExactQbRow: { type: integer, description: "Untied payouts that have a penny-exact QB row at some date." }
        deposits:       { type: integer, description: "Of those, whose nearest exact QB row is typed 'deposit' (a lump)." }
        payments:       { type: integer, description: "Of those, whose nearest exact QB row is a non-deposit row (donor 'payment')." }
        orphans:        { type: integer, description: "Untied payouts with NO penny-exact QB row at any date — genuine manual-review orphans." }
        rows:
          type: array
          items: { $ref: "#/components/schemas/StripeUntiedPayoutDiagnosticRow" }
    StripeUntiedPayoutDiagnosticRow:
      type: object
      required: [payoutId, amount, arrivalDate, chargeCount, hasExactQbRow, qbEntityType, qbId, qbDateReceived, dateGapDays, suggestedGrain]
      properties:
        payoutId:       { type: string }
        amount:         { type: string, nullable: true, description: "Net amount that hit the bank (major units)." }
        arrivalDate:    { type: string, nullable: true, description: "Bank arrival date (YYYY-MM-DD)." }
        chargeCount:    { type: integer, nullable: true, description: "Number of charges rolled into the payout (1 = single donation)." }
        hasExactQbRow:  { type: boolean, description: "A penny-exact QB row exists at some date." }
        qbEntityType:   { type: string, nullable: true, description: "Type of the nearest exact QB row ('deposit', 'payment', etc.), or null when none." }
        qbId:           { type: string, nullable: true, description: "staged_payments id of the nearest exact QB row." }
        qbDateReceived: { type: string, nullable: true, description: "Date of the nearest exact QB row (YYYY-MM-DD)." }
        dateGapDays:    { type: integer, nullable: true, description: "|days| between the payout arrival and the nearest exact QB row; null when no exact row." }
        suggestedGrain:
          type: string
          enum: [deposit-lump, charge-payment, none]
          description: "'deposit-lump' = tie payout↔deposit (multi-charge or a deposit-typed exact row exists); 'charge-payment' = single donation booked as a donor payment, match at the charge grain; 'none' = no exact QB row, needs manual review."
    StripeResyncStatus:
      type: object
      required: [status, startedAt, finishedAt, summary, error]
      properties:
        status:
          type: string
          enum: [idle, running, done, error]
          description: "Lifecycle of the background full Stripe re-pull. 'idle' = none has run since boot; 'running' = in progress; 'done'/'error' = last run outcome."
        startedAt:  { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
        summary:
          oneOf: [ { $ref: "#/components/schemas/StripeSyncSummary" } ]
          nullable: true
          description: "Result of the last completed run (null while running / before any run)."
        error:      { type: string, nullable: true, description: "Error message when status is 'error'." }
    StripeSyncStatus:
      type: object
      required: [configured, lastRunAt, lastRunStatus, lastError, consecutiveErrors, payoutCreatedWatermark]
      properties:
        configured:             { type: boolean, description: "True once the sync has run at least once and seeded its per-account cursor." }
        lastRunAt:              { type: string, format: date-time, nullable: true }
        lastRunStatus:          { type: string, nullable: true, description: "'ok' | 'error' — coarse health of the most recent run." }
        lastError:              { type: string, nullable: true }
        consecutiveErrors:      { type: integer, description: "Consecutive errored runs (cursor held); 0 after a clean run." }
        payoutCreatedWatermark: { type: string, format: date-time, nullable: true, description: "Only payouts created at/after this instant are pulled." }
    DonorboxEnrichment:
      type: object
      description: |
        Read-only Donorbox donation facts joined onto a Stripe-sourced record
        (a Stripe staged charge or a gift minted/matched from one) by
        donorbox_donations.stripe_charge_id = stripe_staged_charges.id — a 1:1
        join present only for Stripe-type Donorbox donations. Enrichment only:
        it NEVER mints a gift (the Stripe sync already pulls those charges). The
        verbatim Donorbox payload, custom questions, and review/donor-match
        state are deliberately omitted.
      required: [id, recurring, refunded, anonymous]
      properties:
        id:            { type: string, description: "Donorbox donation id." }
        donationType:  { type: string, nullable: true, description: "Donorbox payment instrument (e.g. stripe)." }
        amount:        { type: string, nullable: true }
        processingFee: { type: string, nullable: true }
        currency:      { type: string, nullable: true }
        donatedAt:     { type: string, format: date-time, nullable: true }
        campaignName:  { type: string, nullable: true }
        designation:   { type: string, nullable: true }
        comment:       { type: string, nullable: true }
        recurring:     { type: boolean }
        refunded:      { type: boolean, description: "True when refunded (fully/partially) in Donorbox. Surfaced as a badge — Donorbox refunds are NOT auto-applied to gifts." }
        anonymous:     { type: boolean }
        donorName:     { type: string, nullable: true }
        donorEmail:    { type: string, nullable: true }
        donorEmployer: { type: string, nullable: true }
    DonorboxExclusionReason:
      type: string
      enum: [already_booked, duplicate, not_a_gift, other]
      description: |
        Why a non-Stripe Donorbox candidate was filed out of the new-money
        worklist. already_booked = the money is already a CRM gift via another
        path; duplicate = a duplicate donation; not_a_gift = not donation
        revenue; other = anything else.
    DonorboxReviewQueue:
      type: string
      enum: [needs_review, done, excluded]
      description: |
        Which new-money worklist bucket to list. needs_review = pending
        candidates; done = linked to an existing gift or minted a new one;
        excluded = filed out.
    DonorboxReviewRow:
      type: object
      description: |
        A non-Stripe (PayPal/ACH) Donorbox donation surfaced as a human-reviewed
        new-money candidate. Stripe-type donations never appear here (they enrich
        existing Stripe records instead — see DonorboxEnrichment). A reviewer
        links it to an existing gift, mints a new gift (with a dedupe guard), or
        excludes it. Never auto-minted; never written to staged_payments.
      required: [id, recurring, refunded, anonymous, status, matchStatus, queue, createdAt, updatedAt]
      properties:
        id:                        { type: string, description: "Donorbox donation id (primary key)." }
        donationType:              { type: string, nullable: true, description: "Donorbox payment instrument (e.g. paypal); never 'stripe' here." }
        paypalTransactionId:       { type: string, nullable: true }
        amount:                    { type: string, nullable: true }
        amountRefunded:            { type: string, nullable: true }
        processingFee:             { type: string, nullable: true }
        currency:                  { type: string, nullable: true }
        donationStatus:            { type: string, nullable: true, description: "Donorbox donation status (paid/refunded/…), distinct from the review status." }
        refunded:                  { type: boolean }
        recurring:                 { type: boolean }
        donatedAt:                 { type: string, format: date-time, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        campaignName:              { type: string, nullable: true }
        designation:               { type: string, nullable: true }
        comment:                   { type: string, nullable: true }
        anonymous:                 { type: boolean }
        donorName:                 { type: string, nullable: true }
        donorEmail:                { type: string, nullable: true }
        donorEmployer:             { type: string, nullable: true }
        status:                    { type: string, enum: [pending, match_confirmed, excluded], description: "Review status in the shared derived vocabulary: pending | match_confirmed (linked or minted) | excluded. Donorbox stores its own lifecycle column; it is mapped to this vocabulary at the API edge (match_proposed never occurs here)." }
        exclusionReason:           { allOf: [ { $ref: "#/components/schemas/DonorboxExclusionReason" } ], nullable: true }
        matchStatus:               { type: string, description: "Suggested-donor match tier: unmatched | suggested | matched (a hint; never auto-applied)." }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { type: string, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        organizationName:          { type: string, nullable: true, readOnly: true }
        householdName:             { type: string, nullable: true, readOnly: true }
        individualGiverPersonName: { type: string, nullable: true, readOnly: true }
        intermediaryName:          { type: string, nullable: true, readOnly: true }
        linkedGiftId:              { type: string, nullable: true, readOnly: true, description: "The linked/minted gift (from the counted payment-applications ledger row), joined for display." }
        linkedGiftName:            { type: string, nullable: true, readOnly: true }
        linkedGiftAmount:          { type: string, nullable: true, readOnly: true }
        linkedGiftDate:            { type: string, format: date, nullable: true, readOnly: true }
        queue:                     { allOf: [ { $ref: "#/components/schemas/DonorboxReviewQueue" } ], readOnly: true }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
    DonorboxReviewList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/DonorboxReviewRow" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StripeChargeLinkGiftBody:
      type: object
      required: [giftId]
      description: |
        Link a single Stripe charge (a per-charge card expanded from a
        multi-charge payout) to an EXISTING gift as permanent reconciled
        evidence. The charge adopts that gift's donor and no new gift is minted;
        the gift's final amount is stamped to the charge GROSS. Optionally
        re-point the gift's donor by setting switchGiftDonor=true plus exactly one
        donor FK (Donor XOR).
      properties:
        giftId:                  { type: string, description: "The existing gift this Stripe charge is evidence for." }
        switchStripeSource:      { type: boolean, description: "When true, confirm re-sourcing a gift already backed by a DIFFERENT Stripe charge: the incumbent charge is orphaned back to the unmatched-money queue and this charge becomes the gift's Stripe evidence. Without it, that case 409s with a gift_already_stripe_sourced gate issue describing the incumbent." }
        switchGiftDonor:         { type: boolean, description: "When true, re-point the gift's donor to the donor FK below instead of adopting the gift's current donor." }
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
    DonorboxLinkGiftBody:
      type: object
      required: [giftId]
      properties:
        giftId: { type: string, description: "The existing gift this Donorbox donation is evidence for. The donation adopts that gift's donor; no new gift is minted." }
    DonorboxCreateGiftBody:
      type: object
      description: |
        Mint a NEW gift from a non-Stripe Donorbox donation. Exactly one donor
        FK must be set (Donor XOR). The server runs a dedupe guard against
        existing gifts / staged payments / Donorbox links; pass force=true to
        override a possible-duplicate (409) and mint anyway.
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true, description: "Conduit the donor gave through (Donorbox/PayPal), propagated onto the gift." }
        force:                   { type: boolean, description: "Override the dedupe guard and mint even when possible duplicates were found." }
    DonorboxExcludeBody:
      type: object
      required: [exclusionReason]
      properties:
        exclusionReason: { $ref: "#/components/schemas/DonorboxExclusionReason" }
    DonorboxCreateGiftResponse:
      type: object
      required: [gift, donationId]
      properties:
        gift:       { $ref: "#/components/schemas/GiftOrPayment" }
        donationId: { type: string }
    DonorboxDuplicateCandidate:
      type: object
      required: [kind, id]
      properties:
        kind:         { type: string, enum: [gift, staged_payment, donorbox], description: "Where the possible duplicate was found." }
        id:           { type: string }
        name:         { type: string, nullable: true }
        amount:       { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        reason:       { type: string, nullable: true, description: "Why it matched (amount+date, paypal id, …)." }
    DonorboxDuplicateResponse:
      type: object
      description: "409 body when the dedupe guard finds possible duplicates; resubmit create-gift with force=true to override, or link/exclude instead."
      required: [error, candidates]
      properties:
        error:      { type: string, enum: [possible_duplicate] }
        message:    { type: string }
        candidates: { type: array, items: { $ref: "#/components/schemas/DonorboxDuplicateCandidate" } }
    StripeStagedCharge:
      type: object
      required: [id, stripeAccountId, status, classificationSource, matchStatus, autoApplied, refunded, disputed, refundPropagationStatus, createdAt, updatedAt]
      properties:
        id:                        { type: string, description: "The Stripe charge id (ch_...) — also the primary key." }
        stripeAccountId:           { type: string }
        stripePayoutId:            { type: string, nullable: true, description: "The payout this charge settled in (null until paid out)." }
        stripeBalanceTransactionId: { type: string, nullable: true }
        stripePaymentIntentId:     { type: string, nullable: true }
        stripeCustomerId:          { type: string, nullable: true }
        # Money (major units, 2dp). Donors are credited GROSS; net = gross − fees − refunds.
        grossAmount:               { type: string, nullable: true }
        feeAmount:                 { type: string, nullable: true }
        netAmount:                 { type: string, nullable: true }
        amountRefunded:            { type: string, nullable: true }
        currency:                  { type: string, nullable: true }
        chargeCreated:             { type: string, format: date-time, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        payerName:                 { type: string, nullable: true }
        payerEmail:                { type: string, nullable: true }
        description:               { type: string, nullable: true }
        statementDescriptor:       { type: string, nullable: true }
        cardBrand:                 { type: string, nullable: true }
        metadata:                  { type: object, additionalProperties: { type: string }, nullable: true }
        refunded:                  { type: boolean }
        disputed:                  { type: boolean }
        status:                    { $ref: "#/components/schemas/StagedPaymentStatus" }
        exclusionReason:           { $ref: "#/components/schemas/StagedPaymentExclusionReason", nullable: true }
        classificationSource:      { $ref: "#/components/schemas/StagedPaymentClassificationSource" }
        matchStatus:               { $ref: "#/components/schemas/StagedPaymentMatchStatus" }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { $ref: "#/components/schemas/StagedPaymentMatchMethod", nullable: true }
        autoApplied:               { type: boolean }
        matchConfirmedByUserId:    { type: string, nullable: true }
        matchConfirmedAt:          { type: string, format: date-time, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        approvedByUserId:          { type: string, nullable: true }
        approvedAt:                { type: string, format: date-time, nullable: true }
        rejectedByUserId:          { type: string, nullable: true }
        rejectedAt:                { type: string, format: date-time, nullable: true }
        # Refund / chargeback propagation (INV-13, propose-then-confirm).
        refundPropagationStatus:   { $ref: "#/components/schemas/StripeRefundPropagationStatus" }
        refundPropagationKind:     { $ref: "#/components/schemas/StripeRefundKind", nullable: true }
        refundPropagationGiftId:   { type: string, nullable: true, description: "The CRM gift the refund proposal targets (snapshot of the gift link at propose time)." }
        refundProposedAmount:      { type: string, nullable: true, description: "Absolute amount being reversed: gross for a full refund / chargeback, cumulative amount_refunded for a partial refund." }
        refundConfirmedByUserId:   { type: string, nullable: true }
        refundConfirmedAt:         { type: string, format: date-time, nullable: true }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
        # Derived queue bucket + denormalized display fields, joined server-side
        # (present on list responses, omitted from bare mutation responses).
        queue:                     { $ref: "#/components/schemas/StagedPaymentQueue" }
        organizationName:          { type: string, nullable: true }
        householdName:             { type: string, nullable: true }
        individualGiverPersonName: { type: string, nullable: true }
        intermediaryName:          { type: string, nullable: true }
        resolvedGiftId:            { type: string, nullable: true }
        resolvedGiftName:          { type: string, nullable: true }
        resolvedGiftAmount:        { type: string, nullable: true }
        resolvedGiftDate:          { type: string, format: date, nullable: true }
        # Payout-level rollups (gross − fees − refunds = net), joined read-only.
        payoutAmount:              { type: string, nullable: true }
        payoutGrossTotal:          { type: string, nullable: true }
        payoutFeeTotal:            { type: string, nullable: true }
        payoutRefundTotal:         { type: string, nullable: true }
        payoutNetTotal:            { type: string, nullable: true }
        payoutArrivalDate:         { type: string, format: date, nullable: true }
        payoutStatus:              { type: string, nullable: true }
        payoutQbSupersedeStatus:   { type: string, nullable: true, description: "Non-destructive QuickBooks supersede audit for this charge's payout: none | excluded_pending | conflict_approved. 'conflict_approved' blocks minting a per-charge gift here." }
        payoutQbConflictGiftId:    { type: string, nullable: true, description: "The already-approved QuickBooks gift this payout conflicts with, when payoutQbSupersedeStatus is conflict_approved." }
        reconciliationLanes:       { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this still-unmatched Stripe evidence, derived read-only: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped matchConfirmedAt)." }
        donorbox:                  { allOf: [ { $ref: "#/components/schemas/DonorboxEnrichment" } ], nullable: true, readOnly: true, description: "Donorbox donation facts for this Stripe charge (joined 1:1 by donorbox_donations.stripe_charge_id = id), present when the charge originated from a Donorbox donation. Enrichment only — never mints a gift. Present on list reads; omitted from bare mutation responses." }
    StripeStagedChargeList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StripeStagedCharge" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StripePayoutReconciliationStatus:
      type: string
      description: "Where a Stripe payout sits in the QuickBooks reconciliation lifecycle, DERIVED read-only from the authoritative settlement_links row (payoutStatusFromLink). unmatched: no settlement link. proposed: a link exists (lifecycle=proposed) with no conflict gift. conflict_approved: a proposed link whose deposit was already approved into a gift (needs keep/replace). confirmed_reconciled: lifecycle=confirmed — the per-charge Stripe gifts are the source of truth and the QB deposit lump is marked reconciled (kept, never archived)."
      enum: [unmatched, proposed, conflict_approved, confirmed_reconciled]
    StripePayoutReconciliationQueue:
      type: string
      description: "Which reconciliation bucket to list. unmatched: no QB deposit candidate yet (stray Stripe). proposed: awaiting confirm. conflict: conflict_approved awaiting keep/replace. confirmed: any confirmed state (incl. confirmed_reconciled). all: every non-unmatched payout."
      enum: [unmatched, proposed, conflict, confirmed, all]
    StripePayoutReconciliation:
      type: object
      required: [id, stripeAccountId]
      properties:
        id:                              { type: string, description: "The Stripe payout id (po_...) — also the primary key." }
        stripeAccountId:                 { type: string }
        amount:                          { type: string, nullable: true, description: "Payout amount reported by Stripe (major units)." }
        currency:                        { type: string, nullable: true }
        status:                          { type: string, nullable: true }
        arrivalDate:                     { type: string, format: date, nullable: true }
        # Charge rollups (gross − fees − refunds = net), computed at sync time.
        grossTotal:                      { type: string, nullable: true }
        feeTotal:                        { type: string, nullable: true }
        refundTotal:                     { type: string, nullable: true }
        netTotal:                        { type: string, nullable: true }
        chargeCount:                     { type: integer, nullable: true }
        # Settlement state — DERIVED read-only from the authoritative settlement_links row.
        settlementLifecycle:             { type: string, enum: [proposed, confirmed, exempt], nullable: true, description: "The settlement_links lifecycle for this payout (null when there is no link). The reconciliation status is derived from this + the conflict gift via payoutStatusFromLink." }
        # Active QB deposit lump (matched once confirmed, else the candidate), joined read-only.
        depositId:                       { type: string, nullable: true }
        depositAmount:                   { type: string, nullable: true }
        depositDateReceived:             { type: string, format: date, nullable: true }
        depositPayerName:                { type: string, nullable: true }
        depositStatus:                   { type: string, nullable: true }
        # Conflicting already-approved gift (present for conflict_approved / confirmed_replace), joined read-only.
        conflictGiftAmount:              { type: string, nullable: true }
        conflictGiftDate:                { type: string, format: date, nullable: true }
        conflictGiftArchivedAt:          { type: string, format: date-time, nullable: true, description: "Set once a confirm-replace archives this gift (kept, never deleted)." }
        conflictGiftDonorName:           { type: string, nullable: true }
        reconciliationLanes:             { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two-lane reconciliation status (INV-4) for this payout, derived read-only from the settlement link: funding = unlinked (no link)→proposed (lifecycle=proposed)→confirmed (lifecycle=confirmed). crmRecord is null — a payout is a batch with no single donor." }
    StripePayoutReconciliationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StripePayoutReconciliation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StripePayoutReconciliationResult:
      type: object
      required: [ok, kind, payoutId]
      description: "Outcome of a payout reconciliation confirm/revert transition."
      properties:
        ok:               { type: boolean, enum: [true] }
        kind:             { type: string, enum: [confirmed_reconciled, confirmed_linkage_only, confirmed_excluded, confirmed_keep, confirmed_replace, reverted] }
        payoutId:         { type: string }
        stagedPaymentId:  { type: string, nullable: true, description: "The QB deposit lump that was excluded/relinked, when applicable." }
        archivedGiftId:   { type: string, nullable: true, description: "The QB-derived gift archived by a confirm-replace (kept, never deleted)." }
        restoredGiftId:   { type: string, nullable: true, description: "The gift un-archived by reverting a confirm-replace." }
    GiftStripeChain:
      type: object
      required: [giftId]
      description: "Read-only three-way audit chain for a gift: the Stripe charge it was minted from or linked to → the Stripe payout that charge settled in → the QuickBooks deposit lump that payout reconciles against. Any leg is null when it doesn't apply (non-Stripe gift, charge not yet paid out, payout with no QB deposit candidate)."
      properties:
        giftId: { type: string }
        charge:
          type: object
          nullable: true
          required: [id, linkage]
          properties:
            id:           { type: string, description: "The Stripe charge id (ch_...)." }
            linkage:      { type: string, enum: [created, matched], description: "Whether this gift was minted from the charge (created) or the charge linked to a pre-existing gift (matched)." }
            grossAmount:  { type: string, nullable: true }
            feeAmount:    { type: string, nullable: true }
            netAmount:    { type: string, nullable: true }
            dateReceived: { type: string, format: date, nullable: true }
            payerName:    { type: string, nullable: true }
            currency:     { type: string, nullable: true }
        payout:
          type: object
          nullable: true
          required: [id, reconciliationStatus]
          properties:
            id:                     { type: string, description: "The Stripe payout id (po_...)." }
            amount:                 { type: string, nullable: true }
            arrivalDate:            { type: string, format: date, nullable: true }
            grossTotal:             { type: string, nullable: true }
            feeTotal:               { type: string, nullable: true }
            netTotal:               { type: string, nullable: true }
            chargeCount:            { type: integer, nullable: true }
            reconciliationStatus:   { $ref: "#/components/schemas/StripePayoutReconciliationStatus" }
        qbDeposit:
          type: object
          nullable: true
          required: [id]
          properties:
            id:           { type: string, description: "The QuickBooks deposit lump's staged-payment id." }
            amount:       { type: string, nullable: true }
            dateReceived: { type: string, format: date, nullable: true }
            payerName:    { type: string, nullable: true }
            status:       { type: string, nullable: true }
    ReconciliationMatchNodeType:
      type: string
      enum: [qb, donor, gift, opportunity, stripe]
      description: "A node in a reconciliation card's match graph. qb is the required anchor; donor/gift/opportunity are the resolvable nodes (opportunity covers pledges — same table). stripe appears ONLY as a candidate source label in the un-anchored qb-search results (a Stripe staged charge, linkable via the per-charge link-gift path) — it is never a graph node, and /reconciliation/search/{nodeType} rejects it."
    ReconciliationEdgeState:
      type: string
      enum: [determined, ambiguous, filter_only, conflict, none, create]
      description: |
        Resolution state of a node within a card's graph.
        determined: exactly one confident candidate, auto-locked (DERIVE-AND-LOCK, e.g. gift→donor via XOR, gift→opportunity via opportunityId). The human may still override.
        ambiguous: several plausible candidates; the human must choose.
        filter_only: this node only narrows the others (FILTER edge, e.g. donor→which gift); not independently locked.
        conflict: a candidate disagrees with an already-locked node (e.g. gift donor ≠ opportunity donor).
        none: no candidate found.
        create: the human intends to create a new record for this node (new donor / new gift).
    ReconciliationCandidateSource:
      type: string
      enum: [donor_xor, payment_on_pledge, name, email, amount_date, memo, intermediary, stripe, manual]
      description: "How a candidate was derived (audit + UI badge)."
    ReconciliationCandidate:
      type: object
      required: [nodeType, id, label]
      properties:
        nodeType:   { $ref: "#/components/schemas/ReconciliationMatchNodeType" }
        id:         { type: string }
        label:      { type: string, description: "Display label (anonymous-masked when the viewer can't see the identity)." }
        sublabel:   { type: string, nullable: true, description: "Secondary context (donor name for a gift/opp, email/phone for a donor)." }
        amount:     { type: string, nullable: true }
        date:       { type: string, format: date, nullable: true }
        confidence: { type: integer, nullable: true, description: "0–100 match confidence; null for filter-only candidates." }
        source:     { $ref: "#/components/schemas/ReconciliationCandidateSource", nullable: true }
        donorKind:  { type: string, enum: [organization, person, household], nullable: true }
        donorId:    { type: string, nullable: true, description: "For gift/opportunity candidates: the record id of the candidate's CURRENT donor (organization/person/household), so the client can detect when a picked donor differs from the gift's existing donor." }
        alreadyLinkedStagedPaymentId: { type: string, nullable: true, description: "For gift candidates: set when the gift is already owned by another money event — for a QB staged-payment anchor, another staged payment (via the QB cash-application ledger); for a Stripe-charge anchor, another Stripe charge (the QB ledger is expected, not a conflict). The UI disables linking to avoid double-counting." }
        alreadyLinkedGiftId: { type: string, nullable: true, description: "For QB staged-payment candidates (the reverse picker — choosing a QuickBooks payment to link to a gift): set when this payment is already matched to, created, or group-reconciled onto a gift. The UI grays the row and offers Unlink to free it before re-linking, to avoid double-counting." }
        conflictReason: { type: string, nullable: true, description: "Why this candidate is blocked: a conflict with a locked node (card search), or — in the un-anchored qb-search pick list — why the row can't currently be picked (excluded from review, already settled against another payout, or already claimed by a charge-grain tie to another Stripe charge). Blocked rows are labeled, never hidden, so users can spot mis-derived statuses; the action endpoints still enforce the block with a specific 409." }
        conflictKind: { type: string, enum: [excluded, settled_elsewhere, tied_to_charge], nullable: true, description: "Structured discriminator behind conflictReason for qb-search pick-list rows, so clients can decide overridability without parsing the label. Only `excluded` is human-overridable (the confirm endpoints accept overrideExclusion to re-include the row in the same transaction); the other kinds mean the row's money is already claimed and overriding would double-count." }
    ReconciliationNode:
      type: object
      required: [nodeType, state, candidates]
      properties:
        nodeType:   { $ref: "#/components/schemas/ReconciliationMatchNodeType" }
        state:      { $ref: "#/components/schemas/ReconciliationEdgeState" }
        selectedId: { type: string, nullable: true, description: "Auto-selected candidate id (a confident lock when state=determined; the top guess when state=ambiguous)." }
        locked:     { type: boolean, description: "True when the selection is server-derived (DERIVE-AND-LOCK). The human may override." }
        candidates: { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" } }
    ReconciliationEvidence:
      type: object
      required: [qb]
      description: "Cross-source evidence backing a card. QB is always present (the anchor). Stripe is present only when a Stripe charge/payout backs the same money (brokerage/check have none)."
      properties:
        qb:
          type: object
          required: [stagedPaymentId]
          properties:
            stagedPaymentId: { type: string }
            amount:          { type: string, nullable: true }
            dateReceived:    { type: string, format: date, nullable: true }
            payerName:       { type: string, nullable: true }
            paymentMethod:   { type: string, nullable: true }
            docNumber:       { type: string, nullable: true }
            depositId:       { type: string, nullable: true }
        stripe:
          type: object
          nullable: true
          required: [payoutId]
          properties:
            payoutId:    { type: string }
            chargeId:    { type: string, nullable: true, description: "The single Stripe charge backing this money, when resolved to one." }
            grossAmount: { type: string, nullable: true }
            feeAmount:   { type: string, nullable: true }
            netAmount:   { type: string, nullable: true }
            chargeCount: { type: integer, nullable: true }
            reconciliationStatus: { type: string, nullable: true, description: "The Stripe payout's QB-reconciliation state (proposed | conflict_approved | confirmed_reconciled | unmatched | …); null when no payout/charge backs this money." }
    ReconciliationGraph:
      type: object
      required: [stagedPaymentId, nodes, evidence, ready, blockers]
      description: "The full 4-node match graph for one card. Read-only — nothing is mutated."
      properties:
        stagedPaymentId: { type: string }
        nodes:    { type: array, items: { $ref: "#/components/schemas/ReconciliationNode" } }
        evidence: { $ref: "#/components/schemas/ReconciliationEvidence" }
        ready:    { type: boolean, description: "True when a confident, non-conflicting selection exists for the required nodes (donor + gift) so the card can be one-click approved." }
        blockers: { type: array, items: { type: string }, description: "Human-readable reasons the card is not ready (ambiguous donor, conflicting opportunity, gift already linked, amount mismatch, etc.)." }
    SettlementLineageLinkSource:
      type: string
      enum: [pulled, qb_confirmed, stripe_pulled, stripe_confirmed]
      description: |
        HOW a lineage leg was tied to the anchor.
        pulled: from a Stripe-pulled join key (payout↔QB tie, or charge.stripePayoutId).
        qb_confirmed: a reviewer-confirmed link directly to the QB staged row (charge.linkedQbStagedPaymentId / donation.linkedQbStagedPaymentId).
        stripe_pulled: a Donorbox donation tied to a Stripe charge via the pulled donation.stripeChargeId key.
        stripe_confirmed: a reviewer-confirmed donation↔charge link (donation.linkedStripeChargeId).
    SettlementLineageCharge:
      type: object
      required: [chargeId, linkSource, donorResolved, hasGift]
      description: "One Stripe charge in the settlement chain (the per-donor gross behind a payout)."
      properties:
        chargeId:     { type: string }
        grossAmount:  { type: string, nullable: true }
        feeAmount:    { type: string, nullable: true }
        netAmount:    { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        payerName:    { type: string, nullable: true }
        payerEmail:   { type: string, nullable: true }
        description:  { type: string, nullable: true }
        refunded:     { type: boolean }
        disputed:     { type: boolean }
        linkSource:   { $ref: "#/components/schemas/SettlementLineageLinkSource" }
        # Explode-into-per-donor-gifts support (read-only; drives the bundle queue).
        status:            { type: string, nullable: true, description: "The staged charge's derived reconciliation status (pending | match_proposed | match_confirmed | excluded)." }
        donorResolved:     { type: boolean, description: "True when a donor (org/person/household) is already resolved on this charge, so it can be exploded into a gift." }
        hasGift:           { type: boolean, description: "True when this charge already has a created or matched gift (already exploded)." }
        resolvedDonorName: { type: string, nullable: true, description: "The resolved donor's display name, when known." }
    BundleTieResult:
      type: object
      required: [ok, chargesLinked, donationsLinked]
      description: "Outcome of persisting a settlement bundle's cross-processor ties — counts of link fields newly filled (idempotent: re-running yields zeros)."
      properties:
        ok:               { type: boolean, enum: [true] }
        chargesLinked:    { type: integer, description: "Stripe charges whose linkedQbStagedPaymentId was newly set to the deposit." }
        donationsLinked:  { type: integer, description: "Donorbox donations whose linkedStripeChargeId/linkedQbStagedPaymentId were newly set." }
    SettlementLineageDonation:
      type: object
      required: [donationId, linkSource]
      description: "One Donorbox donation in the settlement chain (enrichment for a Stripe charge, or non-Stripe money landing in the QB deposit)."
      properties:
        donationId:   { type: string }
        donationType: { type: string, nullable: true, description: "stripe | paypal | … — distinguishes enrichment (stripe) from new money." }
        amount:       { type: string, nullable: true }
        dateReceived: { type: string, format: date, nullable: true }
        donorName:    { type: string, nullable: true }
        donorEmail:   { type: string, nullable: true }
        campaignName: { type: string, nullable: true }
        designation:  { type: string, nullable: true }
        refunded:     { type: boolean }
        linkSource:   { $ref: "#/components/schemas/SettlementLineageLinkSource" }
    SettlementLineage:
      type: object
      required: [stagedPaymentId, deposit, charges, donations]
      description: |
        Read-only settlement lineage for one card: the QB deposit (anchor) and the
        SAME money traced across Stripe (payout + charges) and Donorbox (donations).
        Derived from pulled join keys plus any human-confirmed cross-processor links;
        a leg is null/empty when it doesn't apply to this deposit.
      properties:
        stagedPaymentId: { type: string }
        deposit:
          type: object
          required: [stagedPaymentId]
          description: "The QB staged-payment anchor (the bank deposit lump this card reconciles)."
          properties:
            stagedPaymentId:        { type: string }
            amount:                 { type: string, nullable: true }
            dateReceived:           { type: string, format: date, nullable: true }
            payerName:              { type: string, nullable: true }
            paymentMethod:          { type: string, nullable: true }
            docNumber:              { type: string, nullable: true }
            depositId:              { type: string, nullable: true, description: "QB deposit transaction id this row was deposited into (read-only, derived from qb_raw)." }
            depositToAccountName:   { type: string, nullable: true }
        payout:
          type: object
          nullable: true
          required: [payoutId, linkSource]
          description: "The Stripe payout tied to this deposit (null when no Stripe payout backs the money)."
          properties:
            payoutId:             { type: string }
            amount:               { type: string, nullable: true, description: "Net amount that hit the bank." }
            grossTotal:           { type: string, nullable: true }
            feeTotal:             { type: string, nullable: true }
            netTotal:             { type: string, nullable: true }
            chargeCount:          { type: integer, nullable: true }
            arrivalDate:          { type: string, format: date, nullable: true }
            status:               { type: string, nullable: true }
            reconciliationStatus: { type: string, nullable: true, description: "The payout's QB-reconciliation state (proposed | conflict_approved | confirmed_reconciled | unmatched | …)." }
            linkSource:           { $ref: "#/components/schemas/SettlementLineageLinkSource" }
        charges:
          type: array
          items: { $ref: "#/components/schemas/SettlementLineageCharge" }
          description: "The individual Stripe charges behind the payout (and any reviewer-confirmed per-charge ties to this deposit). Empty when no Stripe charges back the money."
        donations:
          type: array
          items: { $ref: "#/components/schemas/SettlementLineageDonation" }
          description: "Donorbox donations tied to the chain — enrichment for the Stripe charges, or non-Stripe new money the reviewer linked to this deposit. Empty when none apply."
    ReconciliationCardGiftAllocation:
      type: object
      required: [regionalRestrictionType, usageRestrictionType, timeRestrictionType]
      description: "Compact intended-usage summary of one allocation line on a reconciler card's linked CRM gift, so a reviewer can judge what the money is for."
      properties:
        entityName:      { type: string, nullable: true, description: "Wildflower legal entity the allocation is attributed to." }
        usageLabel:      { type: string, nullable: true, description: "Human-readable intended-usage label (display_usage, falling back to the intended_usage code) — e.g. 'Gen Ops', 'School Startup', or a project name." }
        regionalRestrictionType: { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:    { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
    ReconciliationCard:
      type: object
      required: [stagedPaymentId, status, queue, hasStripeEvidence, ready, isSourceGroup, cardStatus, settled]
      description: "List item for the unified reconciler — one per QB staged payment (the anchor), OR one per manual 'same physical gift' source group (collapsed; stagedPaymentId is the representative member). Carries the QB anchor facts + a compact best-guess summary; the full graph is fetched per card."
      properties:
        stagedPaymentId: { type: string }
        status:          { $ref: "#/components/schemas/StagedPaymentStatus" }
        queue:           { $ref: "#/components/schemas/QuickbooksStagedPaymentQueue" }
        amount:          { type: string, nullable: true }
        dateReceived:    { type: string, format: date, nullable: true }
        payerName:       { type: string, nullable: true }
        payerEmail:      { type: string, nullable: true }
        rawReference:    { type: string, nullable: true }
        lineDescription: { type: string, nullable: true }
        qbPaymentMethod: { type: string, nullable: true }
        qbEntityType:    { type: string, nullable: true, description: "QuickBooks transaction type (SalesReceipt | Payment | Deposit | …) — part of the QB key used to reference this card." }
        qbEntityId:      { type: string, nullable: true, description: "QuickBooks internal transaction id — the stable, unique QB key for this card's record." }
        qbDocNumber:     { type: string, nullable: true, description: "QuickBooks document/reference number (the 'No.' field), human-visible; may be absent (e.g. some deposits)." }
        qbAccountNames:  { type: array, nullable: true, items: { type: string }, description: "QuickBooks GL account name(s) on the transaction line(s) — the 'object code'. QBO bakes the numeric account number into the name as a prefix (e.g. '4000.1 Unrestricted Donations:…'), so this carries both the code and the label. Null/empty when the line(s) have no account." }
        qbClasses:       { type: array, nullable: true, items: { type: string }, description: "QuickBooks class(es) tagged on the transaction line(s). Null/empty when the line(s) are unclassed." }
        qbItemNames:     { type: array, nullable: true, items: { type: string }, description: "QuickBooks Product/Service item name(s) on the transaction line(s) (e.g. 'Academic Support') — the clearest human-readable revenue-type signal. Null/empty for entities without item lines (e.g. JournalEntry-coded payments, deposits)." }
        qbTransactionMemo: { type: string, nullable: true, description: "QuickBooks transaction-level memo/note, distinct from the per-line description (lineDescription)." }
        qbLocation:      { type: string, nullable: true, description: "QuickBooks Location/Department (DepartmentRef) on the transaction, e.g. 'National:Foundation Operations'. A read-only QB fact captured at pull time; null when none is tagged." }
        entityId:        { type: string, nullable: true }
        entityName:      { type: string, nullable: true }
        proposedDonorId:         { type: string, nullable: true }
        proposedDonorName:       { type: string, nullable: true }
        proposedDonorKind:       { type: string, enum: [organization, person, household], nullable: true }
        proposedGiftId:          { type: string, nullable: true }
        proposedGiftName:        { type: string, nullable: true }
        proposedOpportunityId:   { type: string, nullable: true }
        proposedOpportunityName: { type: string, nullable: true }
        donorState:       { $ref: "#/components/schemas/ReconciliationEdgeState" }
        giftState:        { $ref: "#/components/schemas/ReconciliationEdgeState" }
        opportunityState: { $ref: "#/components/schemas/ReconciliationEdgeState" }
        hasStripeEvidence: { type: boolean }
        stripeChargeId:    { type: string, nullable: true, description: "When set, this card is ONE Stripe charge (not the whole QB deposit): the active/needs-review/research queues expand a Stripe-payout-backed deposit into one card per backing charge. The card's identity is then the composite (stagedPaymentId, stripeChargeId); approve acts on this single charge → its own CRM gift. Null for non-Stripe rows, source-group cards, and the unexpanded (terminal) queues." }
        stripePayoutId:    { type: string, nullable: true }
        stripeChargeCount: { type: integer, nullable: true }
        stripeReconciliationStatus: { type: string, nullable: true, description: "Reconciliation state of the Stripe payout backing this money (proposed | conflict_approved | confirmed_reconciled | unmatched | …); null when there is no Stripe evidence." }
        stripeChargeDonorName: { type: string, nullable: true, description: "Payer/customer name (or resolved donor) on the Stripe charge — the real donor, not the 'Stripe' processor name that appears as the QB payer. Set for a per-charge card (stripeChargeId present) and for a single-charge payout; null for an un-expanded multi-charge payout or non-Stripe money." }
        stripeGrossAmount: { type: string, nullable: true, description: "Gross amount (major units) of the Stripe charge for this card; set for a per-charge card or a single-charge payout, null otherwise." }
        stripeNetAmount:   { type: string, nullable: true, description: "Net amount deposited (gross − processor fee) for the Stripe charge for this card; set for a per-charge card or a single-charge payout, null otherwise." }
        stripeFeeAmount:   { type: string, nullable: true, description: "Processor fee on the Stripe charge for this card (gross − net); set for a per-charge card or a single-charge payout, null otherwise." }
        resolvedGiftId:     { type: string, nullable: true }
        resolvedGiftName:   { type: string, nullable: true }
        resolvedGiftAmount: { type: string, nullable: true }
        resolvedGiftDonorName: { type: string, nullable: true, description: "Display name of the donor the LINKED gift is recorded under (its organization/individual/household), shown on the card's CRM-gift side. Distinct from proposedDonorName (the staged payment's payer-side donor): surfaces a payer-vs-gift-donor difference before approval. Null when no gift is linked." }
        resolvedGiftDate:   { type: string, format: date, nullable: true, description: "Received date (dateReceived) of the linked or proposed gift, shown on the card's CRM-gift side. Null when no gift is linked/proposed or the gift has no received date." }
        resolvedGiftFiscalYear: { type: string, nullable: true, description: "Fiscal-year slug (grantYear) of the linked gift, shown on the card's CRM-gift side. Null when no gift is linked or the gift has no fiscal year set." }
        resolvedGiftAllocations:
          type: array
          nullable: true
          description: "Intended-usage rollup of the linked gift's allocation lines (entity, usage label, restriction) — shown on the card's CRM-gift side so a reviewer can judge what the money is for. Null when no gift is linked or the gift has no allocations."
          items: { $ref: "#/components/schemas/ReconciliationCardGiftAllocation" }
        finalAmountSource:  { $ref: "#/components/schemas/GiftFinalAmountSource", nullable: true }
        ready:              { type: boolean, description: "Auto-proposal satisfies the consistency gate (one-click approve)." }
        exclusionReason:    { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Why this money was filed as a non-gift; set only when status='excluded'. Drives the Excluded queue's reason label." }
        reconciliationLanes: { allOf: [ { $ref: "#/components/schemas/ReconciliationLanes" } ], readOnly: true, description: "Two independently-tracked reconciliation lanes (INV-4) for this anchor's money, derived read-only from status + donor/gift state: funding = unlinked→proposed→confirmed (exempt when excluded/rejected); crmRecord = unlinked→proposed (donor guessed)→confirmed (human-stamped donor match). Replaces the single blended badge." }
        fundingSource:      { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "Origin of this money (Stripe, brokerage, DAF, …). For a group card this is the members' common source, or null when they differ. Distinct from qbPaymentMethod (the instrument) and the funding lane." }
        fundingSourceProvenance: { $ref: "#/components/schemas/StagedPaymentFundingSourceProvenance", nullable: true, description: "Whether fundingSource was derived (auto) or human-pinned (manual). Null on a group card whose members disagree." }
        sourceGroupId:      { type: string, nullable: true, description: "The unit group id when this card represents a manual 'same physical gift' group; null for a single staged payment. Derived from unit_group_members." }
        isSourceGroup:      { type: boolean, description: "True when this card collapses several staged payments a human grouped as one physical gift (rows in one unit group). The card's stagedPaymentId is the representative member; approve acts on the whole group." }
        sourceGroupCount:   { type: integer, nullable: true, description: "Number of staged payments in the group (>= 2). Null when not a group." }
        sourceGroupTotalAmount: { type: string, nullable: true, description: "Summed amount of all group members (the amount the group reconciles for). Null when not a group." }
        sourceGroupMembers:
          type: array
          nullable: true
          description: "Compact per-member rows of the group, for display. Null when not a group. The representative is the card's stagedPaymentId."
          items: { $ref: "#/components/schemas/ReconciliationCardGroupMember" }
        # ── Revenue-accounting / QuickBooks coding snapshot (Task #449) ──────────
        # The derived coding snapshot describes this QuickBooks PAYMENT (moved off
        # gift/pledge allocations). Surfaced read-only on the card so the reviewer
        # can see + edit it inline via /staged-payments/{id}/set-coding. Each
        # `*Override` lets a human override the derived value (effective =
        # override ?? derived).
        objectCode:              { type: string, nullable: true }
        objectCodeOverride:      { type: string, nullable: true }
        revenueLocation:         { type: string, nullable: true }
        revenueLocationOverride: { type: string, nullable: true }
        revenueClass:            { type: string, nullable: true }
        revenueClassOverride:    { type: string, nullable: true }
        codingFlags:             { type: array, items: { type: string }, nullable: true, description: "Coding flags surfaced for human review (e.g. location_default, payer_type_assumed)." }
        deferredRevenue:         { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:   { type: string, nullable: true }
        cardStatus:         { type: string, enum: [none, proposal, matched], description: "Server-authoritative 3-state match verdict for the card's 'Status:' line: matched = money tied to a resolved CRM gift; proposal = the matcher has a candidate gift/donor a human still has to confirm; none = no candidate yet. Derived server-side (deriveCardVerdict) so the UI never re-derives it." }
        settled:            { type: boolean, description: "Server-authoritative bucketing verdict: true when the card's gift link is fully settled — a resolved gift whose amount agrees with the evidence (group total for a group card, Stripe gross/net window when a charge backs the money, else the QB amount) within the approve gate's fee band (amountWithinFeeBand). Settled cards drop out of the review column; an amount-divergent resolved gift stays visible (still 'matched') so the rest of the money can be tied to it. Unknown amounts count as settled." }
        createdAt:          { type: string, format: date-time, nullable: true }
        updatedAt:          { type: string, format: date-time, nullable: true }
    ReconciliationCardList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/ReconciliationCard" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    ReconciliationCardGroupMember:
      type: object
      required: [stagedPaymentId, isRepresentative]
      description: "One member of a manual 'same physical gift' source group, summarized for the group card."
      properties:
        stagedPaymentId:  { type: string }
        amount:           { type: string, nullable: true }
        dateReceived:     { type: string, format: date, nullable: true }
        payerName:        { type: string, nullable: true }
        qbDocNumber:      { type: string, nullable: true }
        fundingSource:    { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true }
        isRepresentative: { type: boolean, description: "True for the single member that anchors the group card / carries the group's gift link on approve (the card's stagedPaymentId)." }
    ReconciliationSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" } }
    PayoutChargeSummary:
      type: object
      required: [id]
      description: >-
        One Stripe charge rolled into a payout, for at-a-glance display on the
        Settlement report (who the money is from without drilling in).
      properties:
        id:        { type: string, description: "Stripe charge id (ch_...)." }
        payerName: { type: string, nullable: true, description: "Charge payer name, falling back to the charge description; null when neither is set." }
        amount:    { type: string, nullable: true, description: "Charge gross amount (major units)." }
        fee:       { type: string, nullable: true, description: "Stripe processor fee for this charge (major units)." }
        net:       { type: string, nullable: true, description: "Charge net amount after the processor fee (major units)." }
        description:         { type: string, nullable: true, description: "Charge description (charge.description) — often the real donor name / memo." }
        statementDescriptor: { type: string, nullable: true, description: "Card statement descriptor shown on the payer's statement." }
        date:      { type: string, format: date, nullable: true, description: "Calendar date the charge is credited to (date_received)." }
        status:    { type: string, nullable: true, description: "Staged-charge derived review status (pending/match_proposed/match_confirmed/excluded) — lets the Settlement report tell an excluded charge from one still needing a QB tie." }
        exclusionReason: { type: string, nullable: true, description: "Why an excluded charge was excluded (e.g. failed_charge for a Stripe charge that never settled, or refunded_charge for a fully-refunded charge that was never booked into a gift — both auto-excluded). Null unless the charge is excluded." }
        linkedQbStagedPaymentId: { type: string, nullable: true, description: "CONFIRMED per-charge QuickBooks tie: the staged_payments row recording this same money (individually-booked payouts). Null when untied." }
        linkedFeeQbStagedPaymentId: { type: string, nullable: true, description: "The sibling NEGATIVE QuickBooks 'Stripe fee' row auto-claimed when the donor-line tie was confirmed — same QB deposit, amount exactly −(gross − net). Plane-1 settlement evidence only (fees never enter payment applications). Null when no fee row was found or the tie is unconfirmed." }
        proposedQb:
          nullable: true
          allOf: [ { $ref: "#/components/schemas/ChargeProposedQbTie" } ]
          description: "The system-PROPOSED (not yet confirmed) QuickBooks row for this charge, awaiting a human approve on the Settlement report. Null when nothing is proposed or the tie is already confirmed."
    ChargeProposedQbTie:
      type: object
      required: [id]
      description: >-
        A proposed charge-grain Stripe↔QuickBooks tie: the QB staged_payments
        row believed to record the SAME money as one Stripe charge (exact
        amount, close date, payer-name similarity when several same-amount
        candidates competed). Proposal only — a human approves it into the
        confirmed linkedQbStagedPaymentId.
      properties:
        id:        { type: string, description: "staged_payments.id of the proposed QB row." }
        payerName: { type: string, nullable: true }
        amount:    { type: string, nullable: true, description: "QB row amount (major units)." }
        date:      { type: string, format: date, nullable: true, description: "QB date received." }
        memo:      { type: string, nullable: true, description: "QB transaction memo / line description, whichever is set." }
    PayoutSearchCandidate:
      type: object
      required: [id]
      description: One orphan Stripe payout returned by the reverse payout search.
      properties:
        id:          { type: string, description: "Stripe payout id (po_...)." }
        amount:      { type: string, nullable: true, description: "Payout net (net_total, falling back to amount), in major units." }
        date:        { type: string, format: date, nullable: true, description: "Payout arrival date." }
        chargeCount: { type: integer, nullable: true, description: "Number of charges in the payout." }
        charges:     { type: array, items: { $ref: "#/components/schemas/PayoutChargeSummary" }, description: "Per-charge breakdown (payer name + amount) inside the payout, capped and ordered by amount desc. Empty when unknown." }
    PayoutSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/PayoutSearchCandidate" } }
    RejectSettlementProposalResult:
      type: object
      required: [rejected]
      properties:
        rejected: { type: boolean, description: "True when a proposed link was deleted; false when there was no proposed link to reject (no-op)." }
    ConfirmSettlementLinkBody:
      type: object
      description: |
        Optional resolve payload. When the payout has NO settlement link yet, a
        depositStagedPaymentId proposes that payout↔deposit tie before confirming
        (the Settlement report's Resolve box, in either direction). Omit it to
        confirm an already-proposed tie.
      properties:
        depositStagedPaymentId: { type: string, nullable: true, description: "QB deposit staged-payment id to tie to this payout before confirming (resolve). Omit when a proposed link already exists." }
        overrideExclusion: { type: boolean, description: "Deliberate human override for a deposit that was excluded from review: re-includes the picked deposit (clears its exclusion, pinning classification_source='manual') in the same transaction, then confirms normally. Only honored together with an explicitly picked depositStagedPaymentId — never applied to an already-proposed link. Default false: an excluded deposit is refused with a 409." }
    ConfirmChargeTiesBody:
      type: object
      description: |
        Optional manual-tie payload. Omit (or send no body) to approve the
        system-proposed per-charge ties. Provide qbStagedPaymentIds to manually
        tie the selected QB staged rows to this payout's untied charges
        (the Settlement report's "Tie selected" gesture).
      properties:
        qbStagedPaymentIds:
          type: array
          items: { type: string }
          description: "QB staged_payments ids to tie to this payout's charges. Each must match a distinct untied charge by exact amount and must not already be tied/settlement-linked elsewhere."
        overrideExclusion: { type: boolean, description: "Deliberate human override for manually selected QB rows that were excluded from review: re-includes them (clears the exclusion, pinning classification_source='manual') in the same transaction before tying. Manual mode only — ignored when approving system-proposed ties. Default false: excluded rows are refused with a 409." }
        chargeId: { type: string, description: "PIN the manual tie to this specific untied charge of the payout (requires exactly ONE qbStagedPaymentIds entry). Without it, manual rows are placed by exact amount onto whichever untied charge fits. Required for overrideAmountMismatch — an amount-agnostic tie is only meaningful against an explicit charge." }
        overrideAmountMismatch: { type: boolean, description: "Deliberate human override of the exact-amount rule for a PINNED tie (chargeId required): tie the row to the charge even though its amount matches neither the charge's gross nor its net — the human asserts the row records this charge's money (e.g. the bookkeeper booked a partial/adjusted amount). Default false: a mismatched pinned row is refused with 409 amount_mismatch." }
    RejectChargeQbTieResult:
      type: object
      required: [rejected, chargeId]
      properties:
        rejected:           { type: boolean, description: "True when the proposed tie was cleared and the dismissal recorded." }
        chargeId:           { type: string, description: "Stripe charge id (ch_...) the proposal was rejected on." }
        qbStagedPaymentId:  { type: string, nullable: true, description: "The staged_payments id of the dismissed QB row (the pair that will never be re-proposed)." }
    RevertChargeQbTieResult:
      type: object
      required: [reverted, chargeId, qbStagedPaymentId]
      properties:
        reverted:           { type: boolean, description: "True when the confirmed tie was cleared." }
        chargeId:           { type: string, description: "Stripe charge id (ch_...) the confirmed tie was reverted on." }
        qbStagedPaymentId:  { type: string, description: "The staged_payments id of the QB row this charge was untied from — it returns to the open review flow." }
        feeQbStagedPaymentId: { type: string, nullable: true, description: "The sibling negative 'Stripe fee' QB row freed alongside the donor row (null when none was claimed at confirm time)." }
    ConfirmChargeTiesResult:
      type: object
      required: [confirmed, payoutId, tied, feeRowsTied, payoutFullyTied]
      properties:
        confirmed: { type: boolean, description: "True when the ties were written." }
        payoutId:  { type: string }
        tied:      { type: integer, description: "Charges that gained a confirmed QuickBooks tie in this call." }
        feeRowsTied: { type: integer, description: "Sibling NEGATIVE QuickBooks 'Stripe fee' rows auto-detected and claimed alongside the donor-line ties in this call (same QB deposit, amount exactly −(gross − net)). Fee rows are plane-1 settlement evidence only — they never enter payment applications." }
        payoutFullyTied: { type: boolean, description: "True when, after this call, every charge of the payout is tied or excluded/rejected — the payout now shows as settled (Matched) on the Settlement report." }
    ConfirmSettlementLinkResult:
      type: object
      required: [confirmed, kind, payoutId]
      properties:
        confirmed: { type: boolean, description: "True when the settlement link is confirmed after this call." }
        kind:
          type: string
          enum: [confirmed_reconciled, confirmed_linkage_only, conflict_kept, already_confirmed]
          description: "Which path ran: a clean pending-deposit confirm, a linkage-only confirm against an already-booked (approved) deposit that was left untouched, a keep-the-approved-gift confirm, or an idempotent no-op on an already-confirmed link."
        payoutId: { type: string }
        depositStagedPaymentId: { type: string, nullable: true, description: "The QB deposit the confirmed link ties to (null only if the link's deposit pointer had degraded)." }
    GiftMissingQb:
      type: object
      required: [id, rowKey]
      description: |
        ONE ROW PER gift_allocation for the gifts-missing-QB worklist. A gift with
        several allocations surfaces several rows (the gift header fields repeat).
        A gift that has no allocations surfaces a single row with allocationId null.
        Allocations attributed to an entity that never settles through a payment
        processor (entities.expectsPayment = false: "Direct to School" /
        "Wildflower Foundation TSNE") are excluded.
      properties:
        id:            { type: string, description: "Gift (gifts_and_payments) id. Repeats across the gift's allocation rows." }
        rowKey:        { type: string, description: "Stable per-row key (giftId + allocationId). Unique across the list; use as the React key." }
        allocationId:  { type: string, nullable: true, description: "gift_allocations id for this row. Null when the gift has no allocations." }
        giftName:      { type: string, nullable: true, description: "Gift header name (used with the allocation id to label the row)." }
        donorName:     { type: string, nullable: true, description: "Donor display name (anonymous-masked for the viewer)." }
        donorKind:     { type: string, enum: [organization, person, household], nullable: true }
        amount:        { type: string, nullable: true, description: "Raw gift header amount (may be null)." }
        displayAmount: { type: string, nullable: true, description: "Amount to display: the gift header amount, falling back to the sum of the gift's allocation sub-amounts when the header is null. Null only when no amount is recorded anywhere." }
        allocationAmount: { type: string, nullable: true, description: "This allocation's sub-amount (null when there is no allocation)." }
        dateReceived:  { type: string, format: date, nullable: true, description: "Raw gift header date received (may be null)." }
        displayDate:   { type: string, format: date, nullable: true, description: "Date to display: the gift date received, falling back to the earliest allocation spending-start date when the header is null." }
        paymentMethod: { $ref: "#/components/schemas/GiftPaymentMethod", nullable: true, description: "The donor's recorded payment method on the gift (NOT a reconciliation match)." }
        entityId:      { type: string, nullable: true, description: "The allocation's fund entity id." }
        entityName:    { type: string, nullable: true, description: "The allocation's fund entity name." }
        intendedUsage: { $ref: "#/components/schemas/IntendedUsage", nullable: true }
        displayUsage:  { type: string, nullable: true, description: "Denormalized human-readable usage label for the allocation." }
        fundableProjectId:   { type: string, nullable: true }
        fundableProjectName: { type: string, nullable: true }
        schoolRecipientId:   { type: string, nullable: true }
        schoolRecipientName: { type: string, nullable: true }
        grantYear:     { type: string, nullable: true, description: "The allocation's fiscal year (grant_year) id." }
        finalAmountSource: { $ref: "#/components/schemas/GiftFinalAmountSource", nullable: true }
        opportunityId:   { type: string, nullable: true, description: "The linked opportunity/pledge (gifts_and_payments.opportunity_id) this gift books against, if any." }
        opportunityName: { type: string, nullable: true, description: "Display name of the linked opportunity/pledge." }
        proposedPayment:
          $ref: "#/components/schemas/GiftMissingQbProposedPayment"
          nullable: true
          description: |
            Best-guess UNLINKED payment for this gift row (a QuickBooks staged payment
            OR a Stripe staged charge), or null when none is a plausible match.
            Read-only convenience so the card can offer a one-click "Link" — the same
            match the manual Link dialog would surface (donor name + amount fee-band +
            date window), restricted to rows not already tied to a gift. A QuickBooks
            match is preferred; a Stripe charge is proposed when no plausible QuickBooks
            payment exists (Stripe-settled gifts land in QuickBooks at the payout level,
            not per gift). The row-level amount used is the allocation sub-amount,
            falling back to the gift's display amount.
    GiftMissingQbProposedPayment:
      type: object
      required: [source]
      description: |
        A single unlinked payment proposed as this gift's match. `source` picks the
        processor and therefore the reconcile target + endpoint: a QuickBooks staged
        payment (source=quickbooks, target stagedPaymentId) or a Stripe staged charge
        (source=stripe, target stripeChargeId).
      properties:
        source:          { type: string, enum: [quickbooks, stripe], description: "Which processor this proposal comes from — determines the reconcile target and endpoint." }
        stagedPaymentId: { type: string, nullable: true, description: "staged_payments id — the reconcile target when source=quickbooks." }
        stripeChargeId:  { type: string, nullable: true, description: "stripe_staged_charges id — the reconcile target when source=stripe." }
        payerName:       { type: string, nullable: true, description: "Payer name (QuickBooks payer / Stripe payer or description)." }
        amount:          { type: string, nullable: true, description: "Proposed payment amount (QuickBooks staged amount / Stripe GROSS)." }
        dateReceived:    { type: string, format: date, nullable: true, description: "Payment date received." }
        paymentMethod:   { type: string, nullable: true, description: "QuickBooks payment method / instrument (qb_payment_method), or Stripe card brand." }
        reference:       { type: string, nullable: true, description: "Raw memo / reference for context." }
    GiftMissingQbLinkedMatch:
      type: object
      required: [id, linkedVia]
      description: |
        A gift matching the free-text search that is EXCLUDED from the
        missing-QB worklist because it is already tied to money (a QuickBooks
        cash-application ledger row, or settled through Stripe/Donorbox at the
        payout level). Surfaced grayed-out so a search never silently hides an
        already-matched gift — mirrors the "already linked" note the payment-side
        gift search shows. Read-only context; not actionable from this list.
      properties:
        id:           { type: string, description: "Gift (gifts_and_payments) id." }
        giftName:     { type: string, nullable: true, description: "Gift header name." }
        donorName:    { type: string, nullable: true, description: "Donor display name (anonymous-masked for the viewer)." }
        donorKind:    { type: string, enum: [organization, person, household], nullable: true }
        amount:       { type: string, nullable: true, description: "Display amount: gift header amount, falling back to the sum of allocation sub-amounts." }
        dateReceived: { type: string, format: date, nullable: true, description: "Gift header date received." }
        linkedVia:    { type: string, enum: [quickbooks, processor], description: "Why the gift is excluded from the worklist: quickbooks = it has a QuickBooks cash-application ledger row; processor = it is settled through Stripe/Donorbox (payout-level money, never gets a per-gift QB record)." }
    GiftMissingQbList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftMissingQb" } }
        linkedMatches:
          type: array
          items: { $ref: "#/components/schemas/GiftMissingQbLinkedMatch" }
          description: |
            Present only when `q` is set (>= 2 chars): up to 10 gifts matching the
            search text that are already tied to money and therefore NOT in `data`.
            Lets the UI show "already matched" context instead of an empty result.
        pagination: { $ref: "#/components/schemas/Pagination" }
    BookableReason:
      type: string
      enum:
        - missing_donor
        - missing_amount
        - missing_date
        - no_allocations
        - missing_entity
        - missing_fiscal_year
        - missing_intended_usage
        - missing_fundable_project
        - missing_restriction_evidence
        - missing_reporting_deadline
      description: |
        A single failing item of the bookable-gift standard. missing_donor: not exactly
        one donor. missing_amount / missing_date: header value absent. no_allocations:
        gift has no allocation rows. missing_entity / missing_fiscal_year /
        missing_intended_usage: an allocation lacks that field. missing_fundable_project:
        a project-usage allocation has no fundable project. missing_restriction_evidence:
        a donor_restricted gift has neither a grant letter nor an online-source link.
        missing_reporting_deadline: the linked opportunity requires a written report but
        no reporting_deadline task exists.
    IncompleteGift:
      type: object
      required: [id, reasons]
      description: ONE ROW PER gift that fails the bookable-gift standard.
      properties:
        id:            { type: string, description: "Gift (gifts_and_payments) id." }
        giftName:      { type: string, nullable: true, description: "Gift header name." }
        donorName:     { type: string, nullable: true, description: "Donor display name (anonymous-masked for the viewer)." }
        donorKind:     { type: string, enum: [organization, person, household], nullable: true }
        amount:        { type: string, nullable: true, description: "Raw gift header amount (may be null)." }
        dateReceived:  { type: string, format: date, nullable: true, description: "Raw gift header date received (may be null)." }
        opportunityId:   { type: string, nullable: true, description: "The linked opportunity/pledge, if any." }
        opportunityName: { type: string, nullable: true, description: "Display name of the linked opportunity/pledge." }
        reasons:
          type: array
          items: { $ref: "#/components/schemas/BookableReason" }
          description: "Every failing checklist item for this gift (always non-empty)."
        reasonLabels:
          type: array
          items: { type: string }
          description: "Human-readable label for each reason, index-aligned with `reasons`."
    IncompleteGiftList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/IncompleteGift" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    ReconciliationOutcome:
      type: string
      enum: [link_existing_gift, create_gift, create_gift_from_opportunity, convert_to_pledge_and_first_payment]
      description: |
        What approving the card does.
        link_existing_gift: tie the QB (+Stripe) evidence to an existing gift; no new gift.
        create_gift: human-mint a new gift from the QB evidence for the chosen donor.
        create_gift_from_opportunity: mint a one-time gift and link it to the chosen opportunity (opportunityId); the opp derives to cash_in when fully paid.
        convert_to_pledge_and_first_payment: latch the opportunity as a pledge (set writtenPledge=true; cultivation stage is untouched) and mint the first-payment gift linked to it.
    ApproveCompleteMatchBody:
      type: object
      required: [outcome]
      description: "Approve a reconciliation card. The server re-derives and re-validates the entire graph and runs the consistency gate before committing; it never trusts UI-supplied locks."
      properties:
        outcome:       { $ref: "#/components/schemas/ReconciliationOutcome" }
        giftId:        { type: string, nullable: true, description: "Existing gift to link (required for link_existing_gift)." }
        opportunityId: { type: string, nullable: true, description: "Opportunity/pledge to generate from or link to (required for the *_opportunity / convert_* outcomes)." }
        organizationId:          { type: string, nullable: true, description: "Donor XOR — set exactly one of the three donor FKs when creating a gift and the donor isn't derivable." }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true, description: "Optional DAF / giving-platform conduit the donor gave through." }
        switchGiftDonor: { type: boolean, nullable: true, description: "For link_existing_gift ONLY: when true, re-point the existing gift's donor to the single donor FK supplied in this body (after explicit human confirmation in the UI). Blocked (409 gift_pledge_donor_conflict) when the gift is a payment on a pledge/opportunity owned by a different donor — fix the pledge first." }
        switchStripeSource: { type: boolean, nullable: true, description: "For link_existing_gift ONLY: when true, re-source the existing gift from the Stripe charge selected in stripeChargeId, orphaning the charge that currently backs it (which returns to the unmatched-money queue as pending) and recording an audit entry — after explicit human confirmation in the UI. When omitted and the gift is already sourced from a DIFFERENT charge, the approve is blocked (409 consistency_gate, issue code gift_already_stripe_sourced) whose details carry the current backing charge (id, amount, payer, date) so the UI can describe the switch." }
        displaceLinkedPayment: { type: boolean, nullable: true, description: "For link_existing_gift ONLY: when true, re-target the existing gift onto THIS payment even though another (incumbent) QuickBooks staged payment is already linked to it — disconnecting the incumbent and returning it to the unmatched/pending queue first, then linking this one, recording an audit entry — after explicit human confirmation in the UI. When omitted and the gift is already linked to a different staged payment, the approve is blocked (409 consistency_gate, issue code gift_already_qb_linked) whose details carry the incumbent payment (id, amount, payer, date) so the UI can describe the displacement. Composes with switchStripeSource so a Stripe-backed deposit resolves both conflicts in one confirmation. Only a DIRECT match incumbent is displaceable; a gift linked through a group or split is refused (409 incumbent_not_displaceable) — revert that first." }
        moveOwnApplication: { type: boolean, nullable: true, description: "For link_existing_gift ONLY: when true, re-target THIS payment onto the selected gift even though the payment itself is already applied to a DIFFERENT gift (e.g. the sync worker auto-matched it to the wrong one of two identical donations) — the commit first unwinds the payment's own existing cash-application (removes its ledger rows, reverses its final-amount stamp on the OLD gift, re-derives that gift's pledge and QuickBooks tie status, records an audit entry on the old gift), then applies it to the newly selected gift — after explicit human confirmation in the UI. When omitted and the payment is already applied elsewhere, the approve is blocked (409 consistency_gate, issue code payment_already_applied) whose details carry the currently applied gift (id, name, amount, date) so the UI can describe the move. Composes with switchStripeSource and displaceLinkedPayment so all three conflicts resolve in one confirmation. Only a DIRECT own-match is movable; a payment applied through a group, a split, or one that minted its gift is refused — revert that first." }
        stripeChargeId: { type: string, nullable: true, description: "The Stripe charge whose GROSS becomes the gift's final amount (Stripe precedence). Omit for QB-only money (brokerage/check)." }
        overrideAmountMismatchReason: { type: string, nullable: true, description: "Required to approve when the evidence amount and the gift amount fall outside the fee-band tolerance." }
        splitGroupIntoAllocations: { type: boolean, nullable: true, description: "For a SOURCE GROUP create_gift ONLY: when true, seed one gift allocation per grouped staged payment (sub_amount = that member's amount, entity from its attributed entityId) so the subcomponents become allocation rows summing to the gift total. When false/omitted the gift is header-only. Ignored for single (non-group) cards and for the opportunity outcomes (those seed allocations from the pledge)." }
    ReconciliationApproveResult:
      type: object
      required: [ok, stagedPaymentId, outcome, giftId, createdGift, createdPledge]
      properties:
        ok:              { type: boolean, enum: [true] }
        outcome:         { $ref: "#/components/schemas/ReconciliationOutcome" }
        stagedPaymentId: { type: string }
        giftId:          { type: string, description: "The existing-or-newly-created gift the evidence is now tied to." }
        opportunityId:   { type: string, nullable: true }
        createdGift:     { type: boolean, description: "True when a new gift was minted." }
        createdPledge:   { type: boolean, description: "True when an opportunity was latched into a pledge." }
    # ── Reactive settlement-bundle reconciliation ──────────────────────────────
    BundleAnchorType:
      type: string
      enum: [qb_staged_payment, stripe_payout]
      description: "The settlement anchor a bundle reconciles: a QuickBooks deposit (staged_payments) or a Stripe payout (stripe_payouts)."
    BundleProposalStatus:
      type: string
      enum: [open, confirmed, superseded]
      description: "Draft lifecycle. open: editable. confirmed: committed (terminal). superseded: the anchor changed shape and the draft was reset."
    BundleConfidenceTier:
      type: string
      enum: [high, medium, low, none]
      description: "Coarse confidence band for an auto-proposed row value, derived from the numeric match score (high ≥ 90, medium ≥ 70, low > 0, none = no candidate)."
    BundleProvenance:
      type: string
      enum: [auto, override, sync]
      description: "How the current value was set. auto: server best-guess. override: a human edited this row. sync: refreshed from a processor sync."
    BundleWarningSeverity:
      type: string
      enum: [info, warning, blocker]
      description: "info: FYI. warning: review advised, still confirmable (with allowWarnings). blocker: prevents confirm until resolved."
    BundleWarning:
      type: object
      required: [code, message, severity]
      properties:
        code:     { type: string, description: "Stable machine code (amount_mismatch, donor_ambiguous, gift_already_linked, donor_required, payer_vs_gift_donor, tie_conflict, ...)." }
        message:  { type: string, description: "Human-readable explanation." }
        severity: { $ref: "#/components/schemas/BundleWarningSeverity" }
    BundleNewDonorDraft:
      type: object
      required: [kind, name]
      description: "A donor to MINT on confirm when no existing record fits (product decision 1a: propose-new-donor)."
      properties:
        kind:      { type: string, enum: [organization, person, household] }
        name:      { type: string, description: "Org/household name, or a person's full name when first/last aren't split." }
        firstName: { type: string, nullable: true }
        lastName:  { type: string, nullable: true }
        email:     { type: string, nullable: true }
    BundleDonorProposal:
      type: object
      required: [kind, confidenceTier, candidates]
      description: "The proposed donor for a bundle row. existing: link an existing record. new: mint one on confirm. unresolved: no confident proposal (needs a human)."
      properties:
        kind:           { type: string, enum: [existing, new, unresolved] }
        donorId:        { type: string, nullable: true, description: "Set when kind=existing." }
        donorKind:      { type: string, enum: [organization, person, household], nullable: true }
        donorName:      { type: string, nullable: true, description: "Display label (anonymous-masked for the viewer)." }
        newDonor:       { allOf: [ { $ref: "#/components/schemas/BundleNewDonorDraft" } ], nullable: true, description: "Set when kind=new." }
        paymentIntermediaryId: { type: string, nullable: true, description: "Optional DAF / giving-platform conduit the donor gave through." }
        confidence:     { type: integer, nullable: true, description: "0–100 match confidence for the proposed donor." }
        confidenceTier: { $ref: "#/components/schemas/BundleConfidenceTier" }
        source:         { allOf: [ { $ref: "#/components/schemas/ReconciliationCandidateSource" } ], nullable: true }
        candidates:     { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" }, description: "Scored alternative donors for the picker." }
    BundleGiftMintDraft:
      type: object
      required: [amount]
      description: "Header values for a gift to MINT on confirm (product decision 1a: propose-new-gift). Allocations are derived by the existing minting primitive; this carries only the header preview."
      properties:
        amount:            { type: string, nullable: true, description: "Final amount to credit the donor (Stripe GROSS when a charge backs it, else the QB amount), major units." }
        dateReceived:      { type: string, format: date, nullable: true }
        paymentMethod:     { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        finalAmountSource: { allOf: [ { $ref: "#/components/schemas/GiftFinalAmountSource" } ], nullable: true }
    BundleGiftProposal:
      type: object
      required: [kind, confidenceTier, candidates]
      description: |
        What to do with this row's money on the CRM-gift side.
        match: link an existing gift (giftId). mint: create a new gift from the evidence (mintDraft). research: park for later (no gift). exclude: file as a non-gift (exclusionReason).
      properties:
        kind:            { type: string, enum: [match, mint, research, exclude] }
        giftId:          { type: string, nullable: true, description: "Set when kind=match." }
        giftName:        { type: string, nullable: true }
        giftAmount:      { type: string, nullable: true, description: "The matched gift's recorded amount, for the amount-mismatch check." }
        giftDonorName:   { type: string, nullable: true, description: "Donor the matched gift is recorded under (surfaces a payer-vs-gift-donor difference)." }
        mintDraft:       { allOf: [ { $ref: "#/components/schemas/BundleGiftMintDraft" } ], nullable: true, description: "Set when kind=mint." }
        exclusionReason: { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Set when kind=exclude." }
        confidence:      { type: integer, nullable: true, description: "0–100 match confidence for the proposed gift." }
        confidenceTier:  { $ref: "#/components/schemas/BundleConfidenceTier" }
        source:          { allOf: [ { $ref: "#/components/schemas/ReconciliationCandidateSource" } ], nullable: true }
        candidates:      { type: array, items: { $ref: "#/components/schemas/ReconciliationCandidate" }, description: "Scored alternative gifts for the picker (already-linked gifts flagged via alreadyLinkedStagedPaymentId)." }
    BundleChargeRow:
      type: object
      required: [rowKey, donor, gift, provenance, warnings, ready]
      description: |
        One reconcilable unit of money in the bundle — a Stripe charge behind the
        payout, or (for pure-QB money) the deposit line itself. Carries the source
        facts plus the proposed donor + gift end-state, with the warnings and
        readiness that drive the reactive UI.
      properties:
        rowKey:          { type: string, description: "Stable id for this row within the bundle (the Stripe charge id, or the staged_payments id for QB-only money). Override edits are keyed on it." }
        stripeChargeId:  { type: string, nullable: true }
        stagedPaymentId: { type: string, nullable: true, description: "The QB staged_payments row backing this money, when one exists." }
        amount:          { type: string, nullable: true, description: "The amount this row reconciles for (Stripe GROSS when a charge backs it, else the QB amount), major units." }
        feeAmount:       { type: string, nullable: true, description: "Processor fee (Stripe), when known." }
        netAmount:       { type: string, nullable: true, description: "Net deposited (gross − fee), when known." }
        dateReceived:    { type: string, format: date, nullable: true }
        payerName:       { type: string, nullable: true }
        payerEmail:      { type: string, nullable: true }
        donor:           { $ref: "#/components/schemas/BundleDonorProposal" }
        gift:            { $ref: "#/components/schemas/BundleGiftProposal" }
        provenance:      { $ref: "#/components/schemas/BundleProvenance" }
        warnings:        { type: array, items: { $ref: "#/components/schemas/BundleWarning" } }
        ready:           { type: boolean, description: "True when this row's proposal passes the consistency gate (confident, non-conflicting) so it can be confirmed without manual disambiguation." }
    BundleTieProposal:
      type: object
      required: [status, action, warnings]
      description: |
        The payout↔deposit relationship for the bundle. Mirrors the existing
        propose-then-confirm Stripe-payout reconciliation; the bundle confirm
        stamps the tie via the same primitive.
      properties:
        payoutId:               { type: string, nullable: true, description: "The Stripe payout (po_...) backing this bundle, when one exists." }
        depositStagedPaymentId: { type: string, nullable: true, description: "The QB deposit lump (staged_payments) tied to the payout." }
        status:                 { allOf: [ { $ref: "#/components/schemas/StripePayoutReconciliationStatus" } ], nullable: true, description: "Current payout↔deposit reconciliation status; null for pure-QB money with no payout." }
        action:                 { type: string, enum: [confirm_tie, none, conflict], description: "What confirm will do: confirm_tie stamps the payout↔deposit reconciliation; none = nothing to tie; conflict = the deposit is already a gift, needs a keep/replace decision first." }
        payoutNetAmount:        { type: string, nullable: true }
        depositAmount:          { type: string, nullable: true }
        chargeCount:            { type: integer, nullable: true }
        warnings:               { type: array, items: { $ref: "#/components/schemas/BundleWarning" } }
    BundleProposalSummary:
      type: object
      required: [rowCount, matchCount, mintCount, researchCount, excludeCount, newDonorCount, warningCount, blockerCount, ready]
      description: "Rollup counts for the bundle, for the header + a confirm-readiness check."
      properties:
        rowCount:      { type: integer }
        matchCount:    { type: integer, description: "Rows whose gift proposal is match." }
        mintCount:     { type: integer, description: "Rows whose gift proposal is mint." }
        researchCount: { type: integer }
        excludeCount:  { type: integer }
        newDonorCount: { type: integer, description: "Rows that will mint a new donor on confirm." }
        warningCount:  { type: integer }
        blockerCount:  { type: integer, description: "Warnings of severity=blocker across the bundle + tie." }
        ready:         { type: boolean, description: "True when every non-research/non-exclude row is ready and no blocker remains, so Confirm can run." }
    ReconciliationBundleProposal:
      type: object
      required: [draftId, anchorType, anchorId, status, revision, stale, rows, summary, generatedAt]
      description: |
        The COMPLETE proposed end-state for a settlement anchor, server-derived and
        reactive: edit any row via /derive and the rest is recomputed. Confirm
        commits the whole bundle atomically through the shared money-write
        primitives.
      properties:
        draftId:           { type: string }
        anchorType:        { $ref: "#/components/schemas/BundleAnchorType" }
        anchorId:          { type: string }
        status:            { $ref: "#/components/schemas/BundleProposalStatus" }
        revision:          { type: integer, description: "Bumped on every derive; pass it to confirm for idempotency." }
        sourceFingerprint: { type: string, nullable: true, description: "Hash of the underlying source rows; lets the client tell when a sync refreshed the bundle." }
        stale:             { type: boolean, description: "True when the live source rows drifted from the persisted snapshot (a refresh is recommended). Always false right after assemble/derive." }
        tie:               { allOf: [ { $ref: "#/components/schemas/BundleTieProposal" } ], nullable: true, description: "The payout↔deposit tie; null for pure-QB money with no Stripe payout." }
        rows:              { type: array, items: { $ref: "#/components/schemas/BundleChargeRow" } }
        summary:           { $ref: "#/components/schemas/BundleProposalSummary" }
        generatedAt:       { type: string, format: date-time }
    BundleAnchorInput:
      type: object
      required: [anchorType, anchorId]
      description: "Identify the settlement anchor to assemble (or load) a bundle for."
      properties:
        anchorType: { $ref: "#/components/schemas/BundleAnchorType" }
        anchorId:   { type: string, description: "staged_payments.id (qb deposit) or stripe_payouts.id (po_...)." }
        refresh:    { type: boolean, nullable: true, description: "When true, re-derive from live source even if a fresh snapshot exists (overrides are always preserved)." }
    BundleAnchorQueue:
      type: string
      enum: [needs_review, confirmed, all]
      description: |
        Anchor-centric triage bucket for the unified bundle-anchor list (NOT the
        Stripe-only propose/conflict tie states). needs_review: anchors awaiting
        reconciliation (Stripe payouts not yet confirmed — unmatched/proposed/conflict;
        QB deposits still pending). confirmed: already reconciled (Stripe confirmed_*;
        QB approved/reconciled). all: every eligible anchor.
    SettlementBatchStatus:
      type: string
      enum: [settled, proposed, orphan]
      description: |
        Derived Plane-1 settlement status for one anchor (design §4.4 batch), used by the
        Settlement report to group anchors into its three columns. settled: a confirmed
        payout↔deposit settlement link exists. proposed: only a proposed link exists
        (awaiting human confirm — the "needs review" filter). orphan: no settlement link
        (a Stripe payout that never booked to a deposit, or a standalone QB deposit with no
        payout). Combined with anchorType this fully places a row: Stripe orphan → the
        "missing deposit" column; QB orphan → the "missing payout" column.
    BundleAnchor:
      type: object
      required: [anchorType, anchorId, statusLabel, batchStatus]
      description: |
        One selectable settlement anchor for the workbench. anchorType discriminates a
        Stripe payout from a standalone QB deposit; the remaining fields are a normalized
        display projection over both sources.
      properties:
        anchorType:  { $ref: "#/components/schemas/BundleAnchorType" }
        anchorId:    { type: string, description: "stripe_payouts.id (po_...) or staged_payments.id." }
        amount:      { type: string, nullable: true, description: "Net deposited (Stripe net_total, falling back to payout amount) or the QB staged amount, major units." }
        bankAmount:  { type: string, nullable: true, description: "Stripe payout only: the raw bank payout amount (stripe_payouts.amount) — what actually hit the bank. Differs from `amount` (charge-sum net) when the payout absorbed failed-payment reversals or refunds; this is the figure that matches the QB deposit. Null for QB anchors." }
        grossTotal:  { type: string, nullable: true, description: "Stripe payout gross total before processor fees (major units); null for QB-only money." }
        feeTotal:    { type: string, nullable: true, description: "Stripe payout processor-fee total (major units); null for QB-only money." }
        date:        { type: string, format: date, nullable: true, description: "Stripe arrival date, or the QB date received." }
        payerName:   { type: string, nullable: true, description: "QB payer name (the tied/candidate deposit's payer for a Stripe payout, or the staged row's payer for QB-only money)." }
        chargeCount: { type: integer, nullable: true, description: "Stripe charges behind the payout; null for QB-only money." }
        charges:     { type: array, items: { $ref: "#/components/schemas/PayoutChargeSummary" }, description: "Per-charge breakdown (payer name + amount) inside a Stripe payout, capped and ordered by amount desc. Empty for QB-only anchors." }
        lineDescription: { type: string, nullable: true, description: "QB anchor only: the deposit line / memo description. Null for a Stripe payout." }
        memo:            { type: string, nullable: true, description: "QB anchor only: the transaction-level memo (PrivateNote). Null for a Stripe payout." }
        reference:       { type: string, nullable: true, description: "QB anchor only: the human-readable reference (doc/payment ref). Null for a Stripe payout." }
        lineItemNames:    { type: array, items: { type: string }, nullable: true, description: "QB anchor only: line item names captured at pull time." }
        lineAccountNames: { type: array, items: { type: string }, nullable: true, description: "QB anchor only: line account names captured at pull time." }
        lineClasses:      { type: array, items: { type: string }, nullable: true, description: "QB anchor only: line class names captured at pull time." }
        statusLabel: { type: string, description: "Raw source status for the display badge: the Stripe payout's reconciliation status (derived from its settlement link), or the QB staged-payment status." }
        batchStatus: { $ref: "#/components/schemas/SettlementBatchStatus" }
        chargeTiesProposed:  { type: integer, nullable: true, description: "Stripe payout only: charges carrying a PROPOSED (unconfirmed) per-charge QuickBooks tie — >0 makes the Missing-deposit card approvable at charge grain. Null for QB anchors." }
        chargeTiesConfirmed: { type: integer, nullable: true, description: "Stripe payout only: charges with a CONFIRMED per-charge QuickBooks tie. Null for QB anchors." }
        proposedMatch:
          nullable: true
          allOf: [ { $ref: "#/components/schemas/BundleAnchorProposedMatch" } ]
          description: |
            The proposed counterpart for this anchor, populated ONLY when a
            `proposed` (not-yet-confirmed) settlement link exists — enough to
            render the proposed match inline and drive approve/reject without
            first assembling the full draft. Null for orphan or settled anchors.
        readiness:
          nullable: true
          allOf: [ { $ref: "#/components/schemas/BundleAnchorReadiness" } ]
          description: |
            Cached confirm-readiness from the anchor's most-recent bundle-draft
            snapshot (a hint for the card's approve affordance; the confirm
            endpoint always re-derives and re-gates). Null when no draft has been
            assembled yet.
    BundleAnchorProposedMatch:
      type: object
      required: [counterpartType, counterpartId]
      description: |
        A proposed settlement counterpart for a bundle anchor — the QB deposit
        proposed for a Stripe payout (today the only populated direction; a QB
        deposit tied to a payout is reconciled THROUGH the payout and never
        surfaces as its own anchor).
      properties:
        counterpartType: { $ref: "#/components/schemas/BundleAnchorType" }
        counterpartId:   { type: string, description: "staged_payments.id or stripe_payouts.id of the proposed counterpart." }
        amount:          { type: string, nullable: true, description: "Counterpart amount, major units." }
        date:            { type: string, format: date, nullable: true, description: "Counterpart date (QB date received or Stripe arrival date)." }
        payerName:       { type: string, nullable: true, description: "Counterpart payer name." }
        chargeCount:     { type: integer, nullable: true, description: "Stripe charges behind the counterpart payout; null for a QB deposit." }
        lineDescription: { type: string, nullable: true, description: "QB counterpart's deposit line / memo description (the proposed deposit for a Stripe payout)." }
        memo:            { type: string, nullable: true, description: "QB counterpart's transaction-level memo (PrivateNote)." }
        reference:       { type: string, nullable: true, description: "QB counterpart's human-readable reference (doc/payment ref)." }
        lineItemNames:    { type: array, items: { type: string }, nullable: true, description: "QB counterpart's line item names captured at pull time." }
        lineAccountNames: { type: array, items: { type: string }, nullable: true, description: "QB counterpart's line account names captured at pull time." }
        lineClasses:      { type: array, items: { type: string }, nullable: true, description: "QB counterpart's line class names captured at pull time." }
        conflictGiftId:  { type: string, nullable: true, description: "The already-approved QB gift the proposal collided with (a conflict tie awaiting a keep decision), if any." }
        conflictGift:
          nullable: true
          allOf: [ { $ref: "#/components/schemas/BundleAnchorConflictGift" } ]
          description: "Display summary of that conflicting gift (name, donor, amount, date) so the card can explain the keep decision without another fetch. Null when conflictGiftId is null or the gift row no longer exists."
    BundleAnchorConflictGift:
      type: object
      required: [id]
      description: |
        The already-booked CRM gift a proposed settlement tie collided with —
        the QB deposit was ALREADY approved into this gift, so confirming the
        settlement keeps the gift and just records the payout↔deposit linkage.
        Enough display facts to explain the decision on the card.
      properties:
        id:        { type: string, description: "gifts_and_payments.id of the conflicting (kept-on-approve) gift." }
        name:      { type: string, nullable: true, description: "Gift name." }
        donorName: { type: string, nullable: true, description: "Gift donor display name (organization / household / person)." }
        amount:    { type: string, nullable: true, description: "Gift amount (major units)." }
        date:      { type: string, format: date, nullable: true, description: "Gift date received." }
    BundleAnchorReadiness:
      type: object
      required: [ready, warningCount, blockerCount]
      description: "Cached confirm-readiness taken from the anchor's latest bundle-draft snapshot summary."
      properties:
        ready:        { type: boolean }
        warningCount: { type: integer }
        blockerCount: { type: integer }
    BundleAnchorListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/BundleAnchor" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    WorkbenchLens:
      type: string
      enum: [all_open, needs_donor_or_gift, needs_accounting, settlement_gaps, conflicts, refunds, excluded_qb_says_donation, excluded, completed, link_complete, attention_required, crm_only]
      description: |
        A lens is a saved filter over the cluster list — linkage-only in this phase
        (record-adequacy lenses like "missing key info" are additive later).
        all_open: any cluster with unresolved work (everything except completed and
        purely-excluded clusters). needs_donor_or_gift: some evidence row still lacks
        a confirmed CRM gift/donor (pending or match_proposed). needs_accounting:
        money with no accounting side — a crm_only gift, or a payout with no settled
        deposit (settlement link missing or still proposed). settlement_gaps: a
        payout whose Stripe-reported net (gross − fees) disagrees with the amount
        that actually arrived at the bank — the money doesn't add up regardless of
        linkage state. conflicts: a proposed settlement tie collided with an
        already-approved gift. refunds: a charge carries a proposed
        refund/chargeback propagation awaiting a human decision.
        excluded_qb_says_donation: an excluded QB cluster whose line coding carries
        a donation marker (a Donation item or a 4000/4100-series donation income
        account) — likely wrongly excluded, surfaced for review.
        excluded: every evidence row in the cluster is excluded. completed: all
        linkage work done (evidence confirmed into gifts; payout settled).
        A cluster carries EVERY lens it belongs to in `lenses` so dots and rail
        counts agree.
    WorkbenchClusterKind:
      type: string
      enum: [stripe_payout, qb_standalone, crm_only]
      description: "Which anchor the cluster is built around: a Stripe payout bundle, a standalone QuickBooks staged payment/deposit, or a CRM gift with no processor/accounting evidence."
    WorkbenchRecordStatus:
      type: string
      enum: [pending, match_proposed, match_confirmed, excluded]
      description: "Derived per-record linkage status (shared vocabulary for QB staged rows and Stripe charges): pending = no candidate gift yet; match_proposed = candidate awaiting human confirm; match_confirmed = counted into a gift; excluded = marked not-a-donation."
    WorkbenchClusterStatus:
      type: string
      enum: [complete, partial, unresolved, conflict, refund, excluded, unlinked]
      description: |
        Server-derived calm rollup for the cluster's STATUS column. Precedence:
        conflict > refund > unresolved (nothing resolved yet) / partial (some
        resolved) > excluded (all evidence excluded) > complete. unlinked is the
        crm_only kind's open state (gift exists, no accounting evidence yet).
    WorkbenchClusterGift:
      type: object
      required: [giftId]
      description: "One CRM gift card in the cluster's donor-and-purpose facet. Carries actionable ids so later phases can wire actions without a contract change."
      properties:
        giftId:        { type: string, description: "gifts_and_payments.id" }
        opportunityId: { type: string, nullable: true, description: "The gift's linked opportunity/pledge id, when it is a payment against one. Enables opportunity-level actions (e.g. setting loss_type) straight from the workbench." }
        name:          { type: string, nullable: true, description: "Gift name (NOT anonymous-masked today — matches app-wide behavior)." }
        donorName:     { type: string, nullable: true, description: "Donor display name, anonymous-masked for the viewer." }
        donorKind:     { type: string, enum: [organization, person, household], nullable: true }
        donorId:       { type: string, nullable: true, description: "The donor record's id (organization / person / household per donorKind)." }
        amount:        { type: string, nullable: true, description: "Gift amount, major units." }
        dateReceived:  { type: string, format: date, nullable: true }
        quickbooksTie: { allOf: [ { $ref: "#/components/schemas/GiftQuickbooksTie" } ], nullable: true, description: "The gift's persisted QB tie status (exempt/tied/amount_mismatch/missing)." }
        donorbox:      { type: boolean, description: "True when a counted Donorbox ledger row backs this gift (renders the DB badge)." }
        grantLetter:   { type: boolean, description: "True when a grant/award letter file is attached — the gift's own upload or its linked pledge's letter (renders the letter badge)." }
        codingForm:    { type: boolean, description: "True when an APPLIED Donation Revenue Coding Form row is matched to this gift (renders the coding badge)." }
        recordComplete: { type: boolean, description: "True when the gift satisfies the canonical record-completeness predicate: donorbox-backed OR an applied coding-form row is matched OR (donor identified AND every allocation has an entity link). Exposed per-gift so the UI can highlight incomplete records without reproducing the rule." }
        linkedChargeIds: { type: array, items: { type: string }, description: "stripe_staged_charges ids whose counted ledger rows feed this gift (pairs gift↔charge sub-rows client-side). Empty outside stripe_payout clusters." }
        linkedStagedPaymentIds: { type: array, items: { type: string }, description: "staged_payments ids whose counted ledger rows feed this gift. Empty when the gift is charge-fed or crm_only." }
    WorkbenchClusterCharge:
      type: object
      required: [chargeId, status]
      description: "One Stripe charge in the cluster's payment-evidence facet."
      properties:
        chargeId:       { type: string, description: "stripe_staged_charges.id (ch_...)." }
        payerName:      { type: string, nullable: true, description: "Raw processor payer name (external Stripe evidence, not a CRM name — never anonymous-masked, matching the bundle workbench)." }
        cardBrand:      { type: string, nullable: true, description: "Card brand from the charge's payment method (e.g. visa, mastercard); null for non-card charges." }
        description:    { type: string, nullable: true, description: "Stripe charge.description — frequently carries the real donor name / memo." }
        statementDescriptor: { type: string, nullable: true, description: "The statement descriptor the payer saw on their card statement." }
        amount:         { type: string, nullable: true, description: "Charge gross amount, major units." }
        feeAmount:      { type: string, nullable: true, description: "Processor fee, major units." }
        netAmount:      { type: string, nullable: true, description: "Net (gross − fee), major units." }
        chargeDate:     { type: string, format: date, nullable: true }
        status:         { $ref: "#/components/schemas/WorkbenchRecordStatus" }
        linkedGiftId:   { type: string, nullable: true, description: "The gift this charge's counted ledger row feeds, if any." }
        refundProposed: { type: boolean, description: "True when a refund/chargeback propagation proposal awaits a human decision (drives the refunds lens)." }
        refundKind:     { type: string, enum: [full_refund, partial_refund, chargeback], nullable: true, description: "The kind of proposed reversal; null when refundProposed is false." }
        attributedDonor:
          nullable: true
          description: "Donor identified on this specific charge via the Identify action. Null when no donor has been identified on this charge."
          allOf:
            - type: object
              required: [donorKind, donorId]
              properties:
                donorKind: { type: string, enum: [organization, person, household] }
                donorId:   { type: string }
                donorName: { type: string, nullable: true }
    WorkbenchClusterQbRecord:
      type: object
      required: [stagedPaymentId, role, status]
      description: "One QuickBooks staged row in the cluster's bank-and-accounting facet."
      properties:
        stagedPaymentId: { type: string, description: "staged_payments.id" }
        role:
          type: string
          enum: [anchor, deposit, fee, charge_tie, group_member]
          description: "How the row participates: anchor = the qb_standalone cluster's own row; deposit = the payout's settlement-linked deposit lump; fee = a processor-fee row linked via a charge; charge_tie = a per-charge QB tie; group_member = a fellow member of the anchor's unit group."
        reference:       { type: string, nullable: true, description: "Human-readable doc/payment reference." }
        lineDescription: { type: string, nullable: true, description: "Deposit line / memo description." }
        memo:            { type: string, nullable: true, description: "Transaction-level memo (PrivateNote)." }
        amount:          { type: string, nullable: true, description: "Staged amount, major units." }
        dateReceived:    { type: string, format: date, nullable: true }
        paymentMethod:   { type: string, nullable: true, description: "Raw QB PaymentMethodRef name (e.g. Check, ACH, Visa) from the staged row — accounting evidence as QuickBooks recorded it; null when QB recorded none." }
        status:          { $ref: "#/components/schemas/WorkbenchRecordStatus" }
        linkedChargeId:  { type: string, nullable: true, description: "For fee / charge_tie roles: the stripe_staged_charges id the link runs through." }
        payerName:       { type: string, nullable: true, description: "QB payer name from the staged_payments row; populated for anchor and deposit roles; null for fee / charge_tie / group_member." }
        qbEntityType:
          type: string
          enum: [sales_receipt, payment, deposit]
          nullable: true
          description: "The QuickBooks transaction type this staged row came from — drives the 'View in QuickBooks' deep link."
        qbEntityId:      { type: string, nullable: true, description: "The QuickBooks transaction id within the company file (pairs with qbEntityType for the deep link)." }
        attributedDonor:
          nullable: true
          description: "Donor identified on this specific QB row via the Identify action. Present for anchor/deposit roles when a donor has been identified; null otherwise."
          allOf:
            - type: object
              required: [donorKind, donorId]
              properties:
                donorKind: { type: string, enum: [organization, person, household] }
                donorId:   { type: string }
                donorName: { type: string, nullable: true }
    WorkbenchClusterSettlement:
      type: object
      required: [lifecycle]
      description: "The payout↔deposit settlement tie facts for a stripe_payout cluster."
      properties:
        lifecycle:               { type: string, enum: [proposed, confirmed], description: "proposed = awaiting human confirm (a needs_accounting/conflict signal); confirmed = settled." }
        depositStagedPaymentId:  { type: string, nullable: true, description: "The QB deposit lump named by the link." }
        conflictGiftId:          { type: string, nullable: true, description: "The already-approved gift a proposed tie collided with (drives the conflicts lens)." }
    WorkbenchClusterGroup:
      type: object
      required: [memberCount]
      description: "Unit-group rollup when the qb_standalone anchor is a group representative."
      properties:
        memberCount: { type: integer, description: "Total rows in the unit group (including the representative)." }
        totalAmount: { type: string, nullable: true, description: "Group total, major units." }
    WorkbenchRowLinkCompleteness:
      type: string
      enum: [complete, partial, mixed, partial_mixed, missing]
      description: |
        End-to-end chain completeness across all three columns (accounting / transaction / CRM).
        complete — chain fully connected, no conflict, no competing grains.
        partial — some connections exist but the chain is not fully closed.
        mixed — competing grain representations coexist (always requires resolution).
        partial_mixed — both partial and mixed.
        missing — no connections at all (only one column of evidence).
    WorkbenchRowInformationCompleteness:
      type: string
      enum: [audit_ready, accounting_pending, incomplete]
      description: |
        Content completeness of the cluster's records.
        audit_ready — CRM gift records complete AND accounting evidence settled AND no pending refunds.
        accounting_pending — CRM records complete but accounting not yet settled or a refund is pending.
        incomplete — one or more CRM gift records lack required donor / allocation information.
    WorkbenchRowSettlementLinkState:
      type: string
      enum: [unlinked, proposed_full, proposed_partial, proposed_conflict, confirmed]
      description: "State of the payout↔deposit settlement link for stripe_payout clusters. Absent for qb_standalone and crm_only."
    WorkbenchRowCoverageState:
      type: object
      required: [state, grain, relationshipCount]
      description: "Pairwise coverage between two of the three columns."
      properties:
        state:             { type: string, enum: [missing, partial, complete, mixed] }
        grain:             { type: string, enum: [unit, bundle, mixed, none] }
        relationshipCount: { type: integer, description: "Number of linked records on the source side of this pairwise edge." }
    WorkbenchRowQbCardState:
      type: string
      enum: [raw, enriched, matched_complete, matched_partial_qb_surplus, matched_partial_external_surplus, matched_conflict, excluded]
      description: "Derived display state for one QB evidence card."
    WorkbenchRowQbCardEntry:
      type: object
      required: [qbRecordId, state, isTransactionEvidence]
      description: "One QB evidence card in the cluster."
      properties:
        qbRecordId:            { type: string }
        state:                 { $ref: "#/components/schemas/WorkbenchRowQbCardState" }
        isTransactionEvidence: { type: boolean, description: "True for qb_standalone clusters where the QB record is also the transaction evidence." }
    WorkbenchRowCrmCardState:
      type: string
      enum: [missing, unmatched_incomplete, unmatched_complete, matched_incomplete, matched_complete, partial_gift_surplus, partial_external_surplus, mixed, conflict, pledge_link_broken, lost, dormant]
      description: "Derived display state for one CRM gift card."
    WorkbenchRowCrmSatisfiedByCanonical:
      type: string
      enum: [donorbox, completed_coding_form, donor_allocations_and_supporting_documents]
      nullable: true
      description: "Canonical vocabulary for which completeness path was satisfied; null when the gift is incomplete."
    WorkbenchRowCrmCardEntry:
      type: object
      required: [giftId, recordComplete, state]
      description: "One CRM gift card in the cluster."
      properties:
        giftId:         { type: string }
        recordComplete: { type: boolean }
        state:          { $ref: "#/components/schemas/WorkbenchRowCrmCardState" }
        satisfiedBy:    { $ref: "#/components/schemas/WorkbenchRowCrmSatisfiedByCanonical" }
    WorkbenchRowTransactionEntry:
      type: object
      required: [transactionId, livePayment, refundStatus]
      description: "One countable transaction unit (Stripe charge or QB record for qb_standalone)."
      properties:
        transactionId: { type: string }
        livePayment:   { type: boolean, description: "False when the charge is proposed-refunded." }
        refundStatus:  { type: string, enum: [none, anticipated, refunded] }
    WorkbenchRowState:
      type: object
      required: [linkage, information, flags, qbCards, transactions, crmCards]
      description: |
        Canonical row-level state per docs/workbench-business-rules.md §10.
        Computed once per cluster from authoritative DB/hydration data. All
        other per-cluster display fields (coverage.complete, lenses) are derived
        from this — never maintained independently.
      properties:
        linkage:
          type: object
          required: [state, accountingToTransaction, transactionToCrm, accountingToCrm]
          properties:
            state:                   { $ref: "#/components/schemas/WorkbenchRowLinkCompleteness" }
            accountingToTransaction: { allOf: [ { $ref: "#/components/schemas/WorkbenchRowCoverageState" } ], description: "QB ↔ Stripe: does the accounting record know about the transaction?" }
            transactionToCrm:        { allOf: [ { $ref: "#/components/schemas/WorkbenchRowCoverageState" } ], description: "Stripe ↔ CRM: does the transaction link to a CRM gift?" }
            accountingToCrm:         { allOf: [ { $ref: "#/components/schemas/WorkbenchRowCoverageState" } ], description: "QB ↔ CRM: direct accounting-to-CRM link (deposit-grain PAs; missing for the charge-tie path)." }
        information:
          type: object
          required: [state, crmComplete, qbComplete]
          properties:
            state:       { $ref: "#/components/schemas/WorkbenchRowInformationCompleteness" }
            crmComplete: { type: boolean, description: "True when all linked CRM gift records satisfy the record-completeness predicate." }
            qbComplete:  { type: boolean, description: "True when the accounting evidence is present and settled." }
        flags:
          type: object
          required: [excluded, conflict, attentionRequired]
          properties:
            excluded:          { type: boolean }
            conflict:          { type: boolean }
            attentionRequired: { type: boolean, description: "True when a pending refund blocks audit_ready status." }
        settlementLinkState:
          allOf: [ { $ref: "#/components/schemas/WorkbenchRowSettlementLinkState" } ]
          nullable: true
          description: "Present for all stripe_payout clusters ('unlinked' when no settlement relationship exists); absent for other cluster kinds."
        qbCards:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchRowQbCardEntry" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchRowTransactionEntry" }
        crmCards:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchRowCrmCardEntry" }
    WorkbenchClusterCrmLinkage:
      type: object
      required: [grain, complete, coveredIds, uncoveredIds]
      description: "CRM-linkage sub-dimension: whether the cluster's payment units are linked to CRM gift records with valid amount coverage."
      properties:
        grain:             { $ref: "#/components/schemas/WorkbenchClusterDimensionGrain" }
        complete:          { type: boolean }
        coveredIds:        { type: array, items: { type: string }, description: "Charge / QB-row ids that have a counted CRM-gift link." }
        uncoveredIds:      { type: array, items: { type: string }, description: "Charge / QB-row ids that lack a counted CRM-gift link." }
        expectedAmount:    { type: string, nullable: true }
        representedAmount: { type: string, nullable: true }
        representationNote: { type: string, nullable: true, description: "Present when grain=mixed: describes the competing representations." }
    WorkbenchClusterCrmRecordReason:
      type: string
      enum: [missing_donor, missing_restriction_fields, missing_allocation]
      description: "Why a specific linked gift fails the record-completeness predicate."
    WorkbenchClusterCrmRecordGiftDetail:
      type: object
      required: [giftId, reasons]
      description: "Per-gift completeness detail for one linked CRM gift."
      properties:
        giftId:      { type: string }
        reasons:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchClusterCrmRecordReason" }
          description: "Empty when satisfiedBy is non-null (gift is complete)."
        satisfiedBy:
          type: string
          enum: [donorbox, coding_form, donor_and_allocations]
          nullable: true
          description: "Which path satisfied completeness; null when the gift is incomplete."
    WorkbenchClusterCrmRecordCompleteness:
      type: object
      required: [complete, completeGiftIds, incompleteGiftIds, reasonsByGift]
      description: "CRM-record-completeness sub-dimension: whether every linked CRM gift contains sufficient donor and purpose information."
      properties:
        complete:          { type: boolean, description: "True when all linked CRM gifts are complete (vacuously true when no linked gifts yet)." }
        completeGiftIds:   { type: array, items: { type: string } }
        incompleteGiftIds: { type: array, items: { type: string } }
        reasonsByGift:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchClusterCrmRecordGiftDetail" }
    WorkbenchClusterDonorPurpose:
      type: object
      required: [crmLinkage, crmRecordCompleteness, complete]
      description: "Donor/purpose dimension split into two explicit sub-states: CRM linkage (payment units linked to CRM gift records) and CRM record completeness (linked gifts have sufficient donor and purpose information)."
      properties:
        crmLinkage:
          allOf: [ { $ref: "#/components/schemas/WorkbenchClusterCrmLinkage" } ]
          description: "Whether the relevant payment units or bundle are linked to one or more CRM gift records with valid amount coverage."
        crmRecordCompleteness:
          allOf: [ { $ref: "#/components/schemas/WorkbenchClusterCrmRecordCompleteness" } ]
          description: "Whether every linked CRM gift contains sufficient donor and purpose information."
        complete:
          type: boolean
          description: "True when both crmLinkage.complete and crmRecordCompleteness.complete are true."
    WorkbenchClusterDimensionGrain:
      type: string
      enum: [none, unit, bundle, mixed]
      description: "Grain at which a dimension is satisfied: none = no evidence yet; unit = one evidence record per charge / QB row; bundle = one record covers all units; mixed = competing unit + bundle representations (always incomplete)."
    WorkbenchClusterEvidenceRecord:
      type: object
      required: [id, source, roles, grain]
      description: "One external evidence record in the cluster. Each physical record appears exactly once; the roles array lists every reconciliation dimension it satisfies."
      properties:
        id:
          type: string
          description: "External record id: stripe_staged_charges.id (ch_…), staged_payments.id, etc."
        source:
          type: string
          enum: [stripe_charge, qb_record, donorbox]
        roles:
          type: array
          items: { type: string, enum: [payment_transaction, accounting, donor_purpose] }
          description: "Dimensions this record satisfies. A single QBO record may satisfy both payment_transaction and accounting."
        grain:
          type: string
          enum: [unit, bundle]
          description: "unit = covers one charge / unit; bundle = covers the whole payout / group."
        amount:
          type: string
          nullable: true
          description: "Record amount, major units."
        linkedGiftId:
          type: string
          nullable: true
          description: "gifts_and_payments.id this record is counted into, if any."
    WorkbenchClusterDimensionCoverage:
      type: object
      required: [grain, complete, coveredIds, uncoveredIds]
      description: "Coverage status for one of the three reconciliation dimensions."
      properties:
        grain:             { $ref: "#/components/schemas/WorkbenchClusterDimensionGrain" }
        complete:          { type: boolean }
        coveredIds:        { type: array, items: { type: string }, description: "Ids of units (charges or QB rows) that are satisfied for this dimension." }
        uncoveredIds:      { type: array, items: { type: string }, description: "Ids of units that participate in this dimension but are not yet satisfied." }
        expectedAmount:    { type: string, nullable: true, description: "Total expected for this dimension, major units." }
        representedAmount: { type: string, nullable: true, description: "Amount currently represented by covered evidence, major units." }
        representationNote: { type: string, nullable: true, description: "Human-readable note for mixed or competing representations (grain=mixed)." }
    WorkbenchClusterCoverage:
      type: object
      required: [evidenceRecords, donorPurpose, paymentTransaction, accountingEvidence, complete]
      description: |
        Three-dimension canonical cluster state. Derived once and used for both lens counts and
        the hydrated response — a cluster whose complete=false never appears in the Completed lens.
        Present for all cluster kinds (stripe_payout, qb_standalone, crm_only).
      properties:
        evidenceRecords:
          type: array
          items: { $ref: "#/components/schemas/WorkbenchClusterEvidenceRecord" }
          description: "Deduplicated list of all external evidence records. Each physical record appears once even when it satisfies multiple dimensions."
        donorPurpose:
          allOf: [ { $ref: "#/components/schemas/WorkbenchClusterDonorPurpose" } ]
          description: "Dimension 1: donor identified, CRM gift booked with sufficient record completeness. Split into crmLinkage (payment units linked to CRM gifts) and crmRecordCompleteness (linked gifts have donor + allocation data)."
        paymentTransaction:
          allOf: [ { $ref: "#/components/schemas/WorkbenchClusterDimensionCoverage" } ]
          description: "Dimension 2: real-world transaction identified (Stripe charge, check, QBO payment, Donorbox). For stripe_payout: any non-excluded, non-refunded Stripe charge is valid evidence — independent of CRM linkage. QBO may satisfy both this and accountingEvidence."
        accountingEvidence:
          allOf: [ { $ref: "#/components/schemas/WorkbenchClusterDimensionCoverage" } ]
          description: "Dimension 3: money is represented in QuickBooks or another accounting system (settlement link or per-charge QB tie)."
        complete:
          type: boolean
          description: "True when all three dimensions are complete: donorPurpose.complete (crmLinkage + crmRecordCompleteness), paymentTransaction.complete, and accountingEvidence.complete."
        state:
          allOf: [ { $ref: "#/components/schemas/WorkbenchRowState" } ]
          description: "Canonical row-level state (Option C). Derived first; coverage.complete and all lens flags are derived from this."
    WorkbenchCluster:
      type: object
      required: [id, kind, anchorId, status, lenses, gifts, charges, qbRecords, coverage]
      description: |
        One reconciliation cluster row. A single flat shape for all three kinds —
        `kind` discriminates; kind-inapplicable fields are null/empty (house style,
        mirrors BundleAnchor). Money fields are null when unknowable for the kind
        (e.g. no fee data for QB-only money).
      properties:
        id:            { type: string, description: "Stable synthetic key: '<kind>:<anchorId>'." }
        kind:          { $ref: "#/components/schemas/WorkbenchClusterKind" }
        anchorId:      { type: string, description: "stripe_payouts.id (po_...), staged_payments.id, or gifts_and_payments.id per kind." }
        date:          { type: string, format: date, nullable: true, description: "Anchor date: payout arrival, QB date received, or gift date received." }
        title:         { type: string, nullable: true, description: "Display line for the row header: payer / donor / gift name, anonymous-masked." }
        grossTotal:    { type: string, nullable: true, description: "Charge-sum gross for a payout, major units." }
        feeTotal:      { type: string, nullable: true, description: "Processor-fee total for a payout, major units." }
        netTotal:      { type: string, nullable: true, description: "Net total (gross − fees) for a payout; the staged amount for QB money; the gift amount for crm_only." }
        bankAmount:    { type: string, nullable: true, description: "What hit the bank: the raw Stripe payout amount, or the settlement-linked/standalone QB deposit amount." }
        gapAmount:     { type: string, nullable: true, description: "netTotal − bankAmount when both sides exist (the money-math gap line); null when either side is unknown." }
        resolvedCount: { type: integer, nullable: true, description: "Evidence rows confirmed into gifts (excluded rows don't count toward the denominator). Null for crm_only." }
        totalCount:    { type: integer, nullable: true, description: "Non-excluded evidence rows in the cluster. Null for crm_only." }
        chargeCount:   { type: integer, nullable: true, description: "TRUE total charges behind a payout (charges[] is capped, mirrors bundle-anchors)." }
        status:        { $ref: "#/components/schemas/WorkbenchClusterStatus" }
        statusDetail:  { type: string, nullable: true, description: "Server-composed one-line diagnostic under the status word (e.g. '3 of 4 complete · $99.10 unresolved')." }
        lenses:        { type: array, items: { $ref: "#/components/schemas/WorkbenchLens" }, description: "Every lens this cluster belongs to (drives dots; agrees with lensCounts by construction)." }
        gifts:         { type: array, items: { $ref: "#/components/schemas/WorkbenchClusterGift" } }
        charges:       { type: array, items: { $ref: "#/components/schemas/WorkbenchClusterCharge" }, description: "Capped and ordered by amount desc; chargeCount carries the true total. Empty outside stripe_payout." }
        qbRecords:     { type: array, items: { $ref: "#/components/schemas/WorkbenchClusterQbRecord" } }
        settlement:    { allOf: [ { $ref: "#/components/schemas/WorkbenchClusterSettlement" } ], nullable: true, description: "Null for non-payout kinds and for orphan payouts with no settlement link yet." }
        group:         { allOf: [ { $ref: "#/components/schemas/WorkbenchClusterGroup" } ], nullable: true, description: "Present only when the qb_standalone anchor represents a unit group." }
        coverage:
          $ref: "#/components/schemas/WorkbenchClusterCoverage"
          description: "Three-dimension canonical cluster state (donorPurpose / paymentTransaction / accountingEvidence). Always present for all cluster kinds."
    WorkbenchLensCounts:
      type: object
      required: [all_open, needs_donor_or_gift, needs_accounting, settlement_gaps, conflicts, refunds, excluded_qb_says_donation, excluded, completed, link_complete, attention_required, crm_only]
      description: "Cluster counts per lens over the WHOLE universe (not the page), computed in the same request so the rail always agrees with the rows."
      properties:
        all_open:                  { type: integer }
        needs_donor_or_gift:       { type: integer }
        needs_accounting:          { type: integer }
        settlement_gaps:           { type: integer }
        conflicts:                 { type: integer }
        refunds:                   { type: integer }
        excluded_qb_says_donation: { type: integer }
        excluded:                  { type: integer }
        completed:                 { type: integer }
        link_complete:             { type: integer, description: "Clusters where linkage is end-to-end complete but CRM records may still need work." }
        attention_required:        { type: integer, description: "Clusters with a pending refund or other flag that blocks audit_ready status." }
        crm_only:                  { type: integer, description: "On-books CRM gifts with no counted QB or Stripe ledger row." }
    WorkbenchClusterListResponse:
      type: object
      required: [data, lensCounts, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/WorkbenchCluster" } }
        lensCounts: { $ref: "#/components/schemas/WorkbenchLensCounts" }
        pagination: { $ref: "#/components/schemas/Pagination" }
    WorkbenchRecentChangeUndo:
      type: object
      required: [kind, targetId]
      description: "Pointer to the EXISTING endpoint that safely undoes this action: which revert/re-include mutation to dispatch and on which staged row/charge. Recorded at action time, not re-validated at read time."
      properties:
        kind:
          type: string
          enum: [revert_staged_payment, reinclude_staged_payment, revert_stripe_charge, reinclude_stripe_charge]
        targetId: { type: string, description: "The staged payment / staged charge id the undo mutation targets." }
    WorkbenchRecentChange:
      type: object
      required: [id, at, summary]
      properties:
        id:        { type: string, description: "Audit-log row id." }
        at:        { type: string, format: date-time }
        actorName: { type: string, nullable: true, description: "Display name of the user who acted; null for system-recorded entries." }
        summary:   { type: string, description: "Human-readable one-line description of the action." }
        undo:      { allOf: [ { $ref: "#/components/schemas/WorkbenchRecentChangeUndo" } ], nullable: true, description: "Null when the action has no safe single-call inverse (reverts, refunds, manual mints, re-includes, donor resolves)." }
    WorkbenchRecentChangesResponse:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/WorkbenchRecentChange" } }
    BundleRowOverride:
      type: object
      required: [rowKey]
      description: "A human edit to one bundle row. Only the provided fields change; the server re-derives the rest. Omitted fields keep their current (auto or prior-override) value."
      properties:
        rowKey:          { type: string }
        donorKind:       { type: string, enum: [existing, new, unresolved], nullable: true, description: "Switch the donor proposal mode." }
        donorId:         { type: string, nullable: true, description: "Pick an existing donor (with donorRecordKind). Null clears the pick." }
        donorRecordKind: { type: string, enum: [organization, person, household], nullable: true }
        newDonor:        { allOf: [ { $ref: "#/components/schemas/BundleNewDonorDraft" } ], nullable: true, description: "Set/replace the new-donor draft (when donorKind=new)." }
        paymentIntermediaryId: { type: string, nullable: true }
        giftKind:        { type: string, enum: [match, mint, research, exclude], nullable: true, description: "Switch the gift outcome." }
        giftId:          { type: string, nullable: true, description: "Pick an existing gift to match (when giftKind=match)." }
        mintAmount:      { type: string, nullable: true, description: "Override the minted gift's amount (when giftKind=mint)." }
        exclusionReason: { allOf: [ { $ref: "#/components/schemas/StagedPaymentExclusionReason" } ], nullable: true, description: "Reason (when giftKind=exclude)." }
        overrideAmountMismatchReason: { type: string, nullable: true, description: "Acknowledge + clear an amount-mismatch warning for this row." }
        clear:           { type: boolean, nullable: true, description: "When true, drop this row's override entirely and fall back to the auto-derivation." }
    BundleTieOverride:
      type: object
      description: "A human edit to the payout↔deposit tie."
      properties:
        action:                 { type: string, enum: [confirm_tie, none], nullable: true, description: "Force the tie action (or clear it back to auto)." }
        depositStagedPaymentId: { type: string, nullable: true, description: "Pin the QB deposit lump for the payout." }
        clear:                  { type: boolean, nullable: true }
    BundleOverridesInput:
      type: object
      description: "The set of human edits to apply, then re-derive. Empty re-derives with the existing overrides (a plain refresh)."
      properties:
        rows: { type: array, items: { $ref: "#/components/schemas/BundleRowOverride" } }
        tie:  { allOf: [ { $ref: "#/components/schemas/BundleTieOverride" } ], nullable: true }
    BundleConfirmInput:
      type: object
      description: "Commit the whole bundle. Idempotent by (draftId, expectedRevision)."
      properties:
        expectedRevision: { type: integer, nullable: true, description: "The revision the client is confirming; rejected (409) if the draft has since been re-derived." }
        allowWarnings:    { type: boolean, nullable: true, description: "Proceed despite non-blocker warnings. Blockers always reject." }
    BundleConfirmResultRow:
      type: object
      required: [rowKey, outcome]
      properties:
        rowKey:         { type: string }
        outcome:        { type: string, enum: [matched_gift, minted_gift, researched, excluded, skipped] }
        giftId:         { type: string, nullable: true, description: "The gift linked or minted for this row." }
        createdDonorId: { type: string, nullable: true, description: "The donor minted for this row, when the donor proposal was new." }
    ReconciliationBundleConfirmResult:
      type: object
      required: [ok, draftId, revision, tieConfirmed, rows, giftsCreated, giftsMatched, donorsCreated]
      description: "Outcome of an atomic bundle confirm."
      properties:
        ok:               { type: boolean, enum: [true] }
        draftId:          { type: string }
        revision:         { type: integer, description: "The revision that was committed." }
        tieConfirmed:     { type: boolean, description: "True when the payout↔deposit tie was stamped." }
        rows:             { type: array, items: { $ref: "#/components/schemas/BundleConfirmResultRow" } }
        giftsCreated:     { type: integer }
        giftsMatched:     { type: integer }
        donorsCreated:    { type: integer }
        alreadyConfirmed: { type: boolean, description: "True when the draft was already confirmed at this revision (idempotent replay)." }
    DonorSearchResult:
      type: object
      required: [id, kind, name]
      properties:
        id:   { type: string }
        kind: { type: string, enum: [organization, person, household] }
        name: { type: string }
    DonorSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/DonorSearchResult" } }
    PendingDonorMoneyItem:
      type: object
      required: [source, amount, dateReceived, payerName]
      properties:
        source:       { type: string, enum: [quickbooks, stripe], description: "Where the pending money came from." }
        amount:       { type: string, nullable: true, description: "Numeric amount as a string (gross for Stripe)." }
        dateReceived: { type: string, nullable: true, description: "Date the money landed (YYYY-MM-DD), if known." }
        payerName:    { type: string, nullable: true, description: "Payer label from the source record." }
    PendingDonorMoney:
      type: object
      required: [count, items]
      properties:
        count: { type: integer, description: "Total pending staged rows matched to this donor." }
        items: { type: array, items: { $ref: "#/components/schemas/PendingDonorMoneyItem" }, description: "Up to a few recent pending rows for display." }
    SearchHit:
      type: object
      required: [type, id, label, score]
      properties:
        type:     { type: string, enum: [person, organization, household, opportunity, gift] }
        id:       { type: string }
        label:    { type: string, description: "Display name (anonymous-masked when the viewer can't see the identity)." }
        sublabel: { type: string, nullable: true, description: "Secondary context (e.g. donor name for opportunities/gifts)." }
        score:    { type: number, description: "Relevance score; higher is a better match." }
    SearchResults:
      type: object
      required: [people, organizations, households, opportunities, gifts]
      properties:
        people:        { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        organizations: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        households:    { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        opportunities: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
        gifts:         { type: array, items: { $ref: "#/components/schemas/SearchHit" } }
    DuplicatePairSide:
      type: object
      required: [id, name, giftCount]
      properties:
        id:           { type: string }
        name:         { type: string, description: "Display name (anonymous-masked when the viewer can't see the identity)." }
        ownerName:    { type: string, nullable: true, description: "Record owner's display name." }
        primaryEmail: { type: string, nullable: true }
        primaryPhone: { type: string, nullable: true }
        createdAt:    { type: string, nullable: true, description: "ISO timestamp the record was created (helps pick the canonical record)." }
        giftCount:    { type: integer, description: "Number of gifts/payments attributed to this record." }
    DuplicatePair:
      type: object
      required: [type, score, signals, a, b, safeMerge, mergeSuggestion]
      properties:
        type:    { type: string, enum: [organization, person] }
        score:   { type: number, description: "Match confidence; higher is a stronger duplicate signal." }
        signals: { type: array, items: { type: string, enum: [name, phone] }, description: "Why the pair was flagged (similar name and/or a shared phone number)." }
        a:       { $ref: "#/components/schemas/DuplicatePairSide" }
        b:       { $ref: "#/components/schemas/DuplicatePairSide" }
        safeMerge:
          type: boolean
          description: "True when the two records are identical, or their only differences are a filled value vs null/empty, so the merge has no real conflicts and can be applied in one click."
        mergeSuggestion:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DuplicateMergeSuggestion"
          description: "The auto-resolved merge to apply for a safe pair (survivor + the filled-in winning values). Null when the pair has conflicting values and needs manual review."
    DuplicateMergeSuggestion:
      type: object
      required: [primaryId, mergeIds, overrides]
      description: "A ready-to-apply merge for a safe duplicate pair: keep `primaryId`, fold `mergeIds` into it, and apply `overrides` (filled values pulled from the loser where the survivor was empty)."
      properties:
        primaryId: { type: string, description: "The record chosen to survive the merge." }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, description: "Records to fold into the survivor (always the other side of the pair)." }
        overrides: { type: object, additionalProperties: true, description: "Whitelisted scalar winners to apply to the survivor (filled value where the survivor was null/empty)." }
    DuplicatePairList:
      type: object
      required: [pairs]
      properties:
        pairs: { type: array, items: { $ref: "#/components/schemas/DuplicatePair" } }
    DismissDuplicateBody:
      type: object
      required: [type, idA, idB]
      description: "Mark a pair as not-a-duplicate. ids may be passed in any order; the server canonicalizes them (idA < idB)."
      properties:
        type: { type: string, enum: [organization, person] }
        idA:  { type: string }
        idB:  { type: string }
    FinancialCorrectionGift:
      type: object
      required: [id, amount, allocationCount]
      properties:
        id:              { type: string }
        donorName:       { type: string, nullable: true, description: "Display name of the gift's donor (anonymous-masked where required)." }
        amount:          { type: string, nullable: true, description: "Gift gross amount (numeric string)." }
        date:            { type: string, nullable: true, description: "Date the gift was received (ISO date)." }
        allocationCount: { type: integer, description: "Number of allocation lines on the gift." }
        pledgeId:        { type: string, nullable: true, description: "Pledge this gift pays toward, if any." }
    FinancialCorrectionEvidence:
      type: object
      required: [kind, id]
      properties:
        kind:       { type: string, enum: [qb_staged, stripe_charge], description: "Which evidence source this row comes from." }
        id:         { type: string, description: "The evidence row id (staged_payments.id or stripe_staged_charges.id)." }
        amount:     { type: string, nullable: true, description: "Evidence amount (numeric string)." }
        date:       { type: string, nullable: true, description: "Evidence date (ISO date)." }
        payerName:  { type: string, nullable: true, description: "Payer/source name on the evidence (often NOT the donor)." }
        entityName: { type: string, nullable: true, description: "Attributed fund entity, when known." }
    FinancialCorrectionMergeSuggestion:
      type: object
      required: [primaryId, mergeIds]
      description: "A ready-to-apply gift merge: keep `primaryId`, fold `mergeIds` into it as additional allocations. Apply through the gifts-and-payments/merge endpoint."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1 }
    FinancialCorrection:
      type: object
      required: [kind, key, score, reason, gifts, safeApply]
      properties:
        kind:    { type: string, enum: [merge_gifts, link_evidence], description: "merge_gifts = collapse near-duplicate gifts into one with allocations; link_evidence = corroborate many gifts with one bulk deposit." }
        key:     { type: string, description: "Canonical, order-independent proposal key (used for dismissal)." }
        score:   { type: number, description: "Confidence the records describe the same money; higher is stronger." }
        reason:  { type: string, description: "Human-readable explanation of why this was flagged." }
        gifts:   { type: array, items: { $ref: "#/components/schemas/FinancialCorrectionGift" } }
        evidence:
          $ref: "#/components/schemas/FinancialCorrectionEvidence"
        mergeSuggestion:
          $ref: "#/components/schemas/FinancialCorrectionMergeSuggestion"
        safeApply:
          type: boolean
          description: "True when the proposal can be applied without further human disambiguation (e.g. all gifts share one donor for a merge)."
    FinancialCorrectionList:
      type: object
      required: [corrections]
      properties:
        corrections: { type: array, items: { $ref: "#/components/schemas/FinancialCorrection" } }
    ApplyFinancialCorrectionBody:
      type: object
      required: [evidenceKind, evidenceId, giftIds]
      description: "Apply a link_evidence correction: corroborate each gift in `giftIds` with the given evidence row. CRM-side only; never edits the source."
      properties:
        evidenceKind: { type: string, enum: [qb_staged, stripe_charge] }
        evidenceId:   { type: string }
        giftIds:      { type: array, items: { type: string }, minItems: 1 }
    ApplyFinancialCorrectionResult:
      type: object
      required: [evidenceKind, evidenceId, linkedGiftIds]
      properties:
        evidenceKind:  { type: string, enum: [qb_staged, stripe_charge] }
        evidenceId:    { type: string }
        linkedGiftIds: { type: array, items: { type: string }, description: "Gifts now corroborated by the evidence (idempotent — already-linked gifts included)." }
    CleanupQueueStatus:
      type: string
      enum: [open, resolved, dismissed]
    CleanupItem:
      type: object
      required: [id, targetType, targetId, reasonCode, note, status, flaggedAt, createdAt, updatedAt]
      properties:
        id:               { type: string }
        targetType:       { type: string, description: "Kind of record this item targets (e.g. 'pledge', 'opportunity', 'organization', 'person', 'gift')." }
        targetId:         { type: string, description: "Id of the targeted record." }
        targetName:       { type: string, nullable: true, description: "Resolved display name of the target record (when known)." }
        reasonCode:       { type: string, description: "Machine-readable category of the flag." }
        note:             { type: string, description: "Human-readable description of what to fix." }
        status:           { $ref: "#/components/schemas/CleanupQueueStatus" }
        flaggedAt:        { type: string, description: "ISO timestamp the record was flagged for cleanup." }
        resolvedAt:       { type: string, nullable: true, description: "ISO timestamp the item was resolved or dismissed." }
        resolvedByUserId: { type: string, nullable: true }
        resolvedByUserName: { type: string, nullable: true, description: "Display name of the user who resolved/dismissed the item." }
        createdAt:        { type: string }
        updatedAt:        { type: string }
    CleanupItemList:
      type: object
      required: [data, pagination]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CleanupItem" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    FlagForResearchBody:
      type: object
      required: [targetType, targetId, note]
      description: >-
        Flag a record for research. reason_code is always 'needs_research'.
      properties:
        targetType: { type: string, enum: [opportunity, pledge, organization, person, gift, staged_payment, stripe_payout], description: "Kind of record being flagged." }
        targetId:   { type: string, minLength: 1, description: "Id of the record being flagged." }
        note:       { type: string, minLength: 1, description: "What needs research / follow-up on this record." }
    CodingFormRowStatus:
      type: string
      enum: [pending, applied, skipped]
    CrossCheckStatus:
      type: string
      enum: [new, same, conflict, na]
      description: "new = CRM empty (safe to fill); same = already matches; conflict = differs (needs a human choice); na = nothing to import for this attribute."
    CodingFormCrossCheck:
      type: object
      required: [attribute, label, status, applicable]
      properties:
        attribute:  { type: string, enum: [reportDeadline, purposeVerbatim, usageRestriction, intendedUsage, regionalRestriction, allocationEntity, address, circle, seriesType, additionalNotes, internalMemo], description: "Which importable attribute this row describes." }
        label:      { type: string, description: "Human-readable attribute name." }
        status:     { $ref: "#/components/schemas/CrossCheckStatus" }
        applicable: { type: boolean, description: "False when the sheet has nothing to import for this attribute." }
        sheetValue: { type: string, nullable: true, description: "The spreadsheet value (display form)." }
        crmValue:   { type: string, nullable: true, description: "The current CRM value (display form)." }
        targetType: { type: string, nullable: true, description: "What an apply would write to (task / allocation / address)." }
        targetId:   { type: string, nullable: true, description: "Id of the existing target, when one was resolved." }
        decision:   { type: string, nullable: true, enum: [apply, skip], description: "The reviewer's stored decision for this attribute, if any." }
        blockedReason: { type: string, nullable: true, description: "Why this attribute can't be auto-applied (e.g. ambiguous allocation, no confirmed match)." }
        willWrite:   { type: string, nullable: true, description: "EXACT value Apply would write (display form). Null when apply would be a no-op (same / not applicable / blocked)." }
        willWriteTo: { type: string, nullable: true, description: "Human description of the destination record + field Apply would write to, including whether it creates vs overwrites. Null when apply would be a no-op." }
    CodingFormNeedsDecision:
      type: object
      required: [attribute, label]
      properties:
        attribute: { type: string }
        label:     { type: string }
        value:     { type: string, nullable: true, description: "The captured spreadsheet value with no schema home." }
    CodingFormRow:
      type: object
      required: [id, source, sourceRowIndex, status, crossChecks, needsDecision, createdAt, updatedAt]
      properties:
        id:               { type: string }
        source:           { type: string }
        sourceRowIndex:   { type: integer }
        status:           { $ref: "#/components/schemas/CodingFormRowStatus" }
        donorNameRaw:     { type: string, nullable: true }
        internalMemo:     { type: string, nullable: true }
        amount:           { type: string, nullable: true }
        donationDate:     { type: string, nullable: true }
        restrictionLanguage: { type: string, nullable: true }
        donorNameAddressRaw: { type: string, nullable: true }
        reportRequired:   { type: boolean, nullable: true }
        reportDueDate:    { type: string, nullable: true }
        intendedUsageSuggested: { type: string, nullable: true }
        driveLink:        { type: string, nullable: true }
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        donorName:        { type: string, nullable: true, description: "Resolved display name of the matched donor." }
        matchedOpportunityId:   { type: string, nullable: true }
        matchedOpportunityName: { type: string, nullable: true }
        matchedGiftId:    { type: string, nullable: true }
        matchedGiftName:  { type: string, nullable: true, readOnly: true, description: "Display name of the matched gift (read-time join, like matchedOpportunityName)." }
        matchScore:       { type: integer, nullable: true }
        matchMethod:      { type: string, nullable: true }
        matchTier:        { type: string, nullable: true }
        matchConfirmedAt: { type: string, nullable: true }
        giftCandidates:   { type: array, items: { $ref: "#/components/schemas/CodingFormGiftCandidate" }, description: "LIVE (never persisted) exact-amount gift candidates within ±90 days of the donation date (gift's own date OR its counted QuickBooks payment date, whichever is closer). Same-donor when the row has a donor; donor-agnostic for the record-first pass (the picked gift's donor FKs are inherited). Populated only while the row is unresolved (no matched gift, not confirmed) so an ambiguous row shows the reviewer the choices instead of hiding them. Empty when a gift is already matched or no amount/date is set." }
        crossChecks:      { type: array, items: { $ref: "#/components/schemas/CodingFormCrossCheck" } }
        needsDecision:    { type: array, items: { $ref: "#/components/schemas/CodingFormNeedsDecision" } }
        grantAgreement:   { $ref: "#/components/schemas/CodingFormGrantAgreement" }
        aiInterpretation: { allOf: [ { $ref: "#/components/schemas/CodingFormAiInterpretation" } ], nullable: true, description: "The VALIDATED AI reinterpretation payload for this row (null when never run or the stored payload failed validation)." }
        aiInterpretedAt:  { type: string, nullable: true, description: "When the current AI payload was produced." }
        aiModel:          { type: string, nullable: true, description: "Model that produced the current AI payload." }
        aiError:          { type: string, nullable: true, description: "Last AI reinterpretation failure for this row (cleared on success)." }
        appliedAt:        { type: string, nullable: true }
        appliedTaskId:    { type: string, nullable: true }
        appliedAddressId: { type: string, nullable: true }
        appliedAllocationId: { type: string, nullable: true }
        createdAt:        { type: string }
        updatedAt:        { type: string }
    CodingFormRowList:
      type: object
      required: [data, pagination]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CodingFormRow" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CodingFormCount:
      type: object
      required: [key, count]
      properties:
        key:   { type: string }
        count: { type: integer }
    CodingFormSummary:
      type: object
      required: [total, byStatus, bySource, needsDecision]
      properties:
        total:     { type: integer }
        byStatus:  { type: array, items: { $ref: "#/components/schemas/CodingFormCount" } }
        bySource:  { type: array, items: { $ref: "#/components/schemas/CodingFormCount" } }
        needsDecision: { type: array, items: { $ref: "#/components/schemas/CodingFormCount" }, description: "Spreadsheet attributes with no existing schema home, with the number of rows carrying a value for each." }
    CodingFormGiftCandidate:
      type: object
      required: [id]
      description: "A live exact-amount gift candidate for an unresolved coding-form row. The donor FKs let the record-first matcher INHERIT the donor from the picked gift."
      properties:
        id:           { type: string }
        name:         { type: string, nullable: true }
        amount:       { type: string, nullable: true }
        dateReceived: { type: string, nullable: true }
        organizationId:          { type: string, nullable: true, description: "The candidate gift's donor org (donor XOR — at most one of the three is set)." }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
    CodingFormRematchSummary:
      type: object
      required: [scanned, updated, giftMatches]
      description: "Result of the bulk rematch-pending pass."
      properties:
        scanned:     { type: integer, description: "Rows examined (status pending AND never human-confirmed)." }
        updated:     { type: integer, description: "Rows whose proposal was rewritten by the matcher." }
        giftMatches: { type: integer, description: "Rows that now carry a proposed matchedGiftId." }
    CodingFormConfirmSummary:
      type: object
      required: [scanned, confirmed]
      description: "Result of the bulk confirm-matched pass."
      properties:
        scanned:   { type: integer, description: "Rows examined (status pending, never human-confirmed, with a matched donor AND gift)." }
        confirmed: { type: integer, description: "Rows stamped as confirmed." }
    CodingFormApplyDecidedSummary:
      type: object
      required: [scanned, applied, alreadyApplied, nothingToApply, failed, failures]
      description: "Result of the bulk apply-decided pass over pending, match-confirmed rows with stored decisions."
      properties:
        scanned:        { type: integer, description: "Rows examined (status pending, match confirmed, non-empty stored decisions)." }
        applied:        { type: integer, description: "Rows applied in this pass (now status applied)." }
        alreadyApplied: { type: integer, description: "Idempotent no-ops (row already applied)." }
        nothingToApply: { type: integer, description: "Rows whose approved attributes were no longer actionable — left pending for per-row review." }
        failed:         { type: integer, description: "Rows that errored mid-apply (see failures); left pending." }
        failures:
          type: array
          items: { $ref: "#/components/schemas/CodingFormRowFailure" }
    SetCodingFormMatchBody:
      type: object
      description: "Set the donor (XOR — at most one of the three donor FKs) and optionally the matched opportunity/gift. Null clears a field."
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        matchedOpportunityId:    { type: string, nullable: true }
        matchedGiftId:           { type: string, nullable: true }
    ApplyCodingFormRowBody:
      type: object
      required: [decisions]
      description: "Per-attribute apply/skip decisions. Only attributes set to 'apply' are written; everything else is left untouched."
      properties:
        decisions:
          type: object
          additionalProperties: { type: string, enum: [apply, skip] }
          description: "Map of cross-check attribute → apply | skip."
    CodingFormApplyResult:
      type: object
      required: [row, applied, skipped]
      properties:
        row:     { $ref: "#/components/schemas/CodingFormRow" }
        applied: { type: array, items: { type: string }, description: "Attributes written in this apply." }
        skipped: { type: array, items: { type: string }, description: "Attributes intentionally left untouched (same / skip / blocked)." }
    CodingFormGrantAgreementStatus:
      type: string
      enum: [na, no_match, ready, imported, conflict, failed]
      description: >-
        na = no Drive link; no_match = link but no matched opportunity OR gift;
        ready = will attach; imported = already attached by this backfill;
        conflict = the matched target already has a DIFFERENT grant letter;
        failed = the last fetch/upload attempt errored (see error).
    CodingFormGrantAgreement:
      type: object
      required: [status]
      description: "Derived (live) grant-agreement backfill view for a coding-form row. The letter attaches to the matched opportunity when one exists, else the matched gift."
      properties:
        status:              { $ref: "#/components/schemas/CodingFormGrantAgreementStatus" }
        targetType:          { type: string, nullable: true, enum: [opportunity, gift], description: "Where the letter goes: the matched opportunity when one exists, else the matched gift; null when neither is matched." }
        driveFileId:         { type: string, nullable: true, description: "File id extracted from the captured Drive link." }
        importedUrl:         { type: string, nullable: true, description: "Object-storage url of the file this backfill attached." }
        importedFilename:    { type: string, nullable: true }
        importedAt:          { type: string, nullable: true }
        oppExistingUrl:      { type: string, nullable: true, description: "The TARGET's (opportunity or gift — names kept for API compatibility) current grant-letter url (for conflict/imported display)." }
        oppExistingFilename: { type: string, nullable: true }
        error:               { type: string, nullable: true, description: "Last recorded fetch/upload error for this row." }
    PullGrantAgreementBody:
      type: object
      description: "Pull the Drive file onto the matched opportunity. Set replace=true to overwrite an existing grant letter."
      properties:
        replace: { type: boolean, description: "Overwrite an existing grant letter (resolve a conflict). Defaults to false." }
    PullGrantAgreementResult:
      type: object
      required: [row, outcome, replaced]
      properties:
        row:      { $ref: "#/components/schemas/CodingFormRow" }
        outcome:  { type: string, enum: [imported, already_imported, failed], description: "imported = attached now; already_imported = idempotent noop; failed = fetch/upload error (see error)." }
        replaced: { type: boolean, description: "True when an existing grant letter was overwritten." }
        error:    { type: string, nullable: true, description: "Human-readable failure reason when outcome=failed." }
    CodingFormGrantAgreementsSummary:
      type: object
      required: [totalWithLink, byStatus]
      properties:
        totalWithLink: { type: integer, description: "Rows carrying a grant-agreement Drive link." }
        byStatus:      { type: array, items: { $ref: "#/components/schemas/CodingFormCount" }, description: "Count per derived grant-agreement status. Includes a synthetic `held` key: ready/failed rows the bulk pull will NOT attempt (skipped, or match not confirmed/applied) — pull those per-row if genuinely wanted." }
    CodingFormBulkPullSummary:
      type: object
      required: [totalWithLink, attempted, imported, alreadyImported, conflict, noMatch, failed, failures]
      description: "Result of the bulk grant-agreement pull pass."
      properties:
        totalWithLink:   { type: integer, description: "Owner-vetted rows carrying a Drive link (scanned by this pass)." }
        attempted:       { type: integer, description: "Rows whose derived status was ready/failed — a pull was attempted." }
        imported:        { type: integer, description: "Letters attached in this pass." }
        alreadyImported: { type: integer, description: "Idempotent no-ops (letter already attached by this backfill)." }
        conflict:        { type: integer, description: "Targets holding a DIFFERENT letter — left for per-row review with replace=true." }
        noMatch:         { type: integer, description: "Rows with a link but no matched opportunity or gift." }
        failed:          { type: integer, description: "Drive/upload failures (recorded on the rows; see failures)." }
        failures:
          type: array
          items: { $ref: "#/components/schemas/CodingFormRowFailure" }
    CodingFormRowFailure:
      type: object
      required: [rowId, error]
      properties:
        rowId: { type: string }
        error: { type: string }
    CodingFormAiInterpretation:
      type: object
      required: [donorName, address, reportRequired, reportDueDate, junkFields, notes]
      description: "One Zod-validated AI reinterpretation payload. Downstream reads are EFFECTIVE (AI ?? parsed ?? raw); the AI may only normalize/suppress — it never maps circles to regions/entities."
      properties:
        donorName: { type: string, nullable: true, description: "Normalized donor display name (typo-fixed); null when the raw name needs no fixing." }
        address:
          type: object
          nullable: true
          required: [street, city, state, postal, country]
          description: "Structured address re-parsed from the free-text name+address blob; null when the blob holds no usable address."
          properties:
            street:  { type: string, nullable: true }
            city:    { type: string, nullable: true }
            state:   { type: string, nullable: true }
            postal:  { type: string, nullable: true }
            country: { type: string, nullable: true }
        reportRequired: { type: boolean, nullable: true, description: "Reinterpreted 'written report required?' answer; null when ambiguous." }
        reportDueDate:  { type: string, nullable: true, description: "YYYY-MM-DD when the raw answer states an explicit due date." }
        junkFields:
          type: array
          items: { type: string, enum: [internalMemo, restrictionLanguage, additionalNotes, circleRaw, seriesTypeRaw, donorNameAddressRaw, reportRequiredRaw] }
          description: "Row fields the AI flagged as junk/redundant (suppressed from tag/notes/address writes and cross-checks)."
        notes: { type: string, nullable: true, description: "One-sentence rationale for the reviewer." }
    CodingFormReinterpretResult:
      type: object
      required: [row, ok, error]
      properties:
        row:   { $ref: "#/components/schemas/CodingFormRow" }
        ok:    { type: boolean, description: "False when the model call or validation failed (see error; also recorded on the row as aiError)." }
        error: { type: string, nullable: true }
    ReinterpretCodingFormRowsBody:
      type: object
      description: "Bulk AI reinterpretation options."
      properties:
        force: { type: boolean, description: "Re-run every pending row, not just rows without a stored payload. Defaults to false." }
        limit: { type: integer, minimum: 1, maximum: 200, description: "Cap the number of rows processed in this pass (rows without a recorded failure first). Callers chunk with this to keep each request short; omit for the full set." }
    CodingFormReinterpretSummary:
      type: object
      required: [total, succeeded, failed, failures]
      description: "Result of the bulk AI reinterpretation pass."
      properties:
        total:     { type: integer, description: "Pending rows selected for this pass." }
        succeeded: { type: integer }
        failed:    { type: integer }
        failures:
          type: array
          items: { $ref: "#/components/schemas/CodingFormRowFailure" }
    ResolveStagedPaymentBody:
      type: object
      description: "Set exactly one donor FK (donor XOR). Null the others. Optionally record a payment intermediary."
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true }
    StagedGiftResponse:
      type: object
      required: [gift, stagedPaymentId]
      properties:
        gift:            { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentId: { type: string }
    GiftCandidate:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            organizationName:          { type: string, nullable: true }
            householdName:             { type: string, nullable: true }
            individualGiverPersonName: { type: string, nullable: true }
            alreadyLinkedStagedPaymentId:
              type: string
              nullable: true
              description: "Set when this gift is already owned by another money event — for a QB staged-payment anchor, another staged payment (QB cash-application ledger); for a Stripe-charge anchor, another Stripe charge (the QB ledger is expected, not a conflict). The UI disables linking to it to avoid double-counting."
    GiftCandidateList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/GiftCandidate" } }
    ReconcileStagedPaymentBody:
      type: object
      required: [giftId]
      description: "Reconcile the staged payment to an existing gifts_and_payments row. Optionally narrow the link to one of that gift's allocations."
      properties:
        giftId: { type: string }
        allocationId:
          type: string
          nullable: true
          description: "Optional gift_allocation id to record the link against. Must belong to giftId. NULL/omitted = link the whole gift header (the default). Recorded as a narrowing pointer on the cash-application ledger row; it never changes the tie/book-once math (those stay per-gift)."
    SplitStagedPaymentBody:
      type: object
      required: [giftIds]
      description: "Split one staged payment across several existing gifts, with any unmatched remainder optionally routed to a NEW gift. Each existing portion is the linked gift's own gross amount; the optional remainder mints one new gift for the leftover. The total links (existing gifts + remainder) must be at least two."
      properties:
        giftIds:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the existing gifts to split this staged payment across. Each must be unlinked everywhere and carry a single valid donor. Combined with an optional remainder gift, the split must cover at least two links; the summed gross (existing gifts + remainder) must sit in the fee-band around the staged net amount."
        remainderGift:
          $ref: "#/components/schemas/SplitStagedPaymentRemainderGift"
    SplitStagedPaymentRemainderGift:
      type: object
      required: [amount]
      description: "Route the unmatched remainder of the payment to a brand-new gift. Exactly one donor (Donor XOR). Its amount is added to the split's combined gross for the fee-band check."
      properties:
        amount: { type: string, description: "Gross amount of the new remainder gift (the leftover not covered by the existing gifts)." }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    SplitStagedPaymentResponse:
      type: object
      required: [stagedPaymentId, giftIds, splitTotal]
      properties:
        stagedPaymentId: { type: string }
        giftIds: { type: array, items: { type: string }, description: "All gift ids the payment was split across, including the newly minted remainder gift (if any)." }
        splitTotal: { type: string, description: "Combined gross total of the split gifts (existing + remainder)." }
        createdGiftId: { type: string, nullable: true, description: "Id of the newly minted remainder gift, when a remainder gift was requested; null otherwise." }
    GroupReconcileStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds, giftId]
      description: "Group several staged payments and reconcile the whole group to one existing gift. Members must share one bank deposit, or — when no deposit was captured — the same payer."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 2
          items: { type: string }
          description: "Ids of the staged payments to group. Must be at least two, all pending, and all sharing the same non-null qbDepositId, or — when none has a deposit — the same payer name."
        giftId: { type: string, description: "The existing gift the group reconciles to." }
        confirmMultiDate:
          type: boolean
          description: "Must be true when the grouped payments do not all share the same date_received, or carry more than one distinct (non-null) bank deposit. Guards against accidentally collapsing unrelated same-payer gifts (e.g. recurring donations) or two genuinely separate deposits into one. The client prompts the operator to confirm before sending this."
    GroupReconcileStagedPaymentsResponse:
      type: object
      required: [gift, stagedPaymentIds, representativeStagedPaymentId]
      properties:
        gift: { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentIds: { type: array, items: { type: string } }
        representativeStagedPaymentId: { type: string, description: "The deterministic group representative (min id among members). Informational only — every member books its own counted payment_applications ledger row to the gift." }
    ConfirmStagedPaymentMatchesBody:
      type: object
      required: [ids]
      description: "Bulk-confirm several staged-payment matches (e.g. the whole Auto-matched queue) in one call."
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to confirm. Ids that are not in a confirmable state are skipped, not errors."
    ConfirmStagedPaymentMatchesResponse:
      type: object
      required: [confirmedIds, requested]
      properties:
        confirmedIds: { type: array, items: { type: string }, description: "Ids that were actually confirmed." }
        requested: { type: integer, description: "How many ids were submitted. (requested − confirmedIds.length = skipped.)" }
    RevertStagedPaymentMatchesBody:
      type: object
      required: [ids]
      description: "Bulk-revert several auto-applied staged-payment matches (e.g. the whole Auto-matched queue) in one call."
      properties:
        ids:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to revert. Ids that are not in a revertible state are skipped, not errors."
    RevertStagedPaymentMatchesResponse:
      type: object
      required: [revertedIds, requested]
      properties:
        revertedIds: { type: array, items: { type: string }, description: "Ids that were actually reverted." }
        requested: { type: integer, description: "How many ids were submitted. (requested − revertedIds.length = skipped.)" }
    ExcludeStagedPaymentBody:
      type: object
      required: [exclusionReason]
      description: "File the staged payment under a non-gift exclusion category."
      properties:
        exclusionReason: { $ref: "#/components/schemas/StagedPaymentExclusionReason" }
    SetStagedPaymentEntityBody:
      type: object
      required: [entityId]
      description: "Pin (or clear) the Wildflower-entity attribution by hand. Sets entitySource='manual' so detectEntity never overwrites it on re-sync. entityId null clears the attribution back to the default Foundation bucket while keeping the manual pin."
      properties:
        entityId: { type: string, nullable: true, description: "The entities.id to attribute this incoming money to, or null to clear the attribution (keeping the manual pin)." }
    SetStagedPaymentFundingSourceBody:
      type: object
      required: [fundingSource]
      description: "Pin (or clear) the funding source by hand. Sets fundingSourceProvenance='manual' so detectFundingSource never overwrites it on re-sync / reclassify. fundingSource null clears the value back to unknown while keeping the manual pin (so it is not re-derived)."
      properties:
        fundingSource: { $ref: "#/components/schemas/StagedPaymentFundingSource", nullable: true, description: "The origin to attribute this money to, or null to clear it (keeping the manual pin)." }
    SetStagedPaymentCodingBody:
      type: object
      description: |
        Set or clear the revenue-coding snapshot on a staged payment. All fields
        optional; only provided fields are written. The bare fields are the
        derived coding values, the *Override fields pin a manual value, and
        codingFlags surfaces ambiguities for human review. Passing null clears a
        field.
      properties:
        objectCode:              { type: string, nullable: true }
        objectCodeOverride:      { type: string, nullable: true }
        revenueLocation:         { type: string, nullable: true }
        revenueLocationOverride: { type: string, nullable: true }
        revenueClass:            { type: string, nullable: true }
        revenueClassOverride:    { type: string, nullable: true }
        codingFlags:             { type: array, items: { type: string }, nullable: true }
        deferredRevenue:         { allOf: [ { $ref: "#/components/schemas/DeferredRevenue" } ], nullable: true }
        deferredRevenueReason:   { type: string, nullable: true }
    GroupStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds]
      description: "Mark two or more staged payments as ONE physical gift entered separately in QuickBooks (a 'same physical gift' group), stored in the unit_groups / unit_group_members tables. Does not change donor or gift links and never reconciles by itself."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 2
          items: { type: string }
          description: "Ids of the staged payments to group. Must be at least two distinct, existing, non-archived, still-unreconciled rows. Rows already in another group are rejected unless they are all already in the same group (idempotent re-group)."
        confirmDonorConflict:
          type: boolean
          description: "Must be true when the members already resolve to more than one distinct donor. Guards against grouping unrelated gifts. Without it such a group is rejected 400 donor_conflict. The client prompts the operator to confirm before sending this."
    GroupStagedPaymentsResponse:
      type: object
      required: [sourceGroupId, stagedPaymentIds, representativeStagedPaymentId]
      properties:
        sourceGroupId: { type: string, description: "The unit group id shared by every member." }
        stagedPaymentIds: { type: array, items: { type: string }, description: "All member ids now belonging to the unit group." }
        representativeStagedPaymentId: { type: string, description: "The deterministic representative member (the one the group card is anchored on and that carries the gift link on group approve)." }
        totalAmount: { type: string, nullable: true, description: "Summed amount of all members." }
    UngroupStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds]
      description: "Remove staged payments from their 'same physical gift' unit group. If removing rows leaves a group with fewer than two members, the remaining orphan is removed too and the empty group is deleted (a group requires >= 2)."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 1
          items: { type: string }
          description: "Ids of the staged payments to remove from their group. A no-op for rows that aren't grouped."
    UngroupStagedPaymentsResponse:
      type: object
      required: [ungroupedIds]
      properties:
        ungroupedIds: { type: array, items: { type: string }, description: "Ids removed from their unit group (includes any auto-dissolved orphans)." }
        dissolvedGroupIds: { type: array, items: { type: string }, description: "Unit group ids that no longer exist after this call (fully dissolved)." }
    CandidateThankYouEmail:
      type: object
      required: [emailMessageId, sentAt, hasDocumentAttachment]
      properties:
        emailMessageId:        { type: string }
        gmailMessageId:        { type: string, nullable: true }
        subject:               { type: string, nullable: true }
        fromEmail:             { type: string, nullable: true }
        toEmails:              { type: array, items: { type: string }, nullable: true }
        sentAt:                { type: string, format: date-time }
        snippet:               { type: string, nullable: true }
        hasDocumentAttachment: { type: boolean }
        documentAttachmentCount: { type: integer }
        autoSuggested:         { type: boolean, description: "True when this candidate matches the 30-day + 'thank' + has-document-attachment heuristic." }
    CandidateThankYouEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CandidateThankYouEmail" } }
    LinkThankYouEmailBody:
      type: object
      required: [emailMessageId]
      properties:
        emailMessageId: { type: string }

    # ─── Gift allocations ──────────────────────────────────────────────────────
    GiftAllocation:
      type: object
      required: [id, regionalRestrictionType, usageRestrictionType, timeRestrictionType, countsTowardGoal, createdAt, updatedAt]
      properties:
        id:                          { type: string }
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        reimbursementType:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, description: "Direct vs indirect share on a reimbursable grant. DIRECT is excluded from goal analytics; null (untagged) and indirect both count." }
        countsTowardGoal:            { type: boolean, description: "When false, this allocation's money is excluded from goal/received analytics rollups (e.g. government reimbursement that doesn't advance the fundraising goal). Per-allocation; defaults true." }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        displayUsage:                { type: string, nullable: true, readOnly: true, description: "Server-computed human-readable usage label (school name | usage label | usage + ' - ' + region names). Maintained by DB triggers; read-only." }
        purposeVerbatim:             { type: string, nullable: true }
        # @deprecated (Task #449) — superseded by reimbursementType. Spec-only
        # alias; the backing column was renamed, not retained. Read-only.
        reimbursableShare:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true, deprecated: true, description: "@deprecated — renamed to reimbursementType." }
        createdAt:                   { type: string, format: date-time }
        updatedAt:                   { type: string, format: date-time }
    GiftAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string }
        subAmount:                   { type: string }
        grantYear:                   { type: string }
        entityId:                    { type: string }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        intendedUsage:               { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:           { type: string }
        reimbursementType:           { $ref: "#/components/schemas/ReimbursementType" }
        countsTowardGoal:            { type: boolean }
        schoolRecipientId:           { type: string }
        spendingStart:               { type: string, format: date }
        spendingEnd:                 { type: string, format: date }
        regionIds:                   { type: array, items: { type: string } }
        purposeVerbatim:             { type: string }
    UpdateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        regionalRestrictionType:     { $ref: "#/components/schemas/RestrictionAxis" }
        usageRestrictionType:        { $ref: "#/components/schemas/RestrictionAxis" }
        timeRestrictionType:         { $ref: "#/components/schemas/RestrictionAxis" }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        reimbursementType:           { allOf: [ { $ref: "#/components/schemas/ReimbursementType" } ], nullable: true }
        countsTowardGoal:            { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        purposeVerbatim:             { type: string, nullable: true }

    # ─── Interactions ─────────────────────────────────────────────────────────
    InteractionKind:
      type: string
      enum: [meeting, phone_call, video_call, conference, other]
    Interaction:
      type: object
      required: [id, kind, occurredAt, summary, createdAt, updatedAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    InteractionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Interaction" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateInteractionBody:
      type: object
      required: [kind, occurredAt, summary]
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer }
        location:         { type: string }
        summary:          { type: string }
        notes:            { type: string }
        ownerUserId:      { type: string }
        personIds:        { type: array, items: { type: string } }
        organizationIds:        { type: array, items: { type: string } }
        householdIds:     { type: array, items: { type: string } }
    UpdateInteractionBody:
      type: object
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }

    # ─── Email messages + attachments + calendar events ──────────────────────
    EmailMessage:
      type: object
      required: [id, mailboxUserId, direction, sentAt, isPrivate]
      properties:
        id:                  { type: string }
        gmailMessageId:      { type: string }
        gmailThreadId:       { type: string, nullable: true }
        mailboxUserId:       { type: string }
        direction:           { type: string, enum: [sent, received] }
        sentAt:              { type: string, format: date-time }
        subject:             { type: string, nullable: true }
        snippet:             { type: string, nullable: true }
        fromEmail:           { type: string, nullable: true }
        toEmails:            { type: array, items: { type: string }, nullable: true }
        ccEmails:            { type: array, items: { type: string }, nullable: true }
        bccEmails:           { type: array, items: { type: string }, nullable: true }
        hasAttachments:      { type: boolean }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
        aiSummary:           { type: string, nullable: true, description: "One-line topic summary. Populated only when the mailbox owner is in `summary_only` mode; in that case it is the ONLY content stored for the message — `snippet`, `bodyText`, `bodyHtml`, and attachments are all absent." }
        isTracked:           { type: boolean, readOnly: true, description: "True when this sent message matches an open-tracking pixel record. Only ever true for sent messages." }
        trackingTotalViews:  { type: integer, nullable: true, readOnly: true, description: "Total tracking-pixel opens recorded for this message. When the list is contact-scoped (personId/organizationId/householdId), this counts opens by that contact only. Null when not tracked." }
        trackingLastOpenedAt: { type: string, format: date-time, nullable: true, readOnly: true, description: "Most recent tracked open timestamp. Null when not tracked or not yet opened." }
    EmailMessageDetail:
      allOf:
        - $ref: "#/components/schemas/EmailMessage"
        - type: object
          properties:
            bodyText:    { type: string, nullable: true }
            bodyHtml:    { type: string, nullable: true }
            attachments:
              type: array
              items: { $ref: "#/components/schemas/EmailAttachmentSummary" }
    EmailAttachmentSummary:
      type: object
      required: [id, filename, mimeType, sizeBytes]
      properties:
        id:                 { type: string }
        filename:           { type: string }
        mimeType:           { type: string }
        sizeBytes:          { type: integer }
        gmailAttachmentId:  { type: string, nullable: true }
    EmailMessageList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailMessage" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateEmailMessagePrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }
    CalendarEvent:
      type: object
      required: [id, calendarUserId, gcalCalendarId, gcalEventId, startAt, isPrivate]
      properties:
        id:                  { type: string }
        calendarUserId:      { type: string }
        gcalCalendarId:      { type: string }
        gcalEventId:         { type: string }
        startAt:             { type: string, format: date-time }
        endAt:               { type: string, format: date-time, nullable: true }
        summary:             { type: string, nullable: true }
        description:         { type: string, nullable: true }
        location:            { type: string, nullable: true }
        attendeeEmails:      { type: array, items: { type: string }, nullable: true }
        organizerEmail:      { type: string, nullable: true }
        status:              { type: string, nullable: true }
        htmlLink:            { type: string, nullable: true }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
    CalendarEventList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/CalendarEvent" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateCalendarEventPrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }

    # ─── Admin sync status ────────────────────────────────────────────────────
    AdminGoogleSyncSourceStatus:
      type: object
      required: [bootstrapInProgress, bootstrapStuck, noProgressRuns, stuck]
      properties:
        lastSyncedAt:           { type: string, format: date-time, nullable: true }
        lastError:              { type: string, nullable: true }
        bootstrapCompletedAt:   { type: string, format: date-time, nullable: true }
        bootstrapInProgress:    { type: boolean }
        bootstrapStuck:         { type: boolean, description: "True when the initial sync (bootstrap) hasn't completed and has stopped making progress — either errored past the stall threshold or no run has advanced it in over a day. Recoverable from the panel via Sync now." }
        noProgressRuns:         { type: integer, description: "Consecutive sync runs that made no forward progress (cursor pinned by errors). Resets to 0 on any clean run." }
        stuck:                  { type: boolean, description: "True once noProgressRuns crosses the stall threshold — the mailbox appears wedged and should be investigated." }
    AdminGoogleSyncUserRow:
      type: object
      required: [userId, userEmail, connected, gmail, calendar]
      properties:
        userId:           { type: string }
        userEmail:        { type: string }
        googleEmail:      { type: string, nullable: true }
        connected:        { type: boolean }
        grantedAt:        { type: string, format: date-time, nullable: true }
        revokedAt:        { type: string, format: date-time, nullable: true }
        tokenLastError:   { type: string, nullable: true }
        gmail:            { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
        calendar:         { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
    AdminGoogleSyncList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminGoogleSyncUserRow" }

    # ─── Google OAuth status ──────────────────────────────────────────────────
    GoogleOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has GOOGLE_OAUTH_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "Caller has an active, non-revoked grant" }
        googleEmail:  { type: string, nullable: true }
        scope:        { type: string, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }

    # ─── Derivation health check (report-only) ────────────────────────────────
    DerivationDriftRow:
      type: object
      required: [table, id, field]
      properties:
        table:   { type: string, enum: [opportunities_and_pledges, gifts_and_payments] }
        id:      { type: string }
        name:    { type: string, nullable: true }
        field:   { type: string, description: "Which persisted-derived column drifted: status, stage, written_pledge, paid, win_probability, or quickbooks_tie_status" }
        stored:  { type: string, nullable: true, description: "Value currently persisted on the row" }
        derived: { type: string, nullable: true, description: "Value the derivation computes from the row's inputs" }
    DerivationHealthReport:
      type: object
      required: [ranAt, durationMs, checkedOpportunities, checkedGifts, driftCount, byField, drift, truncated]
      properties:
        ranAt:                { type: string, format: date-time }
        durationMs:           { type: integer }
        checkedOpportunities: { type: integer }
        checkedGifts:         { type: integer }
        driftCount:           { type: integer, description: "Total drifting fields found (uncapped)" }
        byField:
          type: object
          additionalProperties: { type: integer }
          description: "Per-field drift totals (uncapped)"
        drift:
          type: array
          items: { $ref: "#/components/schemas/DerivationDriftRow" }
          description: "Detail rows, capped at 200"
        truncated: { type: boolean, description: "True when driftCount exceeded the detail-row cap" }

    # ─── Airtable → schools sync status (admin) ──────────────────────────────
    SchoolSyncStatus:
      type: object
      required: [configured]
      properties:
        configured:        { type: boolean, description: "Server has Airtable credentials set; the sync is a no-op without them" }
        lastRunStartedAt:  { type: string, format: date-time, nullable: true }
        lastRunFinishedAt: { type: string, format: date-time, nullable: true }
        lastStatus:        { type: string, nullable: true, enum: [ok, error, running], description: "State of the most recent run" }
        lastError:         { type: string, nullable: true }
        schoolsFetched:    { type: integer, nullable: true, description: "Records pulled from the Airtable Schools view in the last run" }
        schoolsUpserted:   { type: integer, nullable: true, description: "Schools inserted/updated in the CRM in the last run" }
        staleInDb:         { type: integer, nullable: true, description: "Schools present in the CRM but absent from the Airtable source view" }
        updatedAt:         { type: string, format: date-time, nullable: true }

    # ─── Google sync status + run report ──────────────────────────────────────
    GoogleSyncDateRange:
      type: object
      properties:
        earliest: { type: string, format: date-time, nullable: true }
        latest:   { type: string, format: date-time, nullable: true }
    GoogleSyncStatus:
      type: object
      properties:
        year: { type: integer, description: Calendar year the counts and date range are scoped to }
        gmail:
          nullable: true
          type: object
          properties:
            lastHistoryId:        { type: string, nullable: true }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
        calendar:
          nullable: true
          type: object
          properties:
            hasSyncToken:         { type: boolean }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
    GmailSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            skipped:             { type: integer }
            attachments:         { type: integer }
            attachmentBytes:     { type: integer }
            bootstrapCompleted:  { type: boolean }
            finalHistoryId:      { type: string, nullable: true }
    CalendarSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            updated:             { type: integer }
            skipped:             { type: integer }
            errors:              { type: integer }
            bootstrapCompleted:  { type: boolean }
            hasSyncToken:        { type: boolean }

    # ─── Email intelligence ───────────────────────────────────────────────────
    EmailProposalKind:
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce_invalid, bounce_soft, signature_update, grant_opportunity, thank_you_acknowledgment, wildflower_update]
    EmailProposalStatus:
      type: string
      enum: [pending, applied, rejected, ignored]
    EmailProposal:
      type: object
      required: [id, mailboxUserId, kind, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                 { type: string }
        mailboxUserId:      { type: string }
        kind:               { $ref: "#/components/schemas/EmailProposalKind" }
        status:             { $ref: "#/components/schemas/EmailProposalStatus" }
        sourceMessageId:    { type: string, nullable: true }
        targetPersonId:     { type: string, nullable: true }
        targetOrganizationId:     { type: string, nullable: true }
        targetEmailId:      { type: string, nullable: true }
        subjectEmail:       { type: string, nullable: true }
        subjectName:        { type: string, nullable: true }
        subjectDomain:      { type: string, nullable: true }
        # When the source Gmail message was SENT (from its Date /
        # internalDate), as opposed to createdAt (when our sync first
        # persisted the proposal). The review UI shows this so reviewers
        # see when the email actually arrived. Nullable: legacy rows /
        # messages without a parseable Date fall back to createdAt.
        emailSentAt:        { type: string, format: date-time, nullable: true }
        payload:            { type: object, additionalProperties: true }
        proposedActions:    { type: array, items: { $ref: "#/components/schemas/ProposedAction" } }
        actionsAnalyzedAt:  { type: string, format: date-time, nullable: true }
        actionsModel:       { type: string, nullable: true }
        actionsError:       { type: string, nullable: true }
        appliedActions:     { type: array, items: { $ref: "#/components/schemas/ApplyActionResult" }, nullable: true }
        dedupeKey:          { type: string }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
        resolvedAt:         { type: string, format: date-time, nullable: true }
        resolvedByUserId:   { type: string, nullable: true }
        # Free-text reviewer feedback captured on accept/reject. Used
        # downstream for prompt tuning — pair with `payload` and
        # `status` to see what the LLM proposed vs. what the human said.
        reviewerNote:       { type: string, nullable: true }
    ProposedAction:
      type: object
      required: [type, reason]
      additionalProperties: true
      properties:
        type:
          type: string
          enum:
            - deactivate_per
            - create_per
            - create_person_with_per
            - add_email
            - set_primary_email
            - mark_email_invalid
            - create_grant_opportunity
        reason: { type: string }
    ApplyActionResult:
      type: object
      required: [type, status]
      properties:
        type:      { type: string }
        status:    { type: string, enum: [applied, skipped, failed] }
        message:   { type: string, nullable: true }
        createdId: { type: string, nullable: true }
    EmailProposalList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailProposal" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    EmailProposalSummaryEntry:
      type: object
      required: [kind, pending]
      properties:
        kind:    { $ref: "#/components/schemas/EmailProposalKind" }
        pending: { type: integer }
    EmailProposalSummary:
      type: object
      required: [byKind, totalPending]
      properties:
        byKind:        { type: array, items: { $ref: "#/components/schemas/EmailProposalSummaryEntry" } }
        totalPending:  { type: integer }
    EmailProposalActionFailed:
      # Returned with status 422 when an accept dispatched but one of the
      # apply actions failed. The proposal stays pending (the route's
      # transaction rolls back the row's status change too) and partial
      # action results are surfaced so the UI can show what did/didn't run.
      type: object
      required: [error, message, failedAction, attemptedResults]
      properties:
        error:            { type: string, enum: [action_failed] }
        message:          { type: string }
        failedAction:     { type: string }
        attemptedResults: { type: array, items: { type: object, additionalProperties: true } }
    AcceptEmailProposalBody:
      # All fields optional — the accept handler is per-kind and reads only
      # what's relevant. e.g. signature_update may receive {applyTitle:true,
      # applyPhone:false} to opt into individual field copies; auto_responder_move
      # may receive {newPrimaryFunderId} to override the parsed company guess.
      # `reviewerNote` is recognized for every kind and stored on the
      # proposal row for prompt-tuning feedback.
      type: object
      additionalProperties: true
      properties:
        reviewerNote: { type: string, nullable: true }
        selectedActionIndexes:
          # Optional subset of the stored proposedActions to apply, by
          # zero-based index into the proposal's proposedActions array.
          # Omit the field entirely to apply ALL actions (backward
          # compatible with older clients). An empty array applies no
          # actions but still marks the proposal resolved/applied.
          # Ignored by the thank_you_acknowledgment branch, which has no
          # proposedActions list.
          type: array
          nullable: true
          items: { type: integer }
    RejectEmailProposalBody:
      # Optional reviewer feedback captured at reject time. The whole
      # body is optional so existing clients that POST with no body keep
      # working unchanged.
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }
    ReviseEmailProposalBody:
      # The reviewer's plain-English correction (e.g. "that's an invalid
      # email for him — mark it invalid and make the jfk@ one primary").
      # Required and non-empty: the whole point of this endpoint is to
      # re-run the AI with the reviewer's guidance folded in.
      type: object
      required: [reviewerGuidance]
      properties:
        reviewerGuidance: { type: string, minLength: 1 }

    # ─── Task intelligence ──────────────────────────────────────────────────────
    TaskProposalStatus:
      type: string
      enum: [pending, accepted, dismissed]
    TaskProposal:
      type: object
      required: [id, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                   { type: string }
        status:               { $ref: "#/components/schemas/TaskProposalStatus" }
        targetPersonId:       { type: string, nullable: true }
        targetOrganizationId: { type: string, nullable: true }
        # Signal bundle the AI reasoned over (recent gifts, open
        # opportunities, last-contact dates, capacity/priority, media).
        payload:              { type: object, additionalProperties: true }
        title:                { type: string, nullable: true }
        description:          { type: string, nullable: true }
        suggestedDueDate:     { type: string, format: date, nullable: true }
        rationale:            { type: string, nullable: true }
        # analyzedAt IS NULL means generation is still in flight.
        analyzedAt:           { type: string, format: date-time, nullable: true }
        model:                { type: string, nullable: true }
        error:                { type: string, nullable: true }
        dedupeKey:            { type: string }
        acceptedTaskId:       { type: string, nullable: true }
        reviewerNote:         { type: string, nullable: true }
        resolvedAt:           { type: string, format: date-time, nullable: true }
        resolvedByUserId:     { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }
    TaskProposalResponse:
      # `data` is null when the entity is low-priority (skipped) or has no
      # suggestion yet.
      type: object
      required: [data]
      properties:
        data: { allOf: [ { $ref: "#/components/schemas/TaskProposal" } ], nullable: true }
    RefreshTaskProposalBody:
      # Provide exactly one of personId / organizationId.
      type: object
      properties:
        personId:       { type: string }
        organizationId: { type: string }
    AcceptTaskProposalBody:
      # All optional. assigneeUserId optionally assigns the created task;
      # reviewerNote is stored on the proposal for feedback.
      type: object
      properties:
        assigneeUserId: { type: string, nullable: true }
        reviewerNote:   { type: string, nullable: true }
    AcceptTaskProposalResult:
      type: object
      required: [proposal, task]
      properties:
        proposal: { $ref: "#/components/schemas/TaskProposal" }
        task:     { $ref: "#/components/schemas/Task" }
    DismissTaskProposalBody:
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }
    ReviseTaskProposalBody:
      # The reviewer's plain-English correction (e.g. "this prospect already
      # gave this year — suggest a stewardship thank-you instead of an ask").
      # Required and non-empty: the whole point of this endpoint is to re-run
      # the suggestion with the reviewer's guidance folded in.
      type: object
      required: [reviewerGuidance]
      properties:
        reviewerGuidance: { type: string, minLength: 1 }

    # ─── Email-intelligence admin console ──────────────────────────────────────
    EmailIntelPromptStatus:
      type: string
      enum: [active, draft, archived]
    EmailIntelPromptOrigin:
      type: string
      enum: [hand_edited, ai_generated, reverted]
    EmailIntelSignalType:
      # The kind of detected signal a review prompt is scoped to. The
      # `bounce` value covers both bounce_invalid and bounce_soft proposal
      # kinds. `wildflower_update` is intentionally absent — it is
      # AI-generated, not regex-detected, and stays outside this review model.
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce, signature_update, grant_opportunity, thank_you_acknowledgment]
    EmailIntelReviewPhase:
      # `accuracy`   — judge whether the detected signal is actually correct.
      # `suppression` — even when accurate, decide if it is worth a human's time.
      type: string
      enum: [accuracy, suppression]
    EmailIntelPrompt:
      type: object
      required: [id, promptText, status, origin, createdAt, updatedAt]
      properties:
        id:           { type: string }
        promptText:   { type: string }
        status:       { $ref: "#/components/schemas/EmailIntelPromptStatus" }
        origin:       { $ref: "#/components/schemas/EmailIntelPromptOrigin" }
        # signalType + reviewPhase identify which review prompt this version
        # belongs to. Nullable only for legacy combined-prompt rows retained
        # as history; every new row is keyed.
        signalType:   { allOf: [ { $ref: "#/components/schemas/EmailIntelSignalType" } ], nullable: true }
        reviewPhase:  { allOf: [ { $ref: "#/components/schemas/EmailIntelReviewPhase" } ], nullable: true }
        authorUserId: { type: string, nullable: true }
        authorName:   { type: string, nullable: true }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    EmailIntelPromptKey:
      # The full state for a single (signal type, review phase) review
      # prompt: the live active version (omitted while on the built-in
      # default), any outstanding AI draft awaiting review, the archived
      # version history (newest first), and the built-in default text.
      type: object
      required: [signalType, reviewPhase, history, default, usingDefault]
      properties:
        signalType:   { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase:  { $ref: "#/components/schemas/EmailIntelReviewPhase" }
        active:       { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        draft:        { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        history:      { type: array, items: { $ref: "#/components/schemas/EmailIntelPrompt" } }
        default:      { type: string, description: "Built-in default review prompt text for this key (used when no active version exists)." }
        usingDefault: { type: boolean, description: "True when no saved active version exists for this key and the pipeline is on the built-in default." }
    EmailIntelPromptConsole:
      # All review-prompt keys (one per signal type × review phase) the admin
      # console renders in one fetch. The hidden action-proposing core prompt
      # is never returned here — admins cannot see or edit it.
      type: object
      required: [keys]
      properties:
        keys: { type: array, items: { $ref: "#/components/schemas/EmailIntelPromptKey" } }
    SaveEmailIntelPromptBody:
      type: object
      required: [signalType, reviewPhase, promptText]
      properties:
        signalType:  { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase: { $ref: "#/components/schemas/EmailIntelReviewPhase" }
        promptText:  { type: string, minLength: 1 }
    GenerateEmailIntelPromptBody:
      type: object
      required: [signalType, reviewPhase]
      properties:
        signalType:  { $ref: "#/components/schemas/EmailIntelSignalType" }
        reviewPhase: { $ref: "#/components/schemas/EmailIntelReviewPhase" }
    EmailIntelFeedbackAction:
      type: object
      required: [type, reason]
      properties:
        type:   { type: string }
        reason: { type: string }
    EmailIntelFeedbackItem:
      type: object
      required: [id, kind, status, mailboxUserId, proposedActions, createdAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/EmailProposalKind" }
        status:           { $ref: "#/components/schemas/EmailProposalStatus" }
        reviewerNote:     { type: string, nullable: true }
        mailboxUserId:    { type: string }
        mailboxUserName:  { type: string, nullable: true }
        resolvedByUserId: { type: string, nullable: true }
        resolverName:     { type: string, nullable: true }
        resolvedAt:       { type: string, format: date-time, nullable: true }
        subjectName:      { type: string, nullable: true }
        subjectEmail:     { type: string, nullable: true }
        proposedActions:  { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackAction" } }
        createdAt:        { type: string, format: date-time }
        emailSentAt:      { type: string, format: date-time, nullable: true }
    EmailIntelFeedbackList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackItem" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    UnrecognizedCorrespondent:
      type: object
      required: [emailAddress, threadCount, firstSeenAt, lastSeenAt]
      properties:
        emailAddress: { type: string }
        displayName:  { type: string, nullable: true }
        domain:       { type: string, nullable: true }
        threadCount:  { type: integer }
        firstSeenAt:  { type: string, format: date-time }
        lastSeenAt:   { type: string, format: date-time }
        lastSubject:  { type: string, nullable: true }
    UnrecognizedCorrespondentList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/UnrecognizedCorrespondent" } }
    CreateCorrespondentIgnoreBody:
      type: object
      required: [emailAddress]
      properties:
        emailAddress: { type: string }

    # ─── Notes ───────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, body, authorUserId, createdAt, updatedAt]
      properties:
        id:              { type: string }
        body:            { type: string }
        authorUserId:    { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    NoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Note" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateNoteBody:
      type: object
      required: [body]
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateNoteBody:
      type: object
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Media mentions ────────────────────────────────────────────────────────
    MediaMention:
      type: object
      required: [id, publicationName, url, pinned, dismissed, createdAt, updatedAt]
      properties:
        id:              { type: string }
        publicationName: { type: string }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        # Soft-delete tombstone. Dismissed mentions are never returned by the
        # list endpoint; the field is exposed for completeness on single-row
        # reads. DELETE marks this true instead of removing the row.
        dismissed:       { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    MediaMentionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MediaMention" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    MediaMentionInput:
      type: object
      required: [publicationName, url]
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string }
        author:          { type: string }
        publicationDate: { type: string, format: date }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string }
        source:          { type: string }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
    MediaMentionUpdate:
      type: object
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }

    # ─── Tasks ───────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [open, waiting, done, cancelled]
    TaskKind:
      type: string
      enum: [general, reporting_deadline, thank_you_followup]
    Task:
      type: object
      required: [id, title, status, kind, createdByUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string }
        description:      { type: string, nullable: true }
        dueDate:          { type: string, format: date, nullable: true }
        kind:             { $ref: "#/components/schemas/TaskKind" }
        status:           { $ref: "#/components/schemas/TaskStatus" }
        completedAt:      { type: string, format: date-time, nullable: true }
        assigneeUserId:   { type: string, nullable: true }
        createdByUserId:  { type: string }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        opportunityIds:   { type: array, items: { type: string }, nullable: true }
        giftIds:          { type: array, items: { type: string }, nullable: true }
        grantLeadIds:     { type: array, items: { type: string }, nullable: true }
        mentionUserIds:   { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    TaskList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Task" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateTaskBody:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        description:     { type: string }
        dueDate:         { type: string, format: date }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        grantLeadIds:    { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateTaskBody:
      type: object
      properties:
        title:           { type: string }
        description:     { type: string, nullable: true }
        dueDate:         { type: string, format: date, nullable: true }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string, nullable: true }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        grantLeadIds:    { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Grant Leads ──────────────────────────────────────────────────────────
    GrantLeadStatus:
      type: string
      enum: [new, claimed, converted, archived]
    GrantLeadSighting:
      type: object
      required: [id, grantLeadId, mailboxUserId, createdAt]
      properties:
        id:              { type: string }
        grantLeadId:     { type: string }
        mailboxUserId:   { type: string }
        mailboxUserName: { type: string, nullable: true, description: "Denormalized display name of the mailbox user." }
        gmailMessageId:  { type: string, nullable: true }
        emailMessageId:  { type: string, nullable: true }
        emailSentAt:     { type: string, format: date-time, nullable: true }
        createdAt:       { type: string, format: date-time }
    GrantLeadSourceEmail:
      type: object
      description: "Compact reference to a source email ('sighting') that produced this lead, for opening the original message from the list."
      required: [emailMessageId, gmailMessageId, mailboxUserName, emailSentAt]
      properties:
        emailMessageId:  { type: string, nullable: true, description: "Internal email_messages row id, if the message has been synced into the CRM." }
        gmailMessageId:  { type: string, nullable: true, description: "Raw Gmail message id, used for a Gmail deep-link fallback when not yet synced." }
        mailboxUserName: { type: string, nullable: true, description: "Display name of the mailbox that received this email." }
        emailSentAt:     { type: string, format: date-time, nullable: true, description: "When the source email was sent." }
    GrantLead:
      type: object
      required: [id, dedupeKey, status, title, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        dedupeKey:                { type: string }
        status:                   { $ref: "#/components/schemas/GrantLeadStatus" }
        title:                    { type: string }
        funderName:               { type: string, nullable: true }
        targetOrganizationId:     { type: string, nullable: true }
        targetOrganizationName:   { type: string, nullable: true, description: "Denormalized name of the matched CRM organization." }
        deadline:                 { type: string, nullable: true }
        amount:                   { type: string, nullable: true }
        url:                      { type: string, nullable: true }
        snippet:                  { type: string, nullable: true }
        assigneeUserId:           { type: string, nullable: true }
        assigneeUserName:         { type: string, nullable: true, description: "Denormalized display name of the assignee." }
        claimedAt:                { type: string, format: date-time, nullable: true }
        convertedAt:              { type: string, format: date-time, nullable: true }
        convertedByUserId:        { type: string, nullable: true }
        convertedOpportunityId:   { type: string, nullable: true }
        archivedAt:               { type: string, format: date-time, nullable: true }
        archivedByUserId:         { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
        sightingCount:            { type: integer, description: "Number of inboxes that received this lead." }
        sightingUserIds:          { type: array, items: { type: string }, description: "Mailbox user IDs who received this lead (for display)." }
        sourceEmails:             { type: array, items: { $ref: "#/components/schemas/GrantLeadSourceEmail" }, description: "Source emails that produced this lead, most-recent first, for opening the original message." }
    GrantLeadDetail:
      allOf:
        - { $ref: "#/components/schemas/GrantLead" }
        - type: object
          required: [sightings]
          properties:
            sightings: { type: array, items: { $ref: "#/components/schemas/GrantLeadSighting" } }
    GrantLeadList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GrantLead" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    AssignGrantLeadBody:
      type: object
      required: [assigneeUserId]
      properties:
        assigneeUserId: { type: string, nullable: true, description: "Set to null to unassign." }
    SplitGrantLeadBody:
      type: object
      required: [newTitle]
      properties:
        newTitle:      { type: string, description: "Title for the newly created split-off lead." }
        newFunderName: { type: string, description: "Funder name for the split-off lead (optional)." }
    SplitGrantLeadResponse:
      type: object
      required: [original, splitOff]
      properties:
        original: { $ref: "#/components/schemas/GrantLead" }
        splitOff: { $ref: "#/components/schemas/GrantLeadDetail" }
    ConvertGrantLeadBody:
      type: object
      properties:
        organizationId:           { type: string, description: "Donor org (Donor XOR)." }
        individualGiverPersonId:  { type: string, description: "Individual donor (Donor XOR)." }
        householdId:              { type: string, description: "Household donor (Donor XOR)." }
        ownerUserId:              { type: string, description: "Opportunity owner (defaults to caller)." }
        name:                     { type: string, description: "Opportunity name (defaults to lead title)." }
        askAmount:                { type: string, description: "Ask amount in decimal string form." }
        applicationDeadline:      { type: string, format: date, description: "Application deadline (defaults to lead deadline)." }
    ConvertGrantLeadResponse:
      type: object
      required: [grantLead, opportunity]
      properties:
        grantLead:   { $ref: "#/components/schemas/GrantLead" }
        opportunity: { type: object, description: "The newly created opportunity row." }

    # ─── Meeting notes ────────────────────────────────────────────────────────
    MeetingActionItem:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        assigneeName:    { type: string, nullable: true, description: "Free-text assignee name as extracted from the transcript." }
        dueDate:         { type: string, format: date, nullable: true }
        promotedTaskId:  { type: string, nullable: true, description: "Set after this item was promoted into a task via /promote-action-item." }
    MeetingNote:
      type: object
      required: [id, meetingDate, summaryOnly, creatorUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string, nullable: true }
        meetingDate:      { type: string, format: date-time }
        attendees:        { type: array, items: { type: string }, nullable: true }
        rawTranscript:    { type: string, nullable: true, description: "Always null when summaryOnly is true." }
        summaryOnly:      { type: boolean, description: "Snapshot of the creator's email_sync_mode at create time. When true, the raw transcript was dropped pre-insert." }
        aiSummary:        { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        creatorUserId:    { type: string }
        personId:         { type: string, nullable: true }
        organizationId:         { type: string, nullable: true }
        householdId:      { type: string, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    MeetingNoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MeetingNote" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateMeetingNoteBody:
      type: object
      description: "Exactly one of personId / funderId / householdId must be set (contact XOR). Exactly one of `transcript` or `summary` must be provided — `transcript` runs through AI summarization, `summary` is stored verbatim as the note body (used by the hand-typed-notes flow)."
      properties:
        transcript:      { type: string, description: "Raw pasted transcript. Dropped server-side before insert when the caller's email_sync_mode is summary_only. Runs through AI summarization to produce aiSummary + actionItems." }
        summary:         { type: string, description: "Hand-typed notes. Stored verbatim as aiSummary with no AI processing; no rawTranscript or actionItems are generated. Mutually exclusive with transcript." }
        title:           { type: string }
        meetingDate:     { type: string, format: date-time, description: "Defaults to now if omitted." }
        attendees:       { type: array, items: { type: string } }
        personId:        { type: string }
        organizationId:        { type: string }
        householdId:     { type: string }
    UpdateMeetingNoteBody:
      type: object
      properties:
        title:           { type: string, nullable: true }
        meetingDate:     { type: string, format: date-time }
        attendees:       { type: array, items: { type: string }, nullable: true }
        aiSummary:       { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        personId:        { type: string, nullable: true }
        organizationId:        { type: string, nullable: true }
        householdId:     { type: string, nullable: true }
    PromoteActionItemBody:
      type: object
      required: [index]
      properties:
        index:           { type: integer, description: "Zero-based index into actionItems[]." }
        assigneeUserId:  { type: string, description: "Optional override; the extracted assigneeName is free-text and may not map to a user." }
        dueDate:         { type: string, format: date }

    # ─── Saved views ───────────────────────────────────────────────────────────
    SavedViewVisibility:
      type: string
      enum: [team, individual]
      description: "team = shared with everyone (creator-edit-only); individual = private to creator."
    SavedView:
      type: object
      required: [id, listKey, name, visibility, state, creatorUserId, createdAt, updatedAt]
      properties:
        id:             { type: string }
        listKey:        { type: string }
        name:           { type: string }
        visibility:     { $ref: "#/components/schemas/SavedViewVisibility" }
        state:          { type: object, additionalProperties: true, description: "Opaque page-specific state blob: filters + sort." }
        creatorUserId:  { type: string }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    SavedViewList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/SavedView" } }
    CreateSavedViewBody:
      type: object
      required: [listKey, name, visibility, state]
      properties:
        listKey:    { type: string }
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }
    UpdateSavedViewBody:
      type: object
      description: "Only the creator may PATCH. All fields optional; at least one required."
      properties:
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }

    # ─── Email tracking (Magio-compatible) ─────────────────────────────────
    TrackedEmail:
      type: object
      required: [id, subject, recipient, sender, recipientPersonIds, recipientOrganizationIds, recipientHouseholdIds, createdAt]
      properties:
        id:                       { type: string }
        subject:                  { type: string }
        recipient:                { type: string, description: "Verbatim To: line scraped by the extension, may be a comma list." }
        sender:                   { type: string }
        senderIp:                 { type: string, nullable: true }
        recipientPersonIds:       { type: array, items: { type: string } }
        recipientOrganizationIds:       { type: array, items: { type: string } }
        recipientHouseholdIds:    { type: array, items: { type: string } }
        groupId:                  { type: string, nullable: true, description: "Shared across per-recipient copies of one group send; null for legacy single-pixel sends." }
        gmailMessageId:           { type: string, nullable: true }
        gmailThreadId:            { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        totalViews:               { type: integer, description: "Convenience aggregate; present on list/detail responses." }
        lastView:                 { type: string, format: date-time, nullable: true }
    TrackedEmailView:
      type: object
      required: [id, viewedAt]
      properties:
        id:        { type: string }
        viewedAt:  { type: string, format: date-time }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
    TrackedEmailWithViews:
      allOf:
        - $ref: "#/components/schemas/TrackedEmail"
        - type: object
          required: [totalViews, uniqueIps, views]
          properties:
            totalViews: { type: integer }
            uniqueIps:  { type: integer }
            views:      { type: array, items: { $ref: "#/components/schemas/TrackedEmailView" } }
            recipients:
              type: array
              description: "Per-recipient open breakdown. For a group send this lists every recipient with their own open counts; for a legacy single send it has one entry. Aggregate fields above sum across the group."
              items: { $ref: "#/components/schemas/TrackedEmailRecipient" }
    TrackedEmailRecipient:
      type: object
      required: [id, recipient, totalViews]
      properties:
        id:         { type: string, description: "tracked_emails row id = this recipient's pixel id." }
        recipient:  { type: string }
        totalViews: { type: integer }
        lastView:   { type: string, format: date-time, nullable: true }
    TrackedEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TrackedEmail" } }
    TrackedEmailStatus:
      type: object
      required: [subject, viewCount]
      properties:
        subject:   { type: string }
        viewCount: { type: integer }
    CreateTrackedEmailBody:
      type: object
      required: [subject, recipient, sender]
      description: "Posted by the extension at send-time."
      properties:
        subject:   { type: string }
        recipient: { type: string, description: "Comma- or semicolon-separated address list scraped from compose UI." }
        sender:    { type: string }
    SendTrackedEmailBody:
      type: object
      required: [subject, html, to]
      description: "Posted by the extension for a per-recipient (group) send."
      properties:
        subject:    { type: string }
        html:       { type: string, description: "Composed message body as HTML." }
        to:         { type: array, items: { type: string }, minItems: 1, description: "To: addresses (shown on every copy)." }
        cc:         { type: array, items: { type: string }, description: "Cc: addresses (shown on every copy)." }
        inReplyTo:  { type: string, nullable: true, description: "Message-ID being replied to, for threading." }
        references: { type: string, nullable: true }
    SendTrackedEmailResult:
      type: object
      required: [groupId, recipients]
      properties:
        groupId:  { type: string }
        threadId: { type: string, nullable: true, description: "Shared Gmail thread id for the sent copies." }
        recipients:
          type: array
          items:
            type: object
            required: [id, recipient]
            properties:
              id:        { type: string }
              recipient: { type: string }
    ExtensionTokenResponse:
      type: object
      required: [token]
      properties:
        token: { type: string, nullable: true, description: "Null when the user has not generated a token yet." }

    # ─── Bulk record updates ───────────────────────────────────────────────────
    BulkUpdateResult:
      type: object
      required: [requested, succeededIds, failed]
      properties:
        requested:    { type: integer, description: "Number of ids in the request." }
        succeededIds: { type: array, items: { type: string } }
        failed:
          type: array
          items:
            type: object
            required: [id, message]
            properties:
              id:      { type: string }
              message: { type: string }
    MergeResult:
      type: object
      required: [primaryId, mergedIds]
      properties:
        primaryId: { type: string, description: "The surviving record id." }
        mergedIds: { type: array, items: { type: string }, description: "Duplicate record ids that were merged into the primary and deleted." }
    MergeOrganizationsBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted funder columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    MergePeopleBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted person columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    MergeGiftsBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (losers) into `primaryId` (survivor): the survivor's amount becomes the sum of all selected gifts, every loser's allocation rows move onto the survivor, and the losers are permanently deleted. Exactly one of the donor fields must be set (donor XOR); it is applied to the survivor."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    MergeGiftsIntoPledgeBody:
      type: object
      required: [giftIds]
      description: "Attach `giftIds` to a pledge as its payments (each gift's opportunity_id is set). Provide `pledgeId` to attach to an existing pledge, OR omit it to create a NEW pledge — in which case exactly one donor field must be set (donor XOR) for the new pledge."
      properties:
        giftIds: { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        pledgeId: { type: string, nullable: true, description: "Existing pledge to attach to. Omit/null to create a new pledge." }
        name: { type: string, nullable: true, description: "Name for the new pledge (ignored when pledgeId is set)." }
        organizationId: { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId: { type: string, nullable: true }
    MergeIntoPledgeResult:
      type: object
      required: [pledgeId, giftIds, created]
      properties:
        pledgeId: { type: string, description: "The pledge the gifts were attached to." }
        giftIds: { type: array, items: { type: string }, description: "The gift ids attached as payments." }
        created: { type: boolean, description: "True if a new pledge was created, false if an existing one was used." }
    SplitGiftIntoPledgeBody:
      type: object
      description: "Optional overrides when splitting a gift into a pledge. The pledge inherits the gift's donor and uses the gift amount as its awarded amount; each gift_allocation becomes one payment gift."
      properties:
        name: { type: string, nullable: true, description: "Name for the new pledge. Defaults to the gift's name." }
    WriteOffPledgeBody:
      type: object
      description: "Options for an audit-close pledge write-off. The negative allocations are derived server-side pro-rata from the chosen amount."
      properties:
        reason: { type: string, nullable: true, description: "Optional free-text note explaining why the pledge is being written off (recorded on the write-off pledge's usage notes)." }
        amount: { type: string, nullable: true, description: "Dollar amount (major units, 2dp) of pledge commitment to write off. Independent of any payment actually received. Must be > 0 and <= the pledge's uncollected remainder net of prior active write-offs; omitted/null writes off that full net balance." }
    MintGiftFromOpportunityBody:
      type: object
      description: "Options for proactively minting a gift from an opportunity/pledge. All money/donor/scope is derived server-side from the opportunity; the client only chooses the settlement-expectation flavor."
      properties:
        awaitingSettlement: { type: boolean, description: "When true, stamp the minted gift `awaiting_settlement=true` (the 'won gift awaiting imminent payment' action) so it is not treated as a reconciliation error while it briefly has no cash tie. Defaults false (a plain 'won gift')." }
    ResolveGiftOverpayBody:
      type: object
      description: "Optional metadata for an audit-close gift over-payment resolution. The surplus amount is derived server-side from evidence precedence; the client never supplies amounts."
      properties:
        reason: { type: string, nullable: true, description: "Optional free-text note explaining the over-payment (recorded on the surplus gift's details)." }
    RevertGiftToOpportunityBody:
      type: object
      description: "Options for reverting a gift back into an opportunity. The new record inherits the gift's donor and amount; the gift's allocations are mirrored onto pledge_allocations and the gift is archived."
      properties:
        asPledge: { type: boolean, default: false, description: "When true the new record is a written PLEDGE (writtenPledge=true); otherwise an open opportunity." }
        name: { type: string, nullable: true, description: "Name for the new opportunity/pledge. Defaults to the gift's name." }
    RevertGiftToOpportunityResult:
      type: object
      required: [opportunityId, asPledge]
      properties:
        opportunityId: { type: string, description: "Id of the newly created opportunities_and_pledges row." }
        asPledge:      { type: boolean, description: "Whether the new record was created as a written pledge." }
    BulkArchiveBody:
      type: object
      required: [ids]
      description: "Ids of the records to archive (soft-delete). Stamps archived_at on each row instead of removing it. Processed per-row; the response reports which ids succeeded and which failed (with a reason)."
      properties:
        ids: { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
    BulkUpdatePeoplePatch:
      type: object
      description: "Only fields present here are written. All fields are optional and forward-only — omit to leave unchanged."
      properties:
        ownerUserId:         { type: string, nullable: true }
        currentHomeRegionId: { type: string, nullable: true }
        capacityRating:      { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        connectionStatus:    { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        enthusiasm:          { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:            { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        deceased:            { type: boolean }
        newsletter:          { type: boolean, description: "Newsletter subscription flag. Changes are mirrored out to Flodesk (precedence rules apply — a Flodesk unsubscribe still wins)." }
        interestsThematic:
          type: array
          items: { type: string }
          description: "Thematic-interest tags on each person (people.interests_thematic). Combined with interestsThematicMode."
        interestsThematicMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite the person's interests_thematic with this set (DESTRUCTIVE). append = union this set into the existing tags."
        interestsAges:
          type: array
          items: { type: string }
          description: "Age-band interest tags on each person (people.interests_ages). Combined with interestsAgesMode."
        interestsAgesMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        interestsGovModels:
          type: array
          items: { type: string }
          description: "Governance-model interest tags on each person (people.interests_gov_models). Combined with interestsGovModelsMode."
        interestsGovModelsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        regionIds:
          type: array
          items: { type: string }
          description: "Region-interest ids on each person (people.region_ids). Combined with regionIdsMode."
        regionIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing ids."
    BulkUpdatePeopleBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdatePeoplePatch" }
    BulkUpdateOrganizationsPatch:
      type: object
      properties:
        ownerUserId:          { type: string, nullable: true }
        activeStatus:         { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        connectionStatus:     { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        capacityRating:       { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        enthusiasm:           { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:             { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        strategicAlignment:   { allOf: [ { $ref: "#/components/schemas/StrategicAlignment" } ], nullable: true }
        entityType:           { type: string, nullable: true }
        issuesGrants:         { type: boolean }
        makesPris:            { type: boolean, nullable: true }
        interestsThematic:
          type: array
          items: { type: string }
          description: "Thematic-interest tags on each organization (organizations.interests_thematic). Combined with interestsThematicMode."
        interestsThematicMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite the organization's interests_thematic with this set (DESTRUCTIVE). append = union this set into the existing tags."
        interestsAges:
          type: array
          items: { type: string }
          description: "Age-band interest tags on each organization (organizations.interests_ages). Combined with interestsAgesMode."
        interestsAgesMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        interestsGovModels:
          type: array
          items: { type: string }
          description: "Governance-model interest tags on each organization (organizations.interests_gov_models). Combined with interestsGovModelsMode."
        interestsGovModelsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing tags."
        regionIds:
          type: array
          items: { type: string }
          description: "Region-interest ids on each organization (organizations.region_ids). Combined with regionIdsMode."
        regionIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = overwrite (DESTRUCTIVE). append = union into existing ids."
    BulkUpdateOrganizationsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOrganizationsPatch" }
    BulkUpdateHouseholdsPatch:
      type: object
      properties:
        active: { type: boolean }
    BulkUpdateHouseholdsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateHouseholdsPatch" }
    BulkUpdateOpportunitiesPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        lossType:    { allOf: [ { $ref: "#/components/schemas/OpportunityLossType" } ], nullable: true }
        stage:       { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        writtenPledge:   { type: boolean, nullable: true }
        actualCompletionDate: { type: string, format: date, nullable: true, description: "Close date applied to each row. REQUIRED (in the patch or already on the row) for any row this bulk patch NEWLY closes (lossType set, or stage → complete) — such rows fail per-row validation without it. Rows already closed (incl. legacy no-date rows) are exempt." }
        projectedCloseDate:   { type: string, format: date, nullable: true, description: "Projected close date on each opportunity." }
        applicationDeadline:  { type: string, format: date, nullable: true, description: "Application deadline on each opportunity." }
        entities:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each opportunity via pledge_allocations. Combined with entitiesMode."
        entitiesMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe pledge_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        coveredFiscalYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs (e.g. 'fy2026') to attach to each opportunity via pledge_allocations. Combined with coveredFiscalYearsMode."
        coveredFiscalYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe existing pledge_allocations on each opp and recreate one minimal row per FY (DESTRUCTIVE: loses subAmount/intendedUsage on those rows). append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every pledge_allocations row of each opportunity. Existing allocation rows are updated to this value; if an opportunity has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every pledge_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateOpportunitiesBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOpportunitiesPatch" }
    BulkUpdateGiftsPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentMethod: { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        dateReceived:  { type: string, format: date, nullable: true, description: "Date the gift/payment was received." }
        entityIds:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each gift via gift_allocations. Combined with entityIdsMode."
        entityIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        grantYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs to attach via gift_allocations. Combined with grantYearsMode."
        grantYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose grant_year is set (DESTRUCTIVE) and recreate one minimal row per FY. append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every gift_allocations row of each gift. Existing allocation rows are updated to this value; if a gift has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every gift_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateGiftsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateGiftsPatch" }

    # ─── Person suppression windows ──────────────────────────────────────────
    PersonSuppressionWindow:
      type: object
      required: [id, personId, createdAt, updatedAt]
      properties:
        id:        { type: string }
        personId:  { type: string }
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PersonSuppressionWindowList:
      type: object
      required: [data, staffDefaultSuppressed]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/PersonSuppressionWindow" } }
        staffDefaultSuppressed:
          type: boolean
          description: >-
            True when this person is permanently suppressed from email/calendar
            sync BY DEFAULT because they own a Wildflower staff email (internal
            domain) and have no explicit suppression window. Adding any window
            overrides the default (then only the window dates govern). Only
            meaningful for a single-person listing; false for the admin
            all-windows listing.
    CreatePersonSuppressionWindowBody:
      type: object
      required: [personId]
      properties:
        personId:  { type: string }
        notes:     { type: string }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    UpdatePersonSuppressionWindowBody:
      type: object
      properties:
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }

    # ─── Calendar meeting-filter config ──────────────────────────────────────
    CalendarMeetingFiltersConfig:
      type: object
      required: [titlePatterns, attendeeCountCutoff, updatedAt]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }
        updatedAt:          { type: string, format: date-time, nullable: true }
    UpdateCalendarMeetingFiltersBody:
      type: object
      required: [titlePatterns, attendeeCountCutoff]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }

    # ─── Internal staff email-domain config ──────────────────────────────────
    InternalEmailDomainsConfig:
      type: object
      required: [domains, updatedAt]
      properties:
        domains:   { type: array, items: { type: string } }
        updatedAt: { type: string, format: date-time, nullable: true }
    UpdateInternalEmailDomainsBody:
      type: object
      required: [domains]
      properties:
        domains: { type: array, items: { type: string } }

    # ─── Wildflower updates (shared admin-editable note) ─────────────────────
    WildflowerUpdateConfig:
      type: object
      required: [content, updatedAt]
      properties:
        content:         { type: string }
        updatedAt:       { type: string, format: date-time }
        updatedByUserId: { type: string, nullable: true }
    UpdateWildflowerUpdateBody:
      type: object
      required: [content]
      properties:
        content: { type: string }

    # ─── Audit log ────────────────────────────────────────────────────────────
    AuditChange:
      type: object
      required: [field]
      properties:
        field: { type: string }
        from: {}
        to: {}
    AuditLogEntry:
      type: object
      required: [id, action, entityType, entityId, createdAt]
      properties:
        id:          { type: string }
        actorUserId: { type: ["string", "null"] }
        actorName:   { type: ["string", "null"] }
        actorEmail:  { type: ["string", "null"] }
        action:      { type: string }
        entityType:  { type: string }
        entityId:    { type: string }
        summary:     { type: ["string", "null"] }
        changes:
          type: ["array", "null"]
          items: { $ref: "#/components/schemas/AuditChange" }
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:   { type: string, format: date-time }
    AuditLogList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Admin: offboarding / owner reassignment ───────────────────────────────
    OwnedRecordCounts:
      type: object
      required: [people, organizations, opportunities, gifts, interactions, tasks, grantLeads, total]
      properties:
        people:        { type: integer }
        organizations: { type: integer }
        opportunities: { type: integer }
        gifts:         { type: integer }
        interactions:  { type: integer }
        tasks:         { type: integer, description: "Tasks assigned to the user (assignee_user_id). Task authorship (created_by_user_id) is left untouched." }
        grantLeads:    { type: integer, description: "Grant leads claimed by the user (assignee_user_id)." }
        total:         { type: integer }
    ReassignOwnerBody:
      type: object
      required: [fromUserId, toUserId]
      properties:
        fromUserId:    { type: string, description: "The departing/source user whose records will be reassigned." }
        toUserId:      { type: string, description: "The user who will own the records afterward. Must be active (not archived)." }
        archiveSource: { type: boolean, default: false, description: "When true, archive the source user after a successful reassignment (offboarding)." }
    ReassignOwnerResult:
      type: object
      required: [reassigned, archivedSource]
      properties:
        reassigned:     { $ref: "#/components/schemas/OwnedRecordCounts" }
        archivedSource: { type: boolean, description: "True if the source user was archived as part of this call." }
