        intendedUsage:          { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:      { type: string, nullable: true }
        directToSchool:         { type: boolean }
        status:                 { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        conditions:             { type: string, nullable: true }
        notes:                  { type: string, nullable: true }
        regionIds:              { type: array, items: { type: string }, nullable: true }
        createdAt:              { type: string, format: date-time }
        updatedAt:              { type: string, format: date-time }
    PledgeAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/PledgeAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string }
        subAmount:             { type: string }
        grantYear:             { type: string }
        entityId:              { type: string }
        intendedUsage:         { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:     { type: string }
        directToSchool:        { type: boolean }
        status:                { $ref: "#/components/schemas/PledgeAllocationStatus" }
        conditions:            { type: string }
        notes:                 { type: string }
        regionIds:             { type: array, items: { type: string } }
    UpdatePledgeAllocationBody:
      type: object
      properties:
        pledgeOrOpportunityId: { type: string, nullable: true }
        subAmount:             { type: string, nullable: true }
        grantYear:             { type: string, nullable: true }
        entityId:              { type: string, nullable: true }
        intendedUsage:         { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:     { type: string, nullable: true }
        directToSchool:        { type: boolean }
        status:                { allOf: [ { $ref: "#/components/schemas/PledgeAllocationStatus" } ], nullable: true }
        conditions:            { type: string, nullable: true }
        notes:                 { type: string, nullable: true }
        regionIds:             { type: array, items: { type: string }, nullable: true }

    # ─── Gifts & payments ──────────────────────────────────────────────────────
    GiftOrPayment:
      type: object
      required: [id, designatedToSchool, createdAt, updatedAt]
      properties:
        id:                         { type: string }
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true }
        organizationId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentOnPledgeId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string, nullable: true }
        thankYouSentAt:             { type: string, format: date, nullable: true, description: "Date the linked thank-you email was sent. Snapshot of emailMessages.sentAt at link time." }
        thankYouEmailMessageId:     { type: string, nullable: true, description: "FK to the email_messages row that was identified as the thank-you. Read-only; set via /link-thank-you-email or the thank_you_acknowledgment proposal accept." }
        thankYouAttachments:
          type: array
          nullable: true
          readOnly: true
          description: "Document attachments on the linked thank-you email (PDF / DOCX / etc.). Populated only on the detail endpoint."
          items: { $ref: "#/components/schemas/ThankYouAttachment" }
        # Denormalized display names, joined server-side. See
        # OpportunityOrPledge for rationale.
        organizationName:                 { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        paymentIntermediaryName:    { type: string, nullable: true, readOnly: true }
        quickbooksStagedPaymentId:  { type: string, nullable: true, readOnly: true, description: "Id of the QuickBooks staged payment reconciled to / that created this gift, if any. Lets the reconciler show linked status and offer unmatch." }
        organizationPriority:                 { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        individualGiverPersonPriority:  { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true, readOnly: true }
        # Aggregates across this gift's gift_allocations rows. All three
        # arrays are de-duplicated and may be empty.
        entityIds:                  { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct entity_id values from gift_allocations." }
        displayUsages:              { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct display_usage values from gift_allocations (server-computed labels)." }
        grantYears:                 { type: array, items: { type: string }, nullable: true, readOnly: true, description: "Distinct grant_year values from gift_allocations." }
        createdAt:                  { type: string, format: date-time }
        updatedAt:                  { type: string, format: date-time }
    GiftOrPaymentDetail:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            allocations: { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
    GiftOrPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftOrPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string }
        name:                       { type: string }
        details:                    { type: string }
        dateReceived:               { type: string, format: date }
        paymentMethod:              { $ref: "#/components/schemas/GiftPaymentMethod" }
        amount:                     { type: string }
        organizationId:                   { type: string }
        individualGiverPersonId:    { type: string }
        householdId:                { type: string }
        type:                       { $ref: "#/components/schemas/GiftType" }
        paymentOnPledgeId:          { type: string }
        advisorPersonId:            { type: string }
        grantYear:                  { type: string }
        giftBeingMatchedId:         { type: string }
        primaryContactPersonId:     { type: string }
        paymentIntermediaryId:      { type: string }
        ownerUserId:                      { type: string }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string }
    UpdateGiftOrPaymentBody:
      type: object
      properties:
        legacyGiftId:               { type: string, nullable: true }
        name:                       { type: string, nullable: true }
        details:                    { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        paymentMethod:              { allOf: [ { $ref: "#/components/schemas/GiftPaymentMethod" } ], nullable: true }
        amount:                     { type: string, nullable: true }
        organizationId:                   { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        type:                       { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        paymentOnPledgeId:          { type: string, nullable: true }
        advisorPersonId:            { type: string, nullable: true }
        grantYear:                  { type: string, nullable: true }
        giftBeingMatchedId:         { type: string, nullable: true }
        primaryContactPersonId:     { type: string, nullable: true }
        paymentIntermediaryId:      { type: string, nullable: true }
        ownerUserId:                      { type: string, nullable: true }
        designatedToSchool:         { type: boolean }
        tags:                       { type: string, nullable: true }
    ThankYouAttachment:
      type: object
      required: [id, downloadUrl]
      properties:
        id:          { type: string }
        filename:    { type: string, nullable: true }
        mimeType:    { type: string, nullable: true }
        sizeBytes:   { type: integer, nullable: true }
        downloadUrl: { type: string }

    # ─── QuickBooks payment sync ──────────────────────────────────────────────
    QuickbooksEntityType: { type: string, enum: [sales_receipt, payment, deposit] }
    QuickbooksPayerType: { type: string, enum: [vendor, customer, employee], description: "The QuickBooks payer/entity kind behind this incoming money (Customer for a SalesReceipt/Payment, or the deposit line's Entity ref). Null when QuickBooks recorded no entity (e.g. a bare deposit line)." }
    StagedPaymentStatus: { type: string, enum: [pending, approved, rejected, excluded] }
    StagedPaymentExclusionReason: { type: string, enum: [zero_amount, loan, membership, interest, government_reimbursement, tax_refund, other_revenue, earned_income, fiscally_sponsored, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire] }
    StagedPaymentMatchStatus: { type: string, enum: [matched, suggested, unmatched] }
    StagedPaymentMatchMethod: { type: string, enum: [email, name, name_amount_date, amount_date, memo, intermediary, manual] }
    StagedPaymentClassificationSource: { type: string, enum: [auto, manual] }
    StagedPaymentQueue: { type: string, enum: [needs_review, auto_matched, excluded, done, rejected] }
    StagedPaymentSort: { type: string, enum: [date_desc, date_asc, amount_desc, amount_asc, payer_asc, payer_desc] }
    QuickbooksOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has QUICKBOOKS_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "An active, non-revoked company grant exists" }
        realmId:      { type: string, nullable: true }
        companyName:  { type: string, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }
    QuickbooksSyncSummary:
      type: object
      required: [ran, pulled, staged, matched, autoApplied]
      properties:
        ran:         { type: boolean, description: "False when the sync was skipped (lock contended)." }
        pulled:      { type: integer }
        staged:      { type: integer }
        matched:     { type: integer }
        autoApplied: { type: integer, description: "Newly-staged rows auto-reconciled or auto-minted at high confidence." }
    QuickbooksResyncStatus:
      type: object
      required: [status, startedAt, finishedAt, summary, error]
      properties:
        status:
          type: string
          enum: [idle, running, done, error]
          description: "Lifecycle of the background full re-pull. 'idle' = none has run since boot; 'running' = in progress; 'done'/'error' = last run outcome."
        startedAt:  { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
        summary:
          oneOf: [ { $ref: "#/components/schemas/QuickbooksSyncSummary" } ]
          nullable: true
          description: "Result of the last completed run (null while running / before any run)."
        error:      { type: string, nullable: true, description: "Error message when status is 'error'." }
    QuickbooksRematchSummary:
      type: object
      required: [ran, scanned, matched]
      properties:
        ran:     { type: boolean, description: "False when the rematch was skipped (a sync/rematch was already running)." }
        scanned: { type: integer, description: "Candidate rows examined (pending + unmatched + no donor)." }
        matched: { type: integer, description: "Rows newly given a donor hint by this run." }
    QuickbooksReclassifySummary:
      type: object
      required: [ran, scanned, excluded, included]
      properties:
        ran:      { type: boolean, description: "False when the reclassify was skipped (a sync/rematch/reclassify was already running)." }
        scanned:  { type: integer, description: "Auto-classified pending/excluded rows examined." }
        excluded: { type: integer, description: "Rows newly moved to excluded by this run." }
        included: { type: integer, description: "Rows newly restored to pending by this run." }
    StagedPayment:
      type: object
      required: [id, realmId, qbEntityType, qbEntityId, status, matchStatus, autoApplied, classificationSource, createdAt, updatedAt]
      properties:
        id:                        { type: string }
        realmId:                   { type: string }
        qbEntityType:              { $ref: "#/components/schemas/QuickbooksEntityType" }
        qbEntityId:                { type: string }
        qbLineId:                  { type: string, nullable: true }
        qbDepositId:               { type: string, nullable: true, description: "The underlying bank Deposit id this incoming money belongs to, when known. Rows sharing one non-null value are candidates a fundraiser may manually group into a single deposit unit and reconcile as a whole to one multi-allocation gift. Null when not tied to a deposit (or staged before this field existed)." }
        amount:                    { type: string, nullable: true }
        dateReceived:              { type: string, format: date, nullable: true }
        payerName:                 { type: string, nullable: true }
        payerEmail:                { type: string, nullable: true }
        rawReference:              { type: string, nullable: true }
        lineDescription:           { type: string, nullable: true }
        status:                    { $ref: "#/components/schemas/StagedPaymentStatus" }
        exclusionReason:           { $ref: "#/components/schemas/StagedPaymentExclusionReason", nullable: true }
        classificationSource:      { $ref: "#/components/schemas/StagedPaymentClassificationSource" }
        lineItemNames:             { type: array, items: { type: string }, nullable: true }
        lineAccountNames:          { type: array, items: { type: string }, nullable: true }
        lineClasses:               { type: array, items: { type: string }, nullable: true }
        # Extended QuickBooks capture — read-only mirrors of the QB record surfaced
        # in the reviewer for context. The verbatim qbRaw / qbRawLine JSON is stored
        # in the DB but intentionally omitted here (and from the list select) to keep
        # responses small.
        qbPayerType:               { $ref: "#/components/schemas/QuickbooksPayerType", nullable: true }
        qbPayerId:                 { type: string, nullable: true }
        qbPaymentMethod:           { type: string, nullable: true }
        qbCheckNumber:             { type: string, nullable: true }
        qbDepositToAccountName:    { type: string, nullable: true }
        qbDocNumber:               { type: string, nullable: true }
        qbBillingAddress:          { type: string, nullable: true }
        qbTransactionMemo:         { type: string, nullable: true }
        qbCurrency:                { type: string, nullable: true }
        qbExchangeRate:            { type: string, nullable: true }
        qbCreateTime:              { type: string, format: date-time, nullable: true }
        qbLinkedTxn:
          type: array
          nullable: true
          items:
            type: object
            required: [txnId, txnType]
            properties:
              txnId:   { type: string }
              txnType: { type: string }
        matchStatus:               { $ref: "#/components/schemas/StagedPaymentMatchStatus" }
        matchScore:                { type: integer, nullable: true }
        matchMethod:               { $ref: "#/components/schemas/StagedPaymentMatchMethod", nullable: true }
        matchConfirmedByUserId:    { type: string, nullable: true }
        matchConfirmedAt:          { type: string, format: date-time, nullable: true }
        organizationId:            { type: string, nullable: true }
        individualGiverPersonId:   { type: string, nullable: true }
        householdId:               { type: string, nullable: true }
        matchedPaymentIntermediaryId: { type: string, nullable: true }
        matchedGiftId:             { type: string, nullable: true }
        createdGiftId:             { type: string, nullable: true }
        groupReconciledGiftId:     { type: string, nullable: true, description: "Set on every member of a manually grouped deposit unit that was reconciled as a whole to one existing gift. The group is exactly the rows sharing this gift id; one representative member also carries matchedGiftId. Cleared for the whole group on revert." }
        autoApplied:               { type: boolean }
        approvedByUserId:          { type: string, nullable: true }
        approvedAt:                { type: string, format: date-time, nullable: true }
        rejectedByUserId:          { type: string, nullable: true }
        rejectedAt:                { type: string, format: date-time, nullable: true }
        # Derived queue bucket + denormalized display fields, joined server-side.
        queue:                     { $ref: "#/components/schemas/StagedPaymentQueue" }
        organizationName:          { type: string, nullable: true }
        householdName:             { type: string, nullable: true }
        individualGiverPersonName: { type: string, nullable: true }
        intermediaryName:          { type: string, nullable: true }
        resolvedGiftId:            { type: string, nullable: true }
        resolvedGiftName:          { type: string, nullable: true }
        resolvedGiftAmount:        { type: string, nullable: true }
        resolvedGiftDate:          { type: string, format: date, nullable: true }
        giftAlreadyLinkedElsewhere: { type: boolean, description: "True when this pending row has no gift of its own, yet every same-donor, similar-amount gift is already linked to a different QuickBooks payment — i.e. the gift for this payment likely hasn't been created yet (create a new gift for it, or exclude if it's a duplicate)." }
        createdAt:                 { type: string, format: date-time }
        updatedAt:                 { type: string, format: date-time }
    StagedPaymentList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/StagedPayment" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    StagedPaymentSummary:
      type: object
      required: [needsReview, autoMatched, done, rejected, excluded, excludedByReason]
      properties:
        needsReview: { type: integer }
        autoMatched: { type: integer }
        done:        { type: integer }
        rejected:    { type: integer }
        excluded:    { type: integer }
        excludedByReason:
          type: object
          required: [zero_amount, loan, membership, interest, government_reimbursement, tax_refund, other_revenue, earned_income, fiscally_sponsored, intercompany_transfer, other, insurance, expense_refund, expensify, returned_wire]
          properties:
            zero_amount:             { type: integer }
            loan:                    { type: integer }
            membership:              { type: integer }
            interest:                { type: integer }
            government_reimbursement: { type: integer }
            tax_refund:              { type: integer }
            other_revenue:           { type: integer }
            earned_income:           { type: integer }
            fiscally_sponsored:      { type: integer }
            intercompany_transfer:   { type: integer }
            other:                   { type: integer }
            insurance:               { type: integer }
            expense_refund:          { type: integer }
            expensify:               { type: integer }
            returned_wire:           { type: integer }
    DonorSearchResult:
      type: object
      required: [id, kind, name]
      properties:
        id:   { type: string }
        kind: { type: string, enum: [organization, person, household] }
        name: { type: string }
    DonorSearchList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/DonorSearchResult" } }
    ResolveStagedPaymentBody:
      type: object
      description: "Set exactly one donor FK (donor XOR). Null the others. Optionally record a payment intermediary."
      properties:
        organizationId:          { type: string, nullable: true }
        individualGiverPersonId: { type: string, nullable: true }
        householdId:             { type: string, nullable: true }
        paymentIntermediaryId:   { type: string, nullable: true }
    StagedGiftResponse:
      type: object
      required: [gift, stagedPaymentId]
      properties:
        gift:            { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentId: { type: string }
    GiftCandidate:
      allOf:
        - { $ref: "#/components/schemas/GiftOrPayment" }
        - type: object
          properties:
            organizationName:          { type: string, nullable: true }
            householdName:             { type: string, nullable: true }
            individualGiverPersonName: { type: string, nullable: true }
            alreadyLinkedStagedPaymentId:
              type: string
              nullable: true
              description: "Set when this gift is already reconciled/created by another staged payment. The UI disables linking to it to avoid double-counting."
    GiftCandidateList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/GiftCandidate" } }
    ReconcileStagedPaymentBody:
      type: object
      required: [giftId]
      description: "Reconcile the staged payment to an existing gifts_and_payments row."
      properties:
        giftId: { type: string }
    GroupReconcileStagedPaymentsBody:
      type: object
      required: [stagedPaymentIds, giftId]
      description: "Group several same-deposit staged payments and reconcile the whole group to one existing gift."
      properties:
        stagedPaymentIds:
          type: array
          minItems: 2
          items: { type: string }
          description: "Ids of the staged payments to group. Must be at least two, all pending, and all sharing the same non-null qbDepositId."
        giftId: { type: string, description: "The existing gift the deposit group reconciles to." }
    GroupReconcileStagedPaymentsResponse:
      type: object
      required: [gift, stagedPaymentIds, representativeStagedPaymentId]
      properties:
        gift: { $ref: "#/components/schemas/GiftOrPayment" }
        stagedPaymentIds: { type: array, items: { type: string } }
        representativeStagedPaymentId: { type: string, description: "The group member that also carries matchedGiftId (the one that makes the gift show linked)." }
    ExcludeStagedPaymentBody:
      type: object
      required: [exclusionReason]
      description: "File the staged payment under a non-gift exclusion category."
      properties:
        exclusionReason: { $ref: "#/components/schemas/StagedPaymentExclusionReason" }
    CandidateThankYouEmail:
      type: object
      required: [emailMessageId, sentAt, hasDocumentAttachment]
      properties:
        emailMessageId:        { type: string }
        gmailMessageId:        { type: string, nullable: true }
        subject:               { type: string, nullable: true }
        fromEmail:             { type: string, nullable: true }
        toEmails:              { type: array, items: { type: string }, nullable: true }
        sentAt:                { type: string, format: date-time }
        snippet:               { type: string, nullable: true }
        hasDocumentAttachment: { type: boolean }
        documentAttachmentCount: { type: integer }
        autoSuggested:         { type: boolean, description: "True when this candidate matches the 30-day + 'thank' + has-document-attachment heuristic." }
    CandidateThankYouEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/CandidateThankYouEmail" } }
    LinkThankYouEmailBody:
      type: object
      required: [emailMessageId]
      properties:
        emailMessageId: { type: string }

    # ─── Gift allocations ──────────────────────────────────────────────────────
    GiftAllocation:
      type: object
      required: [id, formalRegionalRestriction, formalFundUseRestriction, createdAt, updatedAt]
      properties:
        id:                          { type: string }
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        formalRegionalRestriction:   { type: boolean }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        formalFundUseRestriction:    { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }
        displayUsage:                { type: string, nullable: true, readOnly: true, description: "Server-computed human-readable usage label (school name | usage label | usage + ' - ' + region names). Maintained by DB triggers; read-only." }
        createdAt:                   { type: string, format: date-time }
        updatedAt:                   { type: string, format: date-time }
    GiftAllocationList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/GiftAllocation" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string }
        subAmount:                   { type: string }
        grantYear:                   { type: string }
        entityId:                    { type: string }
        formalRegionalRestriction:   { type: boolean }
        intendedUsage:               { $ref: "#/components/schemas/IntendedUsage" }
        fundableProjectId:           { type: string }
        formalFundUseRestriction:    { type: boolean }
        schoolRecipientId:           { type: string }
        spendingStart:               { type: string, format: date }
        spendingEnd:                 { type: string, format: date }
        regionIds:                   { type: array, items: { type: string } }
    UpdateGiftAllocationBody:
      type: object
      properties:
        giftId:                      { type: string, nullable: true }
        subAmount:                   { type: string, nullable: true }
        grantYear:                   { type: string, nullable: true }
        entityId:                    { type: string, nullable: true }
        formalRegionalRestriction:   { type: boolean }
        intendedUsage:               { allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ], nullable: true }
        fundableProjectId:           { type: string, nullable: true }
        formalFundUseRestriction:    { type: boolean }
        schoolRecipientId:           { type: string, nullable: true }
        spendingStart:               { type: string, format: date, nullable: true }
        spendingEnd:                 { type: string, format: date, nullable: true }
        regionIds:                   { type: array, items: { type: string }, nullable: true }

    # ─── Interactions ─────────────────────────────────────────────────────────
    InteractionKind:
      type: string
      enum: [meeting, phone_call, video_call, conference, other]
    Interaction:
      type: object
      required: [id, kind, occurredAt, summary, createdAt, updatedAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    InteractionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Interaction" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateInteractionBody:
      type: object
      required: [kind, occurredAt, summary]
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer }
        location:         { type: string }
        summary:          { type: string }
        notes:            { type: string }
        ownerUserId:      { type: string }
        personIds:        { type: array, items: { type: string } }
        organizationIds:        { type: array, items: { type: string } }
        householdIds:     { type: array, items: { type: string } }
    UpdateInteractionBody:
      type: object
      properties:
        kind:             { $ref: "#/components/schemas/InteractionKind" }
        occurredAt:       { type: string, format: date-time }
        durationMinutes:  { type: integer, nullable: true }
        location:         { type: string, nullable: true }
        summary:          { type: string }
        notes:            { type: string, nullable: true }
        ownerUserId:      { type: string, nullable: true }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }

    # ─── Email messages + attachments + calendar events ──────────────────────
    EmailMessage:
      type: object
      required: [id, mailboxUserId, direction, sentAt, isPrivate]
      properties:
        id:                  { type: string }
        gmailMessageId:      { type: string }
        gmailThreadId:       { type: string, nullable: true }
        mailboxUserId:       { type: string }
        direction:           { type: string, enum: [sent, received] }
        sentAt:              { type: string, format: date-time }
        subject:             { type: string, nullable: true }
        snippet:             { type: string, nullable: true }
        fromEmail:           { type: string, nullable: true }
        toEmails:            { type: array, items: { type: string }, nullable: true }
        ccEmails:            { type: array, items: { type: string }, nullable: true }
        bccEmails:           { type: array, items: { type: string }, nullable: true }
        hasAttachments:      { type: boolean }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
        aiSummary:           { type: string, nullable: true, description: "One-line topic summary. Populated only when the mailbox owner is in `summary_only` mode; in that case it is the ONLY content stored for the message — `snippet`, `bodyText`, `bodyHtml`, and attachments are all absent." }
        isTracked:           { type: boolean, readOnly: true, description: "True when this sent message matches an open-tracking pixel record. Only ever true for sent messages." }
        trackingTotalViews:  { type: integer, nullable: true, readOnly: true, description: "Total tracking-pixel opens recorded for this message. When the list is contact-scoped (personId/organizationId/householdId), this counts opens by that contact only. Null when not tracked." }
        trackingLastOpenedAt: { type: string, format: date-time, nullable: true, readOnly: true, description: "Most recent tracked open timestamp. Null when not tracked or not yet opened." }
    EmailMessageDetail:
      allOf:
        - $ref: "#/components/schemas/EmailMessage"
        - type: object
          properties:
            bodyText:    { type: string, nullable: true }
            bodyHtml:    { type: string, nullable: true }
            attachments:
              type: array
              items: { $ref: "#/components/schemas/EmailAttachmentSummary" }
    EmailAttachmentSummary:
      type: object
      required: [id, filename, mimeType, sizeBytes]
      properties:
        id:                 { type: string }
        filename:           { type: string }
        mimeType:           { type: string }
        sizeBytes:          { type: integer }
        gmailAttachmentId:  { type: string, nullable: true }
    EmailMessageList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailMessage" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateEmailMessagePrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }
    CalendarEvent:
      type: object
      required: [id, calendarUserId, gcalCalendarId, gcalEventId, startAt, isPrivate]
      properties:
        id:                  { type: string }
        calendarUserId:      { type: string }
        gcalCalendarId:      { type: string }
        gcalEventId:         { type: string }
        startAt:             { type: string, format: date-time }
        endAt:               { type: string, format: date-time, nullable: true }
        summary:             { type: string, nullable: true }
        description:         { type: string, nullable: true }
        location:            { type: string, nullable: true }
        attendeeEmails:      { type: array, items: { type: string }, nullable: true }
        organizerEmail:      { type: string, nullable: true }
        status:              { type: string, nullable: true }
        htmlLink:            { type: string, nullable: true }
        isPrivate:           { type: boolean }
        privateSetByUserId:  { type: string, nullable: true }
        matchedPersonIds:    { type: array, items: { type: string }, nullable: true }
        matchedOrganizationIds:    { type: array, items: { type: string }, nullable: true }
        matchedHouseholdIds: { type: array, items: { type: string }, nullable: true }
    CalendarEventList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/CalendarEvent" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    UpdateCalendarEventPrivacyBody:
      type: object
      required: [isPrivate]
      properties:
        isPrivate: { type: boolean }

    # ─── Admin sync status ────────────────────────────────────────────────────
    AdminGoogleSyncSourceStatus:
      type: object
      required: [bootstrapInProgress, noProgressRuns, stuck]
      properties:
        lastSyncedAt:           { type: string, format: date-time, nullable: true }
        lastError:              { type: string, nullable: true }
        bootstrapCompletedAt:   { type: string, format: date-time, nullable: true }
        bootstrapInProgress:    { type: boolean }
        noProgressRuns:         { type: integer, description: "Consecutive sync runs that made no forward progress (cursor pinned by errors). Resets to 0 on any clean run." }
        stuck:                  { type: boolean, description: "True once noProgressRuns crosses the stall threshold — the mailbox appears wedged and should be investigated." }
    AdminGoogleSyncUserRow:
      type: object
      required: [userId, userEmail, connected, gmail, calendar]
      properties:
        userId:           { type: string }
        userEmail:        { type: string }
        googleEmail:      { type: string, nullable: true }
        connected:        { type: boolean }
        grantedAt:        { type: string, format: date-time, nullable: true }
        revokedAt:        { type: string, format: date-time, nullable: true }
        tokenLastError:   { type: string, nullable: true }
        gmail:            { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
        calendar:         { $ref: "#/components/schemas/AdminGoogleSyncSourceStatus" }
    AdminGoogleSyncList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminGoogleSyncUserRow" }

    # ─── Google OAuth status ──────────────────────────────────────────────────
    GoogleOauthStatus:
      type: object
      required: [configured, connected]
      properties:
        configured:   { type: boolean, description: "Server has GOOGLE_OAUTH_CLIENT_ID/SECRET set" }
        connected:    { type: boolean, description: "Caller has an active, non-revoked grant" }
        googleEmail:  { type: string, nullable: true }
        scope:        { type: string, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true }
        grantedAt:    { type: string, format: date-time, nullable: true }
        revokedAt:    { type: string, format: date-time, nullable: true }
        lastError:    { type: string, nullable: true }

    # ─── Google sync status + run report ──────────────────────────────────────
    GoogleSyncDateRange:
      type: object
      properties:
        earliest: { type: string, format: date-time, nullable: true }
        latest:   { type: string, format: date-time, nullable: true }
    GoogleSyncStatus:
      type: object
      properties:
        year: { type: integer, description: Calendar year the counts and date range are scoped to }
        gmail:
          nullable: true
          type: object
          properties:
            lastHistoryId:        { type: string, nullable: true }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
        calendar:
          nullable: true
          type: object
          properties:
            hasSyncToken:         { type: boolean }
            lastSyncedAt:         { type: string, format: date-time, nullable: true }
            lastError:            { type: string, nullable: true }
            bootstrapCompletedAt: { type: string, format: date-time, nullable: true }
            bootstrapInProgress:  { type: boolean }
            counts:
              type: object
              properties:
                matched:  { type: integer }
                skipped:  { type: integer, nullable: true }
                reviewed: { type: integer }
            dateRange: { $ref: "#/components/schemas/GoogleSyncDateRange" }
    GmailSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            skipped:             { type: integer }
            attachments:         { type: integer }
            attachmentBytes:     { type: integer }
            bootstrapCompleted:  { type: boolean }
            finalHistoryId:      { type: string, nullable: true }
    CalendarSyncRunResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        report:
          type: object
          properties:
            mode:                { type: string, enum: [bootstrap, incremental, rebootstrap] }
            candidates:          { type: integer }
            matched:             { type: integer }
            updated:             { type: integer }
            skipped:             { type: integer }
            errors:              { type: integer }
            bootstrapCompleted:  { type: boolean }
            hasSyncToken:        { type: boolean }

    # ─── Email intelligence ───────────────────────────────────────────────────
    EmailProposalKind:
      type: string
      enum: [linkedin_job_change, auto_responder_move, bounce_invalid, bounce_soft, signature_update, grant_opportunity, thank_you_acknowledgment]
    EmailProposalStatus:
      type: string
      enum: [pending, applied, rejected, ignored]
    EmailProposal:
      type: object
      required: [id, mailboxUserId, kind, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                 { type: string }
        mailboxUserId:      { type: string }
        kind:               { $ref: "#/components/schemas/EmailProposalKind" }
        status:             { $ref: "#/components/schemas/EmailProposalStatus" }
        sourceMessageId:    { type: string, nullable: true }
        targetPersonId:     { type: string, nullable: true }
        targetOrganizationId:     { type: string, nullable: true }
        targetEmailId:      { type: string, nullable: true }
        subjectEmail:       { type: string, nullable: true }
        subjectName:        { type: string, nullable: true }
        subjectDomain:      { type: string, nullable: true }
        # When the source Gmail message was SENT (from its Date /
        # internalDate), as opposed to createdAt (when our sync first
        # persisted the proposal). The review UI shows this so reviewers
        # see when the email actually arrived. Nullable: legacy rows /
        # messages without a parseable Date fall back to createdAt.
        emailSentAt:        { type: string, format: date-time, nullable: true }
        payload:            { type: object, additionalProperties: true }
        proposedActions:    { type: array, items: { $ref: "#/components/schemas/ProposedAction" } }
        actionsAnalyzedAt:  { type: string, format: date-time, nullable: true }
        actionsModel:       { type: string, nullable: true }
        actionsError:       { type: string, nullable: true }
        appliedActions:     { type: array, items: { $ref: "#/components/schemas/ApplyActionResult" }, nullable: true }
        dedupeKey:          { type: string }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
        resolvedAt:         { type: string, format: date-time, nullable: true }
        resolvedByUserId:   { type: string, nullable: true }
        # Free-text reviewer feedback captured on accept/reject. Used
        # downstream for prompt tuning — pair with `payload` and
        # `status` to see what the LLM proposed vs. what the human said.
        reviewerNote:       { type: string, nullable: true }
    ProposedAction:
      type: object
      required: [type, reason]
      additionalProperties: true
      properties:
        type:
          type: string
          enum:
            - deactivate_per
            - create_per
            - create_person_with_per
            - add_email
            - set_primary_email
            - mark_email_invalid
            - create_grant_opportunity
        reason: { type: string }
    ApplyActionResult:
      type: object
      required: [type, status]
      properties:
        type:      { type: string }
        status:    { type: string, enum: [applied, skipped, failed] }
        message:   { type: string, nullable: true }
        createdId: { type: string, nullable: true }
    EmailProposalList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailProposal" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    EmailProposalSummaryEntry:
      type: object
      required: [kind, pending]
      properties:
        kind:    { $ref: "#/components/schemas/EmailProposalKind" }
        pending: { type: integer }
    EmailProposalSummary:
      type: object
      required: [byKind, totalPending]
      properties:
        byKind:        { type: array, items: { $ref: "#/components/schemas/EmailProposalSummaryEntry" } }
        totalPending:  { type: integer }
    EmailProposalActionFailed:
      # Returned with status 422 when an accept dispatched but one of the
      # apply actions failed. The proposal stays pending (the route's
      # transaction rolls back the row's status change too) and partial
      # action results are surfaced so the UI can show what did/didn't run.
      type: object
      required: [error, message, failedAction, attemptedResults]
      properties:
        error:            { type: string, enum: [action_failed] }
        message:          { type: string }
        failedAction:     { type: string }
        attemptedResults: { type: array, items: { type: object, additionalProperties: true } }
    AcceptEmailProposalBody:
      # All fields optional — the accept handler is per-kind and reads only
      # what's relevant. e.g. signature_update may receive {applyTitle:true,
      # applyPhone:false} to opt into individual field copies; auto_responder_move
      # may receive {newPrimaryFunderId} to override the parsed company guess.
      # `reviewerNote` is recognized for every kind and stored on the
      # proposal row for prompt-tuning feedback.
      type: object
      additionalProperties: true
      properties:
        reviewerNote: { type: string, nullable: true }
        selectedActionIndexes:
          # Optional subset of the stored proposedActions to apply, by
          # zero-based index into the proposal's proposedActions array.
          # Omit the field entirely to apply ALL actions (backward
          # compatible with older clients). An empty array applies no
          # actions but still marks the proposal resolved/applied.
          # Ignored by the thank_you_acknowledgment branch, which has no
          # proposedActions list.
          type: array
          nullable: true
          items: { type: integer }
    RejectEmailProposalBody:
      # Optional reviewer feedback captured at reject time. The whole
      # body is optional so existing clients that POST with no body keep
      # working unchanged.
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }

    # ─── Task intelligence ──────────────────────────────────────────────────────
    TaskProposalStatus:
      type: string
      enum: [pending, accepted, dismissed]
    TaskProposal:
      type: object
      required: [id, status, payload, dedupeKey, createdAt, updatedAt]
      properties:
        id:                   { type: string }
        status:               { $ref: "#/components/schemas/TaskProposalStatus" }
        targetPersonId:       { type: string, nullable: true }
        targetOrganizationId: { type: string, nullable: true }
        # Signal bundle the AI reasoned over (recent gifts, open
        # opportunities, last-contact dates, capacity/priority, media).
        payload:              { type: object, additionalProperties: true }
        title:                { type: string, nullable: true }
        description:          { type: string, nullable: true }
        suggestedDueDate:     { type: string, format: date, nullable: true }
        rationale:            { type: string, nullable: true }
        # analyzedAt IS NULL means generation is still in flight.
        analyzedAt:           { type: string, format: date-time, nullable: true }
        model:                { type: string, nullable: true }
        error:                { type: string, nullable: true }
        dedupeKey:            { type: string }
        acceptedTaskId:       { type: string, nullable: true }
        reviewerNote:         { type: string, nullable: true }
        resolvedAt:           { type: string, format: date-time, nullable: true }
        resolvedByUserId:     { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }
    TaskProposalResponse:
      # `data` is null when the entity is low-priority (skipped) or has no
      # suggestion yet.
      type: object
      required: [data]
      properties:
        data: { allOf: [ { $ref: "#/components/schemas/TaskProposal" } ], nullable: true }
    RefreshTaskProposalBody:
      # Provide exactly one of personId / organizationId.
      type: object
      properties:
        personId:       { type: string }
        organizationId: { type: string }
    AcceptTaskProposalBody:
      # All optional. assigneeUserId optionally assigns the created task;
      # reviewerNote is stored on the proposal for feedback.
      type: object
      properties:
        assigneeUserId: { type: string, nullable: true }
        reviewerNote:   { type: string, nullable: true }
    AcceptTaskProposalResult:
      type: object
      required: [proposal, task]
      properties:
        proposal: { $ref: "#/components/schemas/TaskProposal" }
        task:     { $ref: "#/components/schemas/Task" }
    DismissTaskProposalBody:
      type: object
      properties:
        reviewerNote: { type: string, nullable: true }

    # ─── Email-intelligence admin console ──────────────────────────────────────
    EmailIntelPromptStatus:
      type: string
      enum: [active, draft, archived]
    EmailIntelPromptOrigin:
      type: string
      enum: [hand_edited, ai_generated, reverted]
    EmailIntelPrompt:
      type: object
      required: [id, promptText, status, origin, createdAt, updatedAt]
      properties:
        id:           { type: string }
        promptText:   { type: string }
        status:       { $ref: "#/components/schemas/EmailIntelPromptStatus" }
        origin:       { $ref: "#/components/schemas/EmailIntelPromptOrigin" }
        authorUserId: { type: string, nullable: true }
        authorName:   { type: string, nullable: true }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    EmailIntelPromptOverview:
      # The full state the admin console needs in one fetch: the live
      # active version (omitted when on the built-in default), any
      # outstanding AI draft awaiting review, the archived version
      # history (newest first), and the built-in default text.
      type: object
      required: [history, default, usingDefault]
      properties:
        active:       { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        draft:        { allOf: [ { $ref: "#/components/schemas/EmailIntelPrompt" } ], nullable: true }
        history:      { type: array, items: { $ref: "#/components/schemas/EmailIntelPrompt" } }
        default:      { type: string, description: "Built-in default prompt text (used when no active version exists)." }
        usingDefault: { type: boolean, description: "True when no saved active version exists and the pipeline is on the built-in default." }
    SaveEmailIntelPromptBody:
      type: object
      required: [promptText]
      properties:
        promptText: { type: string, minLength: 1 }
    EmailIntelFeedbackAction:
      type: object
      required: [type, reason]
      properties:
        type:   { type: string }
        reason: { type: string }
    EmailIntelFeedbackItem:
      type: object
      required: [id, kind, status, mailboxUserId, proposedActions, createdAt]
      properties:
        id:               { type: string }
        kind:             { $ref: "#/components/schemas/EmailProposalKind" }
        status:           { $ref: "#/components/schemas/EmailProposalStatus" }
        reviewerNote:     { type: string, nullable: true }
        mailboxUserId:    { type: string }
        mailboxUserName:  { type: string, nullable: true }
        resolvedByUserId: { type: string, nullable: true }
        resolverName:     { type: string, nullable: true }
        resolvedAt:       { type: string, format: date-time, nullable: true }
        subjectName:      { type: string, nullable: true }
        subjectEmail:     { type: string, nullable: true }
        proposedActions:  { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackAction" } }
        createdAt:        { type: string, format: date-time }
        emailSentAt:      { type: string, format: date-time, nullable: true }
    EmailIntelFeedbackList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/EmailIntelFeedbackItem" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    UnrecognizedCorrespondent:
      type: object
      required: [emailAddress, threadCount, firstSeenAt, lastSeenAt]
      properties:
        emailAddress: { type: string }
        displayName:  { type: string, nullable: true }
        domain:       { type: string, nullable: true }
        threadCount:  { type: integer }
        firstSeenAt:  { type: string, format: date-time }
        lastSeenAt:   { type: string, format: date-time }
        lastSubject:  { type: string, nullable: true }
    UnrecognizedCorrespondentList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/UnrecognizedCorrespondent" } }
    CreateCorrespondentIgnoreBody:
      type: object
      required: [emailAddress]
      properties:
        emailAddress: { type: string }

    # ─── Notes ───────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, body, authorUserId, createdAt, updatedAt]
      properties:
        id:              { type: string }
        body:            { type: string }
        authorUserId:    { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    NoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Note" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateNoteBody:
      type: object
      required: [body]
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateNoteBody:
      type: object
      properties:
        body:            { type: string }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Media mentions ────────────────────────────────────────────────────────
    MediaMention:
      type: object
      required: [id, publicationName, url, pinned, dismissed, createdAt, updatedAt]
      properties:
        id:              { type: string }
        publicationName: { type: string }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        # Soft-delete tombstone. Dismissed mentions are never returned by the
        # list endpoint; the field is exposed for completeness on single-row
        # reads. DELETE marks this true instead of removing the row.
        dismissed:       { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }
    MediaMentionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MediaMention" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    MediaMentionInput:
      type: object
      required: [publicationName, url]
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string }
        author:          { type: string }
        publicationDate: { type: string, format: date }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string }
        source:          { type: string }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
    MediaMentionUpdate:
      type: object
      properties:
        publicationName: { type: string, minLength: 1 }
        title:           { type: string, nullable: true }
        author:          { type: string, nullable: true }
        publicationDate: { type: string, format: date, nullable: true }
        url:             { type: string, minLength: 1 }
        aiSummary:       { type: string, nullable: true }
        source:          { type: string, nullable: true }
        pinned:          { type: boolean }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }

    # ─── Tasks ───────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [open, waiting, done, cancelled]
    TaskKind:
      type: string
      enum: [general, reporting_deadline, thank_you_followup]
    Task:
      type: object
      required: [id, title, status, kind, createdByUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string }
        description:      { type: string, nullable: true }
        dueDate:          { type: string, format: date, nullable: true }
        kind:             { $ref: "#/components/schemas/TaskKind" }
        status:           { $ref: "#/components/schemas/TaskStatus" }
        completedAt:      { type: string, format: date-time, nullable: true }
        assigneeUserId:   { type: string, nullable: true }
        createdByUserId:  { type: string }
        personIds:        { type: array, items: { type: string }, nullable: true }
        organizationIds:        { type: array, items: { type: string }, nullable: true }
        householdIds:     { type: array, items: { type: string }, nullable: true }
        opportunityIds:   { type: array, items: { type: string }, nullable: true }
        giftIds:          { type: array, items: { type: string }, nullable: true }
        mentionUserIds:   { type: array, items: { type: string }, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    TaskList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Task" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateTaskBody:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        description:     { type: string }
        dueDate:         { type: string, format: date }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string }
        personIds:       { type: array, items: { type: string } }
        organizationIds:       { type: array, items: { type: string } }
        householdIds:    { type: array, items: { type: string } }
        opportunityIds:  { type: array, items: { type: string } }
        giftIds:         { type: array, items: { type: string } }
        mentionUserIds:  { type: array, items: { type: string } }
    UpdateTaskBody:
      type: object
      properties:
        title:           { type: string }
        description:     { type: string, nullable: true }
        dueDate:         { type: string, format: date, nullable: true }
        kind:            { $ref: "#/components/schemas/TaskKind" }
        status:          { $ref: "#/components/schemas/TaskStatus" }
        assigneeUserId:  { type: string, nullable: true }
        personIds:       { type: array, items: { type: string }, nullable: true }
        organizationIds:       { type: array, items: { type: string }, nullable: true }
        householdIds:    { type: array, items: { type: string }, nullable: true }
        opportunityIds:  { type: array, items: { type: string }, nullable: true }
        giftIds:         { type: array, items: { type: string }, nullable: true }
        mentionUserIds:  { type: array, items: { type: string }, nullable: true }

    # ─── Meeting notes ────────────────────────────────────────────────────────
    MeetingActionItem:
      type: object
      required: [title]
      properties:
        title:           { type: string }
        assigneeName:    { type: string, nullable: true, description: "Free-text assignee name as extracted from the transcript." }
        dueDate:         { type: string, format: date, nullable: true }
        promotedTaskId:  { type: string, nullable: true, description: "Set after this item was promoted into a task via /promote-action-item." }
    MeetingNote:
      type: object
      required: [id, meetingDate, summaryOnly, creatorUserId, createdAt, updatedAt]
      properties:
        id:               { type: string }
        title:            { type: string, nullable: true }
        meetingDate:      { type: string, format: date-time }
        attendees:        { type: array, items: { type: string }, nullable: true }
        rawTranscript:    { type: string, nullable: true, description: "Always null when summaryOnly is true." }
        summaryOnly:      { type: boolean, description: "Snapshot of the creator's email_sync_mode at create time. When true, the raw transcript was dropped pre-insert." }
        aiSummary:        { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        creatorUserId:    { type: string }
        personId:         { type: string, nullable: true }
        organizationId:         { type: string, nullable: true }
        householdId:      { type: string, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    MeetingNoteList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/MeetingNote" } }
        pagination: { $ref: "#/components/schemas/Pagination" }
    CreateMeetingNoteBody:
      type: object
      description: "Exactly one of personId / funderId / householdId must be set (contact XOR). Exactly one of `transcript` or `summary` must be provided — `transcript` runs through AI summarization, `summary` is stored verbatim as the note body (used by the hand-typed-notes flow)."
      properties:
        transcript:      { type: string, description: "Raw pasted transcript. Dropped server-side before insert when the caller's email_sync_mode is summary_only. Runs through AI summarization to produce aiSummary + actionItems." }
        summary:         { type: string, description: "Hand-typed notes. Stored verbatim as aiSummary with no AI processing; no rawTranscript or actionItems are generated. Mutually exclusive with transcript." }
        title:           { type: string }
        meetingDate:     { type: string, format: date-time, description: "Defaults to now if omitted." }
        attendees:       { type: array, items: { type: string } }
        personId:        { type: string }
        organizationId:        { type: string }
        householdId:     { type: string }
    UpdateMeetingNoteBody:
      type: object
      properties:
        title:           { type: string, nullable: true }
        meetingDate:     { type: string, format: date-time }
        attendees:       { type: array, items: { type: string }, nullable: true }
        aiSummary:       { type: string, nullable: true }
        actionItems:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/MeetingActionItem" }
        personId:        { type: string, nullable: true }
        organizationId:        { type: string, nullable: true }
        householdId:     { type: string, nullable: true }
    PromoteActionItemBody:
      type: object
      required: [index]
      properties:
        index:           { type: integer, description: "Zero-based index into actionItems[]." }
        assigneeUserId:  { type: string, description: "Optional override; the extracted assigneeName is free-text and may not map to a user." }
        dueDate:         { type: string, format: date }

    # ─── Saved views ───────────────────────────────────────────────────────────
    SavedViewVisibility:
      type: string
      enum: [team, individual]
      description: "team = shared with everyone (creator-edit-only); individual = private to creator."
    SavedView:
      type: object
      required: [id, listKey, name, visibility, state, creatorUserId, createdAt, updatedAt]
      properties:
        id:             { type: string }
        listKey:        { type: string }
        name:           { type: string }
        visibility:     { $ref: "#/components/schemas/SavedViewVisibility" }
        state:          { type: object, additionalProperties: true, description: "Opaque page-specific state blob: filters + sort." }
        creatorUserId:  { type: string }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    SavedViewList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/SavedView" } }
    CreateSavedViewBody:
      type: object
      required: [listKey, name, visibility, state]
      properties:
        listKey:    { type: string }
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }
    UpdateSavedViewBody:
      type: object
      description: "Only the creator may PATCH. All fields optional; at least one required."
      properties:
        name:       { type: string }
        visibility: { $ref: "#/components/schemas/SavedViewVisibility" }
        state:      { type: object, additionalProperties: true }

    # ─── Email tracking (Magio-compatible) ─────────────────────────────────
    TrackedEmail:
      type: object
      required: [id, subject, recipient, sender, recipientPersonIds, recipientOrganizationIds, recipientHouseholdIds, createdAt]
      properties:
        id:                       { type: string }
        subject:                  { type: string }
        recipient:                { type: string, description: "Verbatim To: line scraped by the extension, may be a comma list." }
        sender:                   { type: string }
        senderIp:                 { type: string, nullable: true }
        recipientPersonIds:       { type: array, items: { type: string } }
        recipientOrganizationIds:       { type: array, items: { type: string } }
        recipientHouseholdIds:    { type: array, items: { type: string } }
        groupId:                  { type: string, nullable: true, description: "Shared across per-recipient copies of one group send; null for legacy single-pixel sends." }
        gmailMessageId:           { type: string, nullable: true }
        gmailThreadId:            { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        totalViews:               { type: integer, description: "Convenience aggregate; present on list/detail responses." }
        lastView:                 { type: string, format: date-time, nullable: true }
    TrackedEmailView:
      type: object
      required: [id, viewedAt]
      properties:
        id:        { type: string }
        viewedAt:  { type: string, format: date-time }
        ipAddress: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
    TrackedEmailWithViews:
      allOf:
        - $ref: "#/components/schemas/TrackedEmail"
        - type: object
          required: [totalViews, uniqueIps, views]
          properties:
            totalViews: { type: integer }
            uniqueIps:  { type: integer }
            views:      { type: array, items: { $ref: "#/components/schemas/TrackedEmailView" } }
            recipients:
              type: array
              description: "Per-recipient open breakdown. For a group send this lists every recipient with their own open counts; for a legacy single send it has one entry. Aggregate fields above sum across the group."
              items: { $ref: "#/components/schemas/TrackedEmailRecipient" }
    TrackedEmailRecipient:
      type: object
      required: [id, recipient, totalViews]
      properties:
        id:         { type: string, description: "tracked_emails row id = this recipient's pixel id." }
        recipient:  { type: string }
        totalViews: { type: integer }
        lastView:   { type: string, format: date-time, nullable: true }
    TrackedEmailList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/TrackedEmail" } }
    TrackedEmailStatus:
      type: object
      required: [subject, viewCount]
      properties:
        subject:   { type: string }
        viewCount: { type: integer }
    CreateTrackedEmailBody:
      type: object
      required: [subject, recipient, sender]
      description: "Posted by the extension at send-time."
      properties:
        subject:   { type: string }
        recipient: { type: string, description: "Comma- or semicolon-separated address list scraped from compose UI." }
        sender:    { type: string }
    SendTrackedEmailBody:
      type: object
      required: [subject, html, to]
      description: "Posted by the extension for a per-recipient (group) send."
      properties:
        subject:    { type: string }
        html:       { type: string, description: "Composed message body as HTML." }
        to:         { type: array, items: { type: string }, minItems: 1, description: "To: addresses (shown on every copy)." }
        cc:         { type: array, items: { type: string }, description: "Cc: addresses (shown on every copy)." }
        inReplyTo:  { type: string, nullable: true, description: "Message-ID being replied to, for threading." }
        references: { type: string, nullable: true }
    SendTrackedEmailResult:
      type: object
      required: [groupId, recipients]
      properties:
        groupId:  { type: string }
        threadId: { type: string, nullable: true, description: "Shared Gmail thread id for the sent copies." }
        recipients:
          type: array
          items:
            type: object
            required: [id, recipient]
            properties:
              id:        { type: string }
              recipient: { type: string }
    ExtensionTokenResponse:
      type: object
      required: [token]
      properties:
        token: { type: string, nullable: true, description: "Null when the user has not generated a token yet." }

    # ─── Bulk record updates ───────────────────────────────────────────────────
    BulkUpdateResult:
      type: object
      required: [requested, succeededIds, failed]
      properties:
        requested:    { type: integer, description: "Number of ids in the request." }
        succeededIds: { type: array, items: { type: string } }
        failed:
          type: array
          items:
            type: object
            required: [id, message]
            properties:
              id:      { type: string }
              message: { type: string }
    MergeResult:
      type: object
      required: [primaryId, mergedIds]
      properties:
        primaryId: { type: string, description: "The surviving record id." }
        mergedIds: { type: array, items: { type: string }, description: "Duplicate record ids that were merged into the primary and deleted." }
    MergeOrganizationsBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted funder columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    MergePeopleBody:
      type: object
      required: [primaryId, mergeIds]
      description: "Collapse `mergeIds` (duplicates) into `primaryId` (survivor). `overrides` supplies the user-chosen winning value for each scalar field; only whitelisted person columns are applied."
      properties:
        primaryId: { type: string }
        mergeIds:  { type: array, items: { type: string }, minItems: 1, maxItems: 49 }
        overrides: { type: object, additionalProperties: true, nullable: true }
    BulkUpdatePeoplePatch:
      type: object
      description: "Only fields present here are written. All fields are optional and forward-only — omit to leave unchanged."
      properties:
        ownerUserId:         { type: string, nullable: true }
        currentHomeRegionId: { type: string, nullable: true }
        capacityRating:      { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        priority:            { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        deceased:            { type: boolean }
        newsletter:          { type: boolean, description: "Newsletter subscription flag. Changes are mirrored out to Flodesk (precedence rules apply — a Flodesk unsubscribe still wins)." }
    BulkUpdatePeopleBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdatePeoplePatch" }
    BulkUpdateOrganizationsPatch:
      type: object
      properties:
        ownerUserId:          { type: string, nullable: true }
        activeStatus:         { allOf: [ { $ref: "#/components/schemas/ActiveStatus" } ], nullable: true }
        connectionStatus:     { allOf: [ { $ref: "#/components/schemas/ConnectionStatus" } ], nullable: true }
        capacityRating:       { allOf: [ { $ref: "#/components/schemas/CapacityRating" } ], nullable: true }
        enthusiasm:           { allOf: [ { $ref: "#/components/schemas/Enthusiasm" } ], nullable: true }
        priority:             { allOf: [ { $ref: "#/components/schemas/Priority" } ], nullable: true }
        entityType:           { type: string, nullable: true }
        issuesGrants:         { type: boolean }
    BulkUpdateOrganizationsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOrganizationsPatch" }
    BulkUpdateHouseholdsPatch:
      type: object
      properties:
        active: { type: boolean }
    BulkUpdateHouseholdsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateHouseholdsPatch" }
    BulkUpdateOpportunitiesPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        lossType:    { allOf: [ { $ref: "#/components/schemas/OpportunityLossType" } ], nullable: true }
        stage:       { allOf: [ { $ref: "#/components/schemas/OpportunityStage" } ], nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/OpportunityType" } ], nullable: true }
        wasPledge:   { type: boolean, nullable: true }
        actualCompletionDate: { type: string, format: date, nullable: true, description: "Optional close date when bulk-setting lossType to lost (or stage to cash_in). Left null is allowed to support historical cleanup workflows." }
        coveredFiscalYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs (e.g. 'fy2026') to attach to each opportunity via pledge_allocations. Combined with coveredFiscalYearsMode."
        coveredFiscalYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe existing pledge_allocations on each opp and recreate one minimal row per FY (DESTRUCTIVE: loses subAmount/intendedUsage on those rows). append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every pledge_allocations row of each opportunity. Existing allocation rows are updated to this value; if an opportunity has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every pledge_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateOpportunitiesBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateOpportunitiesPatch" }
    BulkUpdateGiftsPatch:
      type: object
      properties:
        ownerUserId: { type: string, nullable: true }
        type:        { allOf: [ { $ref: "#/components/schemas/GiftType" } ], nullable: true }
        entityIds:
          type: array
          items: { type: string }
          description: "Set of entity ids to attach to each gift via gift_allocations. Combined with entityIdsMode."
        entityIdsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose entity_id is set (DESTRUCTIVE) and recreate one minimal row per entity. append = add allocations only for entities not already present."
        grantYears:
          type: array
          items: { type: string }
          description: "Set of fiscal-year slugs to attach via gift_allocations. Combined with grantYearsMode."
        grantYearsMode:
          type: string
          enum: [replace, append]
          description: "replace = wipe gift_allocations rows whose grant_year is set (DESTRUCTIVE) and recreate one minimal row per FY. append = add allocations only for FYs not already present."
        intendedUsage:
          allOf: [ { $ref: "#/components/schemas/IntendedUsage" } ]
          description: "Sets the intended usage on every gift_allocations row of each gift. Existing allocation rows are updated to this value; if a gift has no allocations, one is created carrying this usage."
        fundableProjectId:
          type: string
          nullable: true
          description: "Fundable project to link on every gift_allocations row, applied alongside intendedUsage. Only honored when intendedUsage = 'project'; for any other usage the allocations' fundable_project_id is cleared to null."
    BulkUpdateGiftsBody:
      type: object
      required: [ids, patch]
      properties:
        ids:   { type: array, items: { type: string }, minItems: 1, maxItems: 1000 }
        patch: { $ref: "#/components/schemas/BulkUpdateGiftsPatch" }

    # ─── Person suppression windows ──────────────────────────────────────────
    PersonSuppressionWindow:
      type: object
      required: [id, personId, createdAt, updatedAt]
      properties:
        id:        { type: string }
        personId:  { type: string }
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PersonSuppressionWindowList:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/PersonSuppressionWindow" } }
    CreatePersonSuppressionWindowBody:
      type: object
      required: [personId]
      properties:
        personId:  { type: string }
        notes:     { type: string }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    UpdatePersonSuppressionWindowBody:
      type: object
      properties:
        notes:     { type: string, nullable: true }
        startDate: { type: string, format: date, nullable: true }
        endDate:   { type: string, format: date, nullable: true }

    # ─── Calendar meeting-filter config ──────────────────────────────────────
    CalendarMeetingFiltersConfig:
      type: object
      required: [titlePatterns, attendeeCountCutoff, updatedAt]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }
        updatedAt:          { type: string, format: date-time, nullable: true }
    UpdateCalendarMeetingFiltersBody:
      type: object
      required: [titlePatterns, attendeeCountCutoff]
      properties:
        titlePatterns:      { type: array, items: { type: string } }
        attendeeCountCutoff: { type: integer, minimum: 2 }

    # ─── Internal staff email-domain config ──────────────────────────────────
    InternalEmailDomainsConfig:
