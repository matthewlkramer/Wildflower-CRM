openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Wildflower Fundraising CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: individuals
    description: Individual donor/prospect records
  - name: households
    description: Household groupings
  - name: funding-entities
    description: Funding entities (foundations, DAFs, government agencies)
  - name: opportunities
    description: Fundraising opportunities
  - name: pledges
    description: Multi-installment pledge commitments
  - name: gifts
    description: Cash received records
  - name: moves
    description: Logged interactions/touchpoints
  - name: relationships
    description: Cross-entity relationship links
  - name: dashboard
    description: Dashboard and summary views
  - name: projections
    description: Revenue projection and forecast data
  - name: grants-calendar
    description: Grants calendar and deadline tracking
  - name: users
    description: Team member/user management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Individuals ────────────────────────────────────────────────────────────
  /individuals:
    get:
      operationId: listIndividuals
      tags: [individuals]
      summary: List individuals with filters
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: owner
          in: query
          schema: { type: string }
        - name: cultivationStage
          in: query
          schema: { type: string }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: metroArea
          in: query
          schema: { type: string }
        - name: capacityRating
          in: query
          schema: { type: string }
        - name: enthusiasm
          in: query
          schema: { type: string }
        - name: lastMoveRecency
          in: query
          description: "Filter by days since last move: 30, 60, 90, 180, 365"
          schema: { type: integer }
        - name: householdId
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of individuals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Individual"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createIndividual
      tags: [individuals]
      summary: Create a new individual
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIndividualBody"
      responses:
        "201":
          description: Created individual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Individual"

  /individuals/{id}:
    get:
      operationId: getIndividual
      tags: [individuals]
      summary: Get individual by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Individual record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndividualDetail"
    patch:
      operationId: updateIndividual
      tags: [individuals]
      summary: Update individual
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIndividualBody"
      responses:
        "200":
          description: Updated individual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Individual"
    delete:
      operationId: deleteIndividual
      tags: [individuals]
      summary: Soft-delete individual
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Households ─────────────────────────────────────────────────────────────
  /households:
    get:
      operationId: listHouseholds
      tags: [households]
      summary: List households
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: owner
          in: query
          schema: { type: string }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of households
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Household"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createHousehold
      tags: [households]
      summary: Create a new household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHouseholdBody"
      responses:
        "201":
          description: Created household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"

  /households/{id}:
    get:
      operationId: getHousehold
      tags: [households]
      summary: Get household by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Household record with members and giving history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdDetail"
    patch:
      operationId: updateHousehold
      tags: [households]
      summary: Update household
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHouseholdBody"
      responses:
        "200":
          description: Updated household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
    delete:
      operationId: deleteHousehold
      tags: [households]
      summary: Soft-delete household
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /households/{id}/members:
    get:
      operationId: getHouseholdMembers
      tags: [households]
      summary: Get household members
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of household members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HouseholdMember"
    post:
      operationId: addHouseholdMember
      tags: [households]
      summary: Add a member to a household
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddHouseholdMemberBody"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdMember"

  /households/{id}/members/{individualId}:
    delete:
      operationId: removeHouseholdMember
      tags: [households]
      summary: Remove a member from a household
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: individualId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Funding Entities ────────────────────────────────────────────────────────
  /funding-entities:
    get:
      operationId: listFundingEntities
      tags: [funding-entities]
      summary: List funding entities
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: subtype
          in: query
          schema: { $ref: "#/components/schemas/FundingEntitySubtype" }
        - name: owner
          in: query
          schema: { type: string }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: cultivationStage
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of funding entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FundingEntity"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createFundingEntity
      tags: [funding-entities]
      summary: Create a new funding entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFundingEntityBody"
      responses:
        "201":
          description: Created funding entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingEntity"

  /funding-entities/{id}:
    get:
      operationId: getFundingEntity
      tags: [funding-entities]
      summary: Get funding entity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Funding entity record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingEntityDetail"
    patch:
      operationId: updateFundingEntity
      tags: [funding-entities]
      summary: Update funding entity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFundingEntityBody"
      responses:
        "200":
          description: Updated funding entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundingEntity"
    delete:
      operationId: deleteFundingEntity
      tags: [funding-entities]
      summary: Soft-delete funding entity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /funding-entities/{id}/people:
    get:
      operationId: getFundingEntityPeople
      tags: [funding-entities]
      summary: Get people associated with a funding entity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Associated individuals with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityPersonLink"
    post:
      operationId: addFundingEntityPerson
      tags: [funding-entities]
      summary: Link a person to a funding entity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddEntityPersonBody"
      responses:
        "201":
          description: Person linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityPersonLink"

  /funding-entities/{id}/people/{individualId}:
    delete:
      operationId: removeFundingEntityPerson
      tags: [funding-entities]
      summary: Remove a person link from a funding entity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: individualId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Opportunities ───────────────────────────────────────────────────────────
  /opportunities:
    get:
      operationId: listOpportunities
      tags: [opportunities]
      summary: List opportunities
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: owner
          in: query
          schema: { type: string }
        - name: stage
          in: query
          schema: { type: string }
        - name: subtype
          in: query
          schema: { $ref: "#/components/schemas/OpportunitySubtype" }
        - name: region
          in: query
          schema: { type: string }
        - name: donorId
          in: query
          schema: { type: string }
        - name: donorType
          in: query
          schema: { type: string, enum: [individual, funding_entity] }
        - name: fiscalYear
          in: query
          schema: { type: integer }
        - name: rollForward
          in: query
          description: Filter for opportunities in roll-forward status
          schema: { type: boolean }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of opportunities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createOpportunity
      tags: [opportunities]
      summary: Create a new opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpportunityBody"
      responses:
        "201":
          description: Created opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"

  /opportunities/{id}:
    get:
      operationId: getOpportunity
      tags: [opportunities]
      summary: Get opportunity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Opportunity record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityDetail"
    patch:
      operationId: updateOpportunity
      tags: [opportunities]
      summary: Update opportunity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOpportunityBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
    delete:
      operationId: deleteOpportunity
      tags: [opportunities]
      summary: Soft-delete opportunity
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /opportunities/pipeline:
    get:
      operationId: getOpportunityPipeline
      tags: [opportunities]
      summary: Get opportunity pipeline grouped by stage (kanban)
      parameters:
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: owner
          in: query
          schema: { type: string }
        - name: fiscalYear
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Pipeline grouped by stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  stages:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineStage"
                  totalValue:
                    type: number
                  totalCount:
                    type: integer
                required: [stages, totalValue, totalCount]

  # ─── Pledges ─────────────────────────────────────────────────────────────────
  /pledges:
    get:
      operationId: listPledges
      tags: [pledges]
      summary: List pledges
      parameters:
        - name: donorId
          in: query
          schema: { type: string }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: status
          in: query
          schema: { type: string }
        - name: upcomingInstallments
          in: query
          description: Filter for pledges with upcoming installments in next N days
          schema: { type: integer }
        - name: overdueInstallments
          in: query
          description: Include only pledges with overdue installments
          schema: { type: boolean }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of pledges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pledge"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createPledge
      tags: [pledges]
      summary: Create a new pledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePledgeBody"
      responses:
        "201":
          description: Created pledge with installments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PledgeDetail"

  /pledges/{id}:
    get:
      operationId: getPledge
      tags: [pledges]
      summary: Get pledge by ID with installments
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Pledge with installments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PledgeDetail"
    patch:
      operationId: updatePledge
      tags: [pledges]
      summary: Update pledge
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePledgeBody"
      responses:
        "200":
          description: Updated pledge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pledge"

  /pledges/{id}/installments/{installmentId}:
    patch:
      operationId: updatePledgeInstallment
      tags: [pledges]
      summary: Mark an installment as paid or update its details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: installmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInstallmentBody"
      responses:
        "200":
          description: Updated installment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PledgeInstallment"

  # ─── Gifts ───────────────────────────────────────────────────────────────────
  /gifts:
    get:
      operationId: listGifts
      tags: [gifts]
      summary: List gifts
      parameters:
        - name: donorId
          in: query
          schema: { type: string }
        - name: donorType
          in: query
          schema: { type: string, enum: [individual, funding_entity] }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: reconciled
          in: query
          schema: { type: boolean }
        - name: pledgeId
          in: query
          schema: { type: string }
        - name: householdId
          in: query
          schema: { type: string }
        - name: fromDate
          in: query
          schema: { type: string, format: date }
        - name: toDate
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of gifts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Gift"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createGift
      tags: [gifts]
      summary: Record a new gift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGiftBody"
      responses:
        "201":
          description: Created gift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gift"

  /gifts/{id}:
    get:
      operationId: getGift
      tags: [gifts]
      summary: Get gift by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Gift record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gift"
    patch:
      operationId: updateGift
      tags: [gifts]
      summary: Update gift (e.g. mark reconciled)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGiftBody"
      responses:
        "200":
          description: Updated gift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gift"

  # ─── Moves ───────────────────────────────────────────────────────────────────
  /moves:
    get:
      operationId: listMoves
      tags: [moves]
      summary: List moves (activity log)
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: donorId
          in: query
          schema: { type: string }
        - name: householdId
          in: query
          schema: { type: string }
        - name: fundingEntityId
          in: query
          schema: { type: string }
        - name: opportunityId
          in: query
          schema: { type: string }
        - name: moveType
          in: query
          schema: { type: string }
        - name: participantUserId
          in: query
          schema: { type: string }
        - name: fromDate
          in: query
          schema: { type: string, format: date }
        - name: toDate
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of moves
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Move"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                required: [data, total, page, limit]
    post:
      operationId: createMove
      tags: [moves]
      summary: Log a new move/touchpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMoveBody"
      responses:
        "201":
          description: Logged move
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Move"

  /moves/{id}:
    get:
      operationId: getMove
      tags: [moves]
      summary: Get move by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Move record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Move"
    patch:
      operationId: updateMove
      tags: [moves]
      summary: Update a move
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMoveBody"
      responses:
        "200":
          description: Updated move
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Move"
    delete:
      operationId: deleteMove
      tags: [moves]
      summary: Delete a move
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  # ─── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for the current user
      parameters:
        - name: userId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity across the team
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/overdue-next-steps:
    get:
      operationId: getOverdueNextSteps
      tags: [dashboard]
      summary: Get overdue next steps from moves
      parameters:
        - name: userId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Overdue next steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OverdueNextStep"

  /dashboard/donors-gone-quiet:
    get:
      operationId: getDonorsGoneQuiet
      tags: [dashboard]
      summary: Get donors with no recent activity (>90 days in active cultivation)
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 90 }
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: owner
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Donors gone quiet
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonorQuietAlert"

  # ─── Projections ─────────────────────────────────────────────────────────────
  /projections/forecast:
    get:
      operationId: getProjectionsForecast
      tags: [projections]
      summary: Get 3-year fiscal year revenue forecast
      parameters:
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: owner
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - name: opportunitySubtype
          in: query
          schema: { $ref: "#/components/schemas/OpportunitySubtype" }
      responses:
        "200":
          description: 3-year forecast by fiscal year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectionsForecast"

  /projections/pledge-schedule:
    get:
      operationId: getPledgeSchedule
      tags: [projections]
      summary: Get pledge cash-flow schedule
      parameters:
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: months
          in: query
          schema: { type: integer, default: 36 }
      responses:
        "200":
          description: Monthly/quarterly pledge installment schedule
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    type: array
                    items:
                      $ref: "#/components/schemas/PledgeSchedulePeriod"
                required: [schedule]

  # ─── Grants Calendar ─────────────────────────────────────────────────────────
  /grants-calendar:
    get:
      operationId: getGrantsCalendar
      tags: [grants-calendar]
      summary: Get RFP/proposal opportunities with upcoming deadlines
      parameters:
        - name: fund
          in: query
          schema: { $ref: "#/components/schemas/Fund" }
        - name: owner
          in: query
          schema: { type: string }
        - name: daysAhead
          in: query
          schema: { type: integer, default: 90 }
      responses:
        "200":
          description: RFP deadlines calendar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantsCalendarEntry"

  # ─── Users ────────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List team members
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateCurrentUser
      tags: [users]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    # ─── Enums ──────────────────────────────────────────────────────────────────
    Fund:
      type: string
      enum: [general_operating, seed_fund, black_wildflowers, sunlight]

    FundingEntitySubtype:
      type: string
      enum: [institutional_foundation, family_foundation, daf_account, government_agency, corporate]

    OpportunitySubtype:
      type: string
      enum: [ongoing_rolling, targeted_deadline, rfp_proposal]

    CultivationStage:
      type: string
      enum: [pre_qualified, qualified, have_path_to_connect, connected, in_relationship, lapsed_relationship]

    InstitutionalCultivationStage:
      type: string
      enum: [pre_research, researched, have_path_to_connect, connected, in_relationship, lapsed_relationship]

    GovernmentCultivationStage:
      type: string
      enum: [never_applied, active_grantee, lapsed_grantee]

    Enthusiasm:
      type: string
      enum: [active_opposition, unsupportive, skeptical, neutral, warm, supportive, advocate]

    OpportunityStage:
      type: string
      enum: [pre_conversation, conversation, solicitation, negotiation, committed, funded, stewarding, declined, withdrawn]

    GovernmentOpportunityStage:
      type: string
      enum: [opportunity_identified, eligibility_confirmed, bid_no_bid, loi_in_progress, loi_submitted, application_in_progress, application_submitted, under_review, awarded, not_awarded, in_grant_management]

    HouseholdMemberRole:
      type: string
      enum: [principal, spouse, partner, adult_child, matriarch_patriarch, trustee, in_law, other]

    EntityPersonRole:
      type: string
      enum: [principal_founder, donor_advisor, board_member, program_officer, staff, other_contact]

    UserRole:
      type: string
      enum: [admin, team_member, finance, read_only]

    PledgeStatus:
      type: string
      enum: [active, completed, revised, defaulted]

    PledgeInstallmentSchedule:
      type: string
      enum: [annual, semi_annual, quarterly, custom]

    MoveType:
      type: string
      enum: [discovery_call, cultivation_meeting_in_person, cultivation_meeting_virtual, site_visit, event_attendance, email_exchange, phone_call, proposal_sent, loi_sent, letter_sent, thank_you_sent, impact_report_sent, stewardship_touch, introduction_made, referral_received, research_note]

    CapacityRating:
      type: string
      enum: [tier_1k_10k, tier_10k_50k, tier_50k_250k, tier_250k_1m, tier_1m_plus]

    # ─── Shared/Simple ───────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DeleteResult:
      type: object
      properties:
