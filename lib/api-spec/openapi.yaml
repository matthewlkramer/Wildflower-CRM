      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailMessage" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-attachments/{id}/download:
    get:
      operationId: downloadEmailAttachment
      tags: [email-messages]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: Attachment bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Calendar events (synced Google Calendar, read-only + privacy) ────────
  /calendar-events:
    get:
      operationId: listCalendarEvents
      tags: [calendar-events]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: calendarUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string } }
        - { name: funderId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEventList" } } } }
  /calendar-events/{id}:
    get:
      operationId: getCalendarEvent
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /calendar-events/{id}/privacy:
    patch:
      operationId: updateCalendarEventPrivacy
      tags: [calendar-events]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCalendarEventPrivacyBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarEvent" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Admin: per-user sync health + manual resync ──────────────────────────
  /admin/google-sync:
    get:
      operationId: adminListGoogleSync
      tags: [admin]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AdminGoogleSyncList" } } } }
        "403": { description: Admin required }
  /admin/google-sync/{id}/resync:
    post:
      operationId: adminResyncGoogleUser
      tags: [admin]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: object, additionalProperties: true } } }
        "403": { description: Admin required }
        "409": { description: User has no active Google grant }

  # ─── Google OAuth (per-CRM-user Gmail + Calendar grants) ──────────────────
  # NB: /google-oauth/start and /google-oauth/callback are browser
  # navigations (302 redirects to/from Google), not API client calls, so
  # only the status + disconnect endpoints are documented here.
  /google-oauth/status:
    get:
      operationId: getGoogleOauthStatus
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleOauthStatus" } } } }
  /google-oauth/disconnect:
    post:
      operationId: disconnectGoogleOauth
      tags: [google-oauth]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }

  # ─── Google sync (per-user Gmail + Calendar incremental sync) ─────────────
  /google-sync/status:
    get:
      operationId: getGoogleSyncStatus
      tags: [google-sync]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoogleSyncStatus" } } } }
  /google-sync/gmail:
    post:
      operationId: runGmailSync
      tags: [google-sync]
      summary: Trigger an immediate Gmail sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GmailSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }
  /google-sync/calendar:
    post:
      operationId: runCalendarSync
      tags: [google-sync]
      summary: Trigger an immediate Google Calendar sync for the calling user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CalendarSyncRunResponse" } } } }
        "409": { description: "Caller has no active Google grant" }

  # ─── Analytics (aggregate read-only) ───────────────────────────────────────
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Aggregate counts + money totals for the Dashboard landing page.
      parameters:
        - name: entityIds
          in: query
          description: |
            Optional list of `entities.id` slugs. When provided, the money tiles
            (received / openPipelineAsk / openPipelineWeighted / goal) are restricted
            to allocations on those entities. Counts are unaffected. Omit or pass an
            empty list to include all entities.
          required: false
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DashboardSummary" } } } }

  /projections-by-fy-entity:
    get:
      operationId: getProjectionsByFyEntity
      tags: [analytics]
      summary: Open-pipeline pledge_allocations aggregated by (grantYear, entityId).
      description: |
        Joins `pledge_allocations` to its parent `opportunities_and_pledges` where status='open',
        excludes superseded/abandoned allocation rows, and groups remaining rows by
        (grantYear, entityId). `expected` weights `sub_amount` by the parent opp's `win_probability`
        (defaulting to 1 when null). Both grouping keys may be null.
      parameters:
        - name: entityId
          in: query
          required: false
          description: |
            Optional set of `entities.id` slugs. When provided, only allocations
            on those entities are included. Comma-separated form supported.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectionsByFyEntity" } } } }

  /fiscal-year-breakdown/{fyId}:
    get:
      operationId: getFiscalYearBreakdown
      tags: [analytics]
      summary: Per-FY drilldown for a Dashboard money tile.
      description: |
        Returns the supporting detail for a single fiscal year's dashboard money tiles:
        gift allocations booked to that grant_year (the "Received" rollup) and pledge
        allocations on open opportunities for that grant_year (the "Open asks" / "Weighted asks"
        rollups), plus the FY's goal. Each row carries enough denormalized parent info
        (donor names, parent gift/opportunity IDs, win probability) to render a useful table
        without N+1 fetches.
      parameters:
        - { name: fyId, in: path, required: true, schema: { type: string }, description: "fiscal_years.id (e.g. `fy2026`)." }
        - name: entityId
          in: query
          required: false
          description: |
            Optional `entities.id` slug. When provided, both the `received` and
            `openPipeline` sections are restricted to allocations on that entity.
            Omit to include all entities.
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearBreakdown" } } } }

  # ─── Bulk record updates ───────────────────────────────────────────────────
  # One endpoint per entity. The body is { ids, patch } where `patch` is
  # a per-entity subset of writable fields. Only fields present in `patch`
  # are written — forward-only, untouched fields are never overwritten.
  # Returns 200 even on partial failures; per-id failures are listed in
  # the response body (the audit log records both success and failure).
  /people/bulk-update:
    post:
      operationId: bulkUpdatePeople
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdatePeopleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /funders/bulk-update:
    post:
      operationId: bulkUpdateFunders
      tags: [funders]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateFundersBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /households/bulk-update:
    post:
      operationId: bulkUpdateHouseholds
      tags: [households]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateHouseholdsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /opportunities-and-pledges/bulk-update:
    post:
      operationId: bulkUpdateOpportunitiesAndPledges
      tags: [opportunities-and-pledges]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateOpportunitiesBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/bulk-update:
    post:
      operationId: bulkUpdateGiftsAndPayments
      tags: [gifts-and-payments]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateGiftsBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BulkUpdateResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

components:
  parameters:
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 1000, default: 50 } }
    Page:  { name: page,  in: query, schema: { type: integer, minimum: 1, default: 1 } }
    IdPath: { name: id, in: path, required: true, schema: { type: string } }

  responses:
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
    BadRequest:
      description: Bad request (validation error)
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties: { status: { type: string } }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:   { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    Pagination:
      type: object
      required: [page, limit, total]
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ─── Enums ─────────────────────────────────────────────────────────────────
    RegionType: { type: string, enum: [state, metro_area, city, neighborhood, region_within_state, multi_state_region, country, continent] }
    EntityRoleType: { type: string, enum: [funder, non_funding_organization, payment_intermediary, household] }
    ContactValidity: { type: string, enum: [valid, invalid, unknown] }
    EmailType: { type: string, enum: [work, personal, other] }
    PhoneType: { type: string, enum: [work, mobile, home, other] }
    PeopleRoleCurrent: { type: string, enum: [current, past] }
    PeopleEntityRoleConnection: { type: string, enum: [employee, principal, board_member, partner, professor, donor_advisor, elected_official] }
    PaymentIntermediaryType: { type: string, enum: [daf, giving_platform, private_wealth_manager] }
    Pronouns: { type: string, enum: [he_him_his, she_her_hers, they_them_theirs, other] }
    SchoolStatus: { type: string, enum: [emerging, open, paused, closing, permanently_closed, disaffiliating, disaffiliated, placeholder, abandoned] }
    GovernanceModel: { type: string, enum: [independent, district, charter, exploring_charter, community_partnership] }
    UserRole: { type: string, enum: [admin, team_member, finance, read_only] }
    FundingEntitySubtype: { type: string, enum: [family_foundation, institutional_foundation, corporate_foundation, community_foundation, bank_foundation, family_office_trust, intermediary, government, nonprofit, corporation, capital_provider, philanthropic_advisor, cdfi, education_forprofit, competition, public_private, daf_platform, platform] }
    NumberOfEmployees: { type: string, enum: [e_1, e_2_10, e_11_50, e_51_250, e_251_1000, e_1001_10000, e_10000_plus] }
    CapacityRating: { type: string, enum: [tier_10k_50k, tier_50k_250k, tier_250k_1m, tier_1m_plus] }
    ConnectionStatus: { type: string, enum: [connected, have_a_connector, no_connection] }
    Enthusiasm: { type: string, enum: [advocate, supportive, warm, neutral, unsupportive] }
    StrategicAlignment: { type: string, enum: [high, medium, low] }
    ActiveStatus: { type: string, enum: [active, defunct, spenddown] }
    OrganizationType: { type: string, enum: [advocacy_membership_lobbyist, authorizer, cmo, capital_provider, government, corporation, education_vendor, elected_official, higher_ed, investor, law_firm, media, nonprofit, philanthropic_advisor, real_estate, school, school_district, school_network, small_business_consulting, tribal] }
    OpportunityStatus: { type: string, enum: [open, won, dormant, lost] }
    OpportunityType: { type: string, enum: [solicitation, renewal, open_application] }
    OpportunityStage: { type: string, enum: [cold_lead, warm_lead, in_conversation, convince, conditional_commitment, probable_renewal, verbal_commitment, written_commitment, cash_in] }
    OpportunityConditional: { type: string, enum: [unconditional, reimbursable, conditional_on_funder_determination, conditional_on_target] }
    PledgeAllocationStatus: { type: string, enum: [working, committed, superseded, committed_with_conditions, superseded_by_pledge, superseded_by_gift, abandoned] }
    GiftType: { type: string, enum: [standard_gift, pledge_payment, directed_gift, loan_fund_investment, matching_gift] }
    GiftPaymentMethod: { type: string, enum: [ach, check, wire, stock, donor_box, daf_ach, daf_check, daf_bill_com] }
    IntendedUsage: { type: string, enum: [gen_ops, growth, school_startup, teacher_training, project] }

    # ─── Users ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, emailSyncMode, createdAt, updatedAt]
      properties:
        id:             { type: string }
        clerkId:        { type: string }
        email:          { type: string }
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        displayName:    { type: string, nullable: true }
        role:           { $ref: "#/components/schemas/UserRole" }
        defaultFund:    { type: string, nullable: true }
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }
    EmailSyncMode:
      type: string
      enum: [full, summary_only]
      description: "Per-user Gmail sync privacy mode. `full` stores the email body + attachments. `summary_only` stores only an AI-generated one-line topic summary; body and attachments are never persisted, and intelligence/proposals are skipped for messages from this mailbox. The setting applies to NEW emails synced after the change; existing emails are not retroactively edited."
    UpdateCurrentUserBody:
      type: object
      properties:
        emailSyncMode:  { $ref: "#/components/schemas/EmailSyncMode" }

    # ─── Regions ───────────────────────────────────────────────────────────────
    Region:
      type: object
      required: [id, name, displayPath, createdAt, updatedAt]
      properties:
        id:                 { type: string, description: "Human-readable slug PK, e.g. `united_states__minnesota__saint_paul`. Built from the region's name plus its included-type ancestors (continent / country / state / city / neighborhood); intermediate aggregation layers (multi_state_region, region_within_state, metro_area) are skipped." }
        name:               { type: string }
        displayPath:        { type: string, description: "Comma-separated full path including every ancestor (e.g. `United States, New England, Massachusetts, Greater Boston, Boston`). Use for UI display." }
        stateAbbreviation:  { type: string, nullable: true }
        type:               { allOf: [ { $ref: "#/components/schemas/RegionType" } ], nullable: true }
        parentRegionId:     { type: string, nullable: true }
        createdAt:          { type: string, format: date-time }
        updatedAt:          { type: string, format: date-time }
    RegionList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/Region" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Schools ───────────────────────────────────────────────────────────────
    School:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:                       { type: string }
        name:                     { type: string }
        longName:                 { type: string, nullable: true }
        shortName:                { type: string, nullable: true }
        status:                   { allOf: [ { $ref: "#/components/schemas/SchoolStatus" } ], nullable: true }
        governanceModel:          { allOf: [ { $ref: "#/components/schemas/GovernanceModel" } ], nullable: true }
        agesPlanes:               { type: array, items: { type: string }, nullable: true }
        logoMainSquareUrl:        { type: string, nullable: true }
        stageStatus:              { type: string, nullable: true }
        currentMailingAddress:    { type: string, nullable: true }
        currentPhysicalAddress:   { type: string, nullable: true }
        createdAt:                { type: string, format: date-time }
        updatedAt:                { type: string, format: date-time }
    SchoolList:
      type: object
      required: [data, pagination]
      properties:
        data:       { type: array, items: { $ref: "#/components/schemas/School" } }
        pagination: { $ref: "#/components/schemas/Pagination" }

    # ─── Entities / fundable projects / fiscal years ──────────────────────────
    Entity:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:        { type: string }
        name:      { type: string }
        active:    { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateEntityBody:
      type: object
      required: [id, name]
      properties:
        id:     { type: string, description: "Slug-style key, e.g. wildflower_foundation. Must be unique." }
        name:   { type: string }
        active: { type: boolean, description: "Defaults to true. Set false to mark retired." }
    UpdateEntityBody:
      type: object
      properties:
        name:   { type: string }
        active: { type: boolean }
    FiscalYearEntityGoal:
      type: object
      required: [fiscalYearId, entityId, goalAmount, createdAt, updatedAt]
      properties:
        fiscalYearId: { type: string }
        entityId:     { type: string }
        goalAmount:   { type: string, description: "Decimal string (numeric(14,2))." }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }
    UpsertFiscalYearEntityGoalBody:
      type: object
      required: [goalAmount]
      properties:
        goalAmount: { type: string, description: "Decimal string. Use plain digits with optional decimal, no commas." }
    FundableProject:
      type: object
      required: [id, name, active, createdAt, updatedAt]
      properties:
        id:          { type: string }
        name:        { type: string }
        description: { type: string, nullable: true }
        active:      { type: boolean }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }
    FiscalYear:
      type: object
      required: [id, label, createdAt, updatedAt]
      properties:
        id:         { type: string }
        label:      { type: string }
        startDate:  { type: string, format: date, nullable: true }
        endDate:    { type: string, format: date, nullable: true }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    # ─── Analytics (aggregate read-only response shapes) ──────────────────────
    DashboardCounts:
      type: object
      required: [people, funders, households, organizations, opportunities, openOpportunities, wonPledges, gifts]
      properties:
        people:            { type: integer }
        funders:           { type: integer }
        households:        { type: integer }
        organizations:     { type: integer }
        opportunities:     { type: integer }
        openOpportunities: { type: integer }
        wonPledges:        { type: integer }
        gifts:             { type: integer }
    DashboardFiscalYear:
      type: object
      required: [id, label, startDate, endDate]
      properties:
        id:        { type: string, description: "fy-slug (e.g. `fy2026`)." }
        label:     { type: string, description: "Human label (e.g. `FY 2026`)." }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
    FiscalYearMetrics:
      type: object
      required: [fiscalYear, openPipelineAsk, openPipelineWeighted, received, goal]
      description: |
        Per-fiscal-year fundraising metrics. All money values are decimal strings
        (PostgreSQL numeric) to preserve precision — format with `formatCurrency`
        on the client. `goal` is nullable because not every FY has a goal seeded
        (e.g. far-future years or the "future" sentinel).
      properties:
        fiscalYear:           { $ref: "#/components/schemas/DashboardFiscalYear" }
        openPipelineAsk:      { type: string, description: "SUM(pledge_allocations.sub_amount) for status='open' opps with grant_year = this FY." }
        openPipelineWeighted: { type: string, description: "SUM(pledge_allocations.sub_amount × COALESCE(parent.win_probability, 1)) for status='open' opps with grant_year = this FY." }
        received:             { type: string, description: "SUM(gift_allocations.sub_amount) for allocations with grant_year = this FY." }
        goal:                 { type: string, nullable: true, description: "Fundraising goal for the FY (from fiscal_years.goal_amount); null if not set." }
    DashboardSummary:
      type: object
      required: [counts, currentFiscalYear, byFiscalYear]
      properties:
        counts:            { $ref: "#/components/schemas/DashboardCounts" }
        currentFiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        byFiscalYear:
          type: array
          description: "Per-FY metrics for the current FY and the next FY (in that order)."
          items: { $ref: "#/components/schemas/FiscalYearMetrics" }

    ProjectionByFyEntityRow:
      type: object
      required: [grantYear, entityId, allocationCount, totalSubAmount, expected]
      properties:
        grantYear:       { type: string, nullable: true, description: "fiscal_years.id, or null for unbucketed allocations." }
        entityId:        { type: string, nullable: true, description: "entities.id, or null for unbucketed allocations." }
        allocationCount: { type: integer }
        totalSubAmount:  { type: string, description: "SUM(sub_amount) for the group, as numeric string." }
        expected:        { type: string, description: "SUM(sub_amount × COALESCE(parent.win_probability, 1)) for the group, as numeric string." }
    ProjectionsByFyEntity:
      type: object
      required: [rows]
      properties:
        rows: { type: array, items: { $ref: "#/components/schemas/ProjectionByFyEntityRow" } }

    FiscalYearReceivedRow:
      type: object
      required: [allocationId, subAmount, giftId]
      description: "A single gift_allocation row booked to the FY's grant_year, denormalized with parent gift + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "gift_allocations.sub_amount (numeric string)." }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        displayUsage:               { type: string, nullable: true, description: "Server-computed human-readable usage label from gift_allocations.display_usage." }
        fundableProjectId:          { type: string, nullable: true }
        giftId:                     { type: string }
        giftType:                   { type: string, nullable: true }
        dateReceived:               { type: string, format: date, nullable: true }
        giftAmount:                 { type: string, nullable: true, description: "Parent gift's total amount (numeric string)." }
        funderId:                   { type: string, nullable: true }
        funderName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        funderIsPriority:                 { type: boolean, nullable: true, readOnly: true }
        individualGiverPersonIsPriority:  { type: boolean, nullable: true, readOnly: true }
    FiscalYearOpenRow:
      type: object
      required: [allocationId, subAmount, weightedAmount, opportunityId]
      description: "A single pledge_allocation row on an open opportunity for the FY's grant_year, denormalized with parent opp + donor info."
      properties:
        allocationId:               { type: string }
        subAmount:                  { type: string, description: "pledge_allocations.sub_amount (numeric string)." }
        weightedAmount:             { type: string, description: "sub_amount × COALESCE(parent.win_probability, 1) (numeric string)." }
        allocationStatus:           { type: string, nullable: true }
        entityId:                   { type: string, nullable: true }
        intendedUsage:              { type: string, nullable: true }
        fundableProjectId:          { type: string, nullable: true }
        opportunityId:              { type: string }
        opportunityName:            { type: string, nullable: true }
        opportunityStage:           { type: string, nullable: true }
        winProbability:             { type: string, nullable: true, description: "Parent opp's win_probability (0–1, numeric string)." }
        projectedCloseDate:         { type: string, format: date, nullable: true }
        funderId:                   { type: string, nullable: true }
        funderName:                 { type: string, nullable: true }
        householdId:                { type: string, nullable: true }
        householdName:              { type: string, nullable: true }
        individualGiverPersonId:    { type: string, nullable: true }
        individualGiverPersonName:  { type: string, nullable: true }
        funderIsPriority:                 { type: boolean, nullable: true, readOnly: true }
        individualGiverPersonIsPriority:  { type: boolean, nullable: true, readOnly: true }
    FiscalYearBreakdown:
      type: object
      required: [fiscalYear, goal, received, openPipeline]
      description: |
        Supporting detail for a single FY's dashboard money tiles. `received` powers the
        "Received" tile (gift_allocations summed); `openPipeline` powers both the
        "Open asks" tile (totalAsk) and the "Weighted asks" tile (totalWeighted).
      properties:
        fiscalYear: { $ref: "#/components/schemas/DashboardFiscalYear" }
        goal:       { type: string, nullable: true }
        received:
          type: object
          required: [total, rows]
          properties:
            total: { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            rows:  { type: array, items: { $ref: "#/components/schemas/FiscalYearReceivedRow" } }
        openPipeline:
          type: object
          required: [totalAsk, totalWeighted, rows]
          properties:
            totalAsk:      { type: string, description: "SUM(sub_amount) across the rows (numeric string)." }
            totalWeighted: { type: string, description: "SUM(weightedAmount) across the rows (numeric string)." }
            rows:          { type: array, items: { $ref: "#/components/schemas/FiscalYearOpenRow" } }

