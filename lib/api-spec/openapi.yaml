openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Wildflower Fundraising CRM API (Airtable-aligned schema)
servers:
  - url: /api
    description: Base API path
tags:
  - { name: health }
  - { name: users }
  - { name: regions }
  - { name: schools }
  - { name: entities }
  - { name: fiscal-year-entity-goals }
  - { name: fundable-projects }
  - { name: fiscal-years }
  - { name: funders }
  - { name: organizations }
  - { name: payment-intermediaries }
  - { name: households }
  - { name: people }
  - { name: people-entity-roles }
  - { name: emails }
  - { name: phone-numbers }
  - { name: addresses }
  - { name: opportunities-and-pledges }
  - { name: pledge-allocations }
  - { name: gifts-and-payments }
  - { name: gift-allocations }
  - { name: analytics }
  - { name: interactions }
  - { name: google-oauth }
  - { name: google-sync }
  - { name: email-proposals }
  - { name: correspondents }
  - { name: notes }
  - { name: tasks }

paths:
  # ─── Email intelligence proposals ──────────────────────────────────────────
  /email-proposals:
    get:
      operationId: listEmailProposals
      tags: [email-proposals]
      parameters:
        - { name: kind, in: query, schema: { $ref: "#/components/schemas/EmailProposalKind" } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/EmailProposalStatus" } }
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string }, description: "Filter to proposals targeting this person." }
        - { name: funderId, in: query, schema: { type: string }, description: "Filter to proposals targeting this funder." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalList" } } } }
  /email-proposals/summary:
    get:
      operationId: getEmailProposalSummary
      tags: [email-proposals]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalSummary" } } } }
  /email-proposals/{id}/accept:
    post:
      operationId: acceptEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/AcceptEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Accept dispatched but one of the apply actions failed; the proposal remains pending and all side effects were rolled back.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailProposalActionFailed" }
  /email-proposals/{id}/reject:
    post:
      operationId: rejectEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Unrecognized correspondents panel ─────────────────────────────────────
  /correspondents/unrecognized:
    get:
      operationId: listUnrecognizedCorrespondents
      tags: [correspondents]
      parameters:
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: days, in: query, schema: { type: integer, minimum: 1, maximum: 365, default: 60 } }
        - { name: minThreads, in: query, schema: { type: integer, minimum: 1, default: 2 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/UnrecognizedCorrespondentList" } } } }
  /correspondent-ignore:
    post:
      operationId: createCorrespondentIgnore
      tags: [correspondents]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateCorrespondentIgnoreBody" } } } }
      responses:
        "204": { description: Ignored }
        "400": { $ref: "#/components/responses/BadRequest" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } }

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } }
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
    patch:
      operationId: updateCurrentUser
      tags: [users]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCurrentUserBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  # ─── Regions ────────────────────────────────────────────────────────────────
  /regions:
    get:
      operationId: listRegions
      tags: [regions]
      parameters:
        - { name: type, in: query, schema: { $ref: "#/components/schemas/RegionType" } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RegionList" } } } }
  /regions/{id}:
    get:
      operationId: getRegion
      tags: [regions]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Region" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Schools (read-only; synced from Airtable) ─────────────────────────────
  /schools:
    get:
      operationId: listSchools
      tags: [schools]
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/SchoolStatus" } }
        - { name: governanceModel, in: query, schema: { $ref: "#/components/schemas/GovernanceModel" } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SchoolList" } } } }
  /schools/{id}:
    get:
      operationId: getSchool
      tags: [schools]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/School" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Entities (fund entities) ──────────────────────────────────────────────
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Entity" } } } } }
    post:
      operationId: createEntity
      tags: [entities]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateEntityBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Conflict (id already exists) }
  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateEntity
      tags: [entities]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateEntityBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Fiscal-year × entity goals ────────────────────────────────────────────
  /fiscal-year-entity-goals:
    get:
      operationId: listFiscalYearEntityGoals
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: query, schema: { type: string }, description: "Filter by fiscal_year.id" }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter by entity.id" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FiscalYearEntityGoal" } } } } }
  /fiscal-year-entity-goals/{fyId}/{entityId}:
    put:
      operationId: upsertFiscalYearEntityGoal
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: path, required: true, schema: { type: string } }
        - { name: entityId, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpsertFiscalYearEntityGoalBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearEntityGoal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteFiscalYearEntityGoal
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: path, required: true, schema: { type: string } }
        - { name: entityId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }

  # ─── Fundable projects ─────────────────────────────────────────────────────
  /fundable-projects:
    get:
      operationId: listFundableProjects
      tags: [fundable-projects]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FundableProject" } } } } }

  # ─── Fiscal years ──────────────────────────────────────────────────────────
  /fiscal-years:
    get:
      operationId: listFiscalYears
      tags: [fiscal-years]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FiscalYear" } } } } }

  # ─── Funders ───────────────────────────────────────────────────────────────
  /funders:
    get:
      operationId: listFunders
      tags: [funders]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - name: subtype
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/FundingEntitySubtype" } }
        - name: activeStatus
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/ActiveStatus" } }
        - name: connectionStatus
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/ConnectionStatus" } }
        - { name: enthusiasm, in: query, schema: { $ref: "#/components/schemas/Enthusiasm" } }
        - name: capacityRating
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/CapacityRating" } }
        - name: ownerUserId
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FunderList" } } } }
    post:
      operationId: createFunder
      tags: [funders]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateFunderBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Funder" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /funders/{id}:
    get:
      operationId: getFunder
      tags: [funders]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FunderDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateFunder
      tags: [funders]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateFunderBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Funder" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteFunder
      tags: [funders]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── Organizations ─────────────────────────────────────────────────────────
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { $ref: "#/components/schemas/OrganizationType" } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrganizationList" } } } }
    post:
      operationId: createOrganization
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOrganizationBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Organization" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrganizationDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateOrganization
      tags: [organizations]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateOrganizationBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Organization" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── Payment intermediaries ────────────────────────────────────────────────
  /payment-intermediaries:
    get:
      operationId: listPaymentIntermediaries
      tags: [payment-intermediaries]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { $ref: "#/components/schemas/PaymentIntermediaryType" } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntermediaryList" } } } }
    post:
      operationId: createPaymentIntermediary
      tags: [payment-intermediaries]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePaymentIntermediaryBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntermediary" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /payment-intermediaries/{id}:
    get:
      operationId: getPaymentIntermediary
      tags: [payment-intermediaries]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntermediaryDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updatePaymentIntermediary
      tags: [payment-intermediaries]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdatePaymentIntermediaryBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntermediary" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePaymentIntermediary
      tags: [payment-intermediaries]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── Households ────────────────────────────────────────────────────────────
  /households:
    get:
      operationId: listHouseholds
      tags: [households]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: active, in: query, schema: { type: boolean } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HouseholdList" } } } }
    post:
      operationId: createHousehold
      tags: [households]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateHouseholdBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Household" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /households/{id}:
    get:
      operationId: getHousehold
      tags: [households]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HouseholdDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateHousehold
      tags: [households]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateHouseholdBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Household" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteHousehold
      tags: [households]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── People ────────────────────────────────────────────────────────────────
  /people:
    get:
      operationId: listPeople
      tags: [people]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: deceased, in: query, schema: { type: boolean } }
        - { name: regionId, in: query, schema: { type: string } }
        - name: capacityRating
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/CapacityRating" } }
        - name: connectionStatus
          in: query
          style: form
          explode: false
          schema: { type: array, items: { $ref: "#/components/schemas/ConnectionStatus" } }
        - { name: enthusiasm, in: query, schema: { $ref: "#/components/schemas/Enthusiasm" } }
        - name: ownerUserId
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonList" } } } }
    post:
      operationId: createPerson
      tags: [people]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePersonBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Person" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PersonDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updatePerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdatePersonBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Person" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePerson
      tags: [people]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── People-entity-roles ───────────────────────────────────────────────────
  /people-entity-roles:
    get:
      operationId: listPeopleEntityRoles
      tags: [people-entity-roles]
      parameters:
        - { name: personId, in: query, schema: { type: string } }
        - { name: funderId, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: paymentIntermediaryId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PeopleEntityRoleList" } } } }
    post:
      operationId: createPeopleEntityRole
      tags: [people-entity-roles]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePeopleEntityRoleBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PeopleEntityRole" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /people-entity-roles/{id}:
    patch:
      operationId: updatePeopleEntityRole
      tags: [people-entity-roles]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdatePeopleEntityRoleBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PeopleEntityRole" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePeopleEntityRole
