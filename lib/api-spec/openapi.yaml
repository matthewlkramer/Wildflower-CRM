openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Wildflower Fundraising CRM API (Airtable-aligned schema)
servers:
  - url: /api
    description: Base API path
tags:
  - { name: health }
  - { name: users }
  - { name: regions }
  - { name: schools }
  - { name: entities }
  - { name: fiscal-year-entity-goals }
  - { name: fundable-projects }
  - { name: fiscal-years }

  - { name: organizations }
  - { name: payment-intermediaries }
  - { name: households }
  - { name: people }
  - { name: people-entity-roles }
  - { name: donor-payment-intermediaries }
  - { name: emails }
  - { name: phone-numbers }
  - { name: addresses }
  - { name: opportunities-and-pledges }
  - { name: pledge-allocations }
  - { name: gifts-and-payments }
  - { name: gift-allocations }
  - { name: revenue-coding }
  - { name: analytics }
  - { name: interactions }
  - { name: google-oauth }
  - { name: google-sync }
  - { name: email-proposals }
  - { name: task-proposals }
  - { name: correspondents }
  - { name: notes }
  - { name: tasks }
  - { name: meeting-notes }
  - { name: saved-views }
  - { name: storage }
  - { name: media-mentions }
  - { name: suppression-windows }
  - { name: calendar-meeting-filters }
  - { name: internal-email-domains }
  - { name: wildflower-updates }
  - { name: top-priorities }
  - { name: quickbooks-oauth }
  - { name: quickbooks-sync }
  - { name: staged-payments }
  - { name: reconciliation }
  - { name: grant-leads }
  - { name: cleanup-queue }
  - { name: coding-form-rows }
  - { name: admin }
  - { name: search }

paths:
  # ─── Global search ─────────────────────────────────────────────────────────
  /search:
    get:
      operationId: search
      tags: [search]
      summary: >-
        Unified cross-entity search (people, organizations, households,
        opportunities, gifts). Hybrid substring + trigram-fuzzy match, ranked by
        relevance. Archived rows excluded by default (admins may opt in via
        includeArchived); anonymous names masked for viewers who aren't the owner
        or an admin.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string }, description: "Search query (min 2 chars; shorter returns empty groups)." }
        - { name: limitPerType, in: query, schema: { type: integer, default: 5, minimum: 1, maximum: 20 }, description: "Max hits returned per entity group." }
        - { $ref: "#/components/parameters/IncludeArchivedQuery" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResults" } } } }
  # ─── Potential duplicates (review queue) ────────────────────────────────────
  /potential-duplicates:
    get:
      operationId: listPotentialDuplicates
      tags: [potential-duplicates]
      summary: >-
        Admin-only. Likely-duplicate organization or person pairs, detected by
        trigram name similarity plus a shared normalized phone number, ranked by
        score. Active (non-archived) records only; pairs an admin has dismissed
        as "not a duplicate" are excluded.
      parameters:
        - { name: type, in: query, required: true, schema: { type: string, enum: [organization, person] }, description: "Which entity type to scan for duplicates." }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 }, description: "Max candidate pairs to return." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DuplicatePairList" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /potential-duplicates/dismiss:
    post:
      operationId: dismissPotentialDuplicate
      tags: [potential-duplicates]
      summary: >-
        Admin-only. Mark a pair as "not a duplicate" so the detector never
        re-surfaces it. Idempotent — dismissing the same pair twice is a no-op.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DismissDuplicateBody" } } }
      responses:
        "204": { description: Dismissed (idempotent) }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  # ─── Financial corrections (mis-split / duplicate gifts, bulk deposits) ──────
  /financial-corrections:
    get:
      operationId: listFinancialCorrections
      tags: [financial-corrections]
      summary: >-
        Admin-only. Proposed corrections that make the CRM money records conform
        to the intended schema (INV-6 / §4.8) without ever editing a QuickBooks
        or Stripe record. Two kinds: `merge_gifts` (near-duplicate gifts that
        should be one gift with several allocations — apply via the existing
        gifts-and-payments/merge endpoint) and `link_evidence` (one bulk deposit
        that corroborates many gifts — apply via /financial-corrections/apply).
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 100, minimum: 1, maximum: 200 }, description: "Max proposals to return." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialCorrectionList" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /financial-corrections/apply:
    post:
      operationId: applyFinancialCorrection
      tags: [financial-corrections]
      summary: >-
        Admin-only. Apply a `link_evidence` correction: record corroborating
        many-to-many links from one piece of funding evidence to several gifts.
        Never edits the QuickBooks/Stripe source — only adds CRM-side
        corroboration. Idempotent on the (gift, evidence) pair. (Merge proposals
        are applied through the existing gifts-and-payments/merge endpoint.)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ApplyFinancialCorrectionBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ApplyFinancialCorrectionResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  # ─── Cleanup queue (records flagged for manual data cleanup) ─────────────────
  /cleanup-queue:
    get:
      operationId: listCleanupQueue
      tags: [cleanup-queue]
      summary: >-
        Records flagged as needing manual data cleanup. Each item links a target
        record to a human-readable note describing what to fix. Defaults to
        open items only; pass status to view resolved/dismissed items.
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/CleanupQueueStatus" }, description: "Filter by status. Omit to get open items only." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CleanupItemList" } } } }
    post:
      operationId: flagForResearch
      tags: [cleanup-queue]
      summary: >-
        Flag a record for research — adds it to the Cleanup Queue with
        reason_code='needs_research'. Idempotent against the
        (target_type, target_id, reason_code) unique key: re-flagging an
        already-flagged record returns the existing item instead of creating a
        duplicate.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/FlagForResearchBody" } } }
      responses:
        "200": { description: "Already flagged — returns the existing item.", content: { application/json: { schema: { $ref: "#/components/schemas/CleanupItem" } } } }
        "201": { description: "Created a new cleanup item.", content: { application/json: { schema: { $ref: "#/components/schemas/CleanupItem" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /cleanup-queue/{id}/resolve:
    post:
      operationId: resolveCleanupItem
      tags: [cleanup-queue]
      summary: Mark a cleanup item as resolved (the record was cleaned up by hand).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CleanupItem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Item is no longer open (already resolved or dismissed)." }
  /cleanup-queue/{id}/dismiss:
    post:
      operationId: dismissCleanupItem
      tags: [cleanup-queue]
      summary: Dismiss a cleanup item (a false flag / not worth fixing).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CleanupItem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Item is no longer open (already resolved or dismissed)." }

  # ─── Coding-form import (one-time donation coding-form reconciliation) ───────
  /coding-form-rows:
    get:
      operationId: listCodingFormRows
      tags: [coding-form-rows]
      summary: >-
        Parsed donation coding-form rows for the one-time import review. Each row
        carries its proposed donor + opportunity/gift match and a LIVE
        per-attribute cross-check (new/same/conflict) against current CRM state.
        Admin only.
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/CodingFormRowStatus" }, description: "Filter by apply status. Omit for all." }
        - { name: source, in: query, schema: { type: string, enum: [fy24, fy25, fy26, girasol] }, description: "Filter by source sheet." }
        - { name: matchTier, in: query, schema: { type: string, enum: [high, suggested, none] }, description: "Filter by match confidence tier." }
        - { name: hasDriveLink, in: query, schema: { type: boolean }, description: "When true, only rows carrying a grant-agreement Drive link (the grant-agreement backfill queue)." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRowList" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-grant-agreements-summary:
    get:
      operationId: getCodingFormGrantAgreementsSummary
      tags: [coding-form-rows]
      summary: >-
        Grant-agreement backfill progress — counts by derived grant-agreement
        status (na / no_match / ready / imported / conflict / failed) across the
        rows that carry a Drive link. Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormGrantAgreementsSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows-summary:
    get:
      operationId: getCodingFormSummary
      tags: [coding-form-rows]
      summary: >-
        Aggregate counts by status and source plus the "needs a decision" summary
        — spreadsheet attributes with no existing schema home, with row counts.
        Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows/{id}:
    get:
      operationId: getCodingFormRow
      tags: [coding-form-rows]
      summary: One parsed coding-form row with its full live cross-check. Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRow" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /coding-form-rows/{id}/match:
    patch:
      operationId: setCodingFormMatch
      tags: [coding-form-rows]
      summary: >-
        Set or override the donor (XOR — at most one donor FK) and the matched
        opportunity/gift for a row. Stamps matchConfirmedAt. Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SetCodingFormMatchBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRow" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /coding-form-rows/{id}/rematch:
    post:
      operationId: rematchCodingFormRow
      tags: [coding-form-rows]
      summary: >-
        Recompute the proposed donor/opportunity/gift match from the matcher,
        clearing any prior human confirmation. Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRow" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /coding-form-rows/rematch-pending:
    post:
      operationId: rematchPendingCodingFormRows
      tags: [coding-form-rows]
      summary: >-
        Bulk re-run the matcher over every row that is still pending AND has
        never been human-confirmed (rematch clears confirmations, so confirmed
        or applied rows are never touched). Adds the exact-amount same-donor
        ±90-day gift proposal pass. Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRematchSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows/{id}/confirm-match:
    post:
      operationId: confirmCodingFormMatch
      tags: [coding-form-rows]
      summary: >-
        Approve the row's CURRENT proposed donor/opportunity/gift link as-is:
        stamps matchConfirmedAt + the confirming user WITHOUT rewriting the
        proposal (matchMethod/matchTier keep their auto provenance). A confirmed
        row is excluded from every bulk rematch pass. 409 when the row has no
        donor match to confirm. Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRow" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Nothing to confirm — the row has no matched donor." }
  /coding-form-rows/confirm-matched:
    post:
      operationId: confirmMatchedCodingFormRows
      tags: [coding-form-rows]
      summary: >-
        Bulk-approve every still-pending, never-confirmed row that has BOTH a
        matched donor AND a matched gift (the auto-matcher's exactly-one
        proposals). Stamps matchConfirmedAt + the confirming user; never touches
        rows a human already confirmed, applied, or skipped, and never rewrites
        the proposal itself. Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormConfirmSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows/apply-decided:
    post:
      operationId: applyDecidedCodingFormRows
      tags: [coding-form-rows]
      summary: >-
        Bulk-apply every still-pending row whose match has been confirmed AND
        that carries stored per-attribute decisions: each row goes through the
        SAME apply path as the per-row Apply (compare-don't-clobber, idempotent,
        reporting task / allocation / address / gift-tag writes). Rows whose
        approved attributes are no longer actionable are counted (not errors);
        per-row failures are summarized, never thrown. Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormApplyDecidedSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows/{id}/apply:
    post:
      operationId: applyCodingFormRow
      tags: [coding-form-rows]
      summary: >-
        Apply approved attributes for a row through the normal create/update paths
        (reporting-deadline task, allocation restriction/intended-usage/purpose,
        donor address). Compare-don't-clobber: only fills missing or
        reviewer-approved conflicts. Idempotent — re-running never duplicates.
        Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ApplyCodingFormRowBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormApplyResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Row cannot be applied (e.g. no confirmed donor match)." }
  /coding-form-rows/{id}/skip:
    post:
      operationId: skipCodingFormRow
      tags: [coding-form-rows]
      summary: Mark a row as skipped (intentionally not imported). Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormRow" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /coding-form-rows/{id}/pull-grant-agreement:
    post:
      operationId: pullGrantAgreement
      tags: [coding-form-rows]
      summary: >-
        Pull this row's grant-agreement file (PDF, image, or Word doc) from Google
        Drive and attach it to the matched OPPORTUNITY/PLEDGE — or, when the row
        has no matched opportunity, to the matched GIFT — via the normal
        grant-letter flow. Idempotent
        (already-imported → noop). Never silently overwrites an existing grant
        letter — a different existing letter is a 409 conflict unless replace=true.
        A Drive fetch failure is recorded on the row and returned as a `failed`
        outcome (200). Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/PullGrantAgreementBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PullGrantAgreementResult" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "No Drive link, no matched opportunity/gift, or an existing grant letter would be overwritten without replace=true." }
  /coding-form-rows/pull-grant-agreements:
    post:
      operationId: pullGrantAgreementsBulk
      tags: [coding-form-rows]
      summary: >-
        Bulk grant-agreement pull: attach every actionable row's Drive file to
        its matched opportunity-else-gift. Only owner-vetted rows are attempted
        (human-confirmed match or applied row; skipped rows are excluded — pull
        those per-row if genuinely wanted). Attempts rows whose derived status
        is ready or failed (re-runs retry recorded transient failures); skips
        na/no_match/imported, and NEVER replaces an existing letter (conflicts
        are counted and left for per-row review with replace=true). Per-row
        failures are recorded on the rows and summarized, never thrown.
        Admin only.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormBulkPullSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /coding-form-rows/{id}/reinterpret:
    post:
      operationId: reinterpretCodingFormRow
      tags: [coding-form-rows]
      summary: >-
        AI-reinterpret ONE row (normalize donor name, re-parse the address blob,
        reinterpret the report answer, flag junk fields). Always re-runs, even
        when a payload already exists. A model/validation failure is recorded on
        the row (aiError) and returned in the response — never thrown; the prior
        payload is left untouched. Admin only.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormReinterpretResult" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /coding-form-rows/reinterpret:
    post:
      operationId: reinterpretCodingFormRows
      tags: [coding-form-rows]
      summary: >-
        Bulk AI reinterpretation over PENDING rows (applied/skipped rows are
        settled). Default only fills gaps — rows with no stored payload yet
        (including prior failures); force=true re-runs every pending row.
        Rate-limit-aware, concurrency 2; per-row failures are recorded on the
        rows and summarized, never thrown. Admin only.
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/ReinterpretCodingFormRowsBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CodingFormReinterpretSummary" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── Email intelligence proposals ──────────────────────────────────────────
  /email-proposals:
    get:
      operationId: listEmailProposals
      tags: [email-proposals]
      parameters:
        - { name: kind, in: query, schema: { $ref: "#/components/schemas/EmailProposalKind" } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/EmailProposalStatus" } }
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string }, description: "Filter to proposals targeting this person." }
        - { name: organizationId, in: query, schema: { type: string }, description: "Filter to proposals targeting this funder." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalList" } } } }
  /email-proposals/summary:
    get:
      operationId: getEmailProposalSummary
      tags: [email-proposals]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalSummary" } } } }
  /email-proposals/{id}/accept:
    post:
      operationId: acceptEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/AcceptEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Accept dispatched but one of the apply actions failed; the proposal remains pending and all side effects were rolled back.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailProposalActionFailed" }
  /email-proposals/{id}/reject:
    post:
      operationId: rejectEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/RejectEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-proposals/{id}/retry:
    post:
      operationId: retryEmailProposal
      tags: [email-proposals]
      summary: >-
        Re-run AI action-proposal for one errored proposal (owner-scoped).
        Clears the stored error, re-analyzes through the shared AI
        concurrency limiter + rate-limit-retry wrapper, and returns the
        refreshed proposal (new actions, or a fresh error).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The proposal is no longer pending (already resolved), so it cannot be retried.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /email-proposals/{id}/revise:
    post:
      operationId: reviseEmailProposal
      tags: [email-proposals]
      summary: >-
        Re-run AI action-proposal for one pending proposal with a human
        reviewer's plain-English correction folded into the per-proposal
        prompt (owner-scoped, pending-only). Appends the reviewer's comment
        to the reviewer-note field (preserving prior comments and any later
        verdict note), resets the error + analyzed-at fields, re-analyzes
        through the shared AI concurrency limiter + rate-limit-retry wrapper,
        leaves the proposal pending, and returns the refreshed proposal (new
        actions, or a fresh error).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReviseEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The proposal is no longer pending (already resolved), so it cannot be revised.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /email-proposals/{id}/reopen:
    post:
      operationId: reopenEmailProposal
      tags: [email-proposals]
      summary: >-
        Restore an AI auto-hidden (status `ignored`) proposal back to the
        pending review queue (owner-scoped, ignored-only). Used when the
        reviewer judges the AI's "flagged inaccurate" / "auto-suppressed"
        verdict to be wrong. Keeps the existing analysis (proposed actions)
        and reviewer note as audit trail, flips status `ignored` → `pending`,
        and returns the refreshed proposal. Does NOT re-run the AI.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The proposal is not in the `ignored` state, so it cannot be re-opened.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ─── Task intelligence (AI-suggested next-step cultivation tasks) ────────────
  /task-proposals:
    get:
      operationId: getTaskProposal
      tags: [task-proposals]
      summary: >-
        Current AI-suggested next-step task for a person OR organization.
        Generates + caches one on first view when none exists and the entity
        isn't low-priority. Provide exactly one of personId / organizationId.
      parameters:
        - { name: personId, in: query, schema: { type: string }, description: "Entity to suggest a next step for (person)." }
        - { name: organizationId, in: query, schema: { type: string }, description: "Entity to suggest a next step for (organization)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposalResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /task-proposals/refresh:
    post:
      operationId: refreshTaskProposal
      tags: [task-proposals]
      summary: Regenerate the pending suggestion for an entity on demand.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RefreshTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposalResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /task-proposals/{id}/accept:
    post:
      operationId: acceptTaskProposal
      tags: [task-proposals]
      summary: Accept a suggestion — creates a real linked task and marks the proposal accepted.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/AcceptTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AcceptTaskProposalResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /task-proposals/{id}/dismiss:
    post:
      operationId: dismissTaskProposal
      tags: [task-proposals]
      summary: Dismiss a suggestion — marks it dismissed with an optional note (appended to prior notes for the audit trail).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/DismissTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /task-proposals/{id}/revise:
    post:
      operationId: reviseTaskProposal
      tags: [task-proposals]
      summary: >-
        Re-run the AI suggestion for one pending task proposal with a human
        reviewer's plain-English guidance folded into the prompt. Appends the
        reviewer's comment to the reviewer-note field (preserving prior comments
        and any later verdict note), resets the error + analyzed-at fields,
        re-analyzes through the shared AI concurrency limiter + rate-limit-retry
        wrapper, leaves the proposal pending, and returns the refreshed proposal
        (new suggestion, or a fresh error).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReviseTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposalResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The proposal is no longer pending (already resolved), so it cannot be revised.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ─── Email-intelligence admin console ──────────────────────────────────────
  /admin/email-intel/prompts:
    get:
      operationId: adminListEmailIntelPrompts
      tags: [admin]
      summary: Per-(signal type, review phase) review prompts — active + draft + history (admin only)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPromptConsole" } } } }
        "403": { description: Admin required }
    post:
      operationId: adminSaveEmailIntelPrompt
      tags: [admin]
      summary: Save a hand-edited review prompt as the new active version for a (signal type, review phase) key (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SaveEmailIntelPromptBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
  /admin/email-intel/prompts/generate:
    post:
      operationId: adminGenerateEmailIntelPrompt
      tags: [admin]
      summary: Draft an improved review prompt for a (signal type, review phase) key from recent feedback, saved as a non-active draft (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/GenerateEmailIntelPromptBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
        "409": { description: No feedback available to learn from }
  /admin/email-intel/prompts/{id}/activate:
    post:
      operationId: adminActivateEmailIntelPrompt
      tags: [admin]
      summary: Approve a draft / promote a version to active (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/prompts/{id}/revert:
    post:
      operationId: adminRevertEmailIntelPrompt
      tags: [admin]
      summary: Revert to a prior version by copying it into a new active version (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/prompts/{id}:
    delete:
      operationId: adminDiscardEmailIntelPrompt
      tags: [admin]
      summary: Discard an outstanding AI draft (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/feedback:
    get:
      operationId: adminListEmailIntelFeedback
      tags: [admin]
      summary: Cross-mailbox feed of resolved proposal feedback (admin only)
      parameters:
        - { name: kind, in: query, schema: { $ref: "#/components/schemas/EmailProposalKind" } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/EmailProposalStatus" } }
        - name: reviewerSource
          in: query
          description: >
            Filter the feed by who resolved each proposal. `all` (default)
            returns every resolved proposal. `real` excludes feedback authored
            by automated test accounts (the "Test Dev"/"Test Admin" users
            auto-provisioned during end-to-end test runs), leaving only
            feedback from real human reviewers.
          schema: { type: string, enum: [all, real], default: all }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelFeedbackList" } } } }
        "403": { description: Admin required }

