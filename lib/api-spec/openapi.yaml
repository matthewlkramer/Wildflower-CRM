openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Wildflower Fundraising CRM API (Airtable-aligned schema)
servers:
  - url: /api
    description: Base API path
tags:
  - { name: health }
  - { name: users }
  - { name: regions }
  - { name: schools }
  - { name: entities }
  - { name: fiscal-year-entity-goals }
  - { name: fundable-projects }
  - { name: fiscal-years }

  - { name: organizations }
  - { name: payment-intermediaries }
  - { name: households }
  - { name: people }
  - { name: people-entity-roles }
  - { name: donor-payment-intermediaries }
  - { name: emails }
  - { name: phone-numbers }
  - { name: addresses }
  - { name: opportunities-and-pledges }
  - { name: pledge-allocations }
  - { name: gifts-and-payments }
  - { name: gift-allocations }
  - { name: analytics }
  - { name: interactions }
  - { name: google-oauth }
  - { name: google-sync }
  - { name: email-proposals }
  - { name: task-proposals }
  - { name: correspondents }
  - { name: notes }
  - { name: tasks }
  - { name: meeting-notes }
  - { name: saved-views }
  - { name: storage }
  - { name: media-mentions }
  - { name: suppression-windows }
  - { name: calendar-meeting-filters }
  - { name: internal-email-domains }
  - { name: top-priorities }
  - { name: quickbooks-oauth }
  - { name: quickbooks-sync }
  - { name: staged-payments }
  - { name: admin }

paths:
  # ─── Email intelligence proposals ──────────────────────────────────────────
  /email-proposals:
    get:
      operationId: listEmailProposals
      tags: [email-proposals]
      parameters:
        - { name: kind, in: query, schema: { $ref: "#/components/schemas/EmailProposalKind" } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/EmailProposalStatus" } }
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: personId, in: query, schema: { type: string }, description: "Filter to proposals targeting this person." }
        - { name: organizationId, in: query, schema: { type: string }, description: "Filter to proposals targeting this funder." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalList" } } } }
  /email-proposals/summary:
    get:
      operationId: getEmailProposalSummary
      tags: [email-proposals]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposalSummary" } } } }
  /email-proposals/{id}/accept:
    post:
      operationId: acceptEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/AcceptEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Accept dispatched but one of the apply actions failed; the proposal remains pending and all side effects were rolled back.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailProposalActionFailed" }
  /email-proposals/{id}/reject:
    post:
      operationId: rejectEmailProposal
      tags: [email-proposals]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/RejectEmailProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Task intelligence (AI-suggested next-step cultivation tasks) ────────────
  /task-proposals:
    get:
      operationId: getTaskProposal
      tags: [task-proposals]
      summary: >-
        Current AI-suggested next-step task for a person OR organization.
        Generates + caches one on first view when none exists and the entity
        isn't low-priority. Provide exactly one of personId / organizationId.
      parameters:
        - { name: personId, in: query, schema: { type: string }, description: "Entity to suggest a next step for (person)." }
        - { name: organizationId, in: query, schema: { type: string }, description: "Entity to suggest a next step for (organization)." }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposalResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /task-proposals/refresh:
    post:
      operationId: refreshTaskProposal
      tags: [task-proposals]
      summary: Regenerate the pending suggestion for an entity on demand.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RefreshTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposalResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /task-proposals/{id}/accept:
    post:
      operationId: acceptTaskProposal
      tags: [task-proposals]
      summary: Accept a suggestion — creates a real linked task and marks the proposal accepted.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/AcceptTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AcceptTaskProposalResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /task-proposals/{id}/dismiss:
    post:
      operationId: dismissTaskProposal
      tags: [task-proposals]
      summary: Dismiss a suggestion — marks it dismissed with an optional note (audit trail).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/DismissTaskProposalBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TaskProposal" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Email-intelligence admin console ──────────────────────────────────────
  /admin/email-intel/prompts:
    get:
      operationId: adminListEmailIntelPrompts
      tags: [admin]
      summary: Active AI prompt + draft + version history (admin only)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPromptOverview" } } } }
        "403": { description: Admin required }
    post:
      operationId: adminSaveEmailIntelPrompt
      tags: [admin]
      summary: Save a hand-edited prompt as the new active version (admin only)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SaveEmailIntelPromptBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { description: Admin required }
  /admin/email-intel/prompts/generate:
    post:
      operationId: adminGenerateEmailIntelPrompt
      tags: [admin]
      summary: Draft an improved prompt from recent feedback, saved as a non-active draft (admin only)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "403": { description: Admin required }
        "409": { description: No feedback available to learn from }
  /admin/email-intel/prompts/{id}/activate:
    post:
      operationId: adminActivateEmailIntelPrompt
      tags: [admin]
      summary: Approve a draft / promote a version to active (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/prompts/{id}/revert:
    post:
      operationId: adminRevertEmailIntelPrompt
      tags: [admin]
      summary: Revert to a prior version by copying it into a new active version (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelPrompt" } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/prompts/{id}:
    delete:
      operationId: adminDiscardEmailIntelPrompt
      tags: [admin]
      summary: Discard an outstanding AI draft (admin only)
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "403": { description: Admin required }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/email-intel/feedback:
    get:
      operationId: adminListEmailIntelFeedback
      tags: [admin]
      summary: Cross-mailbox feed of resolved proposal feedback (admin only)
      parameters:
        - { name: kind, in: query, schema: { $ref: "#/components/schemas/EmailProposalKind" } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/EmailProposalStatus" } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EmailIntelFeedbackList" } } } }
        "403": { description: Admin required }

  # ─── Unrecognized correspondents panel ─────────────────────────────────────
  /correspondents/unrecognized:
    get:
      operationId: listUnrecognizedCorrespondents
      tags: [correspondents]
      parameters:
        - { name: mailboxUserId, in: query, schema: { type: string } }
        - { name: days, in: query, schema: { type: integer, minimum: 1, maximum: 365, default: 60 } }
        - { name: minThreads, in: query, schema: { type: integer, minimum: 1, default: 2 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/UnrecognizedCorrespondentList" } } } }
  /correspondent-ignore:
    post:
      operationId: createCorrespondentIgnore
      tags: [correspondents]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateCorrespondentIgnoreBody" } } } }
      responses:
        "204": { description: Ignored }
        "400": { $ref: "#/components/responses/BadRequest" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } }

  # ─── Users ──────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } }
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
    patch:
      operationId: updateCurrentUser
      tags: [users]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCurrentUserBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }

  # ─── Regions ────────────────────────────────────────────────────────────────
  /regions:
    get:
      operationId: listRegions
      tags: [regions]
      parameters:
        - { name: type, in: query, schema: { $ref: "#/components/schemas/RegionType" } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RegionList" } } } }
    post:
      operationId: createRegion
      tags: [regions]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateRegionBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Region" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Conflict (slug already exists) }
  /regions/{id}:
    get:
      operationId: getRegion
      tags: [regions]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Region" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Schools (read-only; synced from Airtable) ─────────────────────────────
  /schools:
    get:
      operationId: listSchools
      tags: [schools]
      parameters:
        - { name: status, in: query, schema: { $ref: "#/components/schemas/SchoolStatus" } }
        - { name: governanceModel, in: query, schema: { $ref: "#/components/schemas/GovernanceModel" } }
        - { name: search, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SchoolList" } } } }
  /schools/{id}:
    get:
      operationId: getSchool
      tags: [schools]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/School" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Entities (fund entities) ──────────────────────────────────────────────
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Entity" } } } } }
    post:
      operationId: createEntity
      tags: [entities]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateEntityBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Conflict (id already exists) }
  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateEntity
      tags: [entities]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateEntityBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Entity" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Fiscal-year × entity goals ────────────────────────────────────────────
  /fiscal-year-entity-goals:
    get:
      operationId: listFiscalYearEntityGoals
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: query, schema: { type: string }, description: "Filter by fiscal_year.id" }
        - { name: entityId, in: query, schema: { type: string }, description: "Filter by entity.id" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FiscalYearEntityGoal" } } } } }
  /fiscal-year-entity-goals/{fyId}/{entityId}:
    put:
      operationId: upsertFiscalYearEntityGoal
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: path, required: true, schema: { type: string } }
        - { name: entityId, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpsertFiscalYearEntityGoalBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FiscalYearEntityGoal" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteFiscalYearEntityGoal
      tags: [fiscal-year-entity-goals]
      parameters:
        - { name: fyId,     in: path, required: true, schema: { type: string } }
        - { name: entityId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }

  # ─── Fundable projects ─────────────────────────────────────────────────────
  /fundable-projects:
    get:
      operationId: listFundableProjects
      tags: [fundable-projects]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FundableProject" } } } } }
    post:
      operationId: createFundableProject
      tags: [fundable-projects]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateFundableProjectBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FundableProject" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { description: Conflict (id already exists) }
  /fundable-projects/{id}:
    get:
      operationId: getFundableProject
      tags: [fundable-projects]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FundableProject" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateFundableProject
      tags: [fundable-projects]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateFundableProjectBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FundableProject" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /fundable-projects-progress:
    get:
      operationId: getFundableProjectsProgress
      tags: [fundable-projects]
      summary: Amount raised so far per fundable project (sum of gift_allocations.sub_amount).
      description: |
        Returns, per fundable project, the total amount raised so far — the sum of
        `gift_allocations.sub_amount` for allocations whose `fundable_project_id`
        matches. Projects with no gift allocations report `raised: "0"`. Use with
        each project's `fundraisingGoal` to render progress-to-goal.
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FundableProjectProgress" } } } } }

  # ─── Fiscal years ──────────────────────────────────────────────────────────
  /fiscal-years:
    get:
      operationId: listFiscalYears
      tags: [fiscal-years]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FiscalYear" } } } } }

  # ─── Organizations ─────────────────────────────────────────────────────────
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: issuesGrants, in: query, schema: { type: boolean }, description: "Filter to grant-making organizations only (true) or non-grant entities only (false). Omit for all." }
        - { name: makesPris, in: query, schema: { type: boolean }, description: "Filter to organizations that make PRIs (true) or do not (false). Omit for all." }
        - { name: parentOrganizationId, in: query, description: "Filter to direct child organizations of the given parent.", schema: { type: string } }
        - { name: lifetimeGivingPresence, in: query, required: false, description: "Rollup presence filter on lifetime giving (`has` = >0, `blank` = none). Only meaningful for issuesGrants=true.", schema: { type: string, enum: [has, blank] } }
        - { name: openAsksPresence, in: query, required: false, description: "Rollup presence filter on open opportunity count (`has` = >0, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: primaryContactPresence, in: query, required: false, description: "Presence filter on primary contact (`has` = set, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - name: entityType
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: activeStatus
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: connectionStatus
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: enthusiasm
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: strategicAlignment
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: capacityRating
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: ownerUserId
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: priority
          in: query
          description: |
            Filter to organizations whose `priority` tier is in the given set
            (top/high/medium/low). Multi-value: repeat or comma-separate.
            Accepts the literal `__blank__` to match rows with no priority set.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: regionIds
          in: query
          description: |
            Filter to organizations whose `regionIds` array overlaps the given set.
            Multi-value: repeat or comma-separate.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: type
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrganizationList" } } } }
    post:
      operationId: createOrganization
      tags: [organizations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOrganizationBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Organization" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrganizationDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateOrganization
      tags: [organizations]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateOrganizationBody" } } } }
      responses:
