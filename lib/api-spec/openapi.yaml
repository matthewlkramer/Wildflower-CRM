          nullable: true
        isWildflowerStaff:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, clerkUserId, email, firstName, lastName, displayName, role, isWildflowerStaff, createdAt]

    UpdateUserBody:
