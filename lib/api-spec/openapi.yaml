      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Interaction" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateInteraction
      tags: [interactions]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateInteractionBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Interaction" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteInteraction
      tags: [interactions]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }

  # ─── Notes ────────────────────────────────────────────────────────────────
  /notes:
