        pledge allocation, computed on the fly from its donor, fund entity,
        restriction axes and region — never persisted on the allocation. A
        read-only preview the reviewer can use when the pledge converts to a
        gift and its money is coded on the linked staged_payments row.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RevenueCodingPreview" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Gifts & payments ──────────────────────────────────────────────────────
  /gifts-and-payments:
    get:
      operationId: listGiftsAndPayments
      tags: [gifts-and-payments]
      parameters:
        - { $ref: "#/components/parameters/IncludeArchivedQuery" }
        - { name: search, in: query, schema: { type: string } }
        # Presence filters on computed rollup fields. `has` keeps rows with a
        # value, `blank` keeps rows with none. Omit for no constraint.
        - { name: entitiesPresence, in: query, required: false, description: "Presence filter on linked entities (`has` = any allocation, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: usagesPresence, in: query, required: false, description: "Presence filter on display usages (`has` = any, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - { name: grantYearsPresence, in: query, required: false, description: "Presence filter on grant years (`has` = any, `blank` = none).", schema: { type: string, enum: [has, blank] } }
        - name: type
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: householdId, in: query, schema: { type: string } }
        - { name: individualGiverPersonId, in: query, schema: { type: string } }
        - { name: opportunityId, in: query, schema: { type: string } }
        - name: paymentMethod
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { name: thankYouSentAtPresence, in: query, required: false, description: "Presence filter on thank-you sent date (`has` = sent, `blank` = not sent).", schema: { type: string, enum: [has, blank] } }
        - name: ownerUserId
          in: query
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: entityId
          in: query
          required: false
          description: |
            Filter to gifts that have at least one gift_allocation with `entity_id`
            in the given set. Comma-separated form supported.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - name: fiscalYear
          in: query
          required: false
          description: |
            Filter to gifts that have at least one gift_allocation with
            `grant_year` in the given set (e.g. `fy2026`). Multi-value:
            repeat the param or comma-separate. Omit to include all
            fiscal years.
          style: form
          explode: false
          schema: { type: array, items: { type: string } }
        - { name: dateAfter, in: query, required: false, description: "Keep gifts with dateReceived on/after this date (inclusive).", schema: { type: string, format: date } }
        - { name: dateBefore, in: query, required: false, description: "Keep gifts with dateReceived on/before this date (inclusive).", schema: { type: string, format: date } }
        - { name: linkedToQuickbooks, in: query, required: false, description: "Filter by whether a QuickBooks staged payment is reconciled to / created this gift (`linked`) or not (`unlinked`).", schema: { type: string, enum: [linked, unlinked] } }
        - name: quickbooksTie
          in: query
          required: false
          description: |
            Filter on the derived per-gift QuickBooks-tie status. Repeat or
            comma-separate for multiple values. The special value `untied`
            (sugar for `missing` + `amount_mismatch`) lists on-books gifts that
            should tie to a QuickBooks record but don't.
          style: form
          explode: false
          schema: { type: array, items: { type: string, enum: [exempt, tied, amount_mismatch, missing, untied] } }
        - { name: awaitingEvidence, in: query, required: false, description: "When true, list only gifts awaiting funding evidence (edge case B4): CRM-first gifts logged by a fundraiser before any funding evidence arrived. The state is human-entered amount (`finalAmountSource = human`, which the DB CHECK guarantees has null QuickBooks/Stripe evidence pointers) AND no QuickBooks tie yet (`quickbooksTieStatus = missing`). Off-books/exempt and processor-sourced (tied) gifts are excluded.", schema: { type: boolean } }
        - name: worklist
          in: query
          required: false
          description: |
            Donor-lifecycle worklist preset ("what hasn't been done yet"), the
            canonical definition shared with the dashboard worklist counts:
              missing_allocations — gift headers with no gift_allocations rows
                                    at all. ALL money scope (entity, fiscal year,
                                    sub-amounts, coding) lives on allocation rows,
                                    so a gift with none is uncoded/unattributed
                                    and needs allocation work.
          schema: { type: string, enum: [missing_allocations] }
        - { name: sort, in: query, required: false, schema: { $ref: "#/components/schemas/GiftSort" }, description: "Sort order (default date_desc)." }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftOrPaymentList" } } } }
    post:
      operationId: createGiftOrPayment
      tags: [gifts-and-payments]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateGiftOrPaymentBody" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/GiftOrPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /gifts-and-payments/{id}:
    get:
      operationId: getGiftOrPayment
      tags: [gifts-and-payments]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftOrPaymentDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateGiftOrPayment
      tags: [gifts-and-payments]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateGiftOrPaymentBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftOrPayment" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /gifts-and-payments/{id}/candidate-thank-you-emails:
    get:
      operationId: listCandidateThankYouEmails
      tags: [gifts-and-payments]
      description: |
        Recent outbound emails from the caller's mailbox to any contact
        of the gift's funder, within 90 days of the gift's dateReceived.
        Each result is flagged `autoSuggested: true` when it matches the
        thank-you heuristic (subject contains 'thank', has ≥1 document
        attachment, sent within 30 days of dateReceived).
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CandidateThankYouEmailList" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /gifts-and-payments/{id}/link-thank-you-email:
    post:
      operationId: linkThankYouEmail
      tags: [gifts-and-payments]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/LinkThankYouEmailBody" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftOrPaymentDetail" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: unlinkThankYouEmail
      tags: [gifts-and-payments]
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses: { "204": { description: Deleted } }
  /gifts-and-payments/{id}/stripe-chain:
    get:
      operationId: getGiftStripeChain
      tags: [gifts-and-payments]
      summary: The read-only Stripe→QuickBooks reconciliation chain for a gift (charge → payout → QB deposit lump), for EOY audit provenance. Any leg is null when it doesn't apply.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftStripeChain" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /gifts-and-payments/{id}/audit-reconciliation:
    get:
      operationId: getGiftAuditReconciliation
      tags: [gifts-and-payments]
      summary: |
        Per-gift audit-reconciliation read view answering when the money
        arrived, the QuickBooks record(s) it appears in, who gave it, and its
        restrictions. Off-books gifts (exempt) are flagged `auditExcluded` and
        carry no QuickBooks expectation.
      parameters: [ { $ref: "#/components/parameters/IdPath" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GiftAuditReconciliation" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── Gift allocations ──────────────────────────────────────────────────────
  /gift-allocations:
    get:
      operationId: listGiftAllocations
      tags: [gift-allocations]
      parameters:
        - { name: giftId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Page" }
      responses:
